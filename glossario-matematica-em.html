{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"🎲",term:"Probabilidade — ENEM",
 layers:[{tag:"Ponto de Partida",text:"Um teste de diagnóstico tem 95% de precisão. Você testa positivo. Qual a chance de realmente ter a doença? A maioria das pessoas diz '95%'. Mas se apenas 1 em 1000 pessoas tem a doença, a chance real pode ser bem menor. <b>Probabilidade condicional é contraintuitiva.</b>",ex:"Com prevalência de 0,1% e teste 95% preciso: P(doença dado positivo) aprox 1,9%. Surpreendente!"},
   {tag:"O complementar — o atalho mais poderoso",text:"Calcular P(pelo menos um) diretamente pode ser trabalhoso — muitos casos favoráveis. Mas o complemento é simples: P(pelo menos 1) = 1 - P(nenhum). <b>Sempre que ver 'pelo menos um', pense no complementar primeiro.</b>",ex:"P(pelo menos um 6 em 3 dados) = 1 - P(nenhum 6) = 1 - (5/6)^3 = 1 - 125/216 = 91/216 aprox 42%."},
   {tag:"Formalizacao — Estrategia ENEM",text:"1. Defina o espaço amostral. 2. Identifique: os eventos são independentes? 3. Use complementar se 'pelo menos um'. 4. Use P(A e B)=P(A)xP(B) para independentes. 5. Use P(A dado B)=P(AeB)/P(B) para dependentes.",ex:"Urna: 4 brancas, 6 azuis. P(2 brancas sem reposição) = (4/10) x (3/9) = 12/90 = 2/15."},
   {tag:"ENEM (5,5%) — O que mais cai",text:"Probabilidade condicional em contextos reais (pesquisas, exames), complementar com 'pelo menos um', eventos dependentes (sem reposição). Falácia do apostador: 'cara saiu 10 vezes, logo coroa é mais provável'. FALSO — eventos independentes não têm memória!",ex:"Cara saiu 10 vezes seguidas: P(coroa na 11ª) ainda é 50%. O dado não lembra o passado."}],
 historia:{cenas:[{icon:"🎲",label:"O APOSTADOR E PASCAL",texto:"No século XVII, o Cavaleiro de Méré apostava 'pelo menos um duplo-6 em 24 lançamentos de 2 dados' e perdia mais do que ganhava. Pascal calculou: P(pelo menos um duplo-6 em 24) = 1 - (35/36)^24 aprox 49,1%. Menos de 50% — a aposta era levemente desfavorável. A matemática explicou o que a intuição não conseguia."},{icon:"🏥",label:"O PARADOXO DO TESTE",texto:"Uma doença afeta 1 em 10.000 pessoas. O teste tem 99% de precisão. Se você testar positivo, qual a chance real? Das 10.000 pessoas, 1 tem a doença e testa positivo. Mas 99 das 9.999 saudáveis também testam positivo (1% de erro). Total de positivos: 100. Verdadeiros positivos: 1. P(doente dado positivo) = 1/100 = 1%! O teste é preciso, mas o diagnóstico requer mais."}],pergunta:"Por que um teste com 99% de precisão pode ter apenas 1% de chance de ser correto num caso positivo?",moral:"Probabilidade no ENEM é sobre raciocínio, não cálculo mecânico. O complementar é seu melhor amigo. A probabilidade condicional é a mais poderosa e contraintuitiva — contexto muda tudo."},

 simple:"5,5% ENEM. Probabilidade condicional, eventos independentes, complementar. Foco em interpretação de situações reais.",
 explain:"Probabilidade no ENEM vai além de 'quantas bolas azuis na urna'. As questões costumam colocar probabilidade em contextos reais — e testam se você sabe interpretar e raciocinar, não só calcular.<br><br>Conceitos-chave:<br>• <b>Evento complementar</b>: P(não A) = 1 − P(A). 'Pelo menos um' quase sempre é resolvido pelo complementar.<br>• <b>Eventos independentes</b>: P(A e B) = P(A) × P(B)<br>• <b>Probabilidade condicional</b>: P(A|B) — probabilidade de A dado que B já ocorreu<br>• <b>Falácia do apostador</b>: eventos passados não afetam eventos futuros independentes. A moeda não tem memória.<br><br>Dica prática: quando o enunciado diz 'pelo menos um' ou 'ao menos', calcule o complementar — é sempre mais fácil calcular a probabilidade do que você NÃO quer.",
 example:"ENEM 2019: numa pesquisa, 60% usam celular para redes sociais e 40% para notícias. P(ambos) = ? Precisa saber se são independentes ou não.",

 story:{icon:"🩺",title:"O exame falso-positivo",text:"Um exame detecta uma doença com 99% de precisão. A doença afeta 1% da população. Você fez o exame e deu POSITIVO. Qual a probabilidade de ter a doença?\n\nA maioria intuitivamente responde '99%'. O resultado correto surpreende:\n\nDe 10.000 pessoas:\n• 100 têm a doença. O exame pega 99 (99% de precisão).\n• 9.900 não têm. Mas o exame erra 1% = erra em 99 pessoas saudáveis.\n\nTotal de positivos: 99 + 99 = 198\nDoentes entre os positivos: 99/198 = 50%\n\nApenas 50% de chance de ter a doença — mesmo com exame de 99% de precisão!",connection:"Este é o Teorema de Bayes — fundamental em diagnósticos médicos, filtros de spam, reconhecimento facial por IA, previsões meteorológicas e qualquer sistema que precisa atualizar probabilidades com novas evidências."},
 dict:[
   {term:"Probabilidade condicional",def:"P(A|B) = probabilidade de A dado que B já ocorreu. P(A|B) = P(A∩B)/P(B).",ex:"Numa turma: P(aprova dado que estudou) pode ser bem maior que P(aprova em geral)."},
   {term:"Falácia do apostador",def:"Erro de achar que eventos passados afetam futuros eventos independentes.",ex:"Cara saiu 10 vezes: a probabilidade de coroa na próxima ainda é 50%!"},
   {term:"Eventos mutuamente exclusivos",def:"Não podem ocorrer ao mesmo tempo. P(A∪B)=P(A)+P(B).",ex:"Sair 3 E sair 5 no mesmo lançamento de dado: exclusivos. P=1/6+1/6=1/3."},
   {term:"Complementar",def:"P(evento não ocorrer)=1−P(ocorrer). Útil quando o complemento é mais simples.",ex:"P(pelo menos uma cara em 3 lançamentos)=1−P(nenhuma cara)=1−(1/2)³=7/8."}
 ],
 steps:{
   intro:"Estratégia para probabilidade no ENEM — perguntas-chave antes de calcular.",
   items:[
     {n:1,action:"Os eventos são independentes?",detail:"Com reposição ou sem relação entre si → independentes. Sem reposição → dependentes (espaço amostral muda).",ex:"Dois dados → independentes. Tirar 2 cartas sem reposição → dependentes"},
     {n:2,action:"O evento é simples ou composto?",detail:"Simples: P=favoráveis/total. Composto: use soma (AUB) ou produto (A∩B) conforme o caso.",ex:"P(A e B independentes)=P(A)×P(B). P(A ou B exclusivos)=P(A)+P(B)"},
     {n:3,action:"Considere usar complementar",detail:"Se o enunciado tem 'pelo menos um' ou 'ao menos' → complementar é quase sempre mais rápido.",ex:"P(pelo menos 1 cara em 3 lançamentos)=1−P(nenhuma cara)=1−(1/2)³=7/8"},
     {n:4,action:"Calcule e simplifique",detail:"Expresse como fração, simplifique e converta para % se pedido.",ex:"P=6/36=1/6≈16,7%",tip:"⚠️ Falácia do apostador: cara saiu 5 vezes seguidas — a P(coroa) ainda é 50%! O dado não tem memória."}
   ]
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📈",term:"Funções — ENEM",
 layers:[{tag:"Ponto de Partida",text:"Um plano de celular cobra R$30 fixos + R$0,25/minuto. Uma curva de doença num gráfico sobe devagar, depois acelera. Um produto perde valor com o tempo de forma constante. <b>Cada situação tem um padrão de variação diferente — e uma função diferente descreve cada padrão.</b>",ex:"Crescimento constante → afim. Cresce acelerando → exponencial. Tem máximo/mínimo → quadrática."},
   {tag:"Reconhecer pelo grafico",text:"<b>Reta</b> → função afim. <b>Parábola</b> → função quadrática. <b>Curva que acelera e nunca para</b> → exponencial. <b>Curva que desacelera</b> → logarítmica. O ENEM frequentemente apresenta um gráfico e pede para identificar ou interpretar a função.",ex:"Gráfico que dobra a cada período = exponencial. Gráfico com ponto mais alto = quadrática com máximo."},
   {tag:"Formalizacao — Os coeficientes no contexto",text:"O ENEM cobra interpretar o significado dos coeficientes no contexto real, não apenas calcular. Em f(x)=ax+b: <b>b é o valor inicial</b> (quando x=0) e <b>a é a taxa de variação</b> (quanto muda por unidade). Na quadrática, o vértice é o ponto ótimo.",ex:"f(x)=0,25x+30: b=30 (custo fixo do plano), a=0,25 (R$/minuto). Interpretação > cálculo."},
   {tag:"ENEM (5,4%) — O que mais cai",text:"Modelagem (qual função descreve a situação?), leitura de gráficos, interpretação dos coeficientes no contexto, ponto de equilíbrio entre duas funções. Perguntas típicas: 'em que momento os custos se igualam?' ou 'qual o valor máximo possível?'",ex:"Ponto de equilíbrio: f(x)=g(x) → 0,25x+30=0,50x → x=120 minutos."}],
 historia:{cenas:[{icon:"📱",label:"OS DOIS PLANOS DE CELULAR",texto:"Beatriz tinha que escolher entre dois planos: Plano A — R$30 fixos + R$0,25/minuto. Plano B — R$50 fixos + R$0,10/minuto. Para poucos minutos, o Plano A era mais barato. Para muitos minutos, o Plano B compensava. Onde se igualam? 0,25x+30=0,10x+50 → 0,15x=20 → x aprox 133 minutos. Acima disso, Plano B vence."},{icon:"🌡️",label:"A CURVA DA DOENCA",texto:"No início de uma epidemia, o gráfico de casos parecia uma linha reta — crescimento lento. Mas após algumas semanas, a curva começou a dobrar: 100, 200, 400, 800 casos. O epidemiologista reconheceu: 'isso não é mais linear — é exponencial. Cada infectado está transmitindo para 2 pessoas.' O formato do gráfico revelou a matemática por trás."}],pergunta:"Como o formato do gráfico pode revelar que tipo de função descreve uma situação real?",moral:"Funções no ENEM são sobre reconhecimento e interpretação. Reta: afim. Parábola: quadrática. Curva que acelera: exponencial. O coeficiente no contexto diz mais que a fórmula sozinha."},

 simple:"5,4% ENEM. Função afim, quadrática, exponencial e logarítmica. Foco em modelagem e interpretação de gráficos.",
 explain:"No ENEM, funções aparecem quase sempre como <b>modelagem</b> — o problema descreve uma situação real e você precisa reconhecer qual tipo de função a representa, ou interpretar o significado dos parâmetros no contexto.<br><br>Guia de reconhecimento:<br>• <b>Cresce ou decresce de forma constante</b> (mesma quantidade a cada passo) → função afim (reta)<br>• <b>Tem um ponto máximo ou mínimo</b> → função quadrática (parábola)<br>• <b>Dobra, triplica, cresce cada vez mais rápido</b> → função exponencial<br>• <b>Cresce mas vai desacelerando</b> → função logarítmica<br><br>O que o ENEM mais cobra: interpretar o coeficiente angular (taxa de variação) no contexto. 'O que significa o número 2,5 na equação f(x) = 2,5x + 30 nesta situação?'",
 example:"ENEM: gráfico de crescimento de uma população de bactérias — curva que acelera → exponencial. Se é uma linha reta → afim. Se tem um máximo → quadrática.",

 story:{icon:"📈",title:"A startup e o crescimento",text:"Uma startup de tecnologia registrou seus dados de usuários:\n\nMês 1: 100 usuários\nMês 2: 200 usuários\nMês 3: 400 usuários\nMês 4: 800 usuários\n\nO investidor olhou e perguntou ao fundador: 'Qual função descreve esse crescimento?'\n\nNota-se que a cada mês, o número dobra. Isso é multiplicação por fator constante — função exponencial: f(x) = 100 × 2ˣ.\n\nSe fosse linear (afim), teria crescido 100, 200, 300, 400... A diferença entre exponencial e linear parece pequena no início, mas no mês 10: exponencial = 102.400, linear = 1.000.",connection:"Reconhecer o tipo de crescimento — linear, quadrático ou exponencial — é uma das habilidades mais valorizadas em ciência de dados, economia, biologia e gestão. O ENEM testa isso porque é uma habilidade real do século XXI."},
 dict:[
   {term:"Modelagem matemática",def:"Usar uma função para descrever uma situação real. A escolha da função depende do padrão de crescimento.",ex:"Crescimento constante → afim. Crescimento que acelera → exponencial. Ponto de máximo → quadrática."},
   {term:"Taxa de crescimento",def:"Quanto a variável dependente muda por unidade da independente. No contexto: velocidade, preço por km, etc.",ex:"f(x)=3x+2: taxa=3 (a cada unidade de x, y cresce 3)."},
   {term:"Domínio restrito",def:"Em problemas reais, nem todo valor de x é possível. Ex: x≥0 para tempo, 0<x para tamanho.",ex:"Quantidade de produto: x∈ℕ (inteiros positivos). Temperatura: x pode ser negativo."},
   {term:"Ponto de equilíbrio",def:"O valor de x onde duas funções se igualam. Resolve f(x)=g(x).",ex:"Custos: C₁=50+2x e C₂=20+5x. Equilíbrio: 50+2x=20+5x → x=10 unidades."}
 ],

     {n:2,action:"Extraia os parâmetros do contexto",detail:"Para afim: qual o valor inicial (b) e a taxa (a)? Para quadrática: quando ocorre o máximo/mínimo?",ex:"'Cobra R$5 fixos + R$2/km' → f(x)=2x+5. b=5 (fixo), a=2 (taxa)"},

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📐",term:"Geometria Analítica — ENEM",
 layers:[{tag:"Ponto de Partida",text:"Dois ônibus saem de pontos diferentes com velocidades diferentes. Em que ponto se encontram? Isso é uma interseção de retas no plano cartesiano. <b>GA no ENEM é quase sempre sobre posições relativas e distâncias — interpretação geométrica de equações.</b>",ex:"Cada ônibus é uma reta. O encontro é a solução do sistema formado pelas duas equações."},
   {tag:"Paralelismo e perpendicularismo",text:"Retas <b>paralelas</b>: mesmo coeficiente angular (a1=a2), coeficientes lineares diferentes. Sistema impossível — sem interseção. Retas <b>perpendiculares</b>: produto dos coeficientes angulares = -1 (a1 x a2 = -1). Retas <b>coincidentes</b>: mesma equação — sistema indeterminado.",ex:"y=2x+1 paralela a y=2x+5. Perpendicular a y=2x+1: y=-x/2+3. 2x(-1/2)=-1 ✓"},
   {tag:"Formalizacao — As ferramentas",text:"Distância entre pontos: d=raiz[(x2-x1)²+(y2-y1)²]. Distância ponto-reta: d=|ax0+by0+c|/raiz(a²+b²). Circunferência: (x-a)²+(y-b)²=r². Para interseção: resolva o sistema das duas equações.",ex:"Ponto P(1,1) à reta 3x+4y-5=0: d=|3+4-5|/raiz(9+16)=2/5=0,4."},
   {tag:"ENEM — O que mais cai",text:"Posições relativas de retas (paralelas, concorrentes, coincidentes), equação da reta por dois pontos, interseção como solução de sistema, distância entre pontos. Raramente pedem cônicas — foco em retas e circunferências.",ex:"'Qual a equação da reta que passa por (1,2) e (3,8)?' Inclinação = (8-2)/(3-1) = 3. y-2=3(x-1) → y=3x-1."}],
 historia:{cenas:[{icon:"🗺️",label:"O ENCONTRO DOS VIAJANTES",texto:"Dois ciclistas partem de cidades diferentes ao mesmo tempo. Ana: posição = 2t + 10 (km). Carlos: posição = 3t. Quando se encontram? 2t+10=3t → t=10 horas. Posição de encontro: 3x10=30km. Isso é exatamente resolver o sistema de duas funções lineares — a interseção de duas retas no plano."},{icon:"📡",label:"O SINAL DO CELULAR",texto:"Uma antena de celular tem alcance de 5km (raio). Sua posição no mapa é (2, -3). A equação da área de cobertura: (x-2)² + (y+3)² = 25. Uma estrada segue a reta y = x + 1. O engenheiro precisa saber se a estrada entra na área de cobertura — e onde. Ele substitui a reta na equação da circunferência e resolve o sistema."}],pergunta:"Como a interseção de duas retas se relaciona com a solução de um sistema de equações?",moral:"Geometria Analítica é a linguagem das posições, distâncias e rotas. No ENEM, o foco é interpretar geometricamente: retas que não se cruzam são paralelas, sistemas que não têm solução."},

 simple:"Distâncias, equações de retas e circunferências no plano. Interpretação geométrica de sistemas de equações.",
 explain:"Para o ENEM, geometria analítica tem foco em <b>interpretação geométrica de equações</b> — não em cálculos extensos. A pergunta central é: 'o que essa equação representa no plano?'<br><br>Conexões importantes:<br>• Duas retas com a mesma equação (ou múltiplas) → infinitas soluções (retas coincidentes)<br>• Duas retas paralelas (mesmo coeficiente angular) → sistema impossível (nunca se cruzam)<br>• Duas retas que se cruzam → solução única (um ponto de interseção)<br><br>O problema de 'dois ônibus que saem de pontos diferentes e se encontram' é um sistema de duas equações lineares. O ponto de interseção é onde eles se encontram.<br><br>Circunferência no plano: (x−a)² + (y−b)² = r². Identificar centro (a,b) e raio r a partir da equação é a habilidade mais testada.",
 example:"Dois ônibus saem de pontos diferentes com velocidades diferentes. Quando se encontram? → equação de retas que se intersectam. O x da solução é o tempo.",

 story:{icon:"🚌",title:"Os dois ônibus",text:"Um ônibus sai do ponto A às 6h, andando 60km/h. Outro sai do ponto B (a 180km de A) às 7h, andando 90km/h em direção a A.\n\nPosição do ônibus 1: f(t) = 60t (partiu de 0)\nPosição do ônibus 2: g(t) = 180 − 90(t−1) = 270 − 90t (partiu de 180, começou 1h depois)\n\nQuando se encontram? f(t) = g(t)\n60t = 270 − 90t\n150t = 270\nt = 1,8h = 1h48min após as 6h = 7h48min\n\nPosição: 60 × 1,8 = 108km a partir de A.\n\nIsso é geometria analítica resolvendo um problema real de movimento.",connection:"Logística de transporte, rastreamento de satélites, colisão em jogos digitais, encontro de equipes em campo — toda situação de 'quando se encontram' é geometria analítica."},
 dict:[
   {term:"Equação reduzida da reta",def:"y=ax+b. a=coeficiente angular (inclinação), b=coeficiente linear (ponto no eixo y).",ex:"y=2x−3: reta com inclinação 2, que corta o eixo y em −3."},
   {term:"Distância de ponto a reta",def:"d=|ax₀+by₀+c|/√(a²+b²), onde ax+by+c=0 é a equação da reta.",ex:"Reta 3x+4y−5=0, ponto P(1,1): d=|3+4−5|/√(9+16)=2/5=0,4."},
   {term:"Posições relativas",def:"Duas retas: paralelas (sem interseção), concorrentes (um ponto) ou coincidentes (infinitos pontos).",ex:"y=2x+1 e y=2x+5: mesmo a, b diferente → paralelas. y=3x+1 e y=−x+5: se cruzam → concorrentes."},
   {term:"Equação da circunferência",def:"(x−a)²+(y−b)²=r². Centro (a,b) e raio r.",ex:"(x−1)²+(y+2)²=16: centro (1,−2), raio 4."}
 ],
 steps:{
   intro:"Problemas de GA seguem um protocolo que começa sempre pelos dados geométricos e termina na equação.",
   items:[
     {n:1,action:"Identifique o objeto geométrico",detail:"São dois pontos? → distância ou reta. É uma reta com ponto? → equação da reta. São duas retas? → posição relativa.",ex:"Dados A(1,2) e B(4,6): pedem reta AB, distância AB ou ponto médio?"},
     {n:2,action:"Calcule o coeficiente angular",detail:"a=(y₂−y₁)/(x₂−x₁). Se a reta é vertical (x₁=x₂), não tem coeficiente angular.",ex:"a=(6−2)/(4−1)=4/3"},
     {n:3,action:"Monte a equação da reta",detail:"y−y₁=a(x−x₁). Substitua um dos pontos para encontrar b. Simplifique.",ex:"y−2=(4/3)(x−1) → y=(4/3)x+2/3"},
     {n:4,action:"Para posições relativas",detail:"Paralelas: mesmos coeficientes angulares, b diferentes. Perpendiculares: a₁×a₂=−1. Coincidentes: mesma equação.",ex:"y=2x+1 ⊥ y=−x/2+3? → 2×(−1/2)=−1 ✓ sim, são perpendiculares"},
     {n:5,action:"Para circunferência",detail:"(x−a)²+(y−b)²=r². Identifique centro (a,b) e raio r. Para interseção com reta: resolva o sistema.",ex:"Centro (2,−3), r=5: (x−2)²+(y+3)²=25",tip:"⚠️ Distância de ponto P(x₀,y₀) à reta ax+by+c=0: d=|ax₀+by₀+c|/√(a²+b²)"}
   ]
 },
 steps:{
   intro:"Estratégia para GA no ENEM — sempre interprete geometricamente antes de calcular.",
   items:[
     {n:1,action:"Identifique os objetos",detail:"São pontos, retas ou circunferências? Leia e marque no plano se possível.",ex:"Duas empresas com custos lineares → duas retas. Quando empatam? → interseção"},
     {n:2,action:"Para retas: calcule a inclinação",detail:"a=(y₂−y₁)/(x₂−x₁). Paralelas: a₁=a₂. Perpendiculares: a₁×a₂=−1.",ex:"Reta por (0,3) e (2,7): a=(7−3)/2=2 → y=2x+3"},
     {n:3,action:"Para interseção de retas",detail:"Monte sistema com as duas equações. O ponto (x,y) da solução é onde se cruzam.",ex:"y=2x+3 e y=−x+9 → 2x+3=−x+9 → x=2, y=7"},
     {n:4,action:"Para circunferência",detail:"Identifique (a,b)=centro e r=raio em (x−a)²+(y−b)²=r². Para interseção com reta, substitua.",tip:"⚠️ Distância entre pontos: d=√[(Δx)²+(Δy)²]. É Pitágoras com coordenadas."}
   ]
 },

     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Sistemas de Equações",desc:"A interseção de retas é a solução do sistema formado pelas duas equações.",check:"✓ Pronto se: resolve 2x+y=5 e x+y=3 e interpreta o resultado geometricamente."}

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"🔢",term:"Análise Combinatória — ENEM",
 layers:[{tag:"Ponto de Partida",text:"Uma senha de 4 letras diferentes do alfabeto (26 letras). A ordem importa (AMOR diferente de RAMO). Quantas senhas? 26 x 25 x 24 x 23 = 358.800. <b>A lógica: multiplique as opções de cada etapa.</b>",ex:"1ª letra: 26 opções. 2ª: 25. 3ª: 24. 4ª: 23."},
   {tag:"A pergunta que decide tudo",text:"<b>A ordem importa?</b> Presidente/vice (cargos diferentes) → sim → Arranjo. Membros de comissão → não → Combinação. Essa é a única decisão que importa.",ex:"10 alunos: eleger presidente e vice → A(10,2)=90. Escolher dupla → C(10,2)=45."},
   {tag:"Formalizacao",text:"<b>Permutação</b>: Pn=n!. <b>Arranjo</b>: A(n,k)=n!/(n-k)!. <b>Combinação</b>: C(n,k)=n!/[k!(n-k)!]. Simplifique antes de calcular!",ex:"C(10,3)=(10x9x8)/(3x2x1)=120. Nunca expanda 10! completo."},

 historia:{cenas:[{icon:"🔒",label:"A SENHA DO SMARTPHONE",texto:"O técnico explicou: senha de 6 dígitos distintos tem A(10,6)=151.200 possibilidades. Com repetição: 10^6=1.000.000. Com repetição é 6x mais seguro! Por isso sistemas permitem repetição nas senhas."},{icon:"⚽",label:"A ESCALACAO",texto:"O técnico tem 15 jogadores e precisa escalar 11. Para escolher quem joga: C(15,11)=1365 formações possíveis. Para definir posições além disso: seria um arranjo. Combinação decide o grupo; arranjo define os papéis."}],pergunta:"Se a senha tem 4 dígitos podendo repetir, quantas senhas são possíveis? Compare com A(10,4).",moral:"Combinatória conta sem listar. A chave: ordem importa? Sim → Arranjo. Não → Combinação. Com restrições: use complementação ou separe em casos."},

 steps:{

 simple:"3,7% ENEM. Contagem de possibilidades: quando a ordem importa (arranjo), quando não importa (combinação).",
 explain:"No ENEM, combinatória aparece quase sempre disfarçada em situações cotidianas. O segredo é <b>traduzir o problema para a pergunta correta</b>: a ordem dos elementos muda o resultado ou não?<br><br>Mapa de decisão:<br>• <b>Senha, código, pódio, cargos distintos</b> → ordem importa → Arranjo ou Permutação<br>• <b>Grupo, equipe, comissão, comitê</b> → ordem não importa → Combinação<br>• <b>Sequência de etapas independentes</b> → Princípio Multiplicativo<br><br>Princípio fundamental: para etapas independentes, multiplique as opções. Para escolhas onde elementos se distinguem pela posição, use arranjo. Para escolhas onde só importa quem está (não em que posição), use combinação.",
 example:"ENEM: quantas comissões de 3 pessoas podemos formar com 8 pessoas? Comissão = ordem não importa → C₈,₃ = 8!/(3!×5!) = 56.",

 story:{icon:"🏆",title:"A seleção da escola",text:"A escola precisa mandar 3 alunos para a olimpíada de matemática. Há 10 candidatos.\n\n'Quais 3 vão?' — não importa a ordem, qualquer grupo de 3 serve.\nC₁₀,₃ = 10!/(3!×7!) = 120 grupos possíveis.\n\nMas se a escola precisasse de 1 líder, 1 secretário e 1 auxiliar:\nA ordem importa! Ser líder é diferente de ser auxiliar.\nA₁₀,₃ = 10×9×8 = 720 possibilidades.\n\nA diferença entre 120 e 720 é enorme — e depende apenas de uma pergunta: a posição importa?",connection:"Criptografia e segurança digital (senhas, chaves), genética (combinações de genes), formação de times esportivos, criação de cardápios, design de experimentos científicos — combinatória está na base do raciocínio estruturado."},

   {term:"Permutação",def:"Arranjo de TODOS os n elementos, com ordem. Pₙ=n!",ex:"Anagramas de CASA: 4!/2!=12 (A se repete 2 vezes)."},
   {term:"Combinação",def:"Escolha de k entre n elementos, SEM ordem. Cₙ,ₖ=n!/[k!(n−k)!].",ex:"Chapa de 2 candidatos entre 5 professores: C₅,₂=10 chapas."},
   {term:"Permutação com repetição",def:"Quando há elementos repetidos: Pₙ=n!/(n₁!×n₂!×...), dividindo pelos repetidos.",ex:"Anagramas de ARARA: 5!/(3!×2!)=10 anagramas."}
 ],

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"💰",term:"Matemática Financeira — ENEM",
 layers:[{tag:"Ponto de Partida",text:"Uma TV custa R$1200 à vista ou 4x de R$330. Total parcelado: R$1320. R$120 a mais. Qual a taxa mensal? M=C(1+i)^n: 1320=1200(1+i)^4. Esse tipo de comparação é o que o ENEM cobra.",ex:"(1+i)^4=1,1 → i aprox 2,4% ao mês."},
   {tag:"O erro classico",text:"Simples e compostos são frequentemente confundidos. <b>Simples</b>: M=C(1+in) — crescimento linear. <b>Compostos</b>: M=C(1+i)^n — crescimento exponencial. 1% ao dia NÃO é 30% ao mês em compostos!",ex:"1% ao dia em 30 dias: compostos=(1,01)^30-1 aprox 34,8%. Não 30%."},
   {tag:"Formalizacao",text:"Principais cálculos: encontrar M, C, ou comparar opções. Taxa equivalente: (1+i_mes)^12=(1+i_ano). <b>Sempre</b> verifique se i e n estão na mesma unidade!",ex:"Taxa 2% ao mês: anual equivalente=(1,02)^12-1 aprox 26,8% (não 24%)."},
   {tag:"ENEM — Contextos tipicos",text:"Financiamentos, comparação de planos de crédito, interpretação de taxas no contexto. O ENEM foca em identificar o regime e comparar montantes — não em logaritmos.",ex:"'Qual plano é mais vantajoso?' — compare os montantes totais ao final do período."}],
 historia:{cenas:[{icon:"🏠",label:"O FINANCIAMENTO",texto:"Paulo financiou R$200.000 em 120 meses a 1% ao mês. M=200.000x(1,01)^120. Usando (1,01)^120 aprox 3,3: M aprox R$660.000. Ele pagaria mais do dobro do valor financiado — o custo real dos juros compostos."},{icon:"💳",label:"O CARTAO DE CREDITO",texto:"Maria tinha R$1000 no cartão a 12% ao mês e pagou apenas R$100 (mínimo). Dívida restante: 900x1,12=R$1008. Ela pagou R$100 e a dívida quase não diminuiu. Juros compostos transformando dívida pequena em grande rapidamente."}],pergunta:"Por que pagar apenas o mínimo do cartão de crédito pode ser uma armadilha financeira?",moral:"Simples: M=C(1+in). Compostos: M=C(1+i)^n. O mercado usa compostos. Sempre compare o custo total — não apenas a parcela mensal."},

 steps:{
   intro:"Estratégia para matemática financeira no ENEM — sempre compare o custo total real.",
   items:[
     {n:1,action:"Identifique o regime",detail:"Simples: cresce linearmente (J=Cin). Composto: cresce exponencialmente (M=C(1+i)ⁿ). Mercado usa composto.",ex:"'Banco cobra 2% ao mês' → composto. 'Juros de R$10 por mês fixos' → simples"},
     {n:2,action:"Unifique unidades de tempo",detail:"i e n na mesma unidade. Taxa anual com n em meses → converta.",ex:"12% a.a. por 6 meses → i=1% a.m., n=6 meses. M=C×(1,01)⁶"},

     {n:4,action:"Interprete no contexto",detail:"ENEM frequentemente pede a taxa de juros embutida numa compra parcelada ou o custo real de um financiamento.",tip:"⚠️ 2% ao mês ≠ 24% ao ano em juros compostos. 2% a.m. = (1,02)¹²−1≈26,8% a.a.!"}

 },
 simple:"Juros simples e compostos, descontos, parcelamentos. Capacidade de calcular e comparar opções financeiras.",
 explain:"O ENEM testa se você consegue tomar <b>decisões financeiras inteligentes</b> — comparar opções de compra, entender juros embutidos em parcelamentos, interpretar extratos e taxas.<br><br>A habilidade central: sempre compare o <b>custo total real</b>, não a parcela.<br><br>Ferramentas necessárias:<br>• Juros simples: M = C(1 + i·n) — para situações explicitamente indicadas<br>• Juros compostos: M = C·(1+i)ⁿ — o padrão do mercado<br>• Taxa equivalente: (1+i_anual) = (1+i_mensal)¹² — para converter taxas entre períodos<br>• Desconto comercial: D = N·d·t — para títulos descontados antes do vencimento<br><br>Relação com PG: os montantes de juros compostos a cada período formam uma progressão geométrica de razão (1+i).",
 example:"ENEM 2021: produto à vista R$1.200 ou em 3 parcelas de R$450. No parcelado: 3×450=R$1.350. Diferença de R$150 = taxa de juros embutida. Qual a taxa mensal?",

 story:{icon:"🚗",title:"O financiamento do carro",text:"Pedro quer comprar um carro de R$40.000. Tem duas opções:\n\nOpção A: à vista com 10% de desconto\nOpção B: entrada de R$10.000 + 24 parcelas de R$1.500\n\nOpção A: R$40.000 × 0,90 = R$36.000\nOpção B: R$10.000 + 24×R$1.500 = R$10.000+R$36.000 = R$46.000\n\nDiferença: R$46.000 − R$36.000 = R$10.000 a mais no financiamento.\n\nTaxa embutida: Pedro pagou R$10.000 de juros sobre R$30.000 (o valor financiado) em 24 meses. Isso equivale a uma taxa de juros compostos de aproximadamente 1,5% ao mês.",connection:"Compra de imóveis, financiamento de veículos, análise de investimentos, planejamento de aposentadoria — matemática financeira é a ferramenta que separa quem é dominado pelo dinheiro de quem domina o dinheiro."},
 dict:[
   {term:"Juros compostos",def:"Juros calculados sobre o montante acumulado. M=C×(1+i)ⁿ. O padrão do sistema financeiro.",ex:"R$1.000 a 2%/mês por 12 meses: M=1000×(1,02)¹²≈R$1.268,24."},
   {term:"Taxa equivalente",def:"Taxas que produzem o mesmo montante em períodos diferentes. (1+i_anual)=(1+i_mensal)¹².",ex:"Taxa anual de 26,82% ≈ taxa mensal de 2%. (1,02)¹²≈1,2682."},
   {term:"Desconto simples",def:"Redução no valor de um título antes do vencimento. D=N×d×t.",ex:"Título de R$1.000 com desconto de 5% em 2 meses: D=1000×0,05×2=R$100."},
   {term:"Montante",def:"Valor total ao final: capital + juros acumulados. O que se paga ou recebe no vencimento.",ex:"Capital R$2.000, taxa 10%a.a., 3 anos compostos: M=2000×(1,1)³≈R$2.662."}
 ],
 prereq:{

let activeYear='all',activeTheme='all',searchQ='';

function render(){
  const grid=document.getElementById('glossary');
  const ctr=document.getElementById('counter');
  const filtered=terms.filter(t=>{
    const yearMatch = activeYear==='all' ||
      (activeYear==='3' && (t.year==='3' || t.pu)) ||
      (activeYear!=='3' && t.year===activeYear && !t.pu);
    const th=activeTheme==='all'||t.theme===activeTheme;
    const s=searchQ===''||t.term.toLowerCase().includes(searchQ)||t.simple.toLowerCase().includes(searchQ);
    return yearMatch&&th&&s;
  });
  ctr.textContent=filtered.length?`${filtered.length} TERMO${filtered.length>1?'S':''} ENCONTRADO${filtered.length>1?'S':''}` :'';
  if(!filtered.length){grid.innerHTML=`<div class="no-results"><span style="font-size:3rem;display:block;margin-bottom:12px">∅</span>Nenhum termo encontrado.</div>`;return;}
  grid.innerHTML=filtered.map(t=>{
    const yr=t.pu?'PU':t.year;
    return`<div class="card" data-year="${t.year}" data-pu="${t.pu}" onclick="openModal(${terms.indexOf(t)})">
      <div class="card-top">
        <span style="font-size:1.7rem">${t.emoji}</span>
        <div class="card-badges">
          <span class="by" data-year="${yr}">${t.pu?'PRÉ-UNIV':t.year+'ª SÉR'}</span>
          <span class="btri">${t.tri}</span>
          <span class="bt">${t.theme}</span>
        </div>
      </div>
      <h3>${t.term}</h3>
      <p class="simple">${t.simple}</p>
      <p class="hint">◈ clique para explorar</p>
    </div>`;
  }).join('');
}

function openModal(idx){
  const t=terms[idx];
  const yr=t.pu?'PU':t.year;
  const tc=COLORS[yr]||'#6C5CE7';
  document.getElementById('modalBand').style.background=`linear-gradient(135deg,#0F1623,${tc}22)`;
  document.getElementById('modalBand').style.borderBottom=`1px solid ${tc}44`;
  document.getElementById('mEmoji').textContent=t.emoji;
  document.getElementById('mTitle').style.color=tc;
  document.getElementById('mTitle').textContent=t.term;
  document.getElementById('mSub').textContent=`${t.pu?'Pré-universitário':t.year+'ª série'} · ${t.tri} · ${t.theme}`;
  // mp0 — Explicação em camadas
  const ly=t.layers||[];
  document.getElementById('mp0').innerHTML=`
    ${t.pu?`<div class="pu-badge">📊 Pré-universitário — tema com alta incidência no ENEM</div>`:''}
    ${ly.length?`<div class="explain-layers">${ly.map((l,i)=>`
      <div class="layer layer-${i+1}">
        <div class="layer-tag">${l.tag}</div>
        <div class="layer-text">${l.text}</div>
        ${l.ex?`<div class="layer-ex">📌 ${l.ex}</div>`:''}
      </div>`).join('')}</div>`:`
    <div class="explain-box">${t.explain}</div>
    <div class="example-box" style="border-color:${tc};background:${tc}0D">
      <div class="elabel" style="color:${tc}">◈ EXEMPLO PRÁTICO</div>
      <p>${t.example}</p>
    </div>`}`;
  // mp1 — Aprenda com Histórias
  const hs=t.historia||{};
  document.getElementById('mp1').innerHTML=hs.cenas?`
    <div class="story-wrap">
      ${hs.cenas.map(cn=>`
        <div class="story-scene">
          <div class="story-scene-label"><span class="story-scene-icon">${cn.icon||'📍'}</span>${cn.label||''}</div>
          <div class="story-scene-text">${cn.texto}</div>
        </div>`).join('')}
      ${hs.pergunta?`<div class="story-question"><div class="sq-label">🤔 PENSE</div><div class="sq-text">${hs.pergunta}</div></div>`:''}
      ${hs.moral?`<div class="story-moral"><div class="sm-label">💡 A MATEMÁTICA NA HISTÓRIA</div><div class="sm-text">${hs.moral}</div></div>`:''}
    </div>`:`<div class="explain-box" style="text-align:center;opacity:.5">História em breve...</div>`;
  // mp2 — Dicionário
  document.getElementById('mp2').innerHTML=`
    <ul class="dict-list">
      ${(t.dict||[]).map(d=>`
        <li class="dict-item">
          <div class="dict-term" style="color:${tc}">${d.term}</div>
          <div class="dict-def">${d.def}</div>
          <span class="dict-ex">📌 ${d.ex}</span>
        </li>`).join('')}
    </ul>`;
  document.getElementById('mp3').innerHTML=`
    <div class="visual-wrap">${t.visual}</div>
    <p class="visual-caption">${t.visualCaption}</p>`;
  const pr=t.prereq||{};
  document.getElementById('mp4').innerHTML=`
    ${pr.intro?`<p class="prereq-intro">${pr.intro}</p>`:''}
    <ul class="prereq-list">
      ${(pr.items||[]).map(p=>`
        <li class="prereq-item">
          <span class="prereq-badge" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.badge}</span>
          <div class="prereq-content">
            <div class="prereq-title" style="color:${tc}">${p.title}</div>
            <div class="prereq-desc">${p.desc}</div>
            <div class="prereq-check">${p.check}</div>
          </div>
        </li>`).join('')}
    </ul>
    ${pr.vestibular?`<div class="vestibular-box"><div class="vtitle">🎯 O QUE COBRE NO VESTIBULAR</div><p>${pr.vestibular}</p></div>`:''}`;
  const st=t.steps||{};
  document.getElementById('mp5').innerHTML=`
    ${st.intro?`<p class="steps-intro">${st.intro}</p>`:''}
    <ul class="step-list">
      ${(st.items||[]).map((s,i)=>`
        <li class="step-item">
          <div class="step-num" style="background:${tc}22;color:${tc};border:1px solid ${tc}44">${s.n}</div>
          <div class="step-body">
            <div class="step-action" style="color:${tc}">${s.action}</div>
            <div class="step-detail">${s.detail}</div>
            ${s.ex?`<span class="step-example">📌 ${s.ex}</span>`:''}
            ${s.tip?`<div class="step-warning">${s.tip}</div>`:''}
          </div>
        </li>`).join('')}
    </ul>`;
  document.getElementById('mp6').innerHTML=`
    <ul class="summary-list">
      ${t.summary.map(s=>`<li><span class="icon">◈</span><span>${s}</span></li>`).join('')}
    </ul>`;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.mpanel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModalDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function switchTab(idx,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mpanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`mp${idx}`).classList.add('active');
}
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeYear=tab.dataset.year;render();
  });
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTheme=btn.dataset.theme;render();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase().trim();render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
render();
</script>

<script>
(function(){
  const btn=document.getElementById('themeToggle');
  const icon=document.getElementById('toggleIcon');
  const label=document.getElementById('toggleLabel');
  const saved=localStorage.getItem('cbb_theme');
  if(saved==='light'){
    document.body.classList.add('light-mode');
    icon.textContent='☀️'; label.textContent='Modo Escuro';
  }
  btn.addEventListener('click',function(){
    const isLight=document.body.classList.toggle('light-mode');
    icon.textContent=isLight?'☀️':'🌙';
    label.textContent=isLight?'Modo Escuro':'Modo Claro';
    localStorage.setItem('cbb_theme',isLight?'light':'dark');
  });
})();
</script>
