<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Matemática — Ensino Médio CBB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--c1:#00D2FF;--c2:#FF6B9D;--c3:#FFD700;--bg:#0A0E1A;--card:#111827;--border:#1E2A3A;--text:#E2E8F0;--sub:#94A3B8;--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#0A0E1A 0%,#1a1040 50%,#0A0E1A 100%);padding:50px 24px 70px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,210,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.04) 1px,transparent 1px);background-size:40px 40px;}
.glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,.15) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);}
header h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5vw,2.8rem);color:#fff;text-shadow:0 0 30px rgba(0,210,255,.5);position:relative;letter-spacing:2px;}
header p{color:var(--sub);font-size:.95rem;margin-top:10px;font-weight:600;position:relative;}
.accent{color:var(--c1);}
.search-wrap{max-width:560px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10;}
.search-wrap input{width:100%;padding:15px 22px 15px 50px;border-radius:50px;border:1px solid var(--border);background:#111827;font-size:.95rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--text);outline:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.search-wrap input:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(0,210,255,.15);}
.search-wrap::before{content:'⟩_';position:absolute;left:38px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--c1);font-family:'Orbitron',monospace;}
.tabs{display:flex;justify-content:center;gap:8px;padding:30px 20px 14px;flex-wrap:wrap;}
.tab{padding:9px 20px;border-radius:50px;border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:.72rem;cursor:pointer;transition:all .2s;background:var(--card);color:var(--sub);letter-spacing:1px;}
.tab[data-year="all"]{border-color:#6C5CE7;}
.tab[data-year="1"]{border-color:var(--c1);}
.tab[data-year="2"]{border-color:var(--c2);}
.tab[data-year="3"]{border-color:var(--c3);}
.tab.active[data-year="all"]{background:#6C5CE7;color:#fff;}
.tab.active[data-year="1"]{background:var(--c1);color:#000;}
.tab.active[data-year="2"]{background:var(--c2);color:#fff;}
.tab.active[data-year="3"]{background:var(--c3);color:#000;}
.tab:hover{transform:translateY(-2px);}
.theme-filter{display:flex;justify-content:center;gap:7px;padding:0 20px 22px;flex-wrap:wrap;}
.theme-btn{padding:5px 14px;border-radius:50px;border:1px solid var(--border);background:transparent;font-family:'Inter',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--sub);}
.theme-btn.active,.theme-btn:hover{border-color:var(--c1);color:var(--c1);}
.counter{text-align:center;padding:0 20px 14px;font-weight:700;color:var(--sub);font-size:.82rem;font-family:'Orbitron',monospace;letter-spacing:1px;}
.glossary{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.card{background:var(--card);border-radius:var(--radius);padding:18px 18px 14px;border:1px solid var(--border);border-top:3px solid;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.4);}
.card[data-year="1"]{border-top-color:var(--c1);}
.card[data-year="2"]{border-top-color:var(--c2);}
.card[data-year="3"]{border-top-color:var(--c3);}
.card[data-pu="true"]{border-top-color:#FF9F43;border-style:dashed;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.by{font-family:'Orbitron',monospace;font-size:.62rem;padding:3px 9px;border-radius:50px;color:#000;letter-spacing:.5px;font-weight:700;}
.by[data-year="1"]{background:var(--c1);}
.by[data-year="2"]{background:var(--c2);color:#fff;}
.by[data-year="3"]{background:var(--c3);}
.by[data-year="PU"]{background:#FF9F43;}
.bt{font-size:.65rem;padding:3px 9px;border-radius:50px;background:rgba(255,255,255,.07);color:var(--sub);font-weight:700;}
.btri{font-size:.65rem;padding:3px 9px;border-radius:50px;background:rgba(0,210,255,.1);color:var(--c1);font-weight:700;}
.card h3{font-family:'Orbitron',monospace;font-size:.95rem;margin-bottom:6px;letter-spacing:.5px;line-height:1.4;}
.card .simple{font-size:.83rem;line-height:1.55;font-weight:600;color:var(--sub);}
.card .hint{margin-top:10px;font-size:.7rem;color:rgba(255,255,255,.2);font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:var(--sub);font-size:.95rem;font-weight:700;grid-column:1/-1;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#0F1623;border:1px solid var(--border);border-radius:22px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.6);transform:translateY(30px) scale(.97);transition:transform .3s,opacity .3s;opacity:0;}
.overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-band{padding:24px 24px 16px;border-radius:22px 22px 0 0;position:relative;border-bottom:1px solid var(--border);}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);cursor:pointer;font-size:.9rem;color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:900;transition:all .2s;}
.modal-close:hover{background:rgba(255,255,255,.15);color:#fff;}
.modal-emoji{font-size:2.2rem;display:block;margin-bottom:6px;}
.modal-title{font-family:'Orbitron',monospace;font-size:1.4rem;color:#fff;letter-spacing:1px;}
.modal-sub{color:var(--sub);font-weight:700;font-size:.8rem;margin-top:5px;letter-spacing:.5px;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;gap:2px;}
.mtab{padding:12px 14px;font-family:'Inter',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;border:none;background:none;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.mtab.active{color:var(--c1);border-bottom-color:var(--c1);}
.modal-body{padding:20px 22px 28px;}
.mpanel{display:none;animation:fadeIn .25s ease;}
.mpanel.active{display:block;}
.explain-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px;line-height:1.7;font-size:.9rem;font-weight:600;color:var(--text);}
.example-box{border-radius:12px;padding:14px 18px;border-left:3px solid;}
.example-box .elabel{font-weight:800;font-size:.78rem;margin-bottom:5px;opacity:.8;letter-spacing:.5px;}
.example-box p{font-size:.88rem;line-height:1.6;font-weight:600;color:var(--sub);}
.visual-wrap{text-align:center;padding:8px 0 4px;}
.visual-wrap svg{max-width:100%;height:auto;}
.visual-caption{margin-top:10px;font-size:.82rem;color:var(--sub);font-weight:700;line-height:1.5;text-align:center;}
.summary-list{list-style:none;}
.summary-list li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.88rem;font-weight:600;line-height:1.5;color:var(--text);}
.summary-list li:last-child{border-bottom:none;}
.summary-list .icon{font-size:1rem;flex-shrink:0;margin-top:2px;}

/* CONTEXTO REAL */
.story-box{background:linear-gradient(135deg,rgba(108,92,231,.06),rgba(0,210,255,.04));border:1px solid rgba(108,92,231,.2);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
.story-icon{font-size:2rem;margin-bottom:10px;display:block;}
.story-title{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--c1);margin-bottom:8px;letter-spacing:.5px;}
.story-text{font-size:.92rem;font-weight:600;color:var(--text);line-height:1.75;}
.story-text strong{color:var(--c1);}
.story-connection{margin-top:14px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px 16px;font-size:.83rem;font-weight:600;color:var(--sub);line-height:1.6;border-left:3px solid var(--c1);}
.story-connection .conn-label{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--c1);margin-bottom:5px;letter-spacing:.5px;}

/* DICIONÁRIO */
.dict-list{list-style:none;}
.dict-item{padding:12px 0;border-bottom:1px solid var(--border);}
.dict-item:last-child{border-bottom:none;}
.dict-term{font-family:'Orbitron',monospace;font-size:.82rem;margin-bottom:4px;letter-spacing:.5px;}
.dict-def{font-size:.88rem;font-weight:600;color:var(--sub);line-height:1.55;margin-bottom:6px;}
.dict-ex{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border-radius:8px;padding:5px 10px;display:inline-block;border:1px solid var(--border);}

/* ── EXPLICAÇÃO EM CAMADAS ── */
.explain-layers{display:flex;flex-direction:column;gap:14px;}
.layer{border-radius:14px;padding:16px 18px;border-left:4px solid;}
.layer-tag{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:7px;opacity:.8;}
.layer-text{font-size:.9rem;font-weight:600;line-height:1.7;color:var(--text);}
.layer-text b{font-weight:900;}
.layer-1{background:rgba(0,210,255,.06);border-color:var(--c1);}
.layer-1 .layer-tag{color:var(--c1);}
.layer-2{background:rgba(108,92,231,.06);border-color:#6C5CE7;}
.layer-2 .layer-tag{color:#6C5CE7;}
.layer-3{background:rgba(255,159,67,.06);border-color:#FF9F43;}
.layer-3 .layer-tag{color:#FF9F43;}
.layer-4{background:rgba(255,107,157,.06);border-color:#FF6B9D;}
.layer-4 .layer-tag{color:#FF6B9D;}
.layer-ex{margin-top:10px;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.35);background:rgba(255,255,255,.04);border-radius:8px;padding:6px 11px;display:inline-block;border:1px solid var(--border);}

/* ── HISTÓRIA ── */
.story-wrap{display:flex;flex-direction:column;gap:14px;}
.story-scene{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.story-scene-label{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:1.5px;color:#A855F7;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.story-scene-icon{font-size:1.2rem;}
.story-scene-text{font-size:.9rem;font-weight:600;line-height:1.75;color:var(--text);}
.story-question{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.25);border-radius:12px;padding:13px 16px;}
.story-question .sq-label{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:1.5px;color:#6C5CE7;margin-bottom:6px;}
.story-question .sq-text{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.6;font-style:italic;}
.story-moral{background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(168,85,247,.08));border:1px solid rgba(108,92,231,.3);border-radius:12px;padding:13px 16px;}
.story-moral .sm-label{font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:1.5px;color:#A855F7;margin-bottom:6px;}
.story-moral .sm-text{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.6;}
/* PRÉ-REQUISITOS */
.prereq-intro{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.6;margin-bottom:14px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}
.prereq-list{list-style:none;}
.prereq-item{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.prereq-item:last-child{border-bottom:none;}
.prereq-badge{font-family:'Orbitron',monospace;font-size:.65rem;padding:3px 9px;border-radius:50px;font-weight:700;flex-shrink:0;margin-top:2px;}
.prereq-content{}
.prereq-title{font-family:'Orbitron',monospace;font-size:.82rem;margin-bottom:3px;}
.prereq-desc{font-size:.83rem;font-weight:600;color:var(--sub);line-height:1.5;margin-bottom:4px;}
.prereq-check{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.35);font-style:italic;}
.vestibular-box{background:rgba(255,159,67,.07);border:1px solid rgba(255,159,67,.25);border-radius:12px;padding:14px 16px;margin-top:14px;}
.vestibular-box .vtitle{font-family:'Orbitron',monospace;font-size:.78rem;color:#FF9F43;margin-bottom:8px;letter-spacing:.5px;}
.vestibular-box p{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.6;}
/* COMO RESOLVER */
.steps-intro{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.6;margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}
.step-list{list-style:none;}
.step-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.step-item:last-child{border-bottom:none;}
.step-num{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{}
.step-action{font-family:'Orbitron',monospace;font-size:.8rem;margin-bottom:4px;}
.step-detail{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.55;margin-bottom:5px;}
.step-tip{font-size:.75rem;font-weight:700;font-style:italic;color:rgba(255,255,255,.3);}
.step-warning{font-size:.75rem;font-weight:700;color:#FF9F43;background:rgba(255,159,67,.08);border-radius:6px;padding:4px 8px;display:inline-block;margin-top:4px;}
.step-example{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border-radius:8px;padding:5px 10px;display:inline-block;border:1px solid var(--border);margin-top:4px;}
/* PU panel */
.pu-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.3);border-radius:8px;padding:6px 12px;margin-bottom:12px;font-size:.78rem;font-weight:800;color:#FF9F43;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:20px;color:rgba(255,255,255,.15);font-size:.75rem;font-weight:600;font-family:'Orbitron',monospace;letter-spacing:1px;border-top:1px solid var(--border);}

/* ══ TEMA CBB — IDENTIDADE VISUAL ══════════════════════════ */
:root {
  --cbb-blue: #1B3A6B;
  --cbb-gold: #C8961C;
  --cbb-gold-light: #E8B84B;
  --cbb-blue-mid: #2A5298;
  --font-title: 'Merriweather', 'Georgia', serif;
}

/* Botão de tema */
.theme-toggle {
  position: fixed; top: 14px; right: 14px; z-index: 9999;
  background: var(--cbb-gold); color: #1B3A6B;
  border: none; border-radius: 50px; padding: 8px 16px;
  font-family: 'Nunito', 'Open Sans', sans-serif; font-weight: 800;
  font-size: .75rem; cursor: pointer; letter-spacing: .3px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: all .25s;
}
.theme-toggle:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.35); }

/* MODO CLARO */
body.light-mode { background: #F2F5FB !important; color: #1B2A45 !important; }
body.light-mode header { background: linear-gradient(135deg,#1B3A6B,#2A5298,#1B3A6B) !important; border-color:#1B3A6B !important; }
body.light-mode .grid-bg { background-image: linear-gradient(rgba(27,58,107,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(27,58,107,.04) 1px,transparent 1px) !important; }
body.light-mode .glow { background: radial-gradient(circle,rgba(27,58,107,.12) 0%,transparent 70%) !important; }
body.light-mode .card, body.light-mode .glossary .card { background: #fff !important; border-color: #D8E0EE !important; box-shadow: 0 4px 20px rgba(27,58,107,.08) !important; }
body.light-mode .card:hover { box-shadow: 0 12px 32px rgba(27,58,107,.14) !important; }
body.light-mode .card h3 { color: #1B2A45 !important; }
body.light-mode .card .simple, body.light-mode .card p { color: #3D4E6B !important; }
body.light-mode .card .hint { color: rgba(27,42,69,.25) !important; }
body.light-mode .overlay, body.light-mode #overlay { background: rgba(15,25,50,.7) !important; }
body.light-mode .modal, body.light-mode #modal { background: #fff !important; border-color: #D8E0EE !important; }
body.light-mode .modal-tabs { border-color: #D8E0EE !important; }
body.light-mode .mtab { color: #7A8FB5 !important; }
body.light-mode .explain-box { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #2D3E5C !important; }
body.light-mode .example-box p { color: #3D4E6B !important; }
body.light-mode .dict-item { border-color: #D8E0EE !important; }
body.light-mode .dict-def { color: #3D4E6B !important; }
body.light-mode .dict-ex { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #5A6E8F !important; }
body.light-mode .card-back { background: linear-gradient(135deg,#1B3A6B,#2A5298) !important; border-color: rgba(27,58,107,.4) !important; }
body.light-mode .card-answer { color: #F0F4FF !important; }
body.light-mode .steps-intro { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #3D4E6B !important; }
body.light-mode .step-item { border-color: #D8E0EE !important; }
body.light-mode .step-detail { color: #3D4E6B !important; }
body.light-mode .step-example { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #5A6E8F !important; }
body.light-mode .summary-list li { border-color: #D8E0EE !important; color: #2D3E5C !important; }
body.light-mode .prereq-intro { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #3D4E6B !important; }
body.light-mode .prereq-item { border-color: #D8E0EE !important; }
body.light-mode .prereq-desc { color: #3D4E6B !important; }
body.light-mode .prereq-check { color: #7A8FB5 !important; }
body.light-mode .vestibular-box { background: rgba(200,150,28,.06) !important; border-color: rgba(200,150,28,.2) !important; }
body.light-mode .vestibular-box p { color: #3D4E6B !important; }
body.light-mode .pu-badge { background: rgba(200,150,28,.1) !important; }
body.light-mode .layer { border-left-color: currentColor !important; }
body.light-mode .layer-1 { background: rgba(27,58,107,.04) !important; }
body.light-mode .layer-2 { background: rgba(42,82,152,.04) !important; }
body.light-mode .layer-3 { background: rgba(200,150,28,.04) !important; }
body.light-mode .layer-4 { background: rgba(200,80,80,.04) !important; }
body.light-mode .layer-text { color: #1B2A45 !important; }
body.light-mode .layer-ex { background: #F2F5FB !important; border-color: #D8E0EE !important; color: #5A6E8F !important; }
body.light-mode .story-scene { background: rgba(27,58,107,.04) !important; border-color: #D8E0EE !important; }
body.light-mode .story-scene-text { color: #1B2A45 !important; }
body.light-mode .story-question { background: rgba(27,58,107,.06) !important; border-color: rgba(27,58,107,.2) !important; }
body.light-mode .story-question .sq-text { color: #1B2A45 !important; }
body.light-mode .story-moral { background: rgba(27,58,107,.06) !important; border-color: rgba(27,58,107,.2) !important; }
body.light-mode .story-moral .sm-text { color: #1B2A45 !important; }
body.light-mode .search-wrap input { background: #fff !important; border-color: #D8E0EE !important; color: #1B2A45 !important; }

{year:"1",tri:"T1",theme:"Funções",pu:false,emoji:"📈",term:"Função Afim",
 layers:[{tag:"Ponto de Partida — Observação",text:"Pense num táxi. Você entra e o marcador já mostra R$4,50 — antes de andar. Depois, cada km adiciona R$2,10. Há duas coisas acontecendo: um valor <b>fixo</b> e um valor que <b>cresce com a distância</b>.",ex:"5km: R$4,50 + (5 x R$2,10) = R$15,00"},
   {tag:"Padrão — O que fica fixo e o que muda?",text:"O valor fixo (R$4,50) chamamos de <b>b</b>. O quanto cresce por unidade (R$2,10/km) chamamos de <b>a</b>. O número de km chamamos de <b>x</b>. A regra sempre é: <b>total = a vezes x + b</b>.",ex:"10km: f(10) = 2,10 x 10 + 4,50 = R$25,50"},
   {tag:"Formalizacao — A linguagem matematica",text:"Escrevemos <b>f(x) = ax + b</b>. <b>a</b> é o coeficiente angular — a taxa de variação, a inclinação da reta. <b>b</b> é o coeficiente linear — o valor quando x=0. O gráfico é sempre uma <b>reta</b>.",ex:"a > 0: reta sobe. a < 0: reta desce. a = 0: reta horizontal."},
   {tag:"Aprofundamento — Interpretar e criar",text:"O <b>zero da função</b> é onde a reta cruza o eixo x: <b>x = -b/a</b>. Para comparar dois táxis, iguale as funções e ache o ponto de interseção — a distância onde os dois cobram o mesmo valor.",ex:"Táxi A: f(x)=2,1x+4,5. Táxi B: g(x)=1,8x+6. Iguais quando: 0,3x=1,5 → x=5km."}],
 historia:{cenas:[{icon:"🚗",label:"A CORRIDA DE TÁXI",texto:"Ana chamou um táxi. Antes de sair do lugar: R$4,50. A cada km, mais R$2,10. Em 3km: R$10,80. Em 5km: R$15,00. Em 8km: R$21,30. Ana escreveu no caderno: 'R$4,50 + R$2,10 por km'. Ela tinha descoberto, sem saber, a função afim."},

 simple:"f(x) = ax + b. Gráfico sempre reto. Coeficiente angular a define inclinação; b, o ponto no eixo y.",

 story:{icon:"🚕",title:"O táxi da madrugada",text:"Era meia-noite. Rafael saiu do show e precisava ir para casa — 8km de distância. No app, apareceu: <strong>bandeirada R$4,50 + R$2,10 por km</strong>.\n\nEle pensou: 'Quanto vou gastar?' Fez mentalmente:\n• 1km: R$4,50 + R$2,10 = R$6,60\n• 2km: R$4,50 + R$4,20 = R$8,70\n• 8km: R$4,50 + R$16,80 = R$21,30\n\nPerceba: para cada km a mais, o preço sobe exatamente R$2,10. E o R$4,50 nunca some — ele está sempre lá, independente da distância.\n\nIsso é uma função afim. A bandeirada é o <em>b</em>. O preço por km é o <em>a</em>. E a distância é o <em>x</em>.",connection:"Toda vez que você vê uma cobrança com 'valor fixo + valor por unidade', está diante de uma função afim: planos de celular, contas de luz com taxa mínima, salário com comissão por venda."},
 dict:[
   {term:"Coeficiente angular",def:"O valor a em f(x)=ax+b. Mede a inclinação da reta — quantas unidades y muda para cada 1 unidade de x.",ex:"f(x)=3x+1: a=3. Para cada 1 unidade em x, y sobe 3 unidades."},
   {term:"Coeficiente linear",def:"O valor b em f(x)=ax+b. É o valor de y quando x=0 — onde a reta cruza o eixo y.",ex:"f(x)=2x+5: b=5. O gráfico cruza o eixo y no ponto (0,5)."},

   {term:"Inequação do 1º grau",def:"Comparação com < > ≤ ≥ em vez de =. A solução é um intervalo de valores, não um ponto.",ex:"2x+1>7 → 2x>6 → x>3. Solução: todos os x maiores que 3."}

     {n:3,action:"Calcule",detail:"Se pede f(x): substitua x e calcule. Se pede x: isole x como numa equação do 1º grau.",ex:"f(8) = 2,1×8 + 4,5 = 16,8 + 4,5 = R$21,30"},

{year:"1",tri:"T1",theme:"Álgebra",pu:false,emoji:"🔢",term:"Progressão Aritmética (PA)",
 layers:[{tag:"Ponto de Partida — Observação",text:"Você vai à academia e decide progredir: 1ª semana, 10 minutos. 2ª, 15 minutos. 3ª, 20 minutos. 4ª, 25 minutos. <b>Sempre adiciona 5 minutos.</b> Há uma soma constante a cada etapa.",ex:"Sequência: 10, 15, 20, 25, 30... Razão: +5 a cada termo."},
   {tag:"Padrão — A diferenca constante",text:"A diferença entre qualquer dois termos consecutivos é sempre a mesma — a <b>razao r</b>. A sequência cresce (ou decresce) de forma linear, exatamente como a função afim. r>0: cresce. r<0: decresce. r=0: constante.",ex:"r = 15-10 = 20-15 = 25-20 = 5. Sempre 5."},
   {tag:"Formalizacao — A linguagem matematica",text:"<b>Termo geral</b>: an = a1 + (n-1) x r. <b>Soma</b>: Sn = n x (a1 + an) / 2 — a média do primeiro e do último, multiplicada pela quantidade de termos.",ex:"10ª semana: a10 = 10 + 9 x 5 = 55min. Soma das 10 primeiras semanas: S10 = 10 x (10+55)/2 = 325min."},
   {tag:"Aprofundamento — Relacao com funcao afim",text:"an = a1 + (n-1)r é equivalente a f(n) = rn + (a1 - r). <b>A PA é a função afim nos inteiros</b> — o coeficiente angular é r e o linear é a1-r.",ex:"PA com a1=10 e r=5: f(n)=5n+5. f(1)=10 e f(3)=20. Confira!"}],
 historia:{cenas:[{icon:"🏊",label:"O TREINO DE PEDRO",texto:"Pedro decidiu aprender a nadar. No 1º dia: 2 voltas. O técnico disse: cada dia, adicione 2 voltas. No 2º: 4. No 3º: 6. No 10º: 20 voltas. No 30º dia, Pedro calculou que faria 60 voltas e teria nadado 930 voltas no total."},
       {icon:"🧮",label:"A FORMULA QUE PEDRO USOU",texto:"Pedro usou, sem saber o nome, a fórmula da PA: <b>an = 2 + (n-1) x 2 = 2n</b>. Para a soma: S30 = 30 x (2+60)/2 = 930 voltas. A sequência 2, 4, 6, 8... é uma PA com r=2."}],pergunta:"Em que dia Pedro chegaria a 50 voltas? E qual seria a soma total até esse dia?",moral:"PA é qualquer sequência onde se soma (ou subtrai) sempre o mesmo valor. r>0: cresce. r<0: decresce. A soma usa a media do primeiro e último termo."},

 simple:"Sequência onde cada termo é obtido somando uma constante (razão r) ao anterior. Ex: 2, 5, 8, 11... (r=3)",
 explain:"Você já subiu uma escada e notou que cada degrau tem exatamente a mesma altura? Isso é uma Progressão Aritmética na vida real — cada passo avança o mesmo tanto.<br><br>Uma PA é uma sequência de números em que a <b>diferença entre termos vizinhos é sempre a mesma</b>. Essa diferença tem um nome: <b>razão r</b>.<br><br>Exemplos:<br>• 2, 5, 8, 11... → r = 3 (soma 3 sempre)<br>• 100, 90, 80, 70... → r = −10 (subtrai 10 sempre)<br>• 7, 7, 7, 7... → r = 0 (não muda)<br><br>Para encontrar qualquer termo sem listar todos: <b>aₙ = a₁ + (n−1)·r</b>. Para somar vários termos de uma vez: <b>Sₙ = n·(a₁+aₙ)/2</b> — a média do primeiro e do último, vezes a quantidade.",
 example:"PA 3, 7, 11, 15... (r=4). 10º termo: a₁₀ = 3+(10−1)×4 = 3+36 = 39. Soma dos 10 primeiros: S₁₀ = 10×(3+39)/2 = 10×21 = 210.",

 story:{icon:"🎬",title:"As cadeiras do cinema",text:"O cinema novo tem formato diferente: a fileira 1 tem 10 cadeiras. A fileira 2 tem 13. A fileira 3 tem 16. E assim por diante — cada fileira tem 3 cadeiras a mais que a anterior.\n\nA gerente precisava saber: quantas cadeiras têm no total nas 20 fileiras?\n\nEla percebeu que era uma PA com a₁=10 e r=3.\n• A 20ª fileira: a₂₀ = 10 + (20−1)×3 = 10+57 = 67 cadeiras\n• Total: S₂₀ = 20×(10+67)/2 = 20×38,5 = 770 cadeiras\n\nSem precisar contar fileira por fileira!",connection:"Economistas usam PA para modelar crescimento linear. Arquitetos para calcular degraus de escadas. Professores para criar sequências de exercícios com dificuldade crescente constante."},
 dict:[
   {term:"Razão (r)",def:"A diferença constante entre termos consecutivos de uma PA. Se r>0: crescente. Se r<0: decrescente. Se r=0: constante.",ex:"PA 2,5,8,11: r=3. PA 10,7,4,1: r=−3. PA 5,5,5: r=0."},
   {term:"Termo geral (aₙ)",def:"Fórmula que calcula qualquer termo da PA sem precisar listar todos: aₙ = a₁ + (n−1)r.",ex:"PA com a₁=4 e r=3: a₁₀ = 4+(10−1)×3 = 4+27 = 31."},
   {term:"Interpolação aritmética",def:"Inserir termos entre dois valores para que formem uma PA. Com k meios, a razão é r=(aₙ−a₁)/(k+1).",ex:"Entre 2 e 17, inserir 4 meios: r=(17−2)/5=3. PA: 2,5,8,11,14,17."},
   {term:"Soma dos termos (Sₙ)",def:"Soma dos n primeiros termos de uma PA: Sₙ = n×(a₁+aₙ)/2. Média do primeiro e último vezes n.",ex:"Soma de 1 a 100: S₁₀₀ = 100×(1+100)/2 = 5050. (Gauss!)"}
 ],

     {n:2,action:"Escolha a fórmula certa",detail:"Pede um termo específico? → aₙ = a₁+(n−1)r. Pede a soma? → Sₙ = n·(a₁+aₙ)/2",ex:"'Qual o 20º termo?' → usa aₙ. 'Soma dos 20 primeiros' → usa Sₙ"},

{year:"1",tri:"T2",theme:"Trigonometria",pu:false,emoji:"🌊",term:"Trigonometria no Triângulo",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Você está em frente a um prédio e quer saber a altura sem escalar. Mede a distância do pé até a base (30m) e o ângulo de visão até o topo (60°). <b>Com um lado e um ângulo, você calcula o lado desconhecido.</b>",ex:"Esse é o poder da trigonometria: calcular o que não se pode medir diretamente."},
   {tag:"Padrão — As razoes dos lados",text:"Num triângulo retângulo, as <b>razões entre os lados</b> dependem apenas do ângulo — não do tamanho do triângulo. Essas razões têm nomes: <b>seno, cosseno e tangente</b>. São sempre as mesmas para o mesmo ângulo.",ex:"Todo triângulo retângulo com 30° sempre tem: o lado oposto = metade da hipotenusa."},
   {tag:"Formalizacao — SOH-CAH-TOA",text:"Para o ângulo alfa: <b>sen = oposto / hipotenusa</b>. <b>cos = adjacente / hipotenusa</b>. <b>tg = oposto / adjacente</b>. Valores notáveis: sen30°=1/2, sen45°=raiz(2)/2, sen60°=raiz(3)/2.",ex:"Prédio: tg(60°) = altura / 30. Como tg60°=raiz(3): altura = 30 x raiz(3) aprox 52m."},
   {tag:"Aprofundamento — Para qualquer triângulo",text:"Para triângulos que <b>não são retângulos</b>, usamos: <b>Lei dos Senos</b> (a/senA = b/senB) e <b>Lei dos Cossenos</b> (a² = b² + c² - 2bc x cosA). A Lei dos Cossenos é a generalização do Teorema de Pitágoras.",ex:"Com A=90°: a² = b² + c² - 2bc x 0 = b² + c². Exatamente Pitágoras!"}],
 historia:{cenas:[{icon:"🏔️",label:"O DESAFIO DO ENGENHEIRO",texto:"Um engenheiro precisava medir a largura de um rio sem atravessá-lo. Ele ficou numa margem, mediu 100m ao longo da beira e, dos dois pontos, mediu os ângulos em direção a uma árvore na outra margem: 60° e 45°. Com esses dados e a Lei dos Senos, calculou toda a largura sem molhar os pés."},
       {icon:"📐",label:"O SEGREDO DAS RAZOES",texto:"O engenheiro sabia que as razões entre os lados dependem <b>apenas dos ângulos</b>. Uma tabela de seno e cosseno substituiu anos de medições diretas. Hoje essa lógica está em GPS, arquitetura, física e animações de videogame."}],pergunta:"Por que é útil ter as razões trigonométricas mesmo sem construir o triângulo?",moral:"Trigonometria é a arte de calcular o que não se pode medir diretamente. Com um ângulo e um lado, encontramos todos os outros."},

 simple:"Sen, cos e tg como razões entre lados do triângulo retângulo. Valores notáveis: 30°, 45°, 60°. Extensão para qualquer triângulo com Lei dos Senos e Cossenos.",
 explain:"Imagine que você está de longe olhando para uma árvore muito alta. Você não consegue medir a altura dela com uma régua — mas consegue medir a distância em que está e o ângulo em que você levanta o olhar para ver o topo. Esses dois dados são suficientes para calcular a altura exata da árvore.<br><br>É para isso que serve a trigonometria: <b>calcular lados e ângulos de triângulos</b> quando você não tem acesso direto a todas as medidas.<br><br>No triângulo retângulo (com ângulo de 90°), os três lados têm nomes:<br>• <b>Hipotenusa</b>: o maior lado, sempre oposto ao ângulo de 90°<br>• <b>Cateto oposto</b>: o lado do lado oposto ao ângulo que você escolheu<br>• <b>Cateto adjacente</b>: o lado que toca o ângulo escolhido<br><br>As três razões principais — <b>seno, cosseno e tangente</b> — são divisões entre esses lados. Para outros triângulos (sem o 90°), usamos as <b>Leis dos Senos e Cossenos</b>.",
 example:"Triângulo com lados b=8, c=6 e ângulo A=60°. Lei dos cossenos: a² = 64+36−2×8×6×cos60° = 100−48×0,5 = 76. Logo a = √76 ≈ 8,7.",

 story:{icon:"🏔️",title:"O topógrafo na montanha",text:"Carlos precisava medir a altura de um penhasco sem escalar. Ele ficou a 200m de distância da base e usou um equipamento para medir que o ângulo de elevação até o topo era 35°.\n\nCom isso ele montou um triângulo retângulo:\n• A base horizontal (adjacente) = 200m\n• O ângulo = 35°\n• A altura do penhasco = ?\n\nUsando tg(35°) = oposto/adjacente:\naltura = 200 × tg(35°) ≈ 200 × 0,7 ≈ 140m\n\nSem nunca tocar o penhasco.",connection:"Arquitetos calculam inclinação de telhados. Engenheiros medem a força em cabos de pontes. Jogos de videogame calculam trajetórias de projéteis. GPS usa trigonometria para triangular posições."},
 dict:[
   {term:"Valores notáveis",def:"Os valores exatos de sen, cos e tg para 30°, 45° e 60°. Memorizados pois aparecem em qualquer prova.",ex:"sen30°=cos60°=1/2; sen45°=cos45°=√2/2≈0,71; sen60°=cos30°=√3/2≈0,87"},
   {term:"Lei dos Senos",def:"Relação entre lados e ângulos opostos em qualquer triângulo: a/sen(A)=b/sen(B)=c/sen(C).",ex:"Se a=10 e A=30°, B=45°: b/sen45°=10/sen30° → b=10×(√2/2)/0,5=10√2≈14,1."},
   {term:"Lei dos Cossenos",def:"Generalização do Teorema de Pitágoras para triângulos não retângulos: a²=b²+c²−2bc·cos(A).",ex:"Quando A=90°, cos90°=0, e a fórmula vira a²=b²+c² (Pitágoras!)."},
   {term:"Ângulo notável",def:"Ângulo cujas razões trigonométricas têm valores exatos sem aproximação decimal.",ex:"30°, 45°, 60° e 90° são os ângulos notáveis do EM."},
   {term:"Relação fundamental",def:"Identidade sempre válida: sen²(α)+cos²(α)=1. Deriva do Teorema de Pitágoras.",ex:"Se sen(α)=3/5, então cos²(α)=1−9/25=16/25, logo cos(α)=4/5."}
 ],
 steps:{
   intro:"Para resolver triângulos com trigonometria, o protocolo muda conforme o que é dado.",
   items:[
     {n:1,action:"Classifique o triângulo",detail:"É retângulo? Use sen/cos/tg diretamente. Não é retângulo? Use Lei dos Senos ou Cossenos.",ex:"Tem ângulo de 90°? → SOH-CAH-TOA. Não tem? → Lei dos Senos/Cossenos"},
     {n:2,action:"Identifique o que é dado e o que falta",detail:"Anote os lados e ângulos conhecidos. Dois ângulos e um lado → Lei dos Senos. Dois lados e ângulo entre eles → Lei dos Cossenos.",ex:"Dados: a=10, A=30°, B=45° → Lei dos Senos. Dados: b=8, c=6, A=60° → Lei dos Cossenos"},
     {n:3,action:"Aplique a fórmula",detail:"Lei dos Senos: a/senA = b/senB. Lei dos Cossenos: a²=b²+c²−2bc·cosA. SOH-CAH-TOA para retângulo.",ex:"a/sen30°=10/sen30°... Lei dos Cossenos: a²=64+36−96×0,5=76"},
     {n:4,action:"Calcule e interprete",detail:"Use os valores notáveis decorados. Deixe em forma de raiz quando possível.",ex:"a=√76=2√19≈8,7",tip:"⚠️ sen30°=1/2, sen45°=√2/2, sen60°=√3/2 — esses devem ser automáticos!"}
   ]
 },

     {badge:"9º ANO",color:"#5F27CD",title:"Teorema de Pitágoras",desc:"A Lei dos Cossenos é uma generalização de Pitágoras. Precisa dominar o original.",check:"✓ Pronto se: calcula a hipotenusa de um triângulo 5-12-?."},
     {badge:"8º ANO",color:"#54A0FF",title:"Radiciação e potenciação",desc:"Os cálculos envolvem raízes quadradas e potências nos valores de sen, cos e tg.",check:"✓ Pronto se: simplifica √3/2 e √2/2 sem calculadora."}
   ],
   vestibular:"Lei dos Senos e Cossenos são muito cobradas em vestibulares como FUVEST e UNICAMP em problemas de topografia, navegação e física (forças e vetores). No ENEM, a ênfase é em situações contextualizadas como altura de prédios e ângulos de elevação."
 },

{year:"1",tri:"T2",theme:"Funções",pu:false,emoji:"🏹",term:"Função Quadrática",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Um atleta chuta uma bola. Ela sobe, sobe, chega ao ponto mais alto... depois cai. Em nenhum momento cresce em linha reta. <b>Existe um ponto máximo</b> e a trajetória tem forma de arco — a parábola.",ex:"Nos primeiros segundos, sobe rápido. Perto do topo, quase para. Depois cai acelerando."},
   {tag:"Padrão — O crescimento que desacelera",text:"Diferente da função afim (crescimento constante), aqui o crescimento <b>desacelera, para, e inverte</b>. Isso acontece porque existe um termo x² — que 'dobra o efeito' conforme x cresce. A taxa de variação não é constante.",ex:"Função afim: y cresce sempre igual. Quadrática: y cresce cada vez menos (ou mais), até inverter."},
   {tag:"Formalizacao — A linguagem matematica",text:"f(x) = ax² + bx + c. <b>a > 0</b>: parábola U (mínimo). <b>a < 0</b>: parábola n invertido (máximo). Vértice: <b>xv = -b/2a</b>. Raízes por Bhaskara. Discriminante: <b>Delta = b² - 4ac</b>.",ex:"Bola chutada: h(t) = -5t² + 20t. Topo em t = -20/(2 x -5) = 2s. Altura: h(2) = -20+40 = 20m."},
   {tag:"Aprofundamento — Delta e aplicacoes",text:"<b>Delta > 0</b>: 2 raízes. <b>Delta = 0</b>: 1 raiz (parábola tangente ao eixo). <b>Delta < 0</b>: sem raízes reais. Forma fatorada: a(x-x1)(x-x2). Máximos e mínimos estão sempre no vértice.",ex:"Lucro máximo, área máxima, altura máxima de projéteis — sempre resolvidos pelo vértice."}],
 historia:{cenas:[{icon:"⚽",label:"O CHUTE PERFEITO",texto:"Miguel quer marcar um gol de falta sobre a barreira. O técnico explica: 'a trajetória da bola é uma parábola. Se chutar com muita força vertical, sobe demais. Com pouca, não passa. Existe um ângulo ideal.' A matemática descreve exatamente a trajetória com f(t) = -5t² + 20t."},
       {icon:"📈",label:"A PARABOLA DO LUCRO",texto:"A loja de Miguel vende tênis. Muito caro: poucas vendas. Muito barato: ganha pouco por unidade. O contador modelou: Lucro = -2p² + 120p - 1000, onde p é o preço. Para maximizar, precisa do vértice: p = -120 / (2 x -2) = 30. O preço ideal é R$30."}],pergunta:"Com Lucro = -2p² + 120p - 1000, qual é o lucro máximo? Use yv = -Delta/4a.",moral:"A função quadrática descreve tudo com um ponto de máximo ou mínimo: trajetórias, lucros, áreas. O vértice é a resposta para 'qual o melhor valor possível?'"},

 simple:"f(x) = ax²+bx+c. Gráfico é uma parábola. O vértice é o ponto de máximo ou mínimo. Raízes calculadas por Bhaskara.",
 explain:"Quando você joga uma bola para cima, ela não sobe para sempre — em algum momento para e desce. O caminho que ela faz no ar forma uma curva simétrica chamada <b>parábola</b>. Essa forma é o gráfico da função quadrática.<br><br>Diferente da função afim (que é uma linha reta), a função quadrática tem um <b>ponto de virada</b> — que pode ser o ponto mais alto ou mais baixo da curva. Chamamos esse ponto de <b>vértice</b>.<br><br>A fórmula é <b>f(x) = ax² + bx + c</b>. O que muda entre funções quadráticas diferentes é:<br>• Se <b>a > 0</b>: a parábola abre para cima (∪) — o vértice é o <em>ponto mínimo</em><br>• Se <b>a < 0</b>: a parábola abre para baixo (∩) — o vértice é o <em>ponto máximo</em><br><br>Quando a parábola cruza o eixo horizontal, encontramos as <b>raízes</b> — os valores de x que fazem f(x)=0.",
 example:"f(x) = −x²+4x−3. a=−1 → abre para baixo. Vértice: xᵥ=2, f(2)=−4+8−3=1. Raízes: Δ=16−12=4 → x=(−4±2)/(−2) → x₁=1 e x₂=3.",

 story:{icon:"⚽",title:"O chute perfeito",text:"No treino de futebol, o treinador filmou um chute de falta. Depois, plotou a trajetória da bola em um gráfico e percebeu que ela seguia exatamente f(x) = −0,1x² + 2x, onde x é a distância horizontal e f(x) a altura.\n\nEle conseguiu calcular:\n• Altura máxima: no vértice, xᵥ = −2/(2×(−0,1)) = 10m de distância. Altura = f(10) = −10+20 = 10m\n• Onde a bola cai: f(x)=0 → x(−0,1x+2)=0 → x=0 ou x=20m\n\nA bola sobe até 10m de altura e cai 20m à frente.",connection:"Engenheiros usam funções quadráticas para projetar pontes suspensas e arcos. Economistas calculam o preço que maximiza o lucro. Físicos calculam trajetórias de projéteis."},
 dict:[
   {term:"Parábola",def:"O gráfico da função quadrática. Em forma de U (a>0) ou ∩ (a<0). Tem simetria em torno do eixo do vértice.",ex:"Trajetória de uma bola jogada forma uma parábola. A=−10 (gravidade)."},
   {term:"Vértice",def:"O ponto de mínimo (a>0) ou máximo (a<0) da parábola. Coordenadas: xᵥ=−b/2a e yᵥ=−Δ/4a.",ex:"f(x)=x²−4x+3: xᵥ=2, yᵥ=−1. Ponto (2,−1) é o mínimo."},
   {term:"Discriminante (Δ)",def:"Δ=b²−4ac. Determina o número de raízes reais antes de calcular.",ex:"Δ>0: 2 raízes. Δ=0: 1 raiz (parábola toca o eixo). Δ<0: sem raiz real."},
   {term:"Valor máximo/mínimo",def:"O valor de yᵥ no vértice. É o maior (a<0) ou menor (a>0) valor que a função pode assumir.",ex:"Lucro máximo, altura máxima de projétil — sempre calculado no vértice."},
   {term:"Forma fatorada",def:"Escrever a função como a(x−x₁)(x−x₂) usando as raízes. Facilita análise do sinal.",ex:"f(x)=x²−5x+6 = (x−2)(x−3). f(x)>0 quando x<2 ou x>3."}
 ],
 steps:{
   intro:"O protocolo da função quadrática depende do que o problema pede: raízes, vértice ou sinal.",
   items:[
     {n:1,action:"Escreva na forma padrão",detail:"Garanta que está na forma ax²+bx+c=0 (para raízes) ou f(x)=ax²+bx+c (para gráfico/vértice).",ex:"x²=5x−6 → x²−5x+6=0. Identifique: a=1, b=−5, c=6"},
     {n:2,action:"Analise o que pede",detail:"Pede raízes? → Bhaskara. Pede máximo/mínimo? → vértice. Pede quando f(x)>0? → estudo do sinal.",ex:"'Quando o lucro é máximo?' → vértice. 'Quando lucro é positivo?' → estudo do sinal"},
     {n:3,action:"Calcule o Δ PRIMEIRO",detail:"Δ=b²−4ac. Isso diz quantas raízes existem ANTES de fazer contas desnecessárias.",ex:"Δ=25−24=1>0 → 2 raízes. Se Δ<0, pare — não há raízes reais"},
     {n:4,action:"Aplique Bhaskara ou vértice",detail:"Raízes: x=(−b±√Δ)/2a. Vértice: xᵥ=−b/2a, depois calcule f(xᵥ).",ex:"x=(5±1)/2 → x₁=3 e x₂=2. Vértice: xᵥ=5/2=2,5"},
     {n:5,action:"Verifique substituindo",detail:"Substitua cada raiz na equação. Deve dar zero. Para o vértice, verifique se é máx ou mín pelo sinal de a.",ex:"f(2)=4−10+6=0 ✓ e f(3)=9−15+6=0 ✓",tip:"⚠️ a<0 → parábola ∩ → vértice é MÁXIMO. a>0 → parábola ∪ → vértice é MÍNIMO"}
   ]
 },
 prereq:{
   items:[
     {badge:"9º ANO",color:"#5F27CD",title:"Equação do 2º Grau / Bhaskara",desc:"As raízes da função são as soluções da equação. Bhaskara é ferramenta diária aqui.",check:"✓ Pronto se: resolve x²−5x+6=0 e encontra x=2 e x=3."},
     {badge:"9º ANO",color:"#5F27CD",title:"Produtos Notáveis",desc:"Reconhecer (a+b)² e (a−b)² ajuda a fatorar e identificar vértice.",check:"✓ Pronto se: expande (x−3)² = x²−6x+9 rapidamente."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim (comparação)",desc:"Contrastar crescimento linear (afim) com crescimento quadrático consolida os dois conceitos.",check:"✓ Pronto se: distingue o gráfico de y=2x de y=2x² sem calcular."}
   ],
   vestibular:"A função quadrática é o tema mais cobrado nos vestibulares em problemas de máximo e mínimo: lucro máximo, área máxima, altura máxima de projéteis. No ENEM, aparece principalmente na leitura de parábolas e interpretação de vértice no contexto."
 },

{year:"1",tri:"T2",theme:"Trigonometria",pu:false,emoji:"🔄",term:"Ciclo Trigonométrico",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Seno e cosseno só funcionam para ângulos entre 0° e 90°? E ângulos como 150° ou 270°? A trigonometria do triângulo tem um limite. Precisamos de uma definição mais ampla, que funcione para <b>qualquer ângulo</b>.",ex:"Temperatura ao longo do ano, marés, ondas sonoras, corrente elétrica — todos variam de forma cíclica, além de 90°."},
   {tag:"Padrão — O circulo como referencia",text:"Imagine um ponto andando num círculo de raio 1. Sua posição <b>horizontal</b> é o cosseno do ângulo percorrido. Sua posição <b>vertical</b> é o seno. Assim, seno e cosseno passam a existir para qualquer ângulo.",ex:"Posição (0,1): ângulo 90°, sen=1, cos=0. Posição (-1,0): ângulo 180°, sen=0, cos=-1."},
   {tag:"Formalizacao — Quadrantes e sinais",text:"O círculo divide o plano em 4 quadrantes: <b>1°: sen+, cos+. 2°: sen+, cos-. 3°: sen-, cos-. 4°: sen-, cos+.</b> Memorize: 'Todos Sabem Tudo Certo' (TSTC). Qualquer ângulo se reduz ao 1° quadrante.",ex:"sen(150°): 150°=180°-30° → 2° quadrante → sen positivo → sen(150°)=sen(30°)=1/2."},
   {tag:"Aprofundamento — Funcoes trigonometricas",text:"Com o ciclo, surgem as <b>funções periódicas</b>: f(x)=sen(x) e f(x)=cos(x), oscilando entre -1 e +1 com período de 360°. São a base matemática de ondas sonoras, sinais elétricos e qualquer fenômeno cíclico.",ex:"Corrente elétrica: V(t) = 220 x sen(120pi x t). O seno garante oscilação suave entre -220V e +220V."}],
 historia:{cenas:[{icon:"🌊",label:"AS MARES DE SOFIA",texto:"Sofia é oceanógrafa e precisa prever marés para os próximos 30 dias. A maré alta ocorre a cada 12 horas e a amplitude varia. Com trigonometria de triângulo, só conseguia calcular até 90°. Mas as marés não param em 90° — sobem, chegam ao máximo, descem, chegam ao mínimo, continuamente."},
       {icon:"🔄",label:"O CICLO SE REPETE",texto:"Sofia aprendeu que o ciclo trigonométrico generaliza o seno para qualquer ângulo. A fórmula da maré ficou: <b>h(t) = 2 x sen(30t) + 5</b>. Com isso, ela previu a altura da maré para qualquer hora dos próximos meses — e salvou barcos de encalhar."}],pergunta:"Por que a função seno é ideal para modelar fenômenos que sobem e descem periodicamente?",moral:"O ciclo trigonométrico liberta o seno e o cosseno dos triângulos. Qualquer ângulo, qualquer fenômeno periódico pode ser descrito por sen(x) e cos(x)."},

 simple:"Círculo de raio 1 que permite definir sen e cos para qualquer ângulo — não só de triângulos. Divide o plano em 4 quadrantes.",
 explain:"Seno e cosseno no triângulo retângulo só funcionam para ângulos entre 0° e 90°. Mas e os outros ângulos — 120°, 270°, 360°? Para resolver isso, os matemáticos criaram uma ferramenta elegante: o <b>ciclo trigonométrico</b>.<br><br>Imagine um círculo com raio 1 desenhado no plano. Você começa no ponto (1, 0) — à direita do centro — e caminha pelo contorno do círculo. Para cada ângulo que você percorreu, o ponto onde você está tem coordenadas (<b>cos α</b>, <b>sen α</b>).<br><br>Isso resolve o problema: agora sen e cos fazem sentido para <em>qualquer</em> ângulo. E os <b>4 quadrantes</b> determinam os sinais:<br>• 1º quadrante (0°–90°): sen + e cos +<br>• 2º quadrante (90°–180°): sen + e cos −<br>• 3º quadrante (180°–270°): sen − e cos −<br>• 4º quadrante (270°–360°): sen − e cos +<br><br>Uma dica para memorizar: <em>'Todos São Tão Caros'</em> — em cada quadrante, qual função é positiva.",
 example:"Sen(150°): 150°=180°−30° → está no 2º quadrante → sen>0. Sen(150°)=sen(30°)=1/2. Cos(150°)=−cos(30°)=−√3/2.",

 story:{icon:"🎡",title:"A roda-gigante",text:"Pense em uma roda-gigante de raio 1 (simplificado). Você embarca no ponto mais à direita e começa a girar. Alguém te pergunta: 'A que altura você está?'\n\n• Após girar 90°: você está no topo → altura = 1 (máxima)\n• Após girar 180°: você está no ponto mais à esquerda → altura = 0\n• Após girar 270°: você está no fundo → altura = −1 (mínima)\n• Após girar 360°: você voltou → altura = 0 novamente\n\nEssa 'altura' que varia enquanto você gira é exatamente o seno do ângulo percorrido. O seno 'oscila' entre −1 e +1 — exatamente como você na roda-gigante.",connection:"Ondas de rádio, som e luz têm formato de seno/cosseno. Cardiologistas leem o coração em ondas senoidais no ECG. Engenheiros calculam vibrações em estruturas. Música digital é uma soma de funções trigonométricas."},
 dict:[
   {term:"Quadrante",def:"Cada uma das 4 regiões do plano cartesiano separadas pelos eixos. Determina o sinal de sen e cos.",ex:"1º: sen>0, cos>0. 2º: sen>0, cos<0. 3º: sen<0, cos<0. 4º: sen<0, cos>0."},
   {term:"Arco",def:"O comprimento do arco na circunferência de raio 1 correspondente a um ângulo. Medido em radianos ou graus.",ex:"Arco de 90° = π/2 radianos ≈ 1,57. Arco de 180° = π radianos."},
   {term:"Redução ao 1º quadrante",def:"Técnica para calcular razões trigonométricas de qualquer ângulo usando os ângulos do 1º quadrante.",ex:"Sen(210°)=−sen(30°)=−1/2. O 210° está no 3º quadrante (sen negativo)."},
   {term:"Ângulo negativo",def:"Ângulo medido no sentido horário no ciclo trigonométrico (sentido contrário ao padrão).",ex:"Sen(−30°)=−sen(30°)=−1/2. Cos(−60°)=cos(60°)=1/2."}
 ],
 steps:{
   intro:"Para calcular sen/cos/tg de qualquer ângulo usando o ciclo, siga este protocolo.",
   items:[
     {n:1,action:"Localize o quadrante",detail:"Onde o ângulo cai? 0°-90°=1º, 90°-180°=2º, 180°-270°=3º, 270°-360°=4º. Ângulos acima de 360°: subtraia 360° até ficar no intervalo.",ex:"210° → entre 180° e 270° → 3º quadrante"},
     {n:2,action:"Defina os sinais",detail:"1º: sen+, cos+. 2º: sen+, cos−. 3º: sen−, cos−. 4º: sen−, cos+. Memorize: 'Todos Sem Tudo Certo'",ex:"3º quadrante → sen negativo e cos negativo"},
     {n:3,action:"Calcule o ângulo de referência",detail:"Reduza ao 1º quadrante: 2º→180°−α, 3º→α−180°, 4º→360°−α.",ex:"sen(210°): ângulo de referência = 210°−180° = 30°"},
     {n:4,action:"Aplique o sinal correto",detail:"Use o valor do 1º quadrante com o sinal definido no passo 2.",ex:"sen(210°) = −sen(30°) = −1/2",tip:"⚠️ tg(α) = sen(α)/cos(α). Se cos=0, a tangente não existe (90° e 270°)"}
   ]
 },

     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Trigonometria no triângulo",desc:"Sen, cos e tg no triângulo retângulo são redefinidos aqui para qualquer ângulo.",check:"✓ Pronto se: sabe os valores de sen e cos para 30°, 45° e 60°."},
     {badge:"9º ANO",color:"#5F27CD",title:"Circunferência",desc:"O ciclo é uma circunferência de raio 1. Conceitos de arco, raio e ponto são essenciais.",check:"✓ Pronto se: sabe que o comprimento de uma circunferência de raio r é 2πr."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Plano Cartesiano / Quadrantes",desc:"Os 4 quadrantes do plano determinam os sinais de seno e cosseno.",check:"✓ Pronto se: identifica em qual quadrante fica o ponto (−3, 2)."}

   vestibular:"O ciclo trigonométrico é pré-requisito para as funções trigonométricas (sen x, cos x) e equações trigonométricas, muito cobradas na FUVEST e UNICAMP. No ENEM, aparece em questões de fenômenos periódicos (marés, ondas sonoras, sazonalidade)."
 },

{year:"1",tri:"T3",theme:"Álgebra",pu:false,emoji:"📐",term:"Progressão Geométrica (PG)",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Uma folha tem 0,1mm de espessura. Dobre ao meio: 0,2mm. Dobre de novo: 0,4mm. Depois de 42 dobras, a pilha chegaria até a Lua! <b>Multiplicar por um fator fixo repetidamente cria crescimento explosivo.</b>",ex:"42 dobras: 0,1mm x 2^42 aprox 440.000km. Distância Terra-Lua: aprox 384.000km."},
   {tag:"Padrão — Multiplicar em vez de somar",text:"Na PA, somamos sempre o mesmo valor. Na PG, <b>multiplicamos</b> sempre pela mesma razão q. Se q>1: cresce explosivamente. Se 0<q<1: diminui progressivamente. Os montantes de juros compostos formam exatamente uma PG.",ex:"PG do papel: 0,1 / 0,2 / 0,4 / 0,8... → q=2. A cada dobra, multiplica por 2."},
   {tag:"Formalizacao — A linguagem matematica",text:"Termo geral: <b>an = a1 x q^(n-1)</b>. Soma: <b>Sn = a1 x (q^n - 1) / (q - 1)</b>. PG infinita com |q|<1: <b>S-inf = a1 / (1-q)</b>.",ex:"Investimento R$1000 a 10%/mês: 1000, 1100, 1210, 1331... PG com q=1,1."},
   {tag:"Aprofundamento — PG vs PA",text:"PA: cresce linearmente, gráfico é reta. PG: cresce exponencialmente, gráfico é curva acelerada. A diferença em longo prazo é enorme. Uma pandemia com casos dobrando semanalmente é uma PG com q=2.",ex:"PA de razão 100: em 10 passos chega a 1000. PG de razão 2: em 10 passos chega a 512. Em 20 passos: PA=2000, PG=524.288!"}],
 historia:{cenas:[{icon:"🌾",label:"O GRAO DE TRIGO",texto:"O inventor do xadrez pediu ao rei: 1 grão na 1ª casa, 2 na 2ª, 4 na 3ª... O rei achou fácil e aceitou. Quando calcularam: seriam 2^64 - 1 grãos — mais do que toda a produção de trigo da humanidade. O rei ficou incrédulo. A matemática estava certa."},
       {icon:"🦠",label:"A PANDEMIA E A PG",texto:"Em março de 2020, os epidemiologistas avisaram: 'se cada infectado passar para 2 pessoas, em 30 dias teremos milhões de casos'. A população duvidou dos números pequenos do início. Mas PG com q=2 começando em 1 chega a 1 bilhão em apenas 30 passos. A matemática estava certa."}],pergunta:"Por que a PG é tão surpreendente quando q>1 e começa pequena? O que acontece se q=0,5?",moral:"PG é o crescimento do mundo real: financeiro, biológico, viral. Multiplicar por q>1 gera explosão. Multiplicar por q<1 gera extinção gradual. Juros compostos, epidemias, fissão nuclear — tudo é PG."},

 simple:"Sequência onde cada termo é obtido multiplicando o anterior pela razão q. Ex: 2, 6, 18, 54... (q=3). Cresce exponencialmente.",
 explain:"Na PA, você <em>somava</em> a mesma coisa sempre. Na PG, você <em>multiplica</em> pela mesma coisa sempre. Essa diferença parece pequena, mas muda tudo — o crescimento de uma PG pode ser explosivo.<br><br>Na PG, a <b>razão q</b> é o número pelo qual cada termo é multiplicado para obter o próximo:<br>• 2, 6, 18, 54... → q = 3 (multiplica por 3 sempre)<br>• 100, 10, 1, 0,1... → q = 0,1 (multiplica por 0,1 — ou seja, divide por 10)<br><br>Fórmula do termo geral: <b>aₙ = a₁ · qⁿ⁻¹</b>. O crescimento é <em>exponencial</em> — começa devagar e acelera rápido.<br><br>Uma curiosidade histórica: o rei persa perguntou ao inventor do xadrez o que ele queria de recompensa. O inventor pediu: 1 grão no 1º quadrado, 2 no 2º, 4 no 3º... dobrando até o 64º quadrado. O rei riu. Depois fez a conta e ficou sem palavras.",
 example:"PG 2, 6, 18, 54... (q=3). 6º termo: a₆ = 2×3⁵ = 2×243 = 486. Soma dos 5 primeiros: S₅ = 2×(3⁵−1)/(3−1) = 2×242/2 = 242.",

 story:{icon:"🦠",title:"A história dos vírus",text:"Em 2020, muito se falou sobre crescimento exponencial das pandemias. Imagine um vírus que cada pessoa infectada contagia outras 3.\n\nDia 0: 1 pessoa infectada\nDia 1: 3 pessoas (×3)\nDia 2: 9 pessoas (×3)\nDia 3: 27 pessoas (×3)\nDia 10: 1 × 3¹⁰ = 59.049 pessoas\nDia 20: 1 × 3²⁰ ≈ 3,5 bilhões de pessoas\n\nIsso é uma PG com q=3. Em 20 'gerações', metade da humanidade.\n\nAgora entende por que quarentenas e distanciamento importam? Reduzir q de 3 para 1,5 muda completamente a trajetória.",connection:"Juros compostos, crescimento populacional, pandemias, potência nuclear, dobrar papel infinitamente — todos são PGs. Quando algo cresce multiplicando por um fator fixo, é uma PG."},
 dict:[
   {term:"Razão (q)",def:"O fator pelo qual multiplicamos cada termo para obter o próximo. Constante em toda a PG.",ex:"PG 4,12,36,108: q=3. PG 100,10,1,0,1: q=0,1."},
   {term:"Termo geral (aₙ)",def:"Fórmula que calcula qualquer termo da PG: aₙ = a₁·qⁿ⁻¹.",ex:"PG com a₁=5 e q=2: a₈ = 5×2⁷ = 5×128 = 640."},
   {term:"Interpolação geométrica",def:"Inserir termos entre dois valores para que formem uma PG. Com k meios: q = ᵏ⁺¹√(aₙ/a₁).",ex:"Entre 2 e 54, inserir 2 meios: q = ³√(54/2) = ³√27 = 3. PG: 2, 6, 18, 54."},
   {term:"PG infinita",def:"PG com infinitos termos. Se |q|<1, a soma converge para S∞ = a₁/(1−q).",ex:"1 + 1/2 + 1/4 + 1/8 + ... = 1/(1−0,5) = 2."}
 ],
 steps:{
   intro:"Problemas de PG pedem: identificar o termo geral, calcular a soma, ou reconhecer a razão.",
   items:[
     {n:1,action:"Identifique a₁ e q",detail:"Calcule o quociente entre termos consecutivos: q = a₂/a₁ = a₃/a₂. Se for constante, é PG.",ex:"Sequência 3, 6, 12, 24... → q=6/3=2. Todos dão 2 → é PG"},
     {n:2,action:"Escolha a fórmula",detail:"Termo geral: aₙ=a₁·qⁿ⁻¹. Soma dos n termos: Sₙ=a₁·(qⁿ−1)/(q−1).",ex:"'Qual o 6º termo?' → usa aₙ. 'Soma dos 6 primeiros' → usa Sₙ"},
     {n:3,action:"Substitua e calcule",detail:"Substitua a₁, q e n. Simplifique as potências primeiro.",ex:"a₆=3·2⁵=3·32=96. S₆=3·(64−1)/(2−1)=3·63=189"},
     {n:4,action:"Verifique",detail:"Para PG, cada termo deve ser exatamente q vezes o anterior. Confira com um ou dois termos.",tip:"⚠️ Não confunda PA (soma razão) com PG (multiplica razão). PA→ + r. PG→ × q."}
   ]
 },
 prereq:{
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Progressão Aritmética",desc:"PA e PG são análogas: PA soma uma razão, PG multiplica. Entender a estrutura de uma ajuda na outra.",check:"✓ Pronto se: encontra o 10º termo de uma PA sem dificuldade."},
     {badge:"8º ANO",color:"#54A0FF",title:"Potenciação e propriedades",desc:"O termo geral da PG é aₙ=a₁·qⁿ⁻¹ — essencialmente uma potência com base q.",check:"✓ Pronto se: calcula 2⁸ = 256 e simplifica 3⁵/3² = 3³."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Exponencial",desc:"PG com n termos é uma função exponencial nos inteiros. A razão q é a base da exponencial.",check:"✓ Pronto se: reconhece que a PG 2,4,8,16... corresponde a f(n)=2ⁿ."}
   ],
   vestibular:"PG aparece nos vestibulares associada a juros compostos, crescimento populacional e sequências de investimentos. A soma dos termos de uma PG infinita (convergente) é clássica na FUVEST. No ENEM, PG surge em contextos de crescimento exponencial."
 },

{year:"1",tri:"T3",theme:"Álgebra",pu:false,emoji:"💰",term:"Matemática Financeira",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Você empresta R$1000 por 3 meses a 5% ao mês. Método 1: 5% de R$1000 todo mês = R$50 fixo — <b>juros simples</b>. Método 2: 1° mês 5% de R$1000=R$50; 2° mês 5% de R$1050=R$52,50; 3° mês 5% de R$1102,50=R$55,12 — <b>juros compostos</b>.",ex:"Simples: R$1150 no final. Compostos: R$1157,62. A diferença cresce muito com o tempo."},
   {tag:"Padrão — Juros sobre o que?",text:"A diferença está em <b>sobre o que os juros incidem</b>. Simples: sempre sobre o capital inicial. Compostos: sobre o montante acumulado — <b>juros sobre juros</b>. O mercado financeiro usa quase exclusivamente compostos.",ex:"Simples: crescimento linear (reta). Compostos: crescimento exponencial (curva acelerada)."},
   {tag:"Formalizacao — As formulas",text:"<b>Simples</b>: M = C x (1 + i x n). <b>Compostos</b>: M = C x (1+i)^n. M=montante, C=capital, i=taxa, n=períodos. <b>Atencao</b>: i e n devem estar na mesma unidade de tempo!",ex:"R$2000 a 5%/mês por 3 meses: Simples=R$2300. Compostos=2000 x (1,05)^3 aprox R$2315,25."},
   {tag:"Aprofundamento — Equivalencia de taxas",text:"5% ao mês <b>nao equivale</b> a 60% ao ano em compostos! Taxa equivalente: (1+i_mes)^12 = (1+i_ano). Logo: i_ano = (1,05)^12 - 1 aprox 79,6% ao ano. Essa é a lógica do CET nos financiamentos.",ex:"Cartão de crédito a 10%/mês: (1,10)^12 - 1 aprox 214% ao ano. Muito mais que 120%!"}],
 historia:{cenas:[{icon:"💳",label:"O PARCELAMENTO DE LUCAS",texto:"Lucas quer um tênis de R$600. A loja oferece: à vista R$600 ou 3x de R$220. Lucas calcula: 3x220=R$660. Pagou R$60 a mais. Qual a taxa mensal embutida? Usando M=C(1+i)^n: 660=600x(1+i)^3. (1+i)^3=1,10. i aprox 3,23% ao mês."},
       {icon:"🏦",label:"A POUPANÇA DE CARLA",texto:"Carla depositou R$5000 na poupança a 0,5%/mês. O irmão disse: 'em 10 anos você terá R$8000 (0,5% x 120 meses = 60%)'. Carla calculou com juros compostos: R$5000 x (1,005)^120 aprox R$9.097 — quase o dobro da estimativa do irmão."}],pergunta:"Por que é errado multiplicar a taxa mensal pelo número de meses para calcular juros compostos?",moral:"Simples: M=C(1+in) — crescimento linear. Compostos: M=C(1+i)^n — crescimento exponencial. No mercado financeiro, quase tudo é composto. Saber a diferença pode economizar — ou ganhar — muito dinheiro."},

 simple:"Juros simples: J=Cin — juros sobre o capital inicial. Juros compostos: M=C(1+i)ⁿ — juros sobre juros. Compostos sempre rendem mais a longo prazo.",
 explain:"Você vai comprar um celular. A loja oferece duas opções: à vista por R$1.200 ou em 3 parcelas de R$450. Parece a mesma coisa? Não é: R$450 × 3 = R$1.350. Você pagaria R$150 a mais. Esse valor extra são os <b>juros</b>.<br><br>Existem dois tipos principais de juros:<br><br><b>Juros simples</b>: os juros são sempre calculados sobre o valor original. É como uma taxa plana — cresce de forma constante. Fórmula: M = C(1 + i·n)<br><br><b>Juros compostos</b>: os juros do mês são adicionados ao total, e no mês seguinte os juros incidem sobre esse total maior — é o famoso 'juros sobre juros'. Cresce de forma exponencial. Fórmula: M = C·(1+i)ⁿ<br><br>No dia a dia (financiamentos, cartão de crédito, poupança), quase sempre são juros compostos. Por isso dívidas de cartão de crédito crescem tão rápido.",
 example:"R$2.000 a 5%/mês por 3 meses. Simples: M=2000×(1+0,05×3)=R$2.300. Compostos: M=2000×(1,05)³=2000×1,1576≈R$2.315,25.",

 story:{icon:"💳",title:"A dívida do cartão",text:"Fernanda tinha uma dívida de R$1.000 no cartão de crédito e decidiu não pagar por 12 meses. A taxa era de 10% ao mês — em juros compostos.\n\nEla pensou: '10% de R$1.000 é R$100. Em 12 meses seriam R$1.200 de juros. Posso pagar depois.'\n\nSó que ela estava pensando em juros simples. Na realidade:\nM = 1000 × (1,10)¹² = 1000 × 3,138 = R$3.138\n\nA dívida de R$1.000 virou R$3.138 em um ano. Mais que triplicou.\n\nIsso é o poder (e o perigo) dos juros compostos.",connection:"Investimentos de longo prazo (como previdência privada) crescem por juros compostos — o dinheiro trabalha para você. Mas dívidas também crescem assim. Entender a diferença é literalmente uma questão de sobrevivência financeira."},
 dict:[
   {term:"Capital (C)",def:"Valor inicial investido ou emprestado — antes de qualquer acréscimo de juros.",ex:"Depósito inicial de R$5.000 numa poupança: capital = R$5.000."},
   {term:"Taxa de juros (i)",def:"Percentual de rendimento por período. Deve estar na mesma unidade de tempo que n.",ex:"12% ao ano = 1% ao mês. Se n está em meses, usar i=0,01."},
   {term:"Montante (M)",def:"Valor total ao final do período: capital + juros acumulados. M = C + J.",ex:"C=R$1.000, juros=R$150: M = R$1.150."},
   {term:"Juros compostos",def:"Juros calculados sobre o montante acumulado do período anterior. 'Juros sobre juros'. Crescimento exponencial.",ex:"R$1.000 a 10%/mês: após 2 meses = 1000×(1,1)² = R$1.210 (não R$1.200 como em simples)."}
 ],
 steps:{
   intro:"Para qualquer problema de juros, o primeiro passo é sempre identificar o regime (simples ou composto).",
   items:[
     {n:1,action:"Identifique o regime",detail:"O problema diz 'juros simples'? Use M=C(1+in). Diz 'juros compostos' ou não especifica (mercado)? Use M=C(1+i)ⁿ.",ex:"'Banco cobra 2% ao mês compostos' → M=C·(1,02)ⁿ"},
     {n:2,action:"Unifique as unidades de tempo",detail:"i e n DEVEM estar na mesma unidade. Taxa anual com n em meses → converta a taxa para mensal (ou n para anos).",ex:"Taxa 12% a.a. por 6 meses → use i=1% a.m. e n=6 meses"},
     {n:3,action:"Substitua na fórmula",detail:"Calcule o montante M. Para encontrar os juros J: J=M−C.",ex:"C=R$2.000, i=0,02, n=3. M=2000·(1,02)³=2000·1,0612≈R$2.122,40"},
     {n:4,action:"Responda ao que foi perguntado",detail:"O problema quer M (montante), J (juros), C (capital) ou n (tempo)? Cada um requer isolamento diferente.",ex:"'Quanto rende?' → J=M−C=R$122,40. 'Qual o capital inicial?' → C=M/(1+i)ⁿ",tip:"⚠️ 2% ao mês ≠ 24% ao ano em juros compostos. 2% a.m. = (1,02)¹²−1≈26,8% a.a."}
   ]
 },

     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Progressão Geométrica",desc:"Os montantes em juros compostos formam uma PG de razão (1+i). São a mesma coisa.",check:"✓ Pronto se: reconhece que R$1000 → R$1100 → R$1210 a 10%/mês é uma PG."},

{year:"2",tri:"T1",theme:"Funções",pu:false,emoji:"📡",term:"Função Exponencial",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Uma bactéria se divide em 2 a cada hora. Depois de 10h: 1024 bactérias. De 24h: mais de 16 milhões. <b>A variável está no expoente</b> — e isso muda tudo. O crescimento acelera de forma que parece impossível.",ex:"Diferença: f(x)=2x dá 20 para x=10. g(x)=2^x dá 1024 para x=10."},
   {tag:"Padrão — A variavel no expoente",text:"Na função afim, x é multiplicado por uma constante. Na exponencial, a constante é <b>elevada a x</b>. Isso faz a taxa de crescimento ser proporcional ao valor atual — quanto maior, mais rápido cresce.",ex:"f(x)=2^x: para x=1, f=2. x=2, f=4. x=3, f=8. A cada passo, o valor dobra!"},
   {tag:"Formalizacao — A linguagem matematica",text:"f(x) = a^x, com a>0 e a diferente de 1. <b>a>1</b>: crescimento (curva que sobe acelerando). <b>0<a<1</b>: decrescimento (curva que cai desacelerando). O gráfico nunca toca o eixo x — assíntota em y=0.",ex:"f(x)=2^x: crescente. f(x)=(1/2)^x: decrescente. Domínio: todos os reais. Imagem: (0, +inf)."},
   {tag:"Aprofundamento — Equacoes exponenciais",text:"Para resolver a^x = b: se conseguir igualar as bases, iguale os expoentes. Se não conseguir, use <b>logaritmo</b>: x = log_a(b). Exponencial e logaritmo são funções inversas.",ex:"2^x=32 → 2^x=2^5 → x=5. 3^x=20 → x = log(20)/log(3) aprox 2,73."}],
 historia:{cenas:[{icon:"🦠",label:"A PANDEMIA EM NUMEROS",texto:"Em março de 2020, havia 100 casos no estado. O modelo previa: N(t)=100 x 2^(t/5). Em 30 dias: 6400 casos. Em 60 dias: 409.600. A população olhava para o número pequeno do início e não acreditava. A matemática estava certa."},
       {icon:"☢️",label:"O DECAIMENTO RADIOATIVO",texto:"O carbono-14 tem meia-vida de 5730 anos. Um arqueólogo encontrou um osso com 25% do carbono-14 original. N(t) = N0 x (1/2)^(t/5730). Como 25% = (1/2)², então t/5730=2, logo t=11.460 anos. A função exponencial datou o passado."}],pergunta:"Por que a exponencial com base (1/2) representa decaimento e com base 2 representa crescimento?",moral:"Função exponencial f(x)=a^x: a variável no expoente cria crescimento ou decaimento acelerado. Base>1: explosão. Base entre 0 e 1: extinção gradual."},

 simple:"f(x) = aˣ. A variável está no expoente. Crescimento ou decrescimento rápido. Base da = logaritmo.",
 explain:"Existem coisas no mundo que crescem de um jeito diferente de tudo que você viu antes: cada vez que passa um período de tempo, a quantidade não aumenta por um valor fixo — ela <em>multiplica</em> por um fator fixo. Isso se chama <b>crescimento exponencial</b>.<br><br>A função exponencial tem a forma <b>f(x) = aˣ</b>, onde a base <em>a</em> é sempre positiva e diferente de 1.<br><br>• Se a > 1: a função cresce rápido — quanto maior x, mais rápido ela sobe<br>• Se 0 < a < 1: a função decresce — como uma substância radioativa que vai 'sumindo'<br><br>Uma propriedade importante: o gráfico <em>nunca toca o eixo x</em>. Por mais que x cresça negativamente, o valor nunca chega a zero — apenas se aproxima infinitamente.<br><br>A base mais especial de todas é o número <b>e ≈ 2,718</b>, chamado número de Euler, que aparece naturalmente em crescimento de populações, compostos químicos e muito mais.",
 example:"Crescimento bacteriano: N(t) = 100·2ᵗ (dobra a cada hora). Após 5h: N=100×32=3.200 bactérias. Decaimento radioativo: N(t)=N₀·(1/2)ᵗ/τ.",

 story:{icon:"📱",title:"A corrente do WhatsApp",text:"Uma corrente de WhatsApp pede que você encaminhe para 3 amigos. Cada um desses encaminha para outros 3.\n\nRodada 1: você → 3 pessoas\nRodada 2: cada um → 3 → 9 pessoas\nRodada 3: 27 pessoas\nRodada 10: 3¹⁰ = 59.049 pessoas\nRodada 20: 3²⁰ ≈ 3,5 bilhões de pessoas\n\nIsto é f(x) = 3ˣ — uma função exponencial. Em 20 rodadas, você 'alcançaria' mais da metade da humanidade.\n\nAgora entende por que fake news se espalham tão rápido nas redes sociais?",connection:"Crescimento de bactérias, propagação de vírus, investimentos compostos, aquecimento global, popularidade viral nas redes — todos seguem padrões exponenciais. Reconhecer esse padrão é uma das habilidades mais importantes do século XXI."},
 dict:[
   {term:"Base (a)",def:"O número que é elevado à potência x. Determina se a função é crescente (a>1) ou decrescente (0<a<1).",ex:"f(x)=2ˣ: base 2>1 → crescente. f(x)=(1/2)ˣ: base<1 → decrescente."},
   {term:"Assíntota",def:"Reta que o gráfico se aproxima mas nunca toca. Na exponencial, a assíntota horizontal é y=0.",ex:"f(x)=2ˣ: por menor que x seja, 2ˣ nunca é zero ou negativo."},
   {term:"Crescimento exponencial",def:"Crescimento onde a quantidade multiplica por um fator fixo em cada unidade de tempo.",ex:"COVID-19 no início: casos dobravam a cada semana ≈ crescimento exponencial."},
   {term:"Número de Euler (e)",def:"Constante matemática e≈2,718. Base da função exponencial natural. Surge em juros contínuos e crescimento natural.",ex:"f(x)=eˣ é a função exponencial 'natural', muito usada em ciências."}
 ],
 steps:{
   intro:"Equações exponenciais seguem um protocolo claro: isolar a potência e igualar as bases.",
   items:[
     {n:1,action:"Isole a expressão exponencial",detail:"Deixe a potência sozinha em um lado da equação. Se tiver dois termos exponenciais, coloque no mesmo lado.",ex:"3·2ˣ=48 → 2ˣ=16"},
     {n:2,action:"Tente igualar as bases",detail:"Escreva ambos os lados como potências da mesma base. Se conseguir, iguale os expoentes.",ex:"2ˣ=16=2⁴ → x=4"},
     {n:3,action:"Se não conseguir, use logaritmo",detail:"Se as bases não podem ser igualadas, aplique log dos dois lados: log(aˣ)=x·log(a).",ex:"3ˣ=20 → x·log3=log20 → x=log20/log3≈2,73"},
     {n:4,action:"Verifique",detail:"Substitua o x encontrado na equação original. Se for raiz, deve satisfazer a igualdade.",ex:"2⁴=16=48/3 ✓",tip:"⚠️ A base da exponencial é sempre positiva. Se a equação der base negativa, sem solução real."}
   ]
 },
 prereq:{
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Potenciação (revisão)",desc:"f(x)=aˣ é uma potência com expoente variável. Precisa dominar as propriedades de potências.",check:"✓ Pronto se: simplifica a³×a⁴=a⁷ e (a²)³=a⁶ automaticamente."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Progressão Geométrica",desc:"PG e função exponencial são a mesma ideia: uma discreta (inteiros), outra contínua (todos os reais).",check:"✓ Pronto se: reconhece que f(x)=3ˣ nos inteiros gera a PG 1,3,9,27..."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim (comparação)",desc:"Contrastar crescimento linear com exponencial é essencial para modelagem.",check:"✓ Pronto se: distingue y=2x (linear) de y=2ˣ (exponencial) em um gráfico."}
   ],
   vestibular:"Função exponencial aparece em vestibulares em problemas de crescimento populacional, decaimento radioativo, depreciação e juros compostos. No ENEM é muito cobrada em contextos de biologia e ciências da natureza (crescimento bacteriano, epidemias)."
 },

{year:"2",tri:"T1",theme:"Álgebra",pu:false,emoji:"🌲",term:"Logaritmos",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Você sabe que 2^3=8. Mas e a pergunta inversa: '2 elevado a quanto dá 8?' A resposta é 3. <b>O logaritmo responde: a qual potência preciso elevar a base para obter o número?</b>",ex:"log2(8)=3 porque 2^3=8. log10(1000)=3 porque 10^3=1000."},
   {tag:"Padrão — A operacao inversa",text:"Logaritmo é para exponencial o que raiz é para potência. Se exponencial é o 'caminho de ida', logaritmo é o 'caminho de volta'. São funções inversas — simétricas em relação à reta y=x.",ex:"2^3=8 (exponencial). log2(8)=3 (logaritmo). A mesma informação, expressa ao contrário."},
   {tag:"Formalizacao — Definicao e propriedades",text:"log_a(b)=x significa a^x=b. Propriedades: <b>log(A x B) = logA + logB</b>. <b>log(A/B) = logA - logB</b>. <b>log(A^n) = n x logA</b>. Mudança de base: <b>log_a(b) = log(b) / log(a)</b>.",ex:"log(8) = log(2^3) = 3 x log2 aprox 3 x 0,301 = 0,903."},
   {tag:"Aprofundamento — Escalas logaritmicas",text:"Logaritmos aparecem em escalas que lidam com grandezas enormes: <b>Richter</b> (terremotos), <b>decibéis</b> (som), <b>pH</b> (acidez). Cada ponto na escala Richter representa 10x mais energia. Log transforma multiplicação em adição.",ex:"Terremoto 7 vs 6: 10x mais energia. Terremoto 7 vs 5: 100x mais energia."}],
 historia:{cenas:[{icon:"🔭",label:"O ASTRONOMO E AS TABUAS",texto:"No século XVII, calcular posições de planetas exigia multiplicar números com dezenas de dígitos — horas de trabalho. John Napier criou as tábuas de logaritmos: multiplicar virou somar. log(a x b) = log(a) + log(b). Uma revolução no cálculo científico."},
       {icon:"🌍",label:"O PH DO SUCO DE LIMAO",texto:"pH = -log[H+]. Água: pH=7. Suco de limão: pH=2. Sangue: pH=7,4. A diferença entre pH 2 e 7 parece pequena — apenas 5 unidades. Mas como é escala logarítmica, o limão é <b>100.000 vezes mais ácido</b> que a água."}],pergunta:"Por que usamos escala logarítmica para medir terremotos e acidez em vez de escala linear?",moral:"Logaritmo é a operação inversa da exponencial. Sua maior utilidade é transformar multiplicações em somas e comprimir escalas enormes em números manejáveis."},

 simple:"logₐ(b) = x significa aˣ = b. É a operação inversa da exponencial. Transforma multiplicações em adições.",
 explain:"Imagine que você sabe que uma bactéria dobra a cada hora e agora tem 1.024 bactérias. Você quer saber: quantas horas se passaram? Você precisa descobrir o expoente — quantas vezes foi necessário multiplicar 2 por ele mesmo para chegar em 1.024.<br><br>É exatamente para isso que serve o logaritmo: é a <b>operação inversa da exponenciação</b>. Enquanto 2¹⁰ = 1.024 pergunta 'qual é o resultado de 2 elevado a 10?', o log₂(1024) = 10 pergunta 'a que potência devo elevar 2 para obter 1.024?'<br><br>Propriedades poderosas que simplificam cálculos:<br>• log(A·B) = log A + log B → multiplicação vira adição<br>• log(A/B) = log A − log B → divisão vira subtração<br>• log(Aⁿ) = n·log A → potência vira multiplicação<br><br>No passado, antes de calculadoras, logaritmos eram usados para realizar cálculos complexos. Hoje, aparecem em escalas como pH, Richter e decibéis.",
 example:"log₂(32) = 5 porque 2⁵=32. log(1000)=3 porque 10³=1000. Aplicação: escala Richter — cada ponto é 10× mais intenso, então log transforma essa escala em valores manejáveis.",

 story:{icon:"🌋",title:"A escala Richter",text:"Em 1935, o sismólogo Charles Richter criou uma escala para medir terremotos — mas tinha um problema: a diferença de energia entre um tremorzinho e um grande terremoto é absurda. Um terremoto de grau 9 libera um bilhão de vezes mais energia que um de grau 1.\n\nColocar isso numa régua linear seria impossível — a escala teria que ser enorme.\n\nA solução foi usar logaritmos. Na escala Richter:\n• Grau 5 = 10× mais intenso que grau 4\n• Grau 6 = 100× mais que grau 4\n• Grau 9 = 10.000× mais que grau 5\n\nLogaritmos comprimem escalas gigantes em números manejáveis.",connection:"pH de substâncias (ácidas ou básicas), volume sonoro em decibéis, brilho de estrelas, taxa de crescimento de investimentos, algoritmos de busca — todos usam logaritmos para lidar com escalas que variam em bilhões."},
 dict:[
   {term:"Base do logaritmo",def:"O número a em logₐ(b). Deve ser positivo e diferente de 1.",ex:"log₂(8)=3 (base 2). log₁₀(100)=2 (base 10, chamado log decimal)."},
   {term:"Logaritmando",def:"O número b em logₐ(b). Deve ser positivo (logaritmo de número negativo não existe nos reais).",ex:"log₅(25)=2. O logaritmando é 25. log(−4) não existe nos reais."},
   {term:"Propriedades dos logaritmos",def:"Regras que permitem simplificar cálculos: produto→soma, quociente→subtração, potência→multiplicação.",ex:"log(2×5)=log2+log5. log(1000/10)=log1000−log10=3−1=2."},
   {term:"Mudança de base",def:"Fórmula para calcular logaritmo em qualquer base usando log decimal ou natural: logₐ(b)=log(b)/log(a).",ex:"log₃(81)=log(81)/log(3)=log(3⁴)/log(3)=4·log3/log3=4."},
   {term:"Equação logarítmica",def:"Equação em que a incógnita aparece no logaritmando ou na base. Resolve-se convertendo para forma exponencial.",ex:"log₂(x)=5 → x=2⁵=32. log(x+1)=2 → x+1=100 → x=99."}
 ],
 steps:{
   intro:"Equações e cálculos com logaritmos seguem um protocolo de simplificação progressiva.",
   items:[
     {n:1,action:"Converta para forma exponencial",detail:"logₐ(b)=x ↔ aˣ=b. Se o log é simples, converta direto.",ex:"log₂(x)=5 → x=2⁵=32. log₃(81)=x → 3ˣ=81=3⁴ → x=4"},
     {n:2,action:"Aplique as propriedades",detail:"Simplifique: log(A·B)=logA+logB, log(A/B)=logA−logB, log(Aⁿ)=n·logA.",ex:"log(8)=log(2³)=3·log2. log(50)=log(100/2)=2−log2≈2−0,301=1,699"},
     {n:3,action:"Se necessário, mude a base",detail:"logₐ(b)=log(b)/log(a). Converta para base 10 ou base e para usar calculadora.",ex:"log₃(7)=log(7)/log(3)≈0,845/0,477≈1,77"},
     {n:4,action:"Verifique o domínio",detail:"O logaritmando deve ser positivo. Soluções que tornam o logaritmando ≤0 são inválidas.",ex:"log(x−2): exige x−2>0 → x>2. Se solução der x=1 → descarte!",tip:"⚠️ log(−5) não existe nos reais. Sempre verifique o domínio ao final."}
   ]
 },
