<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Matemática — Ensino Médio CBB</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--c1:#00D2FF;--c2:#FF6B9D;--c3:#FFD700;--bg:#0A0E1A;--card:#111827;--border:#1E2A3A;--text:#E2E8F0;--sub:#94A3B8;--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#0A0E1A 0%,#1a1040 50%,#0A0E1A 100%);padding:50px 24px 70px;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,210,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.04) 1px,transparent 1px);background-size:40px 40px;}
.glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,.15) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);}
header h1{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,5vw,2.8rem);color:#fff;text-shadow:0 0 30px rgba(0,210,255,.5);position:relative;letter-spacing:2px;}
header p{color:var(--sub);font-size:.95rem;margin-top:10px;font-weight:600;position:relative;}
.accent{color:var(--c1);}
.search-wrap{max-width:560px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10;}
.search-wrap input{width:100%;padding:15px 22px 15px 50px;border-radius:50px;border:1px solid var(--border);background:#111827;font-size:.95rem;font-family:'Inter',sans-serif;font-weight:600;color:var(--text);outline:none;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.search-wrap input:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(0,210,255,.15);}
.search-wrap::before{content:'⟩_';position:absolute;left:38px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--c1);font-family:'Orbitron',monospace;}
.tabs{display:flex;justify-content:center;gap:8px;padding:30px 20px 14px;flex-wrap:wrap;}
.tab{padding:9px 20px;border-radius:50px;border:1px solid var(--border);font-family:'Orbitron',monospace;font-size:.72rem;cursor:pointer;transition:all .2s;background:var(--card);color:var(--sub);letter-spacing:1px;}
.tab[data-year="all"]{border-color:#6C5CE7;}
.tab[data-year="1"]{border-color:var(--c1);}
.tab[data-year="2"]{border-color:var(--c2);}
.tab[data-year="3"]{border-color:var(--c3);}
.tab.active[data-year="all"]{background:#6C5CE7;color:#fff;}
.tab.active[data-year="1"]{background:var(--c1);color:#000;}
.tab.active[data-year="2"]{background:var(--c2);color:#fff;}
.tab.active[data-year="3"]{background:var(--c3);color:#000;}
.tab:hover{transform:translateY(-2px);}
.theme-filter{display:flex;justify-content:center;gap:7px;padding:0 20px 22px;flex-wrap:wrap;}
.theme-btn{padding:5px 14px;border-radius:50px;border:1px solid var(--border);background:transparent;font-family:'Inter',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--sub);}
.theme-btn.active,.theme-btn:hover{border-color:var(--c1);color:var(--c1);}
.counter{text-align:center;padding:0 20px 14px;font-weight:700;color:var(--sub);font-size:.82rem;font-family:'Orbitron',monospace;letter-spacing:1px;}
.glossary{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.card{background:var(--card);border-radius:var(--radius);padding:18px 18px 14px;border:1px solid var(--border);border-top:3px solid;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.4);}
.card[data-year="1"]{border-top-color:var(--c1);}
.card[data-year="2"]{border-top-color:var(--c2);}
.card[data-year="3"]{border-top-color:var(--c3);}
.card[data-pu="true"]{border-top-color:#FF9F43;border-style:dashed;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.by{font-family:'Orbitron',monospace;font-size:.62rem;padding:3px 9px;border-radius:50px;color:#000;letter-spacing:.5px;font-weight:700;}
.by[data-year="1"]{background:var(--c1);}
.by[data-year="2"]{background:var(--c2);color:#fff;}
.by[data-year="3"]{background:var(--c3);}
.by[data-year="PU"]{background:#FF9F43;}
.bt{font-size:.65rem;padding:3px 9px;border-radius:50px;background:rgba(255,255,255,.07);color:var(--sub);font-weight:700;}
.btri{font-size:.65rem;padding:3px 9px;border-radius:50px;background:rgba(0,210,255,.1);color:var(--c1);font-weight:700;}
.card h3{font-family:'Orbitron',monospace;font-size:.95rem;margin-bottom:6px;letter-spacing:.5px;line-height:1.4;}
.card .simple{font-size:.83rem;line-height:1.55;font-weight:600;color:var(--sub);}
.card .hint{margin-top:10px;font-size:.7rem;color:rgba(255,255,255,.2);font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:var(--sub);font-size:.95rem;font-weight:700;grid-column:1/-1;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#0F1623;border:1px solid var(--border);border-radius:22px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.6);transform:translateY(30px) scale(.97);transition:transform .3s,opacity .3s;opacity:0;}
.overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-band{padding:24px 24px 16px;border-radius:22px 22px 0 0;position:relative;border-bottom:1px solid var(--border);}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--border);cursor:pointer;font-size:.9rem;color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:900;transition:all .2s;}
.modal-close:hover{background:rgba(255,255,255,.15);color:#fff;}
.modal-emoji{font-size:2.2rem;display:block;margin-bottom:6px;}
.modal-title{font-family:'Orbitron',monospace;font-size:1.4rem;color:#fff;letter-spacing:1px;}
.modal-sub{color:var(--sub);font-weight:700;font-size:.8rem;margin-top:5px;letter-spacing:.5px;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;gap:2px;}
.mtab{padding:12px 14px;font-family:'Inter',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;border:none;background:none;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.mtab.active{color:var(--c1);border-bottom-color:var(--c1);}
.modal-body{padding:20px 22px 28px;}
.mpanel{display:none;animation:fadeIn .25s ease;}
.mpanel.active{display:block;}
.explain-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:12px;line-height:1.7;font-size:.9rem;font-weight:600;color:var(--text);}
.example-box{border-radius:12px;padding:14px 18px;border-left:3px solid;}
.example-box .elabel{font-weight:800;font-size:.78rem;margin-bottom:5px;opacity:.8;letter-spacing:.5px;}
.example-box p{font-size:.88rem;line-height:1.6;font-weight:600;color:var(--sub);}
.visual-wrap{text-align:center;padding:8px 0 4px;}
.visual-wrap svg{max-width:100%;height:auto;}
.visual-caption{margin-top:10px;font-size:.82rem;color:var(--sub);font-weight:700;line-height:1.5;text-align:center;}
.summary-list{list-style:none;}
.summary-list li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.88rem;font-weight:600;line-height:1.5;color:var(--text);}
.summary-list li:last-child{border-bottom:none;}
.summary-list .icon{font-size:1rem;flex-shrink:0;margin-top:2px;}
/* DICIONÁRIO */
.dict-list{list-style:none;}
.dict-item{padding:12px 0;border-bottom:1px solid var(--border);}
.dict-item:last-child{border-bottom:none;}
.dict-term{font-family:'Orbitron',monospace;font-size:.82rem;margin-bottom:4px;letter-spacing:.5px;}
.dict-def{font-size:.88rem;font-weight:600;color:var(--sub);line-height:1.55;margin-bottom:6px;}
.dict-ex{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border-radius:8px;padding:5px 10px;display:inline-block;border:1px solid var(--border);}
/* PRÉ-REQUISITOS */
.prereq-intro{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.6;margin-bottom:14px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}
.prereq-list{list-style:none;}
.prereq-item{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.prereq-item:last-child{border-bottom:none;}
.prereq-badge{font-family:'Orbitron',monospace;font-size:.65rem;padding:3px 9px;border-radius:50px;font-weight:700;flex-shrink:0;margin-top:2px;}
.prereq-content{}
.prereq-title{font-family:'Orbitron',monospace;font-size:.82rem;margin-bottom:3px;}
.prereq-desc{font-size:.83rem;font-weight:600;color:var(--sub);line-height:1.5;margin-bottom:4px;}
.prereq-check{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.35);font-style:italic;}
.vestibular-box{background:rgba(255,159,67,.07);border:1px solid rgba(255,159,67,.25);border-radius:12px;padding:14px 16px;margin-top:14px;}
.vestibular-box .vtitle{font-family:'Orbitron',monospace;font-size:.78rem;color:#FF9F43;margin-bottom:8px;letter-spacing:.5px;}
.vestibular-box p{font-size:.85rem;font-weight:600;color:var(--sub);line-height:1.6;}
/* PU panel */
.pu-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.3);border-radius:8px;padding:6px 12px;margin-bottom:12px;font-size:.78rem;font-weight:800;color:#FF9F43;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:20px;color:rgba(255,255,255,.15);font-size:.75rem;font-weight:600;font-family:'Orbitron',monospace;letter-spacing:1px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<header>
  <div class="grid-bg"></div><div class="glow"></div>
  <h1>∑ GLOSSÁRIO <span class="accent">ENSINO MÉDIO</span></h1>
  <p>1ª · 2ª · 3ª série &nbsp;·&nbsp; Colégio Batista Brasileiro &nbsp;·&nbsp; 2026</p>
</header>
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="buscar termo... ex: logaritmo, matriz, seno">
</div>
<div class="tabs">
  <button class="tab active" data-year="all">TODOS</button>
  <button class="tab" data-year="1">1ª SÉRIE</button>
  <button class="tab" data-year="2">2ª SÉRIE</button>
  <button class="tab" data-year="3">3ª SÉRIE / PU</button>
</div>
<div class="theme-filter">
  <button class="theme-btn active" data-theme="all">Todos os temas</button>
  <button class="theme-btn" data-theme="Álgebra">Álgebra</button>
  <button class="theme-btn" data-theme="Funções">Funções</button>
  <button class="theme-btn" data-theme="Geometria">Geometria</button>
  <button class="theme-btn" data-theme="Trigonometria">Trigonometria</button>
  <button class="theme-btn" data-theme="Combinatória">Combinatória</button>
  <button class="theme-btn" data-theme="Estatística">Estatística</button>
  <button class="theme-btn" data-theme="Pré-universitário">Pré-Univ.</button>
</div>
<div class="counter" id="counter"></div>
<div class="glossary" id="glossary"></div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-band" id="modalBand">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <span class="modal-emoji" id="mEmoji"></span>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-sub" id="mSub"></div>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchTab(0,this)">📖 Explicação</button>
      <button class="mtab" onclick="switchTab(1,this)">📚 Dicionário</button>
      <button class="mtab" onclick="switchTab(2,this)">🎨 Visual</button>
      <button class="mtab" onclick="switchTab(3,this)">🔗 Pré-requisitos</button>
      <button class="mtab" onclick="switchTab(4,this)">✅ Resumão</button>
    </div>
    <div class="modal-body">
      <div class="mpanel active" id="mp0"></div>
      <div class="mpanel" id="mp1"></div>
      <div class="mpanel" id="mp2"></div>
      <div class="mpanel" id="mp3"></div>
      <div class="mpanel" id="mp4"></div>
    </div>
  </div>
</div>
<footer>COLÉGIO BATISTA BRASILEIRO · COORDENAÇÃO PEDAGÓGICA · ENSINO MÉDIO · 2026</footer>
<script>
const COLORS={'1':'#00D2FF','2':'#FF6B9D','3':'#FFD700','PU':'#FF9F43'};
const terms=[

// ══════════════════════════════════════════════════════
// 1ª SÉRIE
// ══════════════════════════════════════════════════════
{year:"1",tri:"T1",theme:"Funções",pu:false,emoji:"📈",term:"Função Afim",
 simple:"f(x) = ax + b. Gráfico sempre reto. Coeficiente angular a define inclinação; b, o ponto no eixo y.",
 explain:"A função afim (ou do 1º grau) tem forma <b>f(x) = ax + b</b>. O <b>coeficiente angular a</b> controla a inclinação: a>0 → crescente, a<0 → decrescente. O <b>coeficiente linear b</b> é o valor de f(0) — onde a reta corta o eixo y. O <b>zero da função</b> é x = −b/a. A taxa de variação é constante: para cada unidade em x, y varia exatamente a unidades.",
 example:"Táxi: R$4,50 de bandeirada + R$2,10/km → f(x) = 2,1x + 4,5. Em 10km: f(10) = 25,50. Zero: x = −4,5/2,1 ≈ −2,14 (sem sentido prático, mas matematicamente é o zero).",
 dict:[
   {term:"Coeficiente angular",def:"O valor a em f(x)=ax+b. Mede a inclinação da reta — quantas unidades y muda para cada 1 unidade de x.",ex:"f(x)=3x+1: a=3. Para cada 1 unidade em x, y sobe 3 unidades."},
   {term:"Coeficiente linear",def:"O valor b em f(x)=ax+b. É o valor de y quando x=0 — onde a reta cruza o eixo y.",ex:"f(x)=2x+5: b=5. O gráfico cruza o eixo y no ponto (0,5)."},
   {term:"Zero da função",def:"O valor de x que faz f(x)=0. Geometricamente, onde a reta cruza o eixo x.",ex:"f(x)=2x−6 → 2x=6 → x=3. O zero é 3."},
   {term:"Taxa de variação",def:"Quanto y muda por cada unidade de x. Nas funções afins, é sempre constante e igual ao coeficiente angular.",ex:"f(x)=5x+2: taxa=5. Se x vai de 1 para 4, y muda 5×3=15 unidades."},
   {term:"Inequação do 1º grau",def:"Comparação com < > ≤ ≥ em vez de =. A solução é um intervalo de valores, não um ponto.",ex:"2x+1>7 → 2x>6 → x>3. Solução: todos os x maiores que 3."}
 ],
 prereq:{
   intro:"A função afim é o ponto de partida das funções no EM. Para entendê-la bem, você precisa dominar equações e plano cartesiano do 9º ano.",
   items:[
     {badge:"9º ANO",color:"#5F27CD",title:"Equação do 1º Grau",desc:"Resolver ax+b=c é o mesmo que encontrar o zero da função afim.",check:"✓ Pronto se: resolve 3x−7=11 sem dificuldade."},
     {badge:"9º ANO",color:"#5F27CD",title:"Plano Cartesiano",desc:"O gráfico da função é plotado no plano. Você precisa saber marcar pontos (x,y).",check:"✓ Pronto se: marca os pontos (−2, 5) e (3, −1) sem hesitar."},
     {badge:"9º ANO",color:"#5F27CD",title:"Função (conceito)",desc:"Entender que f(x) é uma regra que associa cada x a um único y.",check:"✓ Pronto se: calcula f(3) quando f(x)=2x+1 corretamente."}
   ],
   vestibular:"No ENEM e vestibulares, a função afim aparece como modelagem de situações (custo fixo + custo variável, taxas de câmbio, velocidade constante). A leitura do coeficiente angular no contexto do problema é mais cobrada do que o cálculo puro."
 },

 visual:`<svg viewBox="0 0 260 210" xmlns="http://www.w3.org/2000/svg" width="240">
   <line x1="20" y1="185" x2="240" y2="185" stroke="#1E2A3A" stroke-width="2"/>
   <line x1="30" y1="10" x2="30" y2="195" stroke="#1E2A3A" stroke-width="2"/>
   <polygon points="234,179 247,185 234,191" fill="#1E2A3A"/>

   <line x1="30" y1="155" x2="220" y2="55" stroke="#00D2FF" stroke-width="3" stroke-linecap="round"/>
   <circle cx="30" cy="155" r="5" fill="#FFD700"/>
   <text x="5" y="158" font-family="Orbitron" font-size="11" fill="#FFD700">b</text>
   <text x="128" y="92" font-family="Orbitron" font-size="11" fill="#00D2FF" transform="rotate(-28,128,92)">f(x) = ax + b</text>
   <text x="195" y="63" font-family="Inter" font-size="10" fill="#94A3B8" font-weight="700">a&gt;0 ↑</text>
 </svg>`,
 visualCaption:"O ponto dourado (b) é onde a reta toca o eixo y. A inclinação (a) determina a direção da reta.",
 summary:["f(x) = ax + b | Gráfico: reta","a > 0: crescente | a < 0: decrescente | a = 0: horizontal","b = ponto no eixo y (f(0))","Zero: x = −b/a","Inequação: solução é um intervalo"]},

{year:"1",tri:"T1",theme:"Álgebra",pu:false,emoji:"🔢",term:"Progressão Aritmética (PA)",
 simple:"Sequência onde cada termo é obtido somando uma constante (razão r) ao anterior. Ex: 2, 5, 8, 11... (r=3)",
 explain:"Na PA, a diferença entre dois termos consecutivos é sempre a mesma — a <b>razão r</b>. Fórmula do termo geral: <b>aₙ = a₁ + (n−1)·r</b>. Soma dos n primeiros termos: <b>Sₙ = n·(a₁+aₙ)/2</b> (média do primeiro e último vezes a quantidade). Propriedade: o termo do meio de uma PA é a média aritmética dos vizinhos.",
 example:"PA 3, 7, 11, 15... (r=4). 10º termo: a₁₀ = 3+(10−1)×4 = 3+36 = 39. Soma dos 10 primeiros: S₁₀ = 10×(3+39)/2 = 10×21 = 210.",
 dict:[
   {term:"Razão (r)",def:"A diferença constante entre termos consecutivos de uma PA. Se r>0: crescente. Se r<0: decrescente. Se r=0: constante.",ex:"PA 2,5,8,11: r=3. PA 10,7,4,1: r=−3. PA 5,5,5: r=0."},
   {term:"Termo geral (aₙ)",def:"Fórmula que calcula qualquer termo da PA sem precisar listar todos: aₙ = a₁ + (n−1)r.",ex:"PA com a₁=4 e r=3: a₁₀ = 4+(10−1)×3 = 4+27 = 31."},
   {term:"Interpolação aritmética",def:"Inserir termos entre dois valores para que formem uma PA. Com k meios, a razão é r=(aₙ−a₁)/(k+1).",ex:"Entre 2 e 17, inserir 4 meios: r=(17−2)/5=3. PA: 2,5,8,11,14,17."},
   {term:"Soma dos termos (Sₙ)",def:"Soma dos n primeiros termos de uma PA: Sₙ = n×(a₁+aₙ)/2. Média do primeiro e último vezes n.",ex:"Soma de 1 a 100: S₁₀₀ = 100×(1+100)/2 = 5050. (Gauss!)"}
 ],
 prereq:{
   intro:"A PA é a versão algébrica do crescimento linear. Quem entende função afim aprende PA com facilidade.",
   items:[
     {badge:"9º ANO",color:"#5F27CD",title:"Função Afim",desc:"A PA é uma sequência que 'discretiza' a função afim — cada termo é um ponto da reta.",check:"✓ Pronto se: entende que PA com r=3 é como f(x)=3x."},
     {badge:"6º ANO",color:"#FF6B6B",title:"Operações com inteiros",desc:"Calcular termos da PA exige somar e subtrair números positivos e negativos com agilidade.",check:"✓ Pronto se: calcula −7+(−3)×8 rapidamente."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim (conexão)",desc:"aₙ=a₁+(n−1)r é exatamente a forma f(n)=rn+(a₁−r), uma função afim em n.",check:"✓ Pronto se: reconhece a estrutura linear na fórmula do termo geral."}
   ],
   vestibular:"No ENEM, PA aparece em problemas de sequências lógicas, empilhamentos, distribuições regulares e no Binômio de Newton (coeficientes). A soma de Gauss (Sₙ) é uma ferramenta clássica em questões de contagem."
 },

 visual:`<svg viewBox="0 0 265 140" xmlns="http://www.w3.org/2000/svg" width="250">

{year:"1",tri:"T2",theme:"Trigonometria",pu:false,emoji:"🌊",term:"Trigonometria no Triângulo",
 simple:"Sen, cos e tg como razões entre lados do triângulo retângulo. Valores notáveis: 30°, 45°, 60°. Extensão para qualquer triângulo com Lei dos Senos e Cossenos.",
 explain:"No triângulo retângulo: <b>sen(α)=op/hip</b>, <b>cos(α)=adj/hip</b>, <b>tg(α)=op/adj</b>. A <b>Lei dos Senos</b> permite resolver qualquer triângulo: a/sen(A) = b/sen(B) = c/sen(C). A <b>Lei dos Cossenos</b> generaliza Pitágoras: a² = b² + c² − 2bc·cos(A). Valores notáveis: sen30°=1/2, sen45°=√2/2, sen60°=√3/2.",
 example:"Triângulo com lados b=8, c=6 e ângulo A=60°. Lei dos cossenos: a² = 64+36−2×8×6×cos60° = 100−48×0,5 = 76. Logo a = √76 ≈ 8,7.",
 dict:[
   {term:"Valores notáveis",def:"Os valores exatos de sen, cos e tg para 30°, 45° e 60°. Memorizados pois aparecem em qualquer prova.",ex:"sen30°=cos60°=1/2; sen45°=cos45°=√2/2≈0,71; sen60°=cos30°=√3/2≈0,87"},
   {term:"Lei dos Senos",def:"Relação entre lados e ângulos opostos em qualquer triângulo: a/sen(A)=b/sen(B)=c/sen(C).",ex:"Se a=10 e A=30°, B=45°: b/sen45°=10/sen30° → b=10×(√2/2)/0,5=10√2≈14,1."},
   {term:"Lei dos Cossenos",def:"Generalização do Teorema de Pitágoras para triângulos não retângulos: a²=b²+c²−2bc·cos(A).",ex:"Quando A=90°, cos90°=0, e a fórmula vira a²=b²+c² (Pitágoras!)."},
   {term:"Ângulo notável",def:"Ângulo cujas razões trigonométricas têm valores exatos sem aproximação decimal.",ex:"30°, 45°, 60° e 90° são os ângulos notáveis do EM."},
   {term:"Relação fundamental",def:"Identidade sempre válida: sen²(α)+cos²(α)=1. Deriva do Teorema de Pitágoras.",ex:"Se sen(α)=3/5, então cos²(α)=1−9/25=16/25, logo cos(α)=4/5."}
 ],
 prereq:{
   intro:"Trigonometria do triângulo retângulo é revisão e ampliação do 9º ano. Verifique antes os fundamentos.",

 },

{year:"1",tri:"T2",theme:"Funções",pu:false,emoji:"🏹",term:"Função Quadrática",
 simple:"f(x) = ax²+bx+c. Gráfico é uma parábola. O vértice é o ponto de máximo ou mínimo. Raízes calculadas por Bhaskara.",
 explain:"A função quadrática tem gráfico em forma de <b>parábola</b>. Com a>0: abre para cima (∪, mínimo). Com a<0: abre para baixo (∩, máximo). O <b>vértice</b> fica em xᵥ = −b/2a, yᵥ = −Δ/4a. As <b>raízes</b> (zeros) são calculadas com Bhaskara: x=(−b±√Δ)/2a. O <b>discriminante Δ=b²−4ac</b> diz quantas raízes existem.",
 example:"f(x) = −x²+4x−3. a=−1 → abre para baixo. Vértice: xᵥ=2, f(2)=−4+8−3=1. Raízes: Δ=16−12=4 → x=(−4±2)/(−2) → x₁=1 e x₂=3.",
 dict:[
   {term:"Parábola",def:"O gráfico da função quadrática. Em forma de U (a>0) ou ∩ (a<0). Tem simetria em torno do eixo do vértice.",ex:"Trajetória de uma bola jogada forma uma parábola. A=−10 (gravidade)."},
   {term:"Vértice",def:"O ponto de mínimo (a>0) ou máximo (a<0) da parábola. Coordenadas: xᵥ=−b/2a e yᵥ=−Δ/4a.",ex:"f(x)=x²−4x+3: xᵥ=2, yᵥ=−1. Ponto (2,−1) é o mínimo."},
   {term:"Discriminante (Δ)",def:"Δ=b²−4ac. Determina o número de raízes reais antes de calcular.",ex:"Δ>0: 2 raízes. Δ=0: 1 raiz (parábola toca o eixo). Δ<0: sem raiz real."},
   {term:"Valor máximo/mínimo",def:"O valor de yᵥ no vértice. É o maior (a<0) ou menor (a>0) valor que a função pode assumir.",ex:"Lucro máximo, altura máxima de projétil — sempre calculado no vértice."},
   {term:"Forma fatorada",def:"Escrever a função como a(x−x₁)(x−x₂) usando as raízes. Facilita análise do sinal.",ex:"f(x)=x²−5x+6 = (x−2)(x−3). f(x)>0 quando x<2 ou x>3."}
 ],
 prereq:{
   intro:"A função quadrática é a função mais cobrada nos vestibulares. Exige boa base de equação do 2º grau e plano cartesiano.",
   items:[
     {badge:"9º ANO",color:"#5F27CD",title:"Equação do 2º Grau / Bhaskara",desc:"As raízes da função são as soluções da equação. Bhaskara é ferramenta diária aqui.",check:"✓ Pronto se: resolve x²−5x+6=0 e encontra x=2 e x=3."},
     {badge:"9º ANO",color:"#5F27CD",title:"Produtos Notáveis",desc:"Reconhecer (a+b)² e (a−b)² ajuda a fatorar e identificar vértice.",check:"✓ Pronto se: expande (x−3)² = x²−6x+9 rapidamente."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim (comparação)",desc:"Contrastar crescimento linear (afim) com crescimento quadrático consolida os dois conceitos.",check:"✓ Pronto se: distingue o gráfico de y=2x de y=2x² sem calcular."}
   ],
   vestibular:"A função quadrática é o tema mais cobrado nos vestibulares em problemas de máximo e mínimo: lucro máximo, área máxima, altura máxima de projéteis. No ENEM, aparece principalmente na leitura de parábolas e interpretação de vértice no contexto."
 },

{year:"1",tri:"T2",theme:"Trigonometria",pu:false,emoji:"🔄",term:"Ciclo Trigonométrico",
 simple:"Círculo de raio 1 que permite definir sen e cos para qualquer ângulo — não só de triângulos. Divide o plano em 4 quadrantes.",
 explain:"O ciclo trigonométrico é uma circunferência de raio 1 centrada na origem. Cada ponto do ciclo representa um ângulo α, com coordenadas (cos α, sen α). Isso generaliza as razões trigonométricas para <b>qualquer ângulo</b> (inclusive maiores que 90° ou negativos). Os <b>4 quadrantes</b> determinam os sinais de sen e cos: 1º(+,+), 2º(−,+), 3º(−,−), 4º(+,−). A <b>redução ao primeiro quadrante</b> permite calcular qualquer ângulo.",
 example:"Sen(150°): 150°=180°−30° → está no 2º quadrante → sen>0. Sen(150°)=sen(30°)=1/2. Cos(150°)=−cos(30°)=−√3/2.",
 dict:[
   {term:"Quadrante",def:"Cada uma das 4 regiões do plano cartesiano separadas pelos eixos. Determina o sinal de sen e cos.",ex:"1º: sen>0, cos>0. 2º: sen>0, cos<0. 3º: sen<0, cos<0. 4º: sen<0, cos>0."},
   {term:"Arco",def:"O comprimento do arco na circunferência de raio 1 correspondente a um ângulo. Medido em radianos ou graus.",ex:"Arco de 90° = π/2 radianos ≈ 1,57. Arco de 180° = π radianos."},
   {term:"Redução ao 1º quadrante",def:"Técnica para calcular razões trigonométricas de qualquer ângulo usando os ângulos do 1º quadrante.",ex:"Sen(210°)=−sen(30°)=−1/2. O 210° está no 3º quadrante (sen negativo)."},
   {term:"Ângulo negativo",def:"Ângulo medido no sentido horário no ciclo trigonométrico (sentido contrário ao padrão).",ex:"Sen(−30°)=−sen(30°)=−1/2. Cos(−60°)=cos(60°)=1/2."}
 ],
 prereq:{
   intro:"O ciclo trigonométrico generaliza a trigonometria do triângulo para o plano. É a ponte entre geometria e funções periódicas.",
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Trigonometria no triângulo",desc:"Sen, cos e tg no triângulo retângulo são redefinidos aqui para qualquer ângulo.",check:"✓ Pronto se: sabe os valores de sen e cos para 30°, 45° e 60°."},
     {badge:"9º ANO",color:"#5F27CD",title:"Circunferência",desc:"O ciclo é uma circunferência de raio 1. Conceitos de arco, raio e ponto são essenciais.",check:"✓ Pronto se: sabe que o comprimento de uma circunferência de raio r é 2πr."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Plano Cartesiano / Quadrantes",desc:"Os 4 quadrantes do plano determinam os sinais de seno e cosseno.",check:"✓ Pronto se: identifica em qual quadrante fica o ponto (−3, 2)."}
   ],
   vestibular:"O ciclo trigonométrico é pré-requisito para as funções trigonométricas (sen x, cos x) e equações trigonométricas, muito cobradas na FUVEST e UNICAMP. No ENEM, aparece em questões de fenômenos periódicos (marés, ondas sonoras, sazonalidade)."
 },

{year:"1",tri:"T3",theme:"Álgebra",pu:false,emoji:"📐",term:"Progressão Geométrica (PG)",
 simple:"Sequência onde cada termo é obtido multiplicando o anterior pela razão q. Ex: 2, 6, 18, 54... (q=3). Cresce exponencialmente.",
 explain:"Na PG, o quociente entre termos consecutivos é sempre o mesmo — a <b>razão q</b>. Fórmula do termo geral: <b>aₙ = a₁·qⁿ⁻¹</b>. Soma dos n primeiros termos: <b>Sₙ = a₁·(qⁿ−1)/(q−1)</b> para q≠1. Soma de uma PG infinita com |q|<1: <b>S∞ = a₁/(1−q)</b>. PG é base dos juros compostos e do crescimento exponencial.",
 example:"PG 2, 6, 18, 54... (q=3). 6º termo: a₆ = 2×3⁵ = 2×243 = 486. Soma dos 5 primeiros: S₅ = 2×(3⁵−1)/(3−1) = 2×242/2 = 242.",
 dict:[
   {term:"Razão (q)",def:"O fator pelo qual multiplicamos cada termo para obter o próximo. Constante em toda a PG.",ex:"PG 4,12,36,108: q=3. PG 100,10,1,0,1: q=0,1."},
   {term:"Termo geral (aₙ)",def:"Fórmula que calcula qualquer termo da PG: aₙ = a₁·qⁿ⁻¹.",ex:"PG com a₁=5 e q=2: a₈ = 5×2⁷ = 5×128 = 640."},
   {term:"Interpolação geométrica",def:"Inserir termos entre dois valores para que formem uma PG. Com k meios: q = ᵏ⁺¹√(aₙ/a₁).",ex:"Entre 2 e 54, inserir 2 meios: q = ³√(54/2) = ³√27 = 3. PG: 2, 6, 18, 54."},
   {term:"PG infinita",def:"PG com infinitos termos. Se |q|<1, a soma converge para S∞ = a₁/(1−q).",ex:"1 + 1/2 + 1/4 + 1/8 + ... = 1/(1−0,5) = 2."}
 ],
 prereq:{
   intro:"A PG é a versão multiplicativa da PA. Quem entende PA e potenciação aprende PG com naturalidade.",
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Progressão Aritmética",desc:"PA e PG são análogas: PA soma uma razão, PG multiplica. Entender a estrutura de uma ajuda na outra.",check:"✓ Pronto se: encontra o 10º termo de uma PA sem dificuldade."},
     {badge:"8º ANO",color:"#54A0FF",title:"Potenciação e propriedades",desc:"O termo geral da PG é aₙ=a₁·qⁿ⁻¹ — essencialmente uma potência com base q.",check:"✓ Pronto se: calcula 2⁸ = 256 e simplifica 3⁵/3² = 3³."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Exponencial",desc:"PG com n termos é uma função exponencial nos inteiros. A razão q é a base da exponencial.",check:"✓ Pronto se: reconhece que a PG 2,4,8,16... corresponde a f(n)=2ⁿ."}
   ],
   vestibular:"PG aparece nos vestibulares associada a juros compostos, crescimento populacional e sequências de investimentos. A soma dos termos de uma PG infinita (convergente) é clássica na FUVEST. No ENEM, PG surge em contextos de crescimento exponencial."
 },

{year:"1",tri:"T3",theme:"Álgebra",pu:false,emoji:"💰",term:"Matemática Financeira",

 example:"R$2.000 a 5%/mês por 3 meses. Simples: M=2000×(1+0,05×3)=R$2.300. Compostos: M=2000×(1,05)³=2000×1,1576≈R$2.315,25.",
 dict:[
   {term:"Capital (C)",def:"Valor inicial investido ou emprestado — antes de qualquer acréscimo de juros.",ex:"Depósito inicial de R$5.000 numa poupança: capital = R$5.000."},

{year:"2",tri:"T1",theme:"Funções",pu:false,emoji:"📡",term:"Função Exponencial",

 explain:"A função exponencial tem a forma <b>f(x) = aˣ</b>, com a>0 e a≠1. Se a>1: <b>crescente</b> (crescimento exponencial). Se 0<a<1: <b>decrescente</b> (decaimento). O domínio é todos os reais; a imagem são os positivos. Propriedade chave: o gráfico nunca cruza o eixo x (assíntota horizontal y=0). A base mais usada é e≈2,718 (número de Euler).",
 example:"Crescimento bacteriano: N(t) = 100·2ᵗ (dobra a cada hora). Após 5h: N=100×32=3.200 bactérias. Decaimento radioativo: N(t)=N₀·(1/2)ᵗ/τ.",
 dict:[
   {term:"Base (a)",def:"O número que é elevado à potência x. Determina se a função é crescente (a>1) ou decrescente (0<a<1).",ex:"f(x)=2ˣ: base 2>1 → crescente. f(x)=(1/2)ˣ: base<1 → decrescente."},
   {term:"Assíntota",def:"Reta que o gráfico se aproxima mas nunca toca. Na exponencial, a assíntota horizontal é y=0.",ex:"f(x)=2ˣ: por menor que x seja, 2ˣ nunca é zero ou negativo."},
   {term:"Crescimento exponencial",def:"Crescimento onde a quantidade multiplica por um fator fixo em cada unidade de tempo.",ex:"COVID-19 no início: casos dobravam a cada semana ≈ crescimento exponencial."},
   {term:"Número de Euler (e)",def:"Constante matemática e≈2,718. Base da função exponencial natural. Surge em juros contínuos e crescimento natural.",ex:"f(x)=eˣ é a função exponencial 'natural', muito usada em ciências."}
 ],
 prereq:{
   intro:"A função exponencial generaliza a ideia de crescimento multiplicativo da PG para qualquer valor de x real.",
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Potenciação (revisão)",desc:"f(x)=aˣ é uma potência com expoente variável. Precisa dominar as propriedades de potências.",check:"✓ Pronto se: simplifica a³×a⁴=a⁷ e (a²)³=a⁶ automaticamente."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Progressão Geométrica",desc:"PG e função exponencial são a mesma ideia: uma discreta (inteiros), outra contínua (todos os reais).",check:"✓ Pronto se: reconhece que f(x)=3ˣ nos inteiros gera a PG 1,3,9,27..."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim (comparação)",desc:"Contrastar crescimento linear com exponencial é essencial para modelagem.",check:"✓ Pronto se: distingue y=2x (linear) de y=2ˣ (exponencial) em um gráfico."}

 },

{year:"2",tri:"T1",theme:"Álgebra",pu:false,emoji:"🌲",term:"Logaritmos",
 simple:"logₐ(b) = x significa aˣ = b. É a operação inversa da exponencial. Transforma multiplicações em adições.",
 explain:"O <b>logaritmo</b> responde: a que potência devo elevar a base a para obter b? logₐ(b)=x ↔ aˣ=b. <b>Propriedades</b>: log(A·B)=log(A)+log(B); log(A/B)=log(A)−log(B); log(Aⁿ)=n·log(A); mudança de base: logₐ(b)=logc(b)/logc(a). O <b>logaritmo decimal</b> (base 10) e o <b>logaritmo natural</b> (base e) são os mais usados.",
 example:"log₂(32) = 5 porque 2⁵=32. log(1000)=3 porque 10³=1000. Aplicação: escala Richter — cada ponto é 10× mais intenso, então log transforma essa escala em valores manejáveis.",
 dict:[
   {term:"Base do logaritmo",def:"O número a em logₐ(b). Deve ser positivo e diferente de 1.",ex:"log₂(8)=3 (base 2). log₁₀(100)=2 (base 10, chamado log decimal)."},
   {term:"Logaritmando",def:"O número b em logₐ(b). Deve ser positivo (logaritmo de número negativo não existe nos reais).",ex:"log₅(25)=2. O logaritmando é 25. log(−4) não existe nos reais."},
   {term:"Propriedades dos logaritmos",def:"Regras que permitem simplificar cálculos: produto→soma, quociente→subtração, potência→multiplicação.",ex:"log(2×5)=log2+log5. log(1000/10)=log1000−log10=3−1=2."},
   {term:"Mudança de base",def:"Fórmula para calcular logaritmo em qualquer base usando log decimal ou natural: logₐ(b)=log(b)/log(a).",ex:"log₃(81)=log(81)/log(3)=log(3⁴)/log(3)=4·log3/log3=4."},
   {term:"Equação logarítmica",def:"Equação em que a incógnita aparece no logaritmando ou na base. Resolve-se convertendo para forma exponencial.",ex:"log₂(x)=5 → x=2⁵=32. log(x+1)=2 → x+1=100 → x=99."}
 ],
 prereq:{
   intro:"Logaritmo é a operação inversa da exponencial. Quem domina potenciação e função exponencial aprende logaritmo com naturalidade.",
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Função Exponencial",desc:"logₐ(b)=x é a resposta para aˣ=b. Sem entender exponencial, logaritmo não faz sentido.",check:"✓ Pronto se: entende por que 2³=8 implica log₂(8)=3."},
     {badge:"8º ANO",color:"#54A0FF",title:"Potenciação — propriedades",desc:"As propriedades dos logaritmos (produto, quociente, potência) espelham as da potenciação.",check:"✓ Pronto se: usa a²×a³=a⁵ e (aᵐ)ⁿ=aᵐⁿ sem dificuldade."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Função Inversa (conceito)",desc:"Log é a função inversa da exponencial — graficamente, são simétricas em y=x.",check:"✓ Pronto se: sabe que f e g são inversas quando f(g(x))=x."}
   ],

 },

{year:"2",tri:"T1",theme:"Combinatória",pu:false,emoji:"🎯",term:"Análise Combinatória",
 simple:"Conta possibilidades de arranjar ou escolher elementos. Permutação (ordenado, todos), Arranjo (ordenado, alguns), Combinação (sem ordem).",
 explain:"<b>Princípio Fundamental da Contagem</b>: se há m formas de fazer A e n formas de fazer B, há m×n formas de fazer A e B. <b>Permutação simples</b>: Pₙ = n! (arranjo de todos os elementos). <b>Arranjo</b>: Aₙ,ₖ = n!/(n−k)! (escolha ordenada de k entre n). <b>Combinação</b>: Cₙ,ₖ = n!/[k!(n−k)!] (escolha sem ordenação). Fatorial: n! = n×(n−1)×...×2×1.",
 example:"10 atletas disputam 3 medalhas (ouro, prata, bronze): ORDEM importa → Arranjo A₁₀,₃ = 10!/7! = 720. Escolher 3 para uma comissão: Combinação C₁₀,₃ = 120.",
 dict:[
   {term:"Fatorial (n!)",def:"Produto de todos os inteiros positivos de 1 até n. Convenção: 0!=1.",ex:"5! = 5×4×3×2×1 = 120. 3! = 6. 0! = 1."},
   {term:"Permutação",def:"Arranjo de TODOS os n elementos. A ordem importa. Pₙ = n!",ex:"Quantas senhas de 4 dígitos diferentes? P₄ = 4! = 24 senhas."},
   {term:"Arranjo",def:"Escolha ORDENADA de k elementos entre n disponíveis. Aₙ,ₖ = n!/(n−k)!",ex:"A₅,₂ = 5!/3! = 20. (5 alunos, escolher presidente e vice: 20 formas.)"},
   {term:"Combinação",def:"Escolha SEM ORDEM de k entre n. Cₙ,ₖ = n!/[k!(n−k)!]. Sempre menor que o arranjo.",ex:"C₅,₂ = 10. (5 alunos, escolher 2 para uma dupla: 10 formas — a ordem não importa.)"},
   {term:"Princípio Fundamental da Contagem",def:"Para eventos independentes: multiplique as quantidades de opções de cada etapa.",ex:"3 camisas e 4 calças: 3×4=12 combinações de roupa."}
 ],
 prereq:{
   intro:"Análise combinatória exige raciocínio lógico e domínio de fatorial. É um tema novo no EM — não tem pré-requisito pesado.",
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Operações fundamentais",desc:"Cálculo de fatoriais envolve multiplicações encadeadas. Precisa ser ágil com multiplicação.",check:"✓ Pronto se: calcula 5×4×3×2×1=120 mentalmente."},
     {badge:"9º ANO",color:"#5F27CD",title:"Probabilidade (introdução)",desc:"Combinatória é frequentemente usada para calcular o espaço amostral de problemas de probabilidade.",check:"✓ Pronto se: entende que P(evento) = favoráveis / total possível."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Raciocínio lógico",desc:"Identificar se a ordem importa ou não é a chave. Requer ler o enunciado com atenção analítica.",check:"✓ Pronto se: distingue 'formar uma chapa' (sem ordem) de 'eleger presidente e vice' (com ordem)."}
   ],
   vestibular:"Combinatória é cobrada diretamente em todos os vestibulares. FUVEST e UNICAMP pedem problemas de permutação com repetição, combinações com restrições e princípio multiplicativo encadeado. No ENEM, aparece em contextos de organização, senhas e escolhas."
 },

{year:"2",tri:"T2",theme:"Geometria",pu:false,emoji:"🏛️",term:"Geometria Espacial",
 simple:"Estudo de sólidos 3D: prismas, pirâmides, cilindros, cones e esferas. Calcula-se área total e volume.",
 explain:"Os sólidos geométricos principais: <b>Prisma</b>: base poligonal, faces laterais retangulares. V=A_base×h. <b>Pirâmide</b>: base poligonal, faces laterais triangulares. V=A_base×h/3. <b>Cilindro</b>: base circular. V=πr²h. <b>Cone</b>: base circular, V=πr²h/3. <b>Esfera</b>: V=4πr³/3. A área total = soma das áreas de todas as faces.",
 example:"Lata de refrigerante (cilindro): r=3cm, h=12cm. V=π×9×12≈339cm³. Área lateral=2πrh≈226cm². Área total=2πrh+2πr²≈283cm².",
 dict:[
   {term:"Poliedro",def:"Sólido geométrico com faces planas poligonais. Prismas e pirâmides são poliedros.",ex:"Cubo (6 faces quadradas), tetraedro (4 faces triangulares) são poliedros."},
   {term:"Área total",def:"Soma das áreas de todas as faces de um sólido (lateral + bases).",ex:"Cilindro: At = 2πrh (lateral) + 2πr² (2 bases). Para r=5, h=10: At≈471cm²."},
   {term:"Volume",def:"A medida do espaço interior de um sólido. Em cm³ ou m³.",ex:"Prisma: V=Abase×h. Pirâmide/cone: V=Abase×h/3 (1/3 do prisma equivalente)."},
   {term:"Geratriz",def:"O segmento que, ao girar em torno do eixo, gera um sólido de revolução (cone ou cilindro).",ex:"No cone: a geratriz vai do vértice à borda da base. g²=r²+h²."},
   {term:"Relação de Euler",def:"Para poliedros convexos: V−A+F=2, onde V=vértices, A=arestas, F=faces.",ex:"Cubo: V=8, A=12, F=6 → 8−12+6=2 ✓. Sempre vale para poliedros convexos."}
 ],

     {badge:"9º ANO",color:"#5F27CD",title:"Teorema de Pitágoras",desc:"Calcular a altura de pirâmides, a geratriz do cone e diagonais de prismas usa Pitágoras.",check:"✓ Pronto se: encontra a altura de um cone com g=13 e r=5 (h=12)."},

{year:"2",tri:"T2",theme:"Combinatória",pu:false,emoji:"🎲",term:"Probabilidade",
 simple:"P(evento) = casos favoráveis ÷ total possível. Entre 0 e 1. Probabilidade condicional: P(A|B) = P(A∩B)/P(B).",
 explain:"A probabilidade mede a chance de um evento ocorrer. <b>Clássica</b>: P(A) = n(A)/n(Ω). Regras: P(A∪B) = P(A)+P(B)−P(A∩B). <b>Eventos independentes</b>: P(A∩B)=P(A)×P(B). <b>Probabilidade condicional</b>: P(A|B) = P(A∩B)/P(B) — probabilidade de A sabendo que B já ocorreu. Complementar: P(Aᶜ) = 1−P(A).",
 example:"Urna com 3 vermelhas e 7 azuis. P(vermelha)=3/10. Sem reposição, P(vermelha e vermelha) = 3/10 × 2/9 = 6/90 = 1/15 ≈ 6,7%.",
 dict:[
   {term:"Espaço amostral (Ω)",def:"Conjunto de todos os resultados possíveis de um experimento aleatório.",ex:"Lançar um dado: Ω={1,2,3,4,5,6}. Lançar 2 moedas: Ω={CC,CK,KC,KK}."},
   {term:"Evento",def:"Subconjunto do espaço amostral — os resultados que nos interessam.",ex:"'Sair número par' = {2,4,6} ⊂ {1,2,3,4,5,6}. P = 3/6 = 1/2."},
   {term:"Probabilidade condicional",def:"P(A|B) = probabilidade de A acontecer dado que B já aconteceu. P(A|B)=P(A∩B)/P(B).",ex:"P(Ace|Espada) = P(Ace de espadas)/P(Espada) = (1/52)/(13/52) = 1/13."},
   {term:"Eventos independentes",def:"A ocorrência de um não afeta a probabilidade do outro. P(A∩B)=P(A)×P(B).",ex:"Lançar dois dados: o resultado do 1º não afeta o 2º. P(6 e 6)=1/6×1/6=1/36."},
   {term:"Complementar",def:"O evento oposto. P(Aᶜ) = 1 − P(A). Útil quando é mais fácil calcular o que não queremos.",ex:"P(pelo menos um 6 em 3 dados) = 1 − P(nenhum 6) = 1 − (5/6)³ ≈ 42%."}
 ],
 prereq:{
   intro:"Probabilidade aprofundada exige domínio de combinatória e espaços amostrais bem definidos.",
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Análise Combinatória",desc:"Para contar casos favoráveis e total possível com eficiência, combinatória é indispensável.",check:"✓ Pronto se: calcula C₅,₂=10 sem escrever todas as possibilidades."},
     {badge:"9º ANO",color:"#5F27CD",title:"Probabilidade básica",desc:"P=favoráveis/total, espaço amostral, evento. São os fundamentos sobre os quais se constrói.",check:"✓ Pronto se: calcula P(sair par) ao lançar um dado = 3/6 = 1/2."},
     {badge:"7º ANO",color:"#FF9F43",title:"Frações e porcentagem",desc:"Probabilidades são expressas como frações e convertidas em porcentagem para comunicar resultados.",check:"✓ Pronto se: converte 3/8 para 37,5% sem calculadora."}
   ],
   vestibular:"Probabilidade condicional e eventos dependentes são os temas mais cobrados em FUVEST e UNICAMP. No ENEM, o foco é em interpretação de resultados probabilísticos em contextos sociais (pesquisas, epidemiologia, jogos)."
 },

{year:"2",tri:"T2",theme:"Estatística",pu:false,emoji:"📊",term:"Estatística e Dispersão",
 simple:"Média, mediana, moda resumem dados. Variância e desvio padrão medem o espalhamento. Gráficos comunicam os dados.",
 explain:"<b>Média aritmética</b>: x̄ = (Σxᵢ)/n. <b>Média ponderada</b>: x̄ = Σ(xᵢ·pᵢ)/Σpᵢ. <b>Variância</b>: s² = Σ(xᵢ−x̄)²/n. <b>Desvio padrão</b>: s = √variância. Tipos de gráfico: histograma (distribuição de frequências), polígono de frequências, setores (proporções), barras/colunas (comparações). A escolha do gráfico adequado é fundamental para comunicar dados corretamente.",
 example:"Notas de uma turma: 5,6,7,7,7,8,9,10. Média=7,375. Mediana=7. Moda=7. Variância=2,23. DP=1,49 (notas variam, em média, 1,5 ponto da média).",
 dict:[
   {term:"Média ponderada",def:"Média em que cada valor tem um peso diferente. Usada em médias escolares com provas de pesos distintos.",ex:"Notas 6 (peso 2) e 8 (peso 3): média=(6×2+8×3)/(2+3)=36/5=7,2."},
   {term:"Variância",def:"Média dos quadrados dos desvios em relação à média. Mede dispersão em unidade quadrada.",ex:"Dados 4,6,8: média=6. Desvios: −2,0,+2. Var=(4+0+4)/3≈2,67."},
   {term:"Desvio padrão (DP)",def:"Raiz da variância. Na mesma unidade dos dados. DP pequeno = dados concentrados.",ex:"Var=9 → DP=3. Os dados variam, em média, 3 unidades da média."},
   {term:"Histograma",def:"Gráfico de barras adjacentes que mostra a distribuição de frequências de dados agrupados em classes.",ex:"Distribuição de alturas da turma em classes: [1,60-1,65), [1,65-1,70), etc."},
   {term:"Frequência relativa",def:"A proporção de cada valor no total. Frequência absoluta dividida pelo total de dados.",ex:"5 alunos entre 30 têm nota 10: freq. relativa = 5/30 ≈ 16,7%."}
 ],
 prereq:{
   intro:"Estatística aprofundada no EM exige domínio das medidas básicas e habilidade de leitura de gráficos.",
   items:[
     {badge:"7º ANO",color:"#FF9F43",title:"Média, mediana e moda",desc:"As três medidas de tendência central são o ponto de partida. O EM aprofunda com variância e DP.",check:"✓ Pronto se: calcula média, mediana e moda de {3,5,7,7,8} corretamente."},
     {badge:"8º ANO",color:"#54A0FF",title:"Raiz quadrada",desc:"O desvio padrão é a raiz da variância. Calcular raízes com precisão é necessário.",check:"✓ Pronto se: calcula √36=6 e estima √20≈4,5 sem calculadora."},
     {badge:"7º ANO",color:"#FF9F43",title:"Frações e porcentagem",desc:"Frequências relativas e construção de gráficos usam proporções e porcentagens.",check:"✓ Pronto se: converte frequência absoluta 8/40 para 20% sem dificuldade."}
   ],
   vestibular:"Estatística e dispersão são cobradas no ENEM principalmente com leitura e interpretação de gráficos, comparação de grupos com desvios padrão diferentes, e análise crítica de pesquisas. FUVEST e UNICAMP pedem cálculos completos de variância e DP."
 },

{year:"2",tri:"T3",theme:"Álgebra",pu:false,emoji:"⬜",term:"Matrizes",
 simple:"Tabela retangular de números. Soma, subtração e multiplicação seguem regras específicas. Base dos sistemas lineares.",
 explain:"Uma <b>matriz m×n</b> tem m linhas e n colunas. <b>Soma/subtração</b>: elemento a elemento (matrizes devem ter as mesmas dimensões). <b>Multiplicação</b>: A×B só é possível se nº de colunas de A = nº de linhas de B. O elemento cᵢⱼ de C=A×B é o produto interno da linha i de A com a coluna j de B. <b>Matriz inversa</b>: A⁻¹ tal que A×A⁻¹=I (matriz identidade).",
 example:"A=[1,2;3,4] e B=[5;6]. A×B: linha 1 × coluna 1 = 1×5+2×6=17. Linha 2 × col 1 = 3×5+4×6=39. Resultado: [17;39].",
 dict:[
   {term:"Matriz quadrada",def:"Matriz com o mesmo número de linhas e colunas (n×n). Só essas podem ter determinante e inversa.",ex:"Matriz 2×2: [1,2;3,4]. Matriz 3×3 tem 9 elementos."},
   {term:"Matriz identidade (I)",def:"Matriz quadrada com 1s na diagonal principal e 0s em todo o resto. É o 'neutro' da multiplicação.",ex:"I₂=[1,0;0,1]. A×I=I×A=A para qualquer A compatível."},
   {term:"Transposta",def:"Matriz obtida trocando linhas por colunas. Se A é m×n, sua transposta Aᵀ é n×m.",ex:"A=[1,2,3;4,5,6] → Aᵀ=[1,4;2,5;3,6]."},
   {term:"Matriz inversa",def:"A⁻¹ tal que A×A⁻¹=I. Existe apenas para matrizes quadradas com determinante≠0.",ex:"Se A=[2,1;1,1], então A⁻¹=[1,−1;−1,2]. Verificar: A×A⁻¹=I."},
   {term:"Multiplicação de matrizes",def:"Cᵢⱼ = soma dos produtos dos elementos da linha i de A pela coluna j de B. Atenção: A×B ≠ B×A.",ex:"[1,2]×[3;4] = 1×3+2×4 = 11."}
 ],
 prereq:{
   intro:"Matrizes são uma linguagem nova no EM. Não exigem pré-requisitos pesados — principalmente organização e multiplicação.",
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Operações fundamentais",desc:"Soma, subtração e multiplicação de números (inclusive negativos) são as operações das matrizes.",check:"✓ Pronto se: calcula 3×(−2)+(−5)×4=−26 sem errar sinal."},
     {badge:"7º ANO",color:"#FF9F43",title:"Sistemas de equações",desc:"O objetivo final das matrizes é resolver sistemas lineares — a conexão é direta.",check:"✓ Pronto se: resolve o sistema 2x+y=5 e x−y=1 por substituição."},
     {badge:"8º ANO",color:"#54A0FF",title:"Expressões algébricas",desc:"Multiplicação de matrizes envolve produtos e somas de expressões com várias variáveis.",check:"✓ Pronto se: calcula o valor numérico de 2a+3b para a=4, b=−1."}
   ],
   vestibular:"Matrizes e determinantes são extensamente cobrados em FUVEST e UNICAMP — incluindo inversão de matrizes, propriedades de determinantes e solução de sistemas por Cramer. No ENEM, aparecem em questões de transformações e representações matriciais."
 },

{year:"2",tri:"T3",theme:"Álgebra",pu:false,emoji:"🔢",term:"Determinantes e Sistemas Lineares",
 simple:"Determinante é um número associado a uma matriz quadrada. Indica se o sistema tem solução única. Sistemas lineares resolvidos por substituição, adição ou Cramer.",
 explain:"O <b>determinante</b> de uma matriz 2×2: det[a,b;c,d]=ad−bc. Para 3×3, usa-se a <b>Regra de Sarrus</b>. Se det≠0: sistema tem solução única (determinado). Se det=0: impossível ou indeterminado. A <b>Regra de Cramer</b> usa determinantes para resolver sistemas: x=Dx/D, y=Dy/D.",
 example:"Sistema: 2x+y=5 e x−y=1. Matriz: [2,1;1,−1]. Det=2×(−1)−1×1=−3. Dx=[5,1;1,−1]=−6. x=Dx/D=−6/(−3)=2. y=5−2×2=1.",
 dict:[
   {term:"Determinante",def:"Número associado a uma matriz quadrada. det[a,b;c,d]=ad−bc. Indica propriedades do sistema.",ex:"det[3,1;2,4]=3×4−1×2=12−2=10."},
   {term:"Regra de Sarrus",def:"Método para calcular determinante de matrizes 3×3: repete as 2 primeiras colunas e soma/subtrai diagonais.",ex:"Para matriz 3×3, somam-se as 3 diagonais principais e subtraem-se as 3 secundárias."},
   {term:"Sistema determinado",def:"Sistema com solução única. Ocorre quando det da matriz dos coeficientes ≠ 0.",ex:"2 equações, 2 incógnitas, det≠0 → 1 ponto de interseção → solução única."},
   {term:"Sistema impossível",def:"Sistema sem nenhuma solução. Equações representam retas paralelas (no plano).",ex:"x+y=3 e x+y=5: det=0, mas os termos independentes são diferentes → impossível."},
   {term:"Regra de Cramer",def:"Método de resolução usando determinantes: cada incógnita = Det(matriz com coluna substituída) / Det(original).",ex:"x=Dx/D, y=Dy/D. Funciona quando D≠0."}
 ],
 prereq:{
   intro:"Determinantes complementam as matrizes e abrem a porta para resolução sistemática de equações lineares.",
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Matrizes",desc:"O determinante é calculado a partir de uma matriz quadrada. Precisa saber o que é e como operar.",check:"✓ Pronto se: identifica os elementos a₁₁, a₁₂, a₂₁, a₂₂ de uma matriz 2×2."},
     {badge:"7º ANO",color:"#FF9F43",title:"Sistemas de equações",desc:"O objetivo dos determinantes é resolver sistemas. Saber montar o sistema é o passo anterior.",check:"✓ Pronto se: transforma '3 maçãs e 2 laranjas custam R$11' em equação."},
     {badge:"8º ANO",color:"#54A0FF",title:"Expressões algébricas",desc:"A regra de Sarrus envolve somas e subtrações de produtos de variáveis.",check:"✓ Pronto se: calcula ad−bc para a=3, b=1, c=2, d=4 rapidamente."}
   ],
   vestibular:"Sistemas lineares e determinantes são pilares do vestibular científico. FUVEST e UNICAMP cobram Regra de Cramer, sistemas com parâmetro, sistemas impossíveis e indeterminados. Álgebra Linear é base para Engenharia, Física e Ciência da Computação."
 },

{year:"2",tri:"T3",theme:"Geometria",pu:false,emoji:"📍",term:"Geometria Analítica",
 simple:"Une álgebra e geometria: pontos são coordenadas, retas são equações. Distâncias e posições calculadas algebricamente.",
 explain:"No plano cartesiano: <b>Distância entre pontos</b>: d = √[(x₂−x₁)²+(y₂−y₁)²]. <b>Ponto médio</b>: M = ((x₁+x₂)/2, (y₁+y₂)/2). <b>Equação da reta</b>: y = ax+b (forma reduzida) ou ax+by+c=0 (geral). <b>Retas paralelas</b>: mesmo coeficiente angular. <b>Retas perpendiculares</b>: produto dos coeficientes angulares = −1. <b>Circunferência</b>: (x−a)²+(y−b)²=r².",
 example:"Pontos A(1,2) e B(5,5). Distância: d=√[16+9]=√25=5. Ponto médio: M=(3, 3,5). Reta AB: inclinação=(5−2)/(5−1)=3/4.",
 dict:[
   {term:"Plano cartesiano",def:"Sistema de coordenadas com dois eixos perpendiculares (x e y). Cada ponto é um par (x,y).",ex:"O ponto (3,−2) está 3 unidades à direita do eixo y e 2 abaixo do eixo x."},
   {term:"Coeficiente angular",def:"A inclinação da reta — o tan do ângulo que faz com o eixo x. Igual a (y₂−y₁)/(x₂−x₁).",ex:"Reta passando por (0,0) e (3,6): a=(6−0)/(3−0)=2."},
   {term:"Retas paralelas",def:"Têm o mesmo coeficiente angular e nunca se intersectam.",ex:"y=3x+1 e y=3x−5 são paralelas (a=3 nas duas)."},

 explain:"O ENEM foca em <b>interpretação</b> de situações probabilísticas, não só fórmulas. Pontos-chave: distinguir eventos dependentes de independentes; uso de complementar (1−P) quando é mais fácil calcular o que NÃO ocorre; probabilidade condicional P(A|B)=P(A∩B)/P(B). Cuidado com a <b>falácia do apostador</b>: eventos independentes não têm memória (cara 5 vezes seguidas não aumenta a chance de coroa).",
 example:"ENEM 2019: numa pesquisa, 60% usam celular para redes sociais e 40% para notícias. P(ambos) = ? Precisa saber se são independentes ou não.",
 dict:[
   {term:"Probabilidade condicional",def:"P(A|B) = probabilidade de A dado que B já ocorreu. P(A|B) = P(A∩B)/P(B).",ex:"Numa turma: P(aprova dado que estudou) pode ser bem maior que P(aprova em geral)."},
   {term:"Falácia do apostador",def:"Erro de achar que eventos passados afetam futuros eventos independentes.",ex:"Cara saiu 10 vezes: a probabilidade de coroa na próxima ainda é 50%!"},
   {term:"Eventos mutuamente exclusivos",def:"Não podem ocorrer ao mesmo tempo. P(A∪B)=P(A)+P(B).",ex:"Sair 3 E sair 5 no mesmo lançamento de dado: exclusivos. P=1/6+1/6=1/3."},
   {term:"Complementar",def:"P(evento não ocorrer)=1−P(ocorrer). Útil quando o complemento é mais simples.",ex:"P(pelo menos uma cara em 3 lançamentos)=1−P(nenhuma cara)=1−(1/2)³=7/8."}
 ],
 prereq:{
   intro:"Probabilidade no ENEM foca em situações reais. Os pré-requisitos são de nível médio.",
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Probabilidade básica",desc:"Espaço amostral, evento, P=favoráveis/total. São o vocabulário mínimo.",check:"✓ Pronto se: calcula P(sair número primo) ao lançar dado = P({2,3,5}) = 3/6 = 1/2."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Análise Combinatória",desc:"Para contar espaços amostrais grandes com eficiência, combinatória é necessária.",check:"✓ Pronto se: usa C₅,₂=10 para contar duplas sem listar todas."},
     {badge:"6º ANO",color:"#FF6B6B",title:"Frações e porcentagem",desc:"Probabilidades são expressas como frações (0 a 1) e convertidas em %.",check:"✓ Pronto se: converte P=1/4=0,25=25% com naturalidade."}
   ],
   vestibular:"ENEM 5,5%: probabilidade condicional em contextos reais (testes de diagnóstico, pesquisas), complementar (pelo menos um), eventos independentes. Armadilha clássica: a 'falácia do apostador' — cara saiu 10 vezes, a probabilidade de coroa ainda é 50%."
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📈",term:"Funções — ENEM",
 simple:"5,4% ENEM. Função afim, quadrática, exponencial e logarítmica. Foco em modelagem e interpretação de gráficos.",
 explain:"O ENEM raramente pede cálculos isolados de funções — testa a <b>modelagem</b> (qual função descreve a situação?) e a <b>leitura de gráficos</b>. Pontos-chave: reconhecer o crescimento linear (afim), quadrático (parábola), exponencial e logarítmico em gráficos e tabelas. Interpretar o significado dos coeficientes no contexto do problema (taxa de crescimento, valor inicial, ponto de equilíbrio).",
 example:"ENEM: gráfico de crescimento de uma população de bactérias — curva que acelera → exponencial. Se é uma linha reta → afim. Se tem um máximo → quadrática.",
 dict:[
   {term:"Modelagem matemática",def:"Usar uma função para descrever uma situação real. A escolha da função depende do padrão de crescimento.",ex:"Crescimento constante → afim. Crescimento que acelera → exponencial. Ponto de máximo → quadrática."},
   {term:"Taxa de crescimento",def:"Quanto a variável dependente muda por unidade da independente. No contexto: velocidade, preço por km, etc.",ex:"f(x)=3x+2: taxa=3 (a cada unidade de x, y cresce 3)."},
   {term:"Domínio restrito",def:"Em problemas reais, nem todo valor de x é possível. Ex: x≥0 para tempo, 0<x para tamanho.",ex:"Quantidade de produto: x∈ℕ (inteiros positivos). Temperatura: x pode ser negativo."},
   {term:"Ponto de equilíbrio",def:"O valor de x onde duas funções se igualam. Resolve f(x)=g(x).",ex:"Custos: C₁=50+2x e C₂=20+5x. Equilíbrio: 50+2x=20+5x → x=10 unidades."}
 ],
 prereq:{
   intro:"Para funções no ENEM, o foco é reconhecer e interpretar — não calcular. Pré-requisitos são os quatro tipos de função.",
   items:[
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim e Quadrática",desc:"As duas funções mais cobradas. Reconhecer reta (afim) e parábola (quadrática) em gráficos.",check:"✓ Pronto se: distingue f(x)=2x+1 de g(x)=x² e sabe como é o gráfico de cada uma."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Função Exponencial e Log",desc:"Reconhecer crescimento exponencial e logarítmico em gráficos e tabelas.",check:"✓ Pronto se: identifica que dobrar a cada período é crescimento exponencial."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Domínio e imagem",desc:"Saber o que cada eixo representa no problema é essencial para interpretar gráficos.",check:"✓ Pronto se: identifica o domínio como tempo e a imagem como distância em um problema de movimento."}
   ],
   vestibular:"ENEM 5,4%: modelagem (qual função descreve a situação?) e leitura de gráficos são os focos. Perguntas típicas: 'O gráfico mostra crescimento acelerado — qual função descreve?' ou 'Em que instante o custo é mínimo?' (vértice da quadrática)."
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📐",term:"Geometria Analítica — ENEM",
 simple:"Distâncias, equações de retas e circunferências no plano. Interpretação geométrica de sistemas de equações.",
 explain:"O ENEM testa GA com foco em <b>interpretação geométrica</b>: duas retas paralelas = sistema impossível; retas coincidentes = infinitas soluções; retas que se cruzam = solução única. Distância de ponto a reta: d = |ax₀+by₀+c|/√(a²+b²). Circunferência no plano cartesiano: identificar centro e raio a partir da equação. Posições relativas de reta e circunferência.",
 example:"Dois ônibus saem de pontos diferentes com velocidades diferentes. Quando se encontram? → equação de retas que se intersectam. O x da solução é o tempo.",
 dict:[
   {term:"Equação reduzida da reta",def:"y=ax+b. a=coeficiente angular (inclinação), b=coeficiente linear (ponto no eixo y).",ex:"y=2x−3: reta com inclinação 2, que corta o eixo y em −3."},
   {term:"Distância de ponto a reta",def:"d=|ax₀+by₀+c|/√(a²+b²), onde ax+by+c=0 é a equação da reta.",ex:"Reta 3x+4y−5=0, ponto P(1,1): d=|3+4−5|/√(9+16)=2/5=0,4."},
   {term:"Posições relativas",def:"Duas retas: paralelas (sem interseção), concorrentes (um ponto) ou coincidentes (infinitos pontos).",ex:"y=2x+1 e y=2x+5: mesmo a, b diferente → paralelas. y=3x+1 e y=−x+5: se cruzam → concorrentes."},
   {term:"Equação da circunferência",def:"(x−a)²+(y−b)²=r². Centro (a,b) e raio r.",ex:"(x−1)²+(y+2)²=16: centro (1,−2), raio 4."}
 ],
 prereq:{
   intro:"GA no ENEM tem foco em interpretação geométrica de equações. Pré-requisitos: plano cartesiano e equações lineares.",
   items:[
     {badge:"9º ANO",color:"#5F27CD",title:"Plano Cartesiano e pontos",desc:"Marcar pontos, calcular distâncias e encontrar ponto médio são as operações básicas.",check:"✓ Pronto se: calcula a distância entre (1,2) e (5,5) = 5."},
     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim",desc:"y=ax+b é a equação da reta — função afim e GA são duas faces da mesma moeda.",check:"✓ Pronto se: encontra a equação de reta dado um ponto e a inclinação."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Sistemas de Equações",desc:"A interseção de retas é a solução do sistema formado pelas duas equações.",check:"✓ Pronto se: resolve 2x+y=5 e x+y=3 e interpreta o resultado geometricamente."}
   ],
   vestibular:"ENEM: posições relativas de retas e circunferências, equações da reta e da circunferência. FUVEST e UNICAMP cobram cônicas (elipse, hipérbole, parábola), distância de ponto a reta e problemas de otimização geométrica. GA é base de Cálculo e Álgebra Linear."
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"🔢",term:"Análise Combinatória — ENEM",
 simple:"3,7% ENEM. Contagem de possibilidades: quando a ordem importa (arranjo), quando não importa (combinação).",
 explain:"O ENEM testa principalmente a <b>identificação do tipo correto</b>: Quando a ordem importa e usamos todos → Permutação (n!). Quando a ordem importa e escolhemos k de n → Arranjo Aₙ,ₖ=n!/(n−k)!. Quando a ordem NÃO importa → Combinação Cₙ,ₖ=n!/[k!(n−k)!]. Problemas frequentes: senhas, grupos, comissões, equipes, escolhas.",
 example:"ENEM: quantas comissões de 3 pessoas podemos formar com 8 pessoas? Comissão = ordem não importa → C₈,₃ = 8!/(3!×5!) = 56.",
 dict:[
   {term:"Princípio multiplicativo",def:"Se temos m escolhas na 1ª etapa e n na 2ª, temos m×n combinações totais.",ex:"4 sabores de sorvete e 3 coberturas: 4×3=12 combinações."},
   {term:"Permutação",def:"Arranjo de TODOS os n elementos, com ordem. Pₙ=n!",ex:"Anagramas de CASA: 4!/2!=12 (A se repete 2 vezes)."},
   {term:"Combinação",def:"Escolha de k entre n elementos, SEM ordem. Cₙ,ₖ=n!/[k!(n−k)!].",ex:"Chapa de 2 candidatos entre 5 professores: C₅,₂=10 chapas."},
   {term:"Permutação com repetição",def:"Quando há elementos repetidos: Pₙ=n!/(n₁!×n₂!×...), dividindo pelos repetidos.",ex:"Anagramas de ARARA: 5!/(3!×2!)=10 anagramas."}
 ],
 prereq:{
   intro:"Combinatória no ENEM exige raciocínio lógico e clareza sobre quando a ordem importa ou não.",
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Análise Combinatória",desc:"Permutação, arranjo e combinação são as ferramentas. Precisa saber quando usar cada uma.",check:"✓ Pronto se: distingue 'escolher 3 membros de uma comissão' (combinação) de 'eleger presidente, vice e secretário' (arranjo)."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Fatorial",desc:"Todos os cálculos de combinatória passam pelo fatorial. Agilidade aqui economiza tempo.",check:"✓ Pronto se: calcula 8!/6! = 8×7 = 56 sem expandir tudo."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Princípio Fundamental da Contagem",desc:"Para problemas em etapas, multiplica-se as opções de cada etapa.",check:"✓ Pronto se: resolve 'de quantas formas se pode montar um cardápio com 3 entradas e 4 pratos' imediatamente."}
   ],
   vestibular:"ENEM 3,7%: problemas de senhas, organização de objetos, escolha de grupos. FUVEST e UNICAMP pedem permutação com repetição, combinações com restrições e o Princípio Multiplicativo em situações encadeadas. Ler o enunciado com atenção é 50% da solução."
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"💰",term:"Matemática Financeira — ENEM",

 ],

 },

let activeYear='all',activeTheme='all',searchQ='';

function render(){
  const grid=document.getElementById('glossary');
  const ctr=document.getElementById('counter');
  const filtered=terms.filter(t=>{
    const yearMatch = activeYear==='all' ||
      (activeYear==='3' && (t.year==='3' || t.pu)) ||
      (activeYear!=='3' && t.year===activeYear && !t.pu);
    const th=activeTheme==='all'||t.theme===activeTheme;
    const s=searchQ===''||t.term.toLowerCase().includes(searchQ)||t.simple.toLowerCase().includes(searchQ);
    return yearMatch&&th&&s;
  });
  ctr.textContent=filtered.length?`${filtered.length} TERMO${filtered.length>1?'S':''} ENCONTRADO${filtered.length>1?'S':''}` :'';
  if(!filtered.length){grid.innerHTML=`<div class="no-results"><span style="font-size:3rem;display:block;margin-bottom:12px">∅</span>Nenhum termo encontrado.</div>`;return;}
  grid.innerHTML=filtered.map(t=>{
    const yr=t.pu?'PU':t.year;
    return`<div class="card" data-year="${t.year}" data-pu="${t.pu}" onclick="openModal(${terms.indexOf(t)})">
      <div class="card-top">
        <span style="font-size:1.7rem">${t.emoji}</span>
        <div class="card-badges">
          <span class="by" data-year="${yr}">${t.pu?'PRÉ-UNIV':t.year+'ª SÉR'}</span>
          <span class="btri">${t.tri}</span>
          <span class="bt">${t.theme}</span>
        </div>
      </div>
      <h3>${t.term}</h3>
      <p class="simple">${t.simple}</p>
      <p class="hint">◈ clique para explorar</p>
    </div>`;
  }).join('');
}

function openModal(idx){
  const t=terms[idx];
  const yr=t.pu?'PU':t.year;
  const tc=COLORS[yr]||'#6C5CE7';
  document.getElementById('modalBand').style.background=`linear-gradient(135deg,#0F1623,${tc}22)`;
  document.getElementById('modalBand').style.borderBottom=`1px solid ${tc}44`;
  document.getElementById('mEmoji').textContent=t.emoji;
  document.getElementById('mTitle').style.color=tc;
  document.getElementById('mTitle').textContent=t.term;
  document.getElementById('mSub').textContent=`${t.pu?'Pré-universitário':t.year+'ª série'} · ${t.tri} · ${t.theme}`;
  document.getElementById('mp0').innerHTML=`
    ${t.pu?`<div class="pu-badge">📊 Pré-universitário — tema com alta incidência no ENEM</div>`:''}
    <div class="explain-box">${t.explain}</div>
    <div class="example-box" style="border-color:${tc};background:${tc}0D">
      <div class="elabel" style="color:${tc}">◈ EXEMPLO PRÁTICO</div>
      <p>${t.example}</p>
    </div>`;
  document.getElementById('mp1').innerHTML=`
    <ul class="dict-list">
      ${(t.dict||[]).map(d=>`
        <li class="dict-item">
          <div class="dict-term" style="color:${tc}">${d.term}</div>
          <div class="dict-def">${d.def}</div>
          <span class="dict-ex">📌 ${d.ex}</span>
        </li>`).join('')}
    </ul>`;
  document.getElementById('mp2').innerHTML=`
    <div class="visual-wrap">${t.visual}</div>
    <p class="visual-caption">${t.visualCaption}</p>`;
  const pr=t.prereq||{};
  document.getElementById('mp3').innerHTML=`
    ${pr.intro?`<p class="prereq-intro">${pr.intro}</p>`:''}
    <ul class="prereq-list">
      ${(pr.items||[]).map(p=>`
        <li class="prereq-item">
          <span class="prereq-badge" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.badge}</span>
          <div class="prereq-content">
            <div class="prereq-title" style="color:${tc}">${p.title}</div>
            <div class="prereq-desc">${p.desc}</div>
            <div class="prereq-check">${p.check}</div>
          </div>
        </li>`).join('')}
    </ul>
    ${pr.vestibular?`<div class="vestibular-box"><div class="vtitle">🎯 O QUE COBRE NO VESTIBULAR</div><p>${pr.vestibular}</p></div>`:''}`;
  document.getElementById('mp4').innerHTML=`
    <ul class="summary-list">
      ${t.summary.map(s=>`<li><span class="icon">◈</span><span>${s}</span></li>`).join('')}
    </ul>`;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.mpanel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModalDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function switchTab(idx,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mpanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`mp${idx}`).classList.add('active');
}
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeYear=tab.dataset.year;render();
  });
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTheme=btn.dataset.theme;render();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase().trim();render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
render();
</script>
</body>
