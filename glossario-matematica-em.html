{year:"2",tri:"T1",theme:"Combinatória",pu:false,emoji:"🎯",term:"Análise Combinatória",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Uma lanchonete tem 3 tipos de pão e 4 recheios. Quantos sanduíches diferentes você pode montar? Para cada pão, há 4 opções de recheio: 3 x 4 = 12 sanduíches. <b>Esse é o Princípio Fundamental da Contagem.</b>",ex:"3 pães x 4 recheios = 12. Se adicionar 2 molhos: 3 x 4 x 2 = 24 combinações."},
   {tag:"Padrão — A pergunta que muda tudo",text:"<b>A ordem dos elementos importa?</b> Se sim (presidente e vice são cargos diferentes) → Arranjo. Se não (membros de uma comissão, a ordem não importa) → Combinação. Se usamos todos e a ordem importa → Permutação.",ex:"5 alunos: eleger presidente e vice → Arranjo A(5,2)=20. Escolher uma dupla → Combinação C(5,2)=10."},
   {tag:"Formalizacao — As formulas",text:"<b>Permutação</b>: Pn = n! (todos, com ordem). <b>Arranjo</b>: A(n,k) = n!/(n-k)! (k de n, com ordem). <b>Combinação</b>: C(n,k) = n!/[k! x (n-k)!] (k de n, sem ordem).",ex:"C(10,3) = (10 x 9 x 8)/(3 x 2 x 1) = 120. Nunca escreva fatoriais grandes: cancele antes!"},
   {tag:"Aprofundamento — Restricoes e casos",text:"Problemas com restrições usam a <b>Complementação</b>: total - casos proibidos. Ou se dividem em casos. 'Pelo menos 1 mulher' = total - (só homens).",ex:"Comissão de 3 em 5 homens e 4 mulheres, com pelo menos 1 mulher: C(9,3) - C(5,3) = 84 - 10 = 74."}],
 historia:{cenas:[{icon:"🔐",label:"A SENHA DO COFRE",texto:"O banco tinha cofre com senha de 4 dígitos distintos (0-9). O gerente perguntou: 'Quantas senhas possíveis existem?' A ordem importa (1234 diferente de 4321), sem repetição: A(10,4) = 10 x 9 x 8 x 7 = 5040. Com repetição: 10^4 = 10.000."},
       {icon:"⚽",label:"A ESCALA DO CAMPEONATO",texto:"O CBB vai organizar um torneio com as 8 turmas do EM. Cada equipe joga contra todas as outras. Como a ordem não importa (AxB é o mesmo jogo que BxA): C(8,2) = 28 jogos no total."}],pergunta:"Se o torneio fosse de equipes de 3 turmas, quantos jogos seriam? Use C(8,3).",moral:"Combinatória conta possibilidades sem listar. A pergunta central: a ordem importa? Sim: Arranjo/Permutação. Não: Combinação. Leia o enunciado com cuidado antes de calcular."},

 simple:"Conta possibilidades de arranjar ou escolher elementos. Permutação (ordenado, todos), Arranjo (ordenado, alguns), Combinação (sem ordem).",
 explain:"Quantas senhas de 4 dígitos diferentes você pode criar com os dígitos 1 a 9? Você poderia listar uma por uma — mas são centenas. A análise combinatória é uma forma inteligente de <b>contar possibilidades sem precisar listá-las todas</b>.<br><br>A ideia central: se uma escolha tem m opções e outra tem n opções, as duas juntas têm m × n possibilidades. É o <b>Princípio Fundamental da Contagem</b>.<br><br>As três ferramentas principais:<br>• <b>Permutação</b>: arranja <em>todos</em> os elementos, a ordem importa → P = n!<br>• <b>Arranjo</b>: escolhe <em>alguns</em> elementos, a ordem importa → A = n!/(n−k)!<br>• <b>Combinação</b>: escolhe <em>alguns</em> elementos, a ordem <em>não</em> importa → C = n!/[k!(n−k)!]<br><br>A pergunta-chave que define qual usar: <em>a ordem das escolhas muda o resultado?</em>",
 example:"10 atletas disputam 3 medalhas (ouro, prata, bronze): ORDEM importa → Arranjo A₁₀,₃ = 10!/7! = 720. Escolher 3 para uma comissão: Combinação C₁₀,₃ = 120.",

 story:{icon:"🔐",title:"A senha do cofre",text:"Um banco precisa criar senhas de 4 dígitos usando os algarismos 1 a 9, sem repetição. Quantas senhas diferentes são possíveis?\n\nCada posição da senha importa: '1234' é diferente de '4321'. E não pode repetir. Isso é um Arranjo.\n\nA₉,₄ = 9!/(9−4)! = 9×8×7×6 = 3.024 senhas possíveis.\n\nAgora suponha que o banco quer formar uma comissão de 4 pessoas entre 9 funcionários. Aqui a ordem não importa — ser 'membro 1' ou 'membro 4' é a mesma coisa.\n\nC₉,₄ = 9!/(4!×5!) = 126 comissões possíveis.\n\nA diferença: 3.024 vs 126. A ordem multiplica as possibilidades.",connection:"Criptografia, jogos de loteria, seleção de equipes esportivas, arranjos de músicas numa playlist, análise de jogadas possíveis em xadrez — tudo envolve contagem combinatória."},
 dict:[
   {term:"Fatorial (n!)",def:"Produto de todos os inteiros positivos de 1 até n. Convenção: 0!=1.",ex:"5! = 5×4×3×2×1 = 120. 3! = 6. 0! = 1."},
   {term:"Permutação",def:"Arranjo de TODOS os n elementos. A ordem importa. Pₙ = n!",ex:"Quantas senhas de 4 dígitos diferentes? P₄ = 4! = 24 senhas."},
   {term:"Arranjo",def:"Escolha ORDENADA de k elementos entre n disponíveis. Aₙ,ₖ = n!/(n−k)!",ex:"A₅,₂ = 5!/3! = 20. (5 alunos, escolher presidente e vice: 20 formas.)"},
   {term:"Combinação",def:"Escolha SEM ORDEM de k entre n. Cₙ,ₖ = n!/[k!(n−k)!]. Sempre menor que o arranjo.",ex:"C₅,₂ = 10. (5 alunos, escolher 2 para uma dupla: 10 formas — a ordem não importa.)"},
   {term:"Princípio Fundamental da Contagem",def:"Para eventos independentes: multiplique as quantidades de opções de cada etapa.",ex:"3 camisas e 4 calças: 3×4=12 combinações de roupa."}
 ],
 steps:{
   intro:"A chave da combinatória é fazer as perguntas certas antes de calcular.",
   items:[
     {n:1,action:"Leia o enunciado com atenção",detail:"Identifique: quantos elementos disponíveis (n)? Quantos serão escolhidos (k)? A ordem importa?",ex:"'10 alunos, formar grupo de 3' → n=10, k=3. Grupo=sem ordem."},
     {n:2,action:"Decida a ferramenta",detail:"Ordem importa + todos → Permutação (n!). Ordem importa + escolhe k → Arranjo. Sem ordem → Combinação.",ex:"Comissão (sem cargo) → Combinação C₁₀,₃. Presidente+vice+sec → Arranjo A₁₀,₃"},
     {n:3,action:"Verifique restrições",detail:"Há elementos que DEVEM ou NÃO PODEM estar juntos? Trate por casos ou complementar.",ex:"'Comissão com pelo menos 1 menina': total − (só meninos) = C total − C só meninos"},
     {n:4,action:"Calcule",detail:"Perm: n!. Arranjo: n!/(n−k)!. Combinação: n!/[k!(n−k)!]. Simplifique antes de multiplicar.",ex:"C₁₀,₃=10!/(3!·7!)=(10·9·8)/(3·2·1)=720/6=120",tip:"⚠️ Nunca escreva fatoriais grandes por completo — cancele antes: 10!/7! = 10×9×8"}
   ]
 },
 prereq:{
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Operações fundamentais",desc:"Cálculo de fatoriais envolve multiplicações encadeadas. Precisa ser ágil com multiplicação.",check:"✓ Pronto se: calcula 5×4×3×2×1=120 mentalmente."},
     {badge:"9º ANO",color:"#5F27CD",title:"Probabilidade (introdução)",desc:"Combinatória é frequentemente usada para calcular o espaço amostral de problemas de probabilidade.",check:"✓ Pronto se: entende que P(evento) = favoráveis / total possível."},
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Raciocínio lógico",desc:"Identificar se a ordem importa ou não é a chave. Requer ler o enunciado com atenção analítica.",check:"✓ Pronto se: distingue 'formar uma chapa' (sem ordem) de 'eleger presidente e vice' (com ordem)."}
   ],
   vestibular:"Combinatória é cobrada diretamente em todos os vestibulares. FUVEST e UNICAMP pedem problemas de permutação com repetição, combinações com restrições e princípio multiplicativo encadeado. No ENEM, aparece em contextos de organização, senhas e escolhas."
 },

{year:"2",tri:"T2",theme:"Geometria",pu:false,emoji:"🏛️",term:"Geometria Espacial",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Uma lata é um cilindro. Uma caixa de sapato é um prisma. Uma bola é uma esfera. Você lida com sólidos geométricos o tempo todo — para saber <b>quanto cabe dentro</b> (volume) ou <b>quanto de material usa</b> (área total).",ex:"Lata: calcular quantos ml cabem = volume. Papel que envolve a lata = área total."},
   {tag:"Padrão — A relacao prisma e piramide",text:"Uma pirâmide cabe exatamente <b>3 vezes</b> dentro de um prisma de mesma base e altura. Um cone cabe 3 vezes dentro de um cilindro equivalente. Isso não é coincidência — é a relação V = Abase x h / 3.",ex:"Encha 3 cones de areia e despeje num cilindro de mesma base e altura: o cilindro fica exatamente cheio."},
   {tag:"Formalizacao — As formulas",text:"<b>Cilindro</b>: V=pi x r² x h. <b>Cone</b>: V=pi x r² x h / 3. <b>Esfera</b>: V=4 x pi x r³ / 3. <b>Prisma</b>: V=Abase x h. <b>Piramide</b>: V=Abase x h / 3. Conversão: 1m³=1000L.",ex:"Piscina cilíndrica: r=3m, h=1,5m. V=pi x 9 x 1,5 aprox 42,4m³ = 42.400 litros."},
   {tag:"Aprofundamento — Euler e semelhanca",text:"Euler: <b>V - A + F = 2</b> (vértices - arestas + faces = 2) para qualquer poliedro convexo. Sólidos semelhantes com razão k: volumes na razão k³. Lata com o dobro do raio cabe 8x mais líquido!",ex:"Cubo: V=8, A=12, F=6. 8-12+6=2 ✓. Latas com razão 1:2 nos raios: volumes na razão 1:8."}],
 historia:{cenas:[{icon:"🏺",label:"ARQUIMEDES E A COROA",texto:"O rei suspeitava que sua coroa de ouro estava adulterada. Pediu a Arquimedes para verificar sem destruí-la. Arquimedes entrou na banheira e viu a água transbordar — e teve a ideia: o volume de água deslocado é igual ao volume do objeto. Ele mediu o volume da coroa e do ouro puro. Eram diferentes — havia prata."},
       {icon:"📦",label:"A EMBALAGEM MAIS EFICIENTE",texto:"Uma fábrica quer embalagens de 1 litro (1000cm³). Qual forma usa menos material? Cilíndrica com r=5,4cm e h=10,9cm: usa aprox 553cm² de papel. Cúbica de lado 10cm: usa 600cm². O cilindro é mais eficiente — por isso garrafas tendem a ser cilíndricas."}],pergunta:"Por que a esfera é a forma que maximiza o volume para uma dada área superficial?",moral:"Geometria espacial é a matemática das 3 dimensões. Volume mede capacidade. Área total mede material. A relação prisma/pirâmide = 3:1 é uma das mais elegantes da geometria."},

 simple:"Estudo de sólidos 3D: prismas, pirâmides, cilindros, cones e esferas. Calcula-se área total e volume.",
 explain:"A geometria que você aprendeu no Fundamental (áreas, perímetros) é plana — trabalha em 2 dimensões. A geometria espacial trabalha em <b>3 dimensões</b>: comprimento, largura e altura.<br><br>Os sólidos geométricos se dividem em dois grupos:<br>• <b>Poliedros</b>: faces planas. Prismas (caixas, tubos hexagonais) e pirâmides.<br>• <b>Sólidos de revolução</b>: criados 'girando' uma figura plana. Cilindro (lata), cone (sorvete), esfera (bola).<br><br>Dois cálculos principais:<br>• <b>Volume</b>: quanto cabe dentro (em m³ ou litros)<br>• <b>Área total</b>: quanto material é necessário para construir a superfície<br><br>Regra poderosa: <em>pirâmide = prisma ÷ 3</em> e <em>cone = cilindro ÷ 3</em>. Com a mesma base e altura, a pirâmide ocupa exatamente 1/3 do volume do prisma.",
 example:"Lata de refrigerante (cilindro): r=3cm, h=12cm. V=π×9×12≈339cm³. Área lateral=2πrh≈226cm². Área total=2πrh+2πr²≈283cm².",

 story:{icon:"🏗️",title:"A caixa d'água do prédio",text:"O síndico do condomínio precisava saber quanto tempo a caixa d'água cilíndrica aguentaria se a bomba quebrasse. A caixa tinha raio de 2m e altura de 3m. O prédio consumia 500 litros por hora.\n\nVolume = π × r² × h = π × 4 × 3 = 12π ≈ 37,7m³\n\nConvertendo: 37,7m³ = 37.700 litros\n\nTempo = 37.700 ÷ 500 = 75,4 horas ≈ 3 dias\n\nO síndico tinha 3 dias para consertar a bomba antes de ficar sem água.",connection:"Engenheiros calculam volume de concreto para obras. Farmacêuticos calculam dosagens em comprimidos cilíndricos. Arquitetos projetam espaços tridimensionais. Fabricantes de embalagens otimizam material com cálculos de área total."},
 dict:[
   {term:"Poliedro",def:"Sólido geométrico com faces planas poligonais. Prismas e pirâmides são poliedros.",ex:"Cubo (6 faces quadradas), tetraedro (4 faces triangulares) são poliedros."},
   {term:"Área total",def:"Soma das áreas de todas as faces de um sólido (lateral + bases).",ex:"Cilindro: At = 2πrh (lateral) + 2πr² (2 bases). Para r=5, h=10: At≈471cm²."},
   {term:"Volume",def:"A medida do espaço interior de um sólido. Em cm³ ou m³.",ex:"Prisma: V=Abase×h. Pirâmide/cone: V=Abase×h/3 (1/3 do prisma equivalente)."},
   {term:"Geratriz",def:"O segmento que, ao girar em torno do eixo, gera um sólido de revolução (cone ou cilindro).",ex:"No cone: a geratriz vai do vértice à borda da base. g²=r²+h²."},
   {term:"Relação de Euler",def:"Para poliedros convexos: V−A+F=2, onde V=vértices, A=arestas, F=faces.",ex:"Cubo: V=8, A=12, F=6 → 8−12+6=2 ✓. Sempre vale para poliedros convexos."}
 ],
 steps:{
   intro:"Para calcular volume e área de sólidos, o protocolo é sempre: identificar, escolher fórmula, calcular partes.",
   items:[
     {n:1,action:"Identifique o sólido",detail:"É prisma/cilindro (base × altura)? Pirâmide/cone (base × altura / 3)? Esfera (4πr³/3)?",ex:"Lata → cilindro. Caixa de sapato → prisma retangular. Bola → esfera"},
     {n:2,action:"Calcule a área da base",detail:"A base pode ser triângulo, círculo, quadrado etc. Calcule a área da base primeiro.",ex:"Cilindro de r=5: Abase=πr²=25π cm²"},
     {n:3,action:"Identifique a altura",detail:"A altura é sempre perpendicular à base. Em pirâmides, use Pitágoras para calcular se necessário.",ex:"Cone: g²=r²+h² → h=√(g²−r²). Se g=13 e r=5 → h=12"},
     {n:4,action:"Aplique a fórmula de volume",detail:"V=Abase×h (prisma/cilindro) ou V=Abase×h/3 (pirâmide/cone) ou V=4πr³/3 (esfera).",ex:"V cilindro=25π×10=250π≈785 cm³"},
     {n:5,action:"Área total (se pedido)",detail:"Área total = área lateral + área das bases. Lateral do cilindro=2πrh. Lateral do cone=πrg.",ex:"At cilindro=2πrh+2πr²=2π×5×10+2π×25=100π+50π=150π≈471 cm²",tip:"⚠️ 1m³=1.000L e 1L=1dm³. Converta unidades antes de calcular!"}
   ]
 },
 prereq:{
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Área de figuras planas",desc:"As bases dos sólidos são figuras planas. Calcular sua área é o primeiro passo do volume.",check:"✓ Pronto se: calcula a área de um triângulo e de um círculo sem consultar fórmula."},
     {badge:"9º ANO",color:"#5F27CD",title:"Teorema de Pitágoras",desc:"Calcular a altura de pirâmides, a geratriz do cone e diagonais de prismas usa Pitágoras.",check:"✓ Pronto se: encontra a altura de um cone com g=13 e r=5 (h=12)."},
     {badge:"8º ANO",color:"#54A0FF",title:"Circunferência e círculo",desc:"Cilindros, cones e esferas têm base circular. Área=πr² e comprimento=2πr são frequentes.",check:"✓ Pronto se: calcula área e comprimento de círculo de raio 6."}
   ],
   vestibular:"Geometria Espacial é muito cobrada em FUVEST e UNICAMP com cálculos de volume, área total e inscrição/circunscrição de sólidos. No ENEM, foco em situações práticas: capacidade de caixas, dimensionamento de embalagens, leitura de plantas arquitetônicas."
 },

{year:"2",tri:"T2",theme:"Combinatória",pu:false,emoji:"🎲",term:"Probabilidade",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Você lança uma moeda. Pode dar cara ou coroa. Não sabe qual — mas sabe que a chance de cara é 1 de 2. Com um dado, a chance de sair 4 é 1 de 6. <b>Probabilidade mede a chance de um evento ocorrer.</b>",ex:"P(cara)=1/2=50%. P(sair 4)=1/6 aprox 16,7%. P(sair número negativo no dado)=0."},
   {tag:"Padrão — Espaco amostral e evento",text:"O <b>espaço amostral</b> é o conjunto de todos os resultados possíveis. O <b>evento</b> é o subconjunto com os resultados que nos interessam. P(evento) = favoráveis / total possível.",ex:"2 dados: 36 pares possíveis. P(soma=7): 6 pares favoráveis. P=6/36=1/6."},
   {tag:"Formalizacao — Regras e condicional",text:"P(A ou B)=P(A)+P(B)-P(AeB). Independentes: P(AeB)=P(A)xP(B). <b>Condicional</b>: P(A dado B)=P(AeB)/P(B). Complementar: P(nao A)=1-P(A).",ex:"P(pelo menos uma cara em 3 lançamentos) = 1 - P(nenhuma cara) = 1 - (1/2)^3 = 7/8."},
   {tag:"Aprofundamento — Dependencia e falacia",text:"Eventos <b>dependentes</b>: o resultado anterior muda o espaço amostral. Eventos <b>independentes</b>: não se influenciam. <b>Falacia do Apostador</b>: cara 10 vezes seguidas não aumenta a chance de coroa — o dado não tem memória!",ex:"Urna: 3 vermelhas e 7 azuis. Sem reposição: P(2ª vermelha dado 1ª vermelha)=2/9. Com reposição: P=3/10."}],
 historia:{cenas:[{icon:"🎰",label:"O PROBLEMA DOS DADOS",texto:"No século XVII, o Cavaleiro de Méré apostava em jogos e pediu ajuda a Pascal. Ele ganhava apostando 'pelo menos um 6 em 4 lançamentos'. Mas perdia apostando 'pelo menos um duplo-6 em 24 lançamentos'. Pascal calculou: P(pelo menos um 6 em 4) aprox 52%. P(duplo-6 em 24) aprox 49%. A matemática explicou a diferença."},
       {icon:"🏥",label:"O TESTE MEDICO",texto:"Um teste de HIV tem 99% de precisão. Numa população onde 1 em 1000 tem HIV, se der positivo, qual a chance real de ter a doença? Surpreendentemente: menos de 10%! Porque há muito mais pessoas sem HIV sendo testadas, e 1% delas falha no teste — um número maior que os verdadeiros positivos."}],pergunta:"Por que em populações com doença rara, até testes precisos dão muitos falsos positivos?",moral:"Probabilidade mede chance com precisão matemática. P=favoráveis/total. A probabilidade condicional é a mais importante e contraintuitiva — quando sabemos que B ocorreu, isso muda tudo."},

 simple:"P(evento) = casos favoráveis ÷ total possível. Entre 0 e 1. Probabilidade condicional: P(A|B) = P(A∩B)/P(B).",
 explain:"Toda vez que você enfrenta uma situação cujo resultado é incerto, você está lidando com probabilidade. Ela não prevê o que <em>vai</em> acontecer — ela mede o quão <em>provável</em> é cada resultado possível.<br><br>A probabilidade de um evento é sempre um número entre 0 e 1:<br>• 0 = impossível (probabilidade nula)<br>• 1 = certeza absoluta<br>• 0,5 = 50% de chance (cara ou coroa)<br><br>Para calcular: <b>P(evento) = casos favoráveis ÷ total de casos possíveis</b><br><br>Quando os eventos dependem uns dos outros, as contas mudam. A <b>probabilidade condicional</b> P(A|B) pergunta: 'qual a probabilidade de A acontecer, sabendo que B já aconteceu?'<br><br>Uma armadilha clássica: a <em>falácia do apostador</em>. Se cara saiu 10 vezes seguidas numa moeda honesta, a probabilidade de sair cara na próxima ainda é 50%. A moeda não tem memória.",
 example:"Urna com 3 vermelhas e 7 azuis. P(vermelha)=3/10. Sem reposição, P(vermelha e vermelha) = 3/10 × 2/9 = 6/90 = 1/15 ≈ 6,7%.",

 story:{icon:"🎯",title:"O teste médico",text:"Um teste para uma doença rara (que afeta 1% da população) tem 99% de precisão. Você fez o teste e deu positivo. Qual a probabilidade de você realmente ter a doença?\n\nA maioria responde: '99%'. Mas a resposta correta é muito diferente.\n\nDe 10.000 pessoas testadas:\n• 100 têm a doença. O teste pega 99 corretamente.\n• 9.900 não têm. Mas o teste erra 1% = 99 falsos positivos.\n\nDos 198 positivos, apenas 99 são reais.\nP(doença | positivo) = 99/198 = 50%\n\nSó 50%! Isso é probabilidade condicional — e é por isso que médicos pedem exames repetidos antes de um diagnóstico grave.",connection:"Previsão do tempo, seguros, exames médicos, análise de risco financeiro, inteligência artificial, jogos — probabilidade está em todo lugar onde há incerteza."},
 dict:[
   {term:"Espaço amostral (Ω)",def:"Conjunto de todos os resultados possíveis de um experimento aleatório.",ex:"Lançar um dado: Ω={1,2,3,4,5,6}. Lançar 2 moedas: Ω={CC,CK,KC,KK}."},
   {term:"Evento",def:"Subconjunto do espaço amostral — os resultados que nos interessam.",ex:"'Sair número par' = {2,4,6} ⊂ {1,2,3,4,5,6}. P = 3/6 = 1/2."},
   {term:"Probabilidade condicional",def:"P(A|B) = probabilidade de A acontecer dado que B já aconteceu. P(A|B)=P(A∩B)/P(B).",ex:"P(Ace|Espada) = P(Ace de espadas)/P(Espada) = (1/52)/(13/52) = 1/13."},
   {term:"Eventos independentes",def:"A ocorrência de um não afeta a probabilidade do outro. P(A∩B)=P(A)×P(B).",ex:"Lançar dois dados: o resultado do 1º não afeta o 2º. P(6 e 6)=1/6×1/6=1/36."},
   {term:"Complementar",def:"O evento oposto. P(Aᶜ) = 1 − P(A). Útil quando é mais fácil calcular o que não queremos.",ex:"P(pelo menos um 6 em 3 dados) = 1 − P(nenhum 6) = 1 − (5/6)³ ≈ 42%."}
 ],
 steps:{
   intro:"O protocolo de probabilidade: definir o espaço amostral → identificar o evento → calcular.",
   items:[
     {n:1,action:"Defina o espaço amostral",detail:"Liste TODOS os resultados possíveis do experimento. Se for grande, use combinatória para contar.",ex:"Dois dados: Ω tem 6×6=36 resultados. Baralho: Ω tem 52 cartas"},
     {n:2,action:"Identifique o evento",detail:"Quais resultados correspondem ao que o problema pede? Use linguagem de conjuntos.",ex:"Sair soma=7 nos dois dados: {(1,6),(2,5),(3,4),(4,3),(5,2),(6,1)} → 6 casos favoráveis"},
     {n:3,action:"Verifique independência",detail:"Com reposição? → eventos independentes, multiplique. Sem reposição? → espaço amostral muda a cada passo.",ex:"Urna sem reposição: P(2ª bola vermelha | 1ª vermelha) = (r−1)/(n−1)"},
     {n:4,action:"Calcule P(evento)",detail:"P=favoráveis/total. Para eventos compostos: use regras de adição e multiplicação.",ex:"P(soma=7)=6/36=1/6≈16,7%"},
     {n:5,action:"Considere usar o complementar",detail:"Se o evento pedido é complicado, calcule P(complementar) e subtraia de 1.",ex:"P(pelo menos um 6)=1−P(nenhum 6)=1−(5/6)²=11/36",tip:"⚠️ 'Pelo menos um' ou 'ao menos um' → quase sempre use complementar!"}
   ]
 },
 prereq:{
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Análise Combinatória",desc:"Para contar casos favoráveis e total possível com eficiência, combinatória é indispensável.",check:"✓ Pronto se: calcula C₅,₂=10 sem escrever todas as possibilidades."},
     {badge:"9º ANO",color:"#5F27CD",title:"Probabilidade básica",desc:"P=favoráveis/total, espaço amostral, evento. São os fundamentos sobre os quais se constrói.",check:"✓ Pronto se: calcula P(sair par) ao lançar um dado = 3/6 = 1/2."},
     {badge:"7º ANO",color:"#FF9F43",title:"Frações e porcentagem",desc:"Probabilidades são expressas como frações e convertidas em porcentagem para comunicar resultados.",check:"✓ Pronto se: converte 3/8 para 37,5% sem calculadora."}
   ],
   vestibular:"Probabilidade condicional e eventos dependentes são os temas mais cobrados em FUVEST e UNICAMP. No ENEM, o foco é em interpretação de resultados probabilísticos em contextos sociais (pesquisas, epidemiologia, jogos)."
 },

{year:"2",tri:"T2",theme:"Estatística",pu:false,emoji:"📊",term:"Estatística e Dispersão",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Duas turmas têm média 7,0. Turma A: notas 6, 7, 7, 8. Turma B: notas 2, 4, 9, 10. <b>A mesma média esconde realidades completamente diferentes.</b> Como medir essa diferença?",ex:"Turma A: todos perto da média. Turma B: metade muito abaixo, metade muito acima."},
   {tag:"Padrão — Medir o espalhamento",text:"A ideia é calcular o quanto cada valor se afasta da média. Esses afastamentos são os <b>desvios</b>. Como desvios negativos e positivos se cancelariam, elevamos ao quadrado antes de calcular a média. A raiz disso é o <b>desvio padrão</b>.",ex:"Turma A: desvios -1, 0, 0, +1. Quadrados: 1, 0, 0, 1. Media=0,5. DP aprox 0,7 (pequeno)."},
   {tag:"Formalizacao — Variancia e Desvio Padrao",text:"<b>Variância</b> = média dos quadrados dos desvios = soma[(xi - media)²] / n. <b>Desvio Padrao</b> = raiz da variância. DP pequeno: dados concentrados. DP grande: dados espalhados.",ex:"Dados 4, 6, 8, 10: media=7. Variância=(9+1+1+9)/4=5. DP=raiz(5) aprox 2,24."},
   {tag:"Aprofundamento — Graficos e leitura critica",text:"<b>Eixo truncado</b>: gráfico que não começa em zero distorce a percepção. Quando a distribuição tem outliers, a <b>mediana</b> representa melhor que a média. Histograma mostra a distribuição visualmente.",ex:"Salários: maioria ganha R$2000, dono ganha R$100.000. Média seria R$5000 — não representa ninguém."}],
 historia:{cenas:[{icon:"📊",label:"A PESQUISA ELEITORAL",texto:"A pesquisa dizia: candidato A com 52% e margem de 3%. O apresentador afirmou: 'ele vai ganhar!' O estatístico do grupo explicou: 'com margem de 3%, ele pode ter entre 49% e 55%. Ainda pode perder.' A margem de erro é o desvio padrão da amostra."},
       {icon:"🏭",label:"O CONTROLE DE QUALIDADE",texto:"Uma fábrica produz parafusos de 10mm. Variação de ±0,1mm é aceitável. O engenheiro calcula o DP da produção: 0,05mm. Como 0,05<0,1, está dentro do padrão. Se o DP subir para 0,15mm, muitos parafusos saem fora do limite — e a linha precisa ser recalibrada."}],pergunta:"Por que o desvio padrão é mais útil que simplesmente olhar o maior e o menor valor?",moral:"Estatística transforma dados em decisões. A média resume. O desvio padrão revela. Gráficos comunicam — ou manipulam. Saber ler estatística criticamente é uma habilidade para a vida."},

 simple:"Média, mediana, moda resumem dados. Variância e desvio padrão medem o espalhamento. Gráficos comunicam os dados.",
 explain:"A estatística serve para <b>entender conjuntos de dados</b> — não um único número, mas muitos ao mesmo tempo. Ela responde: qual é o comportamento geral? O que é típico? O quanto os valores variam?<br><br>Dois tipos de medidas:<br><br><b>Tendência central</b> — representam o 'centro':<br>• <b>Média</b>: soma tudo e divide pela quantidade. Sensível a valores extremos.<br>• <b>Mediana</b>: valor do meio quando os dados estão ordenados. Não é afetada por extremos.<br>• <b>Moda</b>: o valor que mais aparece.<br><br><b>Dispersão</b> — medem o espalhamento:<br>• <b>Variância</b>: média dos quadrados dos desvios em relação à média.<br>• <b>Desvio padrão</b>: raiz da variância — na mesma unidade dos dados.<br><br>Dois grupos podem ter a mesma média e comportamentos completíssimamente diferentes. O desvio padrão revela isso.",
 example:"Notas de uma turma: 5,6,7,7,7,8,9,10. Média=7,375. Mediana=7. Moda=7. Variância=2,23. DP=1,49 (notas variam, em média, 1,5 ponto da média).",

 story:{icon:"📊",title:"A turma e o ENEM",text:"Duas turmas do 3º ano tiveram a mesma média de 650 pontos no simulado do ENEM.\n\nTurma A: 640, 645, 650, 655, 660 → DP ≈ 7 pontos\nTurma B: 500, 580, 650, 720, 800 → DP ≈ 107 pontos\n\nA professora olhou para as médias e achou que eram iguais. Mas ao calcular o desvio padrão, percebeu:\n\n• A Turma A é homogênea — todos estão perto da média. Estratégia: revisar os mesmos tópicos juntos.\n• A Turma B é heterogênea — há alunos em situações muito diferentes. Estratégia: trabalho individualizado.\n\nMesma média, estratégias pedagógicas completamente diferentes.",connection:"Controle de qualidade industrial, pesquisas de opinião, análise de desempenho esportivo, diagnóstico educacional — desvio padrão é a ferramenta que vai além da média e revela o que ela esconde."},
 dict:[
   {term:"Média ponderada",def:"Média em que cada valor tem um peso diferente. Usada em médias escolares com provas de pesos distintos.",ex:"Notas 6 (peso 2) e 8 (peso 3): média=(6×2+8×3)/(2+3)=36/5=7,2."},
   {term:"Variância",def:"Média dos quadrados dos desvios em relação à média. Mede dispersão em unidade quadrada.",ex:"Dados 4,6,8: média=6. Desvios: −2,0,+2. Var=(4+0+4)/3≈2,67."},
   {term:"Desvio padrão (DP)",def:"Raiz da variância. Na mesma unidade dos dados. DP pequeno = dados concentrados.",ex:"Var=9 → DP=3. Os dados variam, em média, 3 unidades da média."},
   {term:"Histograma",def:"Gráfico de barras adjacentes que mostra a distribuição de frequências de dados agrupados em classes.",ex:"Distribuição de alturas da turma em classes: [1,60-1,65), [1,65-1,70), etc."},
   {term:"Frequência relativa",def:"A proporção de cada valor no total. Frequência absoluta dividida pelo total de dados.",ex:"5 alunos entre 30 têm nota 10: freq. relativa = 5/30 ≈ 16,7%."}
 ],
 steps:{
   intro:"Para calcular as medidas estatísticas, siga sempre a mesma sequência.",
   items:[
     {n:1,action:"Organize os dados",detail:"Ordene os dados em ordem crescente. Isso facilita encontrar mediana, moda e detectar outliers.",ex:"Dados: 7,3,9,3,8,5 → ordenados: 3,3,5,7,8,9"},
     {n:2,action:"Calcule a média",detail:"Soma todos os valores ÷ quantidade. Para média ponderada, multiplique cada valor pelo seu peso antes de somar.",ex:"Média=(3+3+5+7+8+9)/6=35/6≈5,83"},
     {n:3,action:"Encontre a mediana",detail:"Número ímpar de dados: valor central. Número par: média dos dois centrais.",ex:"6 dados (par): centrais são o 3º(5) e 4º(7) → mediana=(5+7)/2=6"},
     {n:4,action:"Calcule o desvio padrão",detail:"1) Calcule a média. 2) Subtraia cada dado da média e eleve ao quadrado. 3) Calcule a média desses quadrados (variância). 4) Tire a raiz quadrada.",ex:"Desvios²: (3−5,83)²+(3−5,83)²+...→ some→divida por 6→raiz quadrada=DP"},
     {n:5,action:"Interprete",detail:"DP pequeno → dados concentrados. DP grande → dados espalhados. Compare DPs de turmas diferentes para ver qual é mais homogênea.",tip:"⚠️ Não confunda variância (unidade²) com desvio padrão (mesma unidade dos dados)."}
   ]
 },
 prereq:{
   items:[
     {badge:"7º ANO",color:"#FF9F43",title:"Média, mediana e moda",desc:"As três medidas de tendência central são o ponto de partida. O EM aprofunda com variância e DP.",check:"✓ Pronto se: calcula média, mediana e moda de {3,5,7,7,8} corretamente."},
     {badge:"8º ANO",color:"#54A0FF",title:"Raiz quadrada",desc:"O desvio padrão é a raiz da variância. Calcular raízes com precisão é necessário.",check:"✓ Pronto se: calcula √36=6 e estima √20≈4,5 sem calculadora."},
     {badge:"7º ANO",color:"#FF9F43",title:"Frações e porcentagem",desc:"Frequências relativas e construção de gráficos usam proporções e porcentagens.",check:"✓ Pronto se: converte frequência absoluta 8/40 para 20% sem dificuldade."}
   ],
   vestibular:"Estatística e dispersão são cobradas no ENEM principalmente com leitura e interpretação de gráficos, comparação de grupos com desvios padrão diferentes, e análise crítica de pesquisas. FUVEST e UNICAMP pedem cálculos completos de variância e DP."
 },

{year:"2",tri:"T3",theme:"Álgebra",pu:false,emoji:"⬜",term:"Matrizes",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Uma escola tem 3 turmas com notas em 4 matérias. Para organizar esses dados, fazemos uma tabela: linhas=turmas, colunas=matérias. Cada célula é uma nota. <b>Isso é uma matriz: uma tabela organizada de números.</b>",ex:"Turma A: 7 8 6 9. Turma B: 5 7 8 6. Turma C: 9 9 7 8. Matriz 3x4."},
   {tag:"Padrão — Operar com tabelas",text:"Podemos somar matrizes elemento a elemento (mesma dimensão). A multiplicação funciona de forma especial: a linha de A com a coluna de B — <b>uma soma de produtos</b>. O tamanho importa: A(m x n) x B(n x p) = C(m x p).",ex:"[1,2] x [3;4] = 1x3 + 2x4 = 11. Linha x coluna."},
   {tag:"Formalizacao — Tipos e regras",text:"Cij = soma(Aik x Bkj). Matriz identidade I: 1s na diagonal, 0s nos outros — A x I = A. Transposta At: troca linhas por colunas. Inversa A^(-1): A x A^(-1) = I. <b>Atencao</b>: A x B diferente de B x A em geral!",ex:"[1,2;3,4] x [5;6]: linha 1=(1x5+2x6)=17, linha 2=(3x5+4x6)=39. Resultado: [17;39]."},
   {tag:"Aprofundamento — Matrizes no mundo real",text:"Matrizes são a linguagem da inteligência artificial, gráficos 3D, criptografia e redes sociais. Cada foto que você vê no celular é uma matriz de pixels. Cada rotação 3D em videogame é uma multiplicação de matriz.",ex:"Uma imagem 1920x1080 é uma matriz com mais de 2 milhões de células — cada uma com um valor de cor."}],
 historia:{cenas:[{icon:"🎮",label:"O DESIGNER DE GAMES",texto:"Quando o personagem se move no videogame, o computador recalcula a posição de milhares de pontos em milissegundos. Cada movimento é uma matriz de rotação multiplicada pelos pontos do modelo 3D. Sem matrizes, um jogo 3D seria impossível de renderizar em tempo real."},
       {icon:"📱",label:"A FOTO NO CELULAR",texto:"A câmera salva cada foto como uma matriz: cada pixel tem 3 valores (vermelho, verde, azul). Aplicar um filtro, aumentar o brilho, ou detectar rostos — tudo são operações matriciais. Quando o algoritmo reconhece seu rosto, está calculando multiplicações de matrizes."}],pergunta:"Por que matrizes são tão importantes em tecnologia mesmo sendo um conceito matemático antigo?",moral:"Matrizes são tabelas de números com operações próprias. Soma: elemento a elemento. Multiplicação: linha x coluna. A x B diferente de B x A. São a linguagem da computação, dos gráficos e da IA."},

 simple:"Tabela retangular de números. Soma, subtração e multiplicação seguem regras específicas. Base dos sistemas lineares.",
 explain:"Uma matriz é simplesmente uma <b>tabela organizada de números</b>. Parece simples — e é. O que torna as matrizes poderosas é que você pode operá-las: somar, subtrair, multiplicar — e essas operações têm regras específicas que permitem resolver problemas complexos de forma organizada.<br><br>Uma matriz m×n tem m linhas e n colunas. Cada número ocupa uma posição (i, j) — linha i, coluna j.<br><br>Operações:<br>• <b>Soma</b>: só é possível com matrizes de mesma dimensão. Some elemento a elemento.<br>• <b>Multiplicação</b>: a coluna da primeira deve ter o mesmo tamanho que a linha da segunda. O elemento (i,j) do resultado é o produto interno da linha i pela coluna j.<br><br>Atenção: A × B geralmente é diferente de B × A — matrizes não comutam na multiplicação.",
 example:"A=[1,2;3,4] e B=[5;6]. A×B: linha 1 × coluna 1 = 1×5+2×6=17. Linha 2 × col 1 = 3×5+4×6=39. Resultado: [17;39].",

 story:{icon:"🎮",title:"O jogo de RPG",text:"Um jogo de RPG tem 3 personagens (Guerreiro, Mago, Arqueiro) com 4 atributos cada (Força, Magia, Velocidade, Defesa). O desenvolvedor organiza isso numa matriz 3×4:\n\n         For  Mag  Vel  Def\nGuerreiro [ 9    2    5    8 ]\nMago      [ 3    9    4    3 ]\nArqueiro  [ 5    4    9    4 ]\n\nQuando o jogo calcula o dano de um ataque, ele multiplica matrizes de atributos e fraquezas dos inimigos. Em millisegundos, centenas de multiplicações de matrizes acontecem — e você só vê 'Dano: 247'.",connection:"Computação gráfica (cada pixel é transformado por matrizes), inteligência artificial (redes neurais são operações matriciais), economia (sistemas de equações), física quântica — matrizes são a linguagem da computação moderna."},
 dict:[
   {term:"Matriz quadrada",def:"Matriz com o mesmo número de linhas e colunas (n×n). Só essas podem ter determinante e inversa.",ex:"Matriz 2×2: [1,2;3,4]. Matriz 3×3 tem 9 elementos."},
   {term:"Matriz identidade (I)",def:"Matriz quadrada com 1s na diagonal principal e 0s em todo o resto. É o 'neutro' da multiplicação.",ex:"I₂=[1,0;0,1]. A×I=I×A=A para qualquer A compatível."},
   {term:"Transposta",def:"Matriz obtida trocando linhas por colunas. Se A é m×n, sua transposta Aᵀ é n×m.",ex:"A=[1,2,3;4,5,6] → Aᵀ=[1,4;2,5;3,6]."},
   {term:"Matriz inversa",def:"A⁻¹ tal que A×A⁻¹=I. Existe apenas para matrizes quadradas com determinante≠0.",ex:"Se A=[2,1;1,1], então A⁻¹=[1,−1;−1,2]. Verificar: A×A⁻¹=I."},
   {term:"Multiplicação de matrizes",def:"Cᵢⱼ = soma dos produtos dos elementos da linha i de A pela coluna j de B. Atenção: A×B ≠ B×A.",ex:"[1,2]×[3;4] = 1×3+2×4 = 11."}
 ],
 steps:{
   intro:"Operações com matrizes seguem regras fixas — principalmente a multiplicação, que exige atenção à ordem.",
   items:[
     {n:1,action:"Verifique as dimensões",detail:"Para somar/subtrair: matrizes devem ter a MESMA dimensão. Para multiplicar A×B: colunas de A = linhas de B.",ex:"A(2×3) × B(3×2) → possível, resultado C(2×2). A(2×3)+B(3×2) → impossível"},
     {n:2,action:"Soma/subtração: elemento a elemento",detail:"Cᵢⱼ = Aᵢⱼ ± Bᵢⱼ. Opere cada posição individualmente.",ex:"[1,2;3,4]+[5,6;7,8]=[1+5,2+6;3+7,4+8]=[6,8;10,12]"},
     {n:3,action:"Multiplicação: linha × coluna",detail:"Cᵢⱼ = soma dos produtos da linha i de A pela coluna j de B. Faça um produto por vez.",ex:"C₁₁=1×5+2×7=5+14=19. C₁₂=1×6+2×8=6+16=22"},
     {n:4,action:"Verifique as dimensões do resultado",detail:"A(m×n)×B(n×p)=C(m×p). O resultado tem as linhas de A e as colunas de B.",ex:"A(2×3)×B(3×4)=C(2×4)",tip:"⚠️ A×B ≠ B×A em geral! Matrizes não comutam na multiplicação."}
   ]
 },
 prereq:{
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Operações fundamentais",desc:"Soma, subtração e multiplicação de números (inclusive negativos) são as operações das matrizes.",check:"✓ Pronto se: calcula 3×(−2)+(−5)×4=−26 sem errar sinal."},
     {badge:"7º ANO",color:"#FF9F43",title:"Sistemas de equações",desc:"O objetivo final das matrizes é resolver sistemas lineares — a conexão é direta.",check:"✓ Pronto se: resolve o sistema 2x+y=5 e x−y=1 por substituição."},
     {badge:"8º ANO",color:"#54A0FF",title:"Expressões algébricas",desc:"Multiplicação de matrizes envolve produtos e somas de expressões com várias variáveis.",check:"✓ Pronto se: calcula o valor numérico de 2a+3b para a=4, b=−1."}
   ],
   vestibular:"Matrizes e determinantes são extensamente cobrados em FUVEST e UNICAMP — incluindo inversão de matrizes, propriedades de determinantes e solução de sistemas por Cramer. No ENEM, aparecem em questões de transformações e representações matriciais."
 },

{year:"2",tri:"T3",theme:"Álgebra",pu:false,emoji:"🔢",term:"Determinantes e Sistemas Lineares",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Você vai à lanchonete. 2 hambúrgueres e 1 suco custam R$25. 1 hambúrguer e 2 sucos custam R$20. Quanto custa cada um? Isso é um sistema — duas condições que precisam ser verdadeiras ao mesmo tempo.",ex:"2h + s = 25 e h + 2s = 20. Duas equações, duas incógnitas."},
   {tag:"Padrão — O determinante como sinal",text:"Cada sistema tem uma 'impressão digital' — o <b>determinante</b> da matriz dos coeficientes. <b>det diferente de 0</b>: existe solução única. <b>det = 0</b>: sem solução ou infinitas soluções.",ex:"Matriz [2,1;1,2]: det = 2x2 - 1x1 = 3. Det diferente de 0: existe solução única."},
   {tag:"Formalizacao — Cramer e Sarrus",text:"Para 2x2: det[a,b;c,d] = ad - bc. Para 3x3: Regra de Sarrus. <b>Regra de Cramer</b>: x = Dx/D, y = Dy/D, onde D=det original e Dx, Dy=det com a coluna substituída pelos termos independentes.",ex:"Lanchonete: D=3, Dh=50-20=30, Ds=40-25=15. h=30/3=10, s=15/3=5."},
   {tag:"Aprofundamento — Sistemas com parametro",text:"Det=0 pode significar retas paralelas (sem solução — impossível) ou coincidentes (infinitas soluções — indeterminado). Para distinguir, analisa-se o determinante das matrizes aumentadas.",ex:"x+y=3 e x+y=5: paralelas — impossível. x+y=3 e 2x+2y=6: coincidentes — infinitas soluções."}],
 historia:{cenas:[{icon:"🍔",label:"OS PRECOS DA LANCHONETE",texto:"A cozinheira Maria precisava saber o custo de cada ingrediente. Sabia: 3kg de carne e 2kg de batata custam R$85. 1kg de carne e 4kg de batata custam R$55. Ela montou o sistema, calculou o determinante (3x4-2x1=10), e descobriu: carne R$18/kg e batata R$5,50/kg."},
       {icon:"⚖️",label:"QUANDO NAO TEM SOLUCAO",texto:"Um estudante montou o sistema: x+y=5 e 2x+2y=8. O determinante é 1x2-1x2=0. Ele olhou as equações: se x+y=5, então 2x+2y seria 10 — mas a segunda diz 8. Contradição. Sistema impossível. O determinante zero salvou de procurar uma solução que não existe."}],pergunta:"O que o determinante zero revela sobre as retas representadas pelo sistema?",moral:"Sistemas lineares modelam múltiplas condições simultâneas. O determinante é o número-chave: diferente de 0 garante solução única. Igual a 0 indica problema. A Regra de Cramer resolve com determinantes."},

 simple:"Determinante é um número associado a uma matriz quadrada. Indica se o sistema tem solução única. Sistemas lineares resolvidos por substituição, adição ou Cramer.",
 explain:"Um sistema linear é um conjunto de equações com as mesmas incógnitas que você quer resolver todas ao mesmo tempo. Por exemplo: você sabe que dois produtos juntos custam R$50, e que o primeiro custa R$10 a mais que o segundo. Duas informações, duas incógnitas — isso é um sistema.<br><br>O <b>determinante</b> é um número que você calcula a partir de uma matriz e que revela imediatamente se o sistema tem solução. Para uma matriz 2×2 [a,b;c,d], o determinante é simplesmente <b>ad − bc</b>.<br><br>Interpretação:<br>• det ≠ 0 → sistema determinado (solução única)<br>• det = 0 → sistema impossível ou indeterminado (sem solução ou infinitas soluções)<br><br>A <b>Regra de Cramer</b> usa determinantes para calcular cada incógnita individualmente — muito útil quando se quer encontrar uma variável específica sem resolver o sistema inteiro.",
 example:"Sistema: 2x+y=5 e x−y=1. Matriz: [2,1;1,−1]. Det=2×(−1)−1×1=−3. Dx=[5,1;1,−1]=−6. x=Dx/D=−6/(−3)=2. y=5−2×2=1.",

 story:{icon:"🏪",title:"O vendedor ambulante",text:"Carlos vende coxinhas e empadas. Numa terça-feira vendeu 30 salgados e faturou R$72. Coxinhas custam R$2 e empadas R$3.\n\nEle montou o sistema:\n• x + y = 30 (quantidade total)\n• 2x + 3y = 72 (valor total)\n\nMatriz: [1,1;2,3]. Determinante = 1×3 − 1×2 = 1 ≠ 0 → solução única!\n\nUsando Cramer:\nx = det[30,1;72,3]/det = (90−72)/1 = 18 coxinhas\ny = det[1,30;2,72]/det = (72−60)/1 = 12 empadas\n\nVerificação: 18+12=30 ✓ e 36+36=72 ✓",connection:"Sistemas lineares aparecem em engenharia elétrica (circuitos), economia (equilíbrio de mercado), nutrição (balancear dietas), logística (otimização de rotas) — sempre que múltiplas condições precisam ser satisfeitas ao mesmo tempo."},
 dict:[
   {term:"Determinante",def:"Número associado a uma matriz quadrada. det[a,b;c,d]=ad−bc. Indica propriedades do sistema.",ex:"det[3,1;2,4]=3×4−1×2=12−2=10."},
   {term:"Regra de Sarrus",def:"Método para calcular determinante de matrizes 3×3: repete as 2 primeiras colunas e soma/subtrai diagonais.",ex:"Para matriz 3×3, somam-se as 3 diagonais principais e subtraem-se as 3 secundárias."},
   {term:"Sistema determinado",def:"Sistema com solução única. Ocorre quando det da matriz dos coeficientes ≠ 0.",ex:"2 equações, 2 incógnitas, det≠0 → 1 ponto de interseção → solução única."},
   {term:"Sistema impossível",def:"Sistema sem nenhuma solução. Equações representam retas paralelas (no plano).",ex:"x+y=3 e x+y=5: det=0, mas os termos independentes são diferentes → impossível."},
   {term:"Regra de Cramer",def:"Método de resolução usando determinantes: cada incógnita = Det(matriz com coluna substituída) / Det(original).",ex:"x=Dx/D, y=Dy/D. Funciona quando D≠0."}
 ],
 steps:{
   intro:"Para resolver um sistema linear com determinantes (Regra de Cramer), siga este protocolo.",
   items:[
     {n:1,action:"Monte a matriz dos coeficientes",detail:"Organize os coeficientes das incógnitas numa matriz A. Os termos independentes formam a matriz coluna B.",ex:"2x+y=5 e x−y=1 → A=[2,1;1,−1] e B=[5;1]"},
     {n:2,action:"Calcule det(A)",detail:"det[a,b;c,d]=ad−bc. Para 3×3, use Regra de Sarrus.",ex:"det(A)=2×(−1)−1×1=−2−1=−3"},
     {n:3,action:"Analise o determinante",detail:"det≠0: sistema determinado (solução única). det=0: impossível ou indeterminado → analise os casos.",ex:"det(A)=−3≠0 → tem solução única → continue"},
     {n:4,action:"Calcule Dₓ e Dᵧ (Cramer)",detail:"Substitua a coluna da incógnita pelos termos independentes. Calcule o determinante da nova matriz.",ex:"Dₓ=[5,1;1,−1]→det=−5−1=−6. Dᵧ=[2,5;1,1]→det=2−5=−3"},
     {n:5,action:"Encontre as incógnitas",detail:"x=Dₓ/D e y=Dᵧ/D. Substitua e verifique nas equações originais.",ex:"x=−6/−3=2. y=−3/−3=1. Verificação: 2(2)+1=5✓ e 2−1=1✓",tip:"⚠️ Se det=0 mas as equações têm solução, são equivalentes (indeterminado). Se contradizem, impossível."}
   ]
 },
 prereq:{
   items:[
     {badge:"2ª SÉRIE",color:"#FF6B9D",title:"Matrizes",desc:"O determinante é calculado a partir de uma matriz quadrada. Precisa saber o que é e como operar.",check:"✓ Pronto se: identifica os elementos a₁₁, a₁₂, a₂₁, a₂₂ de uma matriz 2×2."},
     {badge:"7º ANO",color:"#FF9F43",title:"Sistemas de equações",desc:"O objetivo dos determinantes é resolver sistemas. Saber montar o sistema é o passo anterior.",check:"✓ Pronto se: transforma '3 maçãs e 2 laranjas custam R$11' em equação."},
     {badge:"8º ANO",color:"#54A0FF",title:"Expressões algébricas",desc:"A regra de Sarrus envolve somas e subtrações de produtos de variáveis.",check:"✓ Pronto se: calcula ad−bc para a=3, b=1, c=2, d=4 rapidamente."}
   ],
   vestibular:"Sistemas lineares e determinantes são pilares do vestibular científico. FUVEST e UNICAMP cobram Regra de Cramer, sistemas com parâmetro, sistemas impossíveis e indeterminados. Álgebra Linear é base para Engenharia, Física e Ciência da Computação."
 },

{year:"2",tri:"T3",theme:"Geometria",pu:false,emoji:"📍",term:"Geometria Analítica",
 layers:[{tag:"Ponto de Partida — Observacao",text:"Um mapa usa latitude e longitude. Um smartphone usa coordenadas para localizar você. Um arquiteto usa coordenadas para desenhar uma planta. <b>O plano cartesiano é a linguagem que une números e espaço.</b>",ex:"Ponto (3, -2): 3 unidades à direita e 2 abaixo. Exatamente como latitude e longitude."},
   {tag:"Padrão — A equacao de uma reta",text:"Toda reta no plano cartesiano pode ser descrita por uma equação. A <b>inclinação</b> (coeficiente angular) diz o quanto y muda para cada unidade de x. O ponto onde corta o eixo y é o <b>coeficiente linear</b>.",ex:"Reta com inclinação 2 passando por (0,3): y=2x+3. Para cada 1 unidade à direita, sobe 2."},
   {tag:"Formalizacao — Distancias e posicoes",text:"Distância entre A(x1,y1) e B(x2,y2): <b>d = raiz[(x2-x1)² + (y2-y1)²]</b> (Pitágoras com coordenadas). Ponto médio: M=((x1+x2)/2, (y1+y2)/2). Paralelas: a1=a2. Perpendiculares: a1 x a2 = -1. Circunferência: (x-a)² + (y-b)² = r².",ex:"A(1,2) e B(5,5): d=raiz(16+9)=raiz(25)=5."},
   {tag:"Aprofundamento — Conicas e intersecoes",text:"Além de retas e circunferências, temos <b>elipse, hipérbole e parábola</b> — descritas por equações. A interseção de duas retas é a solução do sistema formado por suas equações. A órbita dos planetas é uma elipse.",ex:"A parábola de uma antena satelital é usada para focar sinais num único ponto — o receptor."}],
 historia:{cenas:[{icon:"🗺️",label:"DESCARTES E A MOSCA",texto:"Conta a lenda que Descartes, deitado doente, observava uma mosca no teto e pensou: 'como descrever a posição exata da mosca?' Bastavam dois números — a distância de cada parede. Nasceu o plano cartesiano. Com ele, toda figura geométrica ganhou uma equação."},
       {icon:"📡",label:"O GPS E AS COORDENADAS",texto:"Quando você abre o GPS, o aplicativo usa coordenadas (latitude, longitude) — exatamente como pares (x,y). Calcular a rota mais curta é encontrar a menor distância: d=raiz[(x2-x1)²+(y2-y1)²]. A mesma fórmula do EM está rodando no servidor do Google Maps agora."}],pergunta:"Como a fórmula da distância entre dois pontos se relaciona com o Teorema de Pitágoras?",moral:"Geometria Analítica é a ponte entre álgebra e geometria. Com coordenadas, toda forma vira equação — e toda equação pode ser visualizada. É a linguagem do GPS, da robótica, da arquitetura e dos gráficos computacionais."},

 simple:"Une álgebra e geometria: pontos são coordenadas, retas são equações. Distâncias e posições calculadas algebricamente.",
 explain:"René Descartes estava deitado na cama olhando uma mosca no teto e pensando: 'Como eu descreveria a posição exata dessa mosca usando apenas números?' A resposta que ele encontrou criou uma das ideias mais poderosas da matemática: o <b>plano cartesiano</b>.<br><br>A geometria analítica une dois mundos que pareciam separados: a geometria (figuras, formas) e a álgebra (equações, cálculos). Cada ponto vira um par de coordenadas (x, y). Cada figura geométrica vira uma equação.<br><br>Ferramentas essenciais:<br>• <b>Distância entre pontos</b>: é Pitágoras com coordenadas — d = √[(x₂−x₁)² + (y₂−y₁)²]<br>• <b>Equação da reta</b>: y = ax + b (sim — é a função afim!)<br>• <b>Equação da circunferência</b>: (x−a)² + (y−b)² = r²<br><br>Retas paralelas têm o mesmo coeficiente angular. Retas perpendiculares têm coeficientes cujo produto é −1.",
 example:"Pontos A(1,2) e B(5,5). Distância: d=√[16+9]=√25=5. Ponto médio: M=(3, 3,5). Reta AB: inclinação=(5−2)/(5−1)=3/4.",

 story:{icon:"🗺️",title:"O GPS e a triangulação",text:"Quando seu GPS diz 'você está aqui', como ele sabe?\n\nTrês satélites enviam sinais. Cada um sabe a distância até você (vamos chamar de r₁, r₂, r₃) e sua posição (como se fossem centros de círculos).\n\nNo plano, cada satélite define um círculo: (x−a₁)²+(y−b₁)²=r₁²\n\nA interseção dos três círculos tem exatamente um ponto — a sua posição.\n\nIsso é geometria analítica: encontrar o ponto que satisfaz três equações de circunferência simultaneamente. Em 3D (espaço real), são esferas em vez de círculos.",connection:"GPS, computação gráfica, robótica, reconhecimento facial, física (trajetórias), arquitetura (plantas baixas) — geometria analítica é o idioma que conecta o mundo físico com o digital."},
 dict:[
   {term:"Plano cartesiano",def:"Sistema de coordenadas com dois eixos perpendiculares (x e y). Cada ponto é um par (x,y).",ex:"O ponto (3,−2) está 3 unidades à direita do eixo y e 2 abaixo do eixo x."},
   {term:"Coeficiente angular",def:"A inclinação da reta — o tan do ângulo que faz com o eixo x. Igual a (y₂−y₁)/(x₂−x₁).",ex:"Reta passando por (0,0) e (3,6): a=(6−0)/(3−0)=2."},
   {term:"Retas paralelas",def:"Têm o mesmo coeficiente angular e nunca se intersectam.",ex:"y=3x+1 e y=3x−5 são paralelas (a=3 nas duas)."},
   {term:"Retas perpendiculares",def:"O produto dos coeficientes angulares é −1: a₁×a₂=−1.",ex:"y=2x+1 (a=2) ⊥ y=−x/2+3 (a=−1/2). 2×(−1/2)=−1 ✓."},
   {term:"Equação da circunferência",def:"(x−a)²+(y−b)²=r², onde (a,b) é o centro e r o raio.",ex:"Centro (2,−3), raio 5: (x−2)²+(y+3)²=25."}
 ],

   intro:"Geometria Analítica une álgebra e geometria. Para dominá-la, é preciso ter base sólida nos dois campos.",

     {badge:"1ª SÉRIE",color:"#00D2FF",title:"Função Afim",desc:"A equação da reta y=ax+b é a função afim. São a mesma coisa vista por ângulos diferentes.",check:"✓ Pronto se: encontra a equação da reta que passa por (0,3) com inclinação 2."},
     {badge:"9º ANO",color:"#5F27CD",title:"Teorema de Pitágoras",desc:"A fórmula da distância entre dois pontos é Pitágoras com coordenadas.",check:"✓ Pronto se: calcula d=√[(5−1)²+(5−2)²]=5 sem dificuldade."}
   ],
   vestibular:"GA é base para Cálculo, Física e Engenharia. FUVEST e UNICAMP cobram equação de retas, circunferências, posições relativas, distância de ponto a reta e cônicas (elipse, hipérbole, parábola). No ENEM, foco em interpretação geométrica de sistemas."
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📊",term:"Regra de Três e Proporcionalidade",
 layers:[{tag:"Ponto de Partida",text:"Se 1 barra de chocolate custa R$3, quanto custam 5 barras? Você percebe intuitivamente: 5x mais barras, 5x mais caro. <b>Quando uma grandeza aumenta e a outra aumenta na mesma proporção, são diretamente proporcionais.</b>",ex:"1 barra → R$3. 5 barras → R$15. A razão custo/quantidade é sempre R$3 (constante)."},
   {tag:"Mas nem sempre é assim...",text:"3 operários constroem um muro em 8 dias. Se colocar mais operários, o muro fica pronto em <b>menos</b> tempo — uma grandeza sobe e a outra cai. Isso é proporcionalidade <b>inversa</b>. Antes de montar qualquer conta, classifique!",ex:"Mais operários = menos dias. 6 operários: 3x8=6xX → X=4 dias."},
   {tag:"Formalizacao — As duas regras",text:"<b>Direta</b>: a1/b1 = a2/b2 (produto cruzado). <b>Inversa</b>: a1 x b1 = a2 x b2 (produto constante). A escala é uma aplicação direta: 1:50.000 significa 1cm no mapa = 50.000cm = 500m na realidade.",ex:"Escala 1:50.000. Um trecho de 4cm no mapa = 4 x 500 = 2.000m = 2km na realidade."},
   {tag:"Aprofundamento — ENEM (14,8%)",text:"O ENEM adora armadilhas de classificação: problema parece direto mas é inverso. Estratégia: pergunte mentalmente 'se a grandeza A dobra, B dobra (direta) ou cai pela metade (inversa)?'. Classifique SEMPRE antes de calcular.",ex:"Velocidade e tempo de percurso: velocidade dobra → tempo cai pela metade → INVERSA."}],
 historia:{cenas:[{icon:"🍫",label:"A FEIRA DE ALIMENTACAO",texto:"A turma do 3° ano organizou uma feira. Carla comprou 3kg de chocolate por R$45. No dia seguinte, precisava de 8kg. Quanto pagaria? 'Se 3kg custam R$45, então 1kg custa R$15. Logo 8kg custam R$120.' Sem saber, Carla usou proporcionalidade direta — a razão R$/kg era constante (R$15/kg)."},{icon:"🚧",label:"A OBRA DA ESCOLA",texto:"A diretora contratou 4 pedreiros para reformar a escola em 15 dias. Na semana seguinte, precisava terminar em 10 dias. Quantos pedreiros precisaria? Se o prazo cai, precisa de mais trabalhadores — é inversa. 4x15=X x10 → X=6 pedreiros."}],pergunta:"Como saber, só lendo o enunciado, se a regra de três é direta ou inversa?",moral:"Proporcionalidade está em todo lugar: receitas, escalas, velocidades, preços. A chave é sempre classificar ANTES de calcular: se uma sobe e a outra sobe — direta. Se uma sobe e a outra cai — inversa."},

 simple:"Grandezas diretamente proporcionais: A↑→B↑. Inversamente: A↑→B↓. Base de 14,8% das questões ENEM (maior tema).",
 explain:"Proporcionalidade é uma das ideias mais antigas e mais usadas da matemática. Quando duas grandezas variam juntas de forma previsível — uma cresce e a outra cresce junto, ou uma cresce e a outra diminui — dizemos que são proporcionais.<br><br><b>Proporção direta</b>: A↑ e B↑ na mesma razão. Se você dobra A, dobra B.<br>Exemplos: quantidade de produtos × preço total; velocidade constante × distância percorrida.<br><br><b>Proporção inversa</b>: A↑ e B↓ na mesma proporção. Se você dobra A, B cai pela metade.<br>Exemplos: velocidade × tempo para percorrer mesma distância; número de operários × dias para terminar mesma obra.<br><br>A regra de três é o método prático para resolver: monte uma tabela com o que você sabe e o que quer descobrir, identifique o tipo de proporção, e resolva.",
 example:"ENEM 2023: se 3 operários fazem um muro em 8 dias, quantos dias 6 operários levam? Inversamente proporcional: 3×8=6×x → x=4 dias.",

 story:{icon:"🍕",title:"A pizzaria do bairro",text:"A pizzaria Bella Napoli usa 300g de farinha para fazer 4 pizzas. O dono recebeu um pedido enorme para uma festa — 30 pizzas. Quanto de farinha precisa?\n\nMais pizzas → mais farinha → proporção DIRETA.\n\n4 pizzas → 300g\n30 pizzas → x g\n\n4/300 = 30/x → 4x = 9.000 → x = 2.250g\n\nMas um funcionário percebeu que a receita pedia 300g por PIZZA, não por 4 pizzas. Releu o enunciado. Na dúvida, sempre identifique as grandezas antes de montar a proporção.",connection:"Culinária, mapas (escala), farmácia (dosagem de medicamentos), combustível para viagens, diluição de produtos de limpeza — proporcionalidade é a matemática que conecta quantidades do mundo real."},
 dict:[
   {term:"Grandezas proporcionais",def:"Duas grandezas cujos valores variam de forma relacionada (sempre juntas ou sempre opostas).",ex:"Velocidade e tempo (inversa): carro mais rápido → menos tempo. Preço e quantidade (direta): mais itens → mais custo."},
   {term:"Constante de proporcionalidade",def:"O valor fixo da razão (direta) ou do produto (inversa) entre as grandezas.",ex:"Direta: y/x=k (sempre). Inversa: x×y=k (sempre)."},
   {term:"Escala",def:"Razão entre medida no mapa e medida real. 1:n significa 1 unidade no mapa = n unidades na realidade.",ex:"Escala 1:50.000: 2cm no mapa = 1km na realidade."},
   {term:"Regra de três composta",def:"Quando mais de duas grandezas estão envolvidas no problema.",ex:"Se 4 máquinas produzem 200 peças em 5 horas, quantas peças 6 máquinas produzem em 8 horas?"}
 ],
 steps:{
   intro:"Estratégia de resolução para questões de regra de três no ENEM.",
   items:[
     {n:1,action:"Identifique as grandezas",detail:"Quais são as duas grandezas que variam? Nomeie-as claramente antes de montar a tabela.",ex:"Trabalhadores e dias. Velocidade e tempo. Preço e quantidade."},
     {n:2,action:"Classifique: direta ou inversa",detail:"Pergunta-chave: se uma grandeza aumenta, a outra aumenta (direta) ou diminui (inversa)?",ex:"Mais trabalhadores → menos dias → INVERSA. Mais km → mais combustível → DIRETA"},
     {n:3,action:"Monte a tabela",detail:"Coluna 1: valores da grandeza A. Coluna 2: valores da grandeza B (um deles é x).",ex:"[3 trabalhadores / 8 dias] e [6 trabalhadores / x dias]"},
     {n:4,action:"Resolva",detail:"Direta: 3/6=x/8 → x=4. Inversa: inverta uma coluna antes de resolver. 3/x=6/8 → x=4.",ex:"Inversa: 3×8=6×x → x=4 dias",tip:"⚠️ Armadilha clássica: montar como direta quando é inversa. Sempre classifique antes!"}
   ]
 },
 prereq:{
   items:[
     {badge:"7º ANO",color:"#FF9F43",title:"Razão e Proporção",desc:"A regra de três é uma aplicação direta de proporção. Precisa entender a/b=c/d.",check:"✓ Pronto se: monta uma proporção e usa produto cruzado para encontrar x."},
     {badge:"7º ANO",color:"#FF9F43",title:"Frações e operações",desc:"As proporções envolvem divisão e multiplicação de frações.",check:"✓ Pronto se: resolve 3/x=4/12 rapidamente."},
     {badge:"8º ANO",color:"#54A0FF",title:"Grandezas proporcionais",desc:"Identificar se as grandezas são direta ou inversamente proporcionais é a chave.",check:"✓ Pronto se: identifica que velocidade e tempo são inversamente proporcionais."}
   ],
   vestibular:"ENEM: 14,8% das questões. Aparece em escalas cartográficas, receitas, velocidade média, densidade demográfica e conversão de unidades. A armadilha clássica é montar inversa como direta. Sempre pergunte: se uma cresce, a outra cresce ou diminui?"
 },

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"💯",term:"Porcentagem Aplicada",
 layers:[{tag:"Ponto de Partida",text:"Uma loja dá 20% de desconto. Você pode calcular: 20% de R$150 = R$30, então paga R$120. Mas há um jeito muito mais rápido: multiplique por 0,80. Um passo, mesmo resultado. <b>O fator de multiplicação é a forma profissional de calcular porcentagem.</b>",ex:"Desconto 20% → fator 0,80. R$150 x 0,80 = R$120. Uma multiplicação resolve tudo."},
   {tag:"A armadilha classica",text:"Uma loja dá +20% de desconto e depois mais -20%. Muita gente pensa: 20%+20%=40% de desconto total. <b>ERRADO.</b> Os fatores se multiplicam: 1,20 x 0,80 = 0,96. O desconto total é apenas 4%!",ex:"R$100 → +20% → R$120 → -20% de R$120 → R$96. Não R$100! O resultado é -4%."},
   {tag:"Formalizacao — Fatores e variacao",text:"Aumento de p%: fator = 1 + p/100. Desconto de p%: fator = 1 - p/100. Variação percentual: (final - inicial) / inicial x 100%. Para variações sucessivas: <b>multiplique os fatores</b>, nunca some as porcentagens.",ex:"+30% e depois -15%: 1,30 x 0,85 = 1,105. Resultado: aumento de 10,5% (não 15%)."},
   {tag:"ENEM (14,8%) — O que mais cai",text:"Variações sucessivas, preço à vista vs. parcelado, inflação composta, câmbio. A questão favorita do ENEM: dois descontos aplicados em sequência — pedir o desconto total real. Resposta: multiplicar os fatores.",ex:"Desconto de 10% e depois mais 10%: 0,90 x 0,90 = 0,81 = desconto total de 19% (não 20%)."}],
 historia:{cenas:[{icon:"🛍️",label:"A BLACK FRIDAY DE MARCOS",texto:"Marcos viu um tênis de R$400 com '30% de desconto + 10% extra no app'. Calculou mentalmente: 30+10=40% de desconto = R$160 de desconto, pagaria R$240. No checkout: R$252. O desconto real foi de 37%, não 40%. Marcos errou por somar porcentagens em vez de multiplicar os fatores: 0,70 x 0,90 = 0,63 → desconto de 37%."},{icon:"💹",label:"A INFLACAO COMPOSTA",texto:"O salário de Ana teve aumento de 5% em janeiro e redução de 5% em julho. O RH disse: 'ficou igual, foi 0% líquido'. Mas Ana calculou: 1,05 x 0,95 = 0,9975. Ela ganhou menos 0,25% do que antes. Pequeno, mas não zero — e com valores maiores, a diferença é significativa."}],pergunta:"Por que 'aumento de 10% e depois desconto de 10%' não volta ao valor original?",moral:"Porcentagem com fator de multiplicação é mais rápida e mais correta. Variações sucessivas: sempre multiplique os fatores, nunca some os percentuais. Essa distinção vale dinheiro real."},

 simple:"Variações percentuais, descontos, juros — sempre com fator de multiplicação. 14,8% do ENEM. A armadilha: +20% depois −20% ≠ zero.",
 explain:"Porcentagem está em todo lugar: desconto na loja, juros do banco, inflação, resultados eleitorais, taxa de aprovação escolar. Entender porcentagem de verdade é entender como os números influenciam decisões.<br><br>A ferramenta mais eficiente é o <b>fator de multiplicação</b>:<br>• Aumento de 20%: multiplica por 1,20 (não precisa calcular 20% e somar)<br>• Desconto de 15%: multiplica por 0,85<br><br>Variações sucessivas: <em>nunca</em> some as porcentagens. Multiplique os fatores.<br>+20% depois −20% = ×1,20 × ×0,80 = ×0,96 → queda de 4%, não zero!<br><br>Para encontrar a taxa de variação: (valor final − valor inicial) / valor inicial × 100%.<br><br>Para recuperar o valor original: divida pelo fator. Se após 30% de desconto ficou R$140: original = 140 ÷ 0,70 = R$200.",
 example:"ENEM: produto com 30% de desconto e depois mais 10% de desconto. Fator total: 0,7×0,9=0,63 → desconto real de 37% (não 40%!).",

 story:{icon:"🛍️",title:"A Black Friday armadilha",text:"Uma loja anunciou: 'Produto com 50% de desconto na Black Friday!'\n\nMas na semana antes da Black Friday, o produto custava R$200. Na semana anterior, R$100. A loja subiu o preço em 100% para depois dar 50% de desconto.\n\nConta do consumidor desavisado:\n• Preço 'original': R$200\n• 50% de desconto: R$100 — que parece ótimo!\n\nMas o produto tinha acabado de ser inflado. O consumidor 'economizou' R$0.\n\nUm consumidor que entende porcentagem sabe que precisaria verificar: +100% depois −50% = ×2 × ×0,5 = ×1 = preço original.",connection:"Negociação de salário, escolha de financiamentos, leitura de notícias econômicas, análise de promoções — porcentagem é a linguagem do consumidor consciente e do profissional que toma decisões com dados."},
 dict:[
   {term:"Fator de multiplicação",def:"Número pelo qual se multiplica para aplicar uma porcentagem. Aumento de i% → (1+i/100). Desconto → (1−i/100).",ex:"+25%: fator=1,25. −15%: fator=0,85. R$200 com −15%: 200×0,85=R$170."},
   {term:"Variação percentual",def:"(Valor final − Valor inicial) / Valor inicial × 100%. Pode ser positiva (aumento) ou negativa (queda).",ex:"De R$80 para R$100: (100−80)/80×100% = 25% de aumento."},
   {term:"Variações sucessivas",def:"Aplicar dois ou mais fatores em sequência. Multiplica os fatores — NÃO soma as porcentagens.",ex:"+20% e depois −20%: 1,2×0,8=0,96 → redução de 4%. (NÃO zero!)"},
   {term:"Porcentagem sobre porcentagem",def:"Erro clássico: somar porcentagens direto. A forma correta é multiplicar os fatores.",ex:"+10% e +10% = ×1,1×1,1=×1,21=21% (NÃO 20%)."}
 ],
 steps:{
   intro:"Estratégia para questões de porcentagem — sempre use fator de multiplicação.",
   items:[
     {n:1,action:"Converta % em fator",detail:"Aumento de p% → fator=(1+p/100). Desconto de p% → fator=(1−p/100). Nunca some % direto.",ex:"+25% → ×1,25. −15% → ×0,85. −30% → ×0,70"},
     {n:2,action:"Aplique na ordem certa",detail:"Se há variações sucessivas, multiplique os fatores em sequência.",ex:"Preço com +20% e depois −20%: valor×1,2×0,8=valor×0,96 (queda de 4%)"},
     {n:3,action:"Para calcular a taxa de variação",detail:"Taxa=(valor final−valor inicial)/valor inicial × 100%.",ex:"De R$80 para R$100: (100−80)/80×100=25% de aumento"},
     {n:4,action:"Para encontrar o valor original",detail:"Se o valor após o desconto/aumento é conhecido, divida pelo fator.",ex:"Após −30%, sobrou R$140: original=140/0,70=R$200",tip:"⚠️ +20% depois −20% ≠ zero! É 1,2×0,8=0,96 → queda de 4%. Nunca some porcentagens!"}
   ]
 },
 prereq:{
   items:[

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📉",term:"Estatística no ENEM",
 layers:[{tag:"Ponto de Partida",text:"Um gráfico mostra que as vendas 'quase dobraram' de um mês para o outro. Mas ao olhar o eixo y, ele começa em 90 — não em 0. A barra que parece o dobro representa apenas 95 vs 100. <b>Gráficos podem comunicar ou distorcer. Saber ler é uma habilidade crítica.</b>",ex:"Eixo truncado: barra de 95 parece enorme comparada a 90, mas a diferença real é 5 pontos."},
   {tag:"Media, mediana e moda — quando usar cada uma",text:"<b>Média</b>: quando os dados são homogêneos, sem valores extremos. <b>Mediana</b>: quando há outliers (valores muito diferentes) — ela não é afetada. <b>Moda</b>: para dados categóricos (cor mais vendida, opinião mais comum).",ex:"Salários: R$1000, R$1000, R$1200, R$50000. Média=R$13.300 (enganosa). Mediana=R$1100 (representativa)."},
   {tag:"Formalizacao — Tipos de grafico",text:"<b>Barras/colunas</b>: comparação entre categorias. <b>Linhas</b>: evolução temporal. <b>Setores (pizza)</b>: proporções (soma = 100%). <b>Histograma</b>: distribuição de frequências (barras adjacentes, sem espaço). Cada tipo serve para um propósito específico.",ex:"Setor de 25% = ângulo de 90° (25% de 360°). Para checar: some todos os setores = 100%."},
   {tag:"ENEM (12,6%) — O que mais cai",text:"Leitura e interpretação de gráficos são o foco principal — não cálculos complexos. Armadilhas: eixo truncado, escala não linear, gráfico 3D distorcido. O ENEM quer saber se você lê criticamente, não apenas mecanicamente.",ex:"Questão típica: 'Com base no gráfico, qual afirmação é INCORRETA?' A resposta geralmente envolve uma distorção visual."}],
 historia:{cenas:[{icon:"📰",label:"A MANCHETE ENGANOSA",texto:"O jornal publicou: 'Aprovação do governo sobe 100% em um mês!' A matéria mostrava um gráfico com o eixo começando em 49%. A aprovação tinha subido de 49% para 50% — 1 ponto percentual, não 100%. A manchete usou variação relativa (1/49=2%) ou gráfico truncado para parecer mais dramático."},{icon:"🏫",label:"A MEDIA QUE ENGANOU",texto:"A diretora informou: 'a média de aprovação no vestibular foi de 72%'. O coordenador perguntou pela mediana. Quando viram os dados: 90% dos alunos foram aprovados em cursos de baixa concorrência, e apenas 10% em medicina e direito. A média alta escondia uma concentração problemática."}],pergunta:"Quando a mediana é mais honesta que a média para representar um conjunto de dados?",moral:"Estatística no ENEM é sobre interpretar criticamente, não calcular mecanicamente. Saiba qual gráfico usar, quando preferir a mediana, e como identificar distorções visuais."},

 simple:"Leitura de gráficos (12,6% ENEM), média, mediana, moda, desvio padrão. Saber interpretar dados de tabelas e gráficos é fundamental.",
 explain:"No ENEM, as questões de estatística raramente pedem cálculos — elas testam sua capacidade de <b>ler criticamente uma informação numérica</b>. Isso é, na verdade, uma habilidade mais sofisticada que calcular.<br><br>O que você precisa saber:<br>• <b>Qual medida usar?</b> Com dados que têm valores extremos (como salários, preços), a mediana representa melhor do que a média.<br>• <b>Leitura de gráficos</b>: identifique o que está nos eixos, a unidade, e se o eixo começa do zero ou está truncado.<br>• <b>Eixo truncado</b>: quando o eixo y não começa em zero, diferenças pequenas parecem enormes. É uma das manipulações mais comuns em apresentações de dados.<br>• <b>Histograma</b>: as barras são adjacentes (sem espaço) e a área representa a frequência, não a altura.",
 example:"ENEM 2022: gráfico de barras com eixo y começando em 80 (não em 0). Uma barra parece o dobro da outra, mas a diferença real é pequena — atenção à escala!",

 story:{icon:"📺",title:"A notícia enganosa",text:"Uma reportagem mostrou um gráfico com o título: 'Criminalidade DISPARA 40%'. O gráfico tinha o eixo y começando em 980, não em 0.\n\nNo gráfico, a barra do ano 2 parecia 5 vezes maior que a do ano 1.\n\nMas os dados reais: Ano 1: 980 crimes. Ano 2: 1.020 crimes.\n\nAumento real: (1020−980)/980 × 100% ≈ 4%, não 40%.\n\nO eixo truncado transformou 4% em algo que parecia catastrófico. Nenhum dado foi mentira — mas a visualização induziu ao erro.\n\nUm leitor que conhece estatística percebe isso imediatamente.",connection:"Jornalismo, política, publicidade, relatórios corporativos — gráficos enganosos são usados constantemente. Saber ler estatística é uma forma de defesa contra manipulação de informação."},
 dict:[
   {term:"Medida de tendência central",def:"Valor que representa o 'centro' dos dados. Média, mediana e moda são as três principais.",ex:"Para dados com outliers, a mediana representa melhor (salários, por exemplo)."},
   {term:"Gráfico de setores",def:"Gráfico circular (pizza) que mostra proporções. A soma de todos os setores é 100%.",ex:"30% gastos com aluguel → setor de 108° (30% de 360°)."},

   {term:"Histograma",def:"Gráfico de barras ADJACENTES para dados agrupados em classes. Área da barra = frequência.",ex:"Classes de renda [0,2), [2,4), [4,6): o histograma mostra a distribuição."}

{year:"3",tri:"PU",theme:"Pré-universitário",pu:true,emoji:"📐",term:"Geometria Plana — Áreas",
 layers:[{tag:"Ponto de Partida",text:"Você quer pintar uma parede irregular — parte retangular, com uma janela triangular e uma janela semicircular. Precisa calcular a área da parede e subtrair as áreas das janelas. <b>Figuras compostas são a aplicação mais cobrada no ENEM.</b>",ex:"Área pintada = Área total da parede - Área da janela retangular - Área da janela triangular."},
   {tag:"As formulas essenciais",text:"<b>Triângulo</b>: A=bh/2. <b>Retângulo</b>: A=bh. <b>Círculo</b>: A=pi x r². <b>Trapézio</b>: A=(B+b) x h/2. <b>Losango</b>: A=D x d/2. <b>Setor circular</b>: A=pi x r² x alfa/360°. Memorize essas 6 — elas cobrem quase tudo.",ex:"Setor de 90° com r=4: A=pi x 16 x 90/360 = 4pi aprox 12,6cm²."},
   {tag:"Formalizacao — Semelhanca e areas",text:"Se a razão de semelhança entre duas figuras é k, a razão entre suas áreas é <b>k²</b>. Dobrou os lados: área quadruplica. Triplicou os lados: área multiplica por 9. Isso aparece muito em problemas de escala e ampliação.",ex:"Dois quadrados com razão de semelhança 1:3: áreas na razão 1:9. O maior tem 9x a área do menor."},
   {tag:"ENEM (7,4%) — O que mais cai",text:"Área de região sombreada (diferença de áreas), setor circular, relação entre áreas de figuras semelhantes, uso de Pitágoras para encontrar a altura antes de calcular a área. Organize sempre: figure out qual fórmula, identifique os dados, calcule.",ex:"Quadrado de lado 10 com círculo inscrito (r=5): Área sombreada = 100 - 25pi aprox 21,5cm²."}],
 historia:{cenas:[{icon:"🎨",label:"O AZULEJISTA",texto:"O azulejista Carlos precisava cobrir uma parede em formato de L: 4m x 3m menos um recuo de 1m x 1m no canto. Área total = 4x3 - 1x1 = 11m². Cada azulejo tem 20cm x 20cm = 0,04m². Quantidade de azulejos = 11/0,04 = 275 azulejos (mais 10% de reserva = 302 azulejos comprados). Geometria plana economizando dinheiro real."},{icon:"🌳",label:"A SOMBRA DA ARVORE",texto:"Um parque quer saber a área de sombra de uma árvore ao meio-dia. A sombra tem forma aproximada de círculo com raio 4m. Área = pi x 16 aprox 50m². Para colocar grama nessa área ao custo de R$8/m², o gasto seria R$400. Uma conta simples com impacto prático real."}],pergunta:"Como calcular a área de uma figura irregular que não tem fórmula pronta?",moral:"Geometria plana é a matemática do espaço que habitamos. Toda planta baixa, toda reforma, todo projeto de paisagismo passa por áreas. Decomponha figuras complexas em formas simples e opere com elas."},

 simple:"Áreas de triângulos, quadriláteros e círculos. 7,4% ENEM. Fórmulas-chave: triângulo=bh/2, círculo=πr², trapézio=(B+b)h/2.",
 explain:"Geometria plana é o estudo de figuras bidimensionais — que existem em um plano, sem altura. Antes de qualquer fórmula, o conceito central é: <b>área mede a quantidade de superfície que uma figura ocupa</b>.<br><br>Fórmulas essenciais:<br>• <b>Triângulo</b>: A = base × altura ÷ 2<br>• <b>Retângulo</b>: A = base × altura<br>• <b>Paralelogramo</b>: A = base × altura<br>• <b>Trapézio</b>: A = (base maior + base menor) × altura ÷ 2<br>• <b>Círculo</b>: A = πr²<br>• <b>Setor circular</b>: A = πr² × α/360°<br><br>Figuras compostas: decomponha em figuras simples e some (ou subtraia) as áreas. Uma área 'sombreada' geralmente é a diferença entre duas figuras.<br><br>Razão de semelhança k → razão de áreas k². Se os lados dobram, a área quadruplica.",
 example:"ENEM: quadrado de lado 10 com círculo inscrito (r=5). Área sombreada = Área quadrado − Área círculo = 100 − 25π ≈ 21,5 cm².",

 story:{icon:"🏠",title:"A reforma do apartamento",text:"Ana queria reformar o piso do apartamento. O quarto era retangular (4m×5m) com um banheiro acoplado circular (raio 1,5m) cortado num canto.\n\nÁrea do retângulo: 4×5 = 20m²\nÁrea do semicírculo do banheiro: π×1,5²/2 ≈ 3,53m²\nÁrea real do quarto: 20 − 3,53 = 16,47m²\n\nO porcelanato custava R$85/m². Total: 16,47 × 85 ≈ R$1.400.\n\nSe ela não soubesse calcular, poderia comprar material para 20m² e desperdiçar R$300.",connection:"Arquitetura e design de interiores, agricultura (área plantada), pintura de paredes, carpetes e pisos, planejamento urbano — áreas são calculadas constantemente em projetos reais."},
 dict:[
   {term:"Área de figuras compostas",def:"Área de uma figura formada por outras menores. Soma ou subtrai as áreas das partes.",ex:"Área do anel circular (coroa): A=πR²−πr²=π(R²−r²)."},
   {term:"Semelhança e áreas",def:"Se a razão de semelhança entre figuras é k, a razão das áreas é k².",ex:"Triângulos com razão 1:3: áreas na razão 1:9."},
   {term:"Fórmula de Heron",def:"Calcula a área de triângulo conhecendo apenas os 3 lados: A=√[s(s−a)(s−b)(s−c)], s=(a+b+c)/2.",ex:"Lados 3,4,5: s=6. A=√[6×3×2×1]=√36=6 cm²."},
   {term:"Setor circular",def:"Fatia de um disco — a 'fatia de pizza'. Área = πr²×(α/360°).",ex:"Setor de 90° em círculo de r=6: A=π×36×(90/360)=9π≈28,3 cm²."}
 ],
 steps:{
   intro:"Estratégia para questões de área — especialmente figuras compostas e sombreadas.",
   items:[
     {n:1,action:"Identifique as figuras",detail:"Decomponha a figura em formas simples conhecidas: triângulos, retângulos, círculos, setores.",ex:"Figura sombreada = quadrado − círculo inscrito"},
     {n:2,action:"Identifique o que é dado",detail:"Quais medidas estão no enunciado? Às vezes precisa calcular a altura com Pitágoras antes da área.",ex:"Triângulo equilátero de lado 6: altura=6×(√3/2)=3√3 → A=6×3√3/2=9√3"},
     {n:3,action:"Aplique as fórmulas",detail:"Triângulo: bh/2. Retângulo: b×h. Círculo: πr². Trapézio: (B+b)h/2. Setor: πr²×α/360.",ex:"Setor de 90° com r=4: A=π×16×90/360=4π≈12,6 cm²"},
     {n:4,action:"Figuras compostas",detail:"Área sombreada = Área maior − Área menor (ou soma, dependendo da figura).",ex:"Anel: A=πR²−πr²=π(R²−r²)",tip:"⚠️ Razão de semelhança k → razão de áreas k². Se lados dobram, área quadruplica!"}
   ]
 },
 prereq:{
   items:[
     {badge:"6º ANO",color:"#FF6B6B",title:"Perímetro e Área básica",desc:"Retângulo, triângulo e círculo são as figuras-base. Fórmulas decoradas liberam o raciocínio.",check:"✓ Pronto se: calcula área de triângulo (base 8, altura 5) = 20 automaticamente."},
     {badge:"9º ANO",color:"#5F27CD",title:"Teorema de Pitágoras",desc:"Calcular alturas em triângulos isósceles e diagonais usa Pitágoras.",check:"✓ Pronto se: acha a altura de um triângulo equilátero de lado 6 = 3√3."},
     {badge:"9º ANO",color:"#5F27CD",title:"Semelhança de figuras",desc:"A razão de semelhança k implica razão de áreas k². Muito cobrado no ENEM.",check:"✓ Pronto se: sabe que figuras semelhantes com razão 1:3 têm áreas na razão 1:9."}
