<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Matemática — Ensino Médio</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#E84393;--c2:#00B4D8;--c3:#06D6A0;
  --bg:#0F0F1A;--card:#1A1A2E;--border:#2a2a45;
  --text:#F0F0FF;--sub:#9999BB;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{
  background:linear-gradient(135deg,#1a0533,#0d1b4b,#0a2a1a);
  padding:44px 24px 65px;text-align:center;position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 15% 60%,rgba(232,67,147,.18) 0%,transparent 55%),
    radial-gradient(circle at 85% 30%,rgba(0,180,216,.15) 0%,transparent 55%),
    radial-gradient(circle at 50% 90%,rgba(6,214,160,.1) 0%,transparent 40%);
}
.header-inner{position:relative;}
header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,5vw,3rem);color:#fff;text-shadow:0 0 30px rgba(232,67,147,.5);}
header p{color:rgba(255,255,255,.75);font-size:1rem;margin-top:8px;font-weight:700;}
.header-tags{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
.htag{padding:5px 14px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:.8rem;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);}

/* SEARCH */
.search-wrap{max-width:580px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10;}
.search-wrap input{
  width:100%;padding:16px 24px 16px 52px;border-radius:50px;border:2px solid var(--border);
  font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;
  background:#1A1A2E;color:var(--text);outline:none;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:#E84393;}
.search-wrap::before{content:'🔍';position:absolute;left:40px;top:50%;transform:translateY(-50%);font-size:1.1rem;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;padding:32px 20px 16px;flex-wrap:wrap;}
.tab{
  padding:10px 22px;border-radius:50px;border:2px solid var(--border);
  font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;
  transition:all .2s;background:var(--card);color:var(--sub);
}
.tab:hover,.tab.active{border-color:#E84393;color:#E84393;background:#2a1030;}
.tab.active{background:linear-gradient(135deg,#E84393,#a0004f);color:#fff;border-color:transparent;}

/* THEME FILTER */
.theme-filter{display:flex;justify-content:center;gap:8px;padding:0 20px 24px;flex-wrap:wrap;}
.theme-btn{
  padding:6px 16px;border-radius:50px;border:1.5px solid var(--border);
  background:var(--card);font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;
  cursor:pointer;transition:all .2s;color:var(--sub);
}
.theme-btn.active,.theme-btn:hover{border-color:#00B4D8;color:#00B4D8;background:#001a2e;}

.counter{text-align:center;padding:0 20px 16px;font-weight:700;color:var(--sub);font-size:.85rem;}

/* GRID */
.glossary{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}

/* CARD */
.card{
  background:var(--card);border-radius:var(--radius);padding:20px 20px 16px;
  border:1.5px solid var(--border);
  border-top:4px solid;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  cursor:pointer;position:relative;overflow:hidden;
}
.card::after{
  content:'Explorar →';position:absolute;bottom:10px;right:16px;
  font-size:.72rem;font-weight:800;color:rgba(255,255,255,.2);
  transition:color .2s;
}
.card:hover::after{color:rgba(255,255,255,.5);}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.5);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.bserie{font-family:'Fredoka One',cursive;font-size:.7rem;padding:3px 10px;border-radius:50px;color:#fff;}
.btheme{font-size:.7rem;padding:3px 10px;border-radius:50px;background:rgba(255,255,255,.08);color:#888;font-weight:700;}
.card h3{font-family:'Fredoka One',cursive;font-size:1.15rem;margin-bottom:5px;color:#fff;}
.card .simple{font-size:.88rem;line-height:1.5;font-weight:600;color:var(--sub);}
.card .prereq-hint{
  margin-top:10px;display:flex;align-items:center;gap:6px;
  font-size:.75rem;font-weight:700;color:rgba(255,200,100,.7);
}

.no-results{text-align:center;padding:60px 20px;color:var(--sub);font-size:1rem;font-weight:700;grid-column:1/-1;}
.no-results span{font-size:3rem;display:block;margin-bottom:12px;}

/* MODAL */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:#13132a;border:1.5px solid var(--border);border-radius:24px;
  width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
  transform:translateY(30px) scale(.97);transition:transform .3s,opacity .3s;opacity:0;
}
.overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-band{padding:26px 26px 18px;border-radius:24px 24px 0 0;position:relative;}
.modal-close{
  position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;cursor:pointer;
  font-size:1rem;color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:900;transition:background .2s;
}
.modal-close:hover{background:rgba(255,255,255,.25);}
.modal-emoji{font-size:2.5rem;display:block;margin-bottom:6px;}
.modal-title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:#fff;}
.modal-sub{color:rgba(255,255,255,.65);font-weight:700;font-size:.88rem;margin-top:4px;}
.modal-bncc{
  display:inline-block;margin-top:8px;padding:3px 12px;border-radius:50px;
  background:rgba(255,255,255,.1);font-size:.75rem;font-weight:800;color:rgba(255,255,255,.6);
}

/* Modal Tabs */
.modal-tabs{display:flex;border-bottom:1.5px solid var(--border);padding:0 24px;overflow-x:auto;}
.mtab{
  padding:13px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;
  cursor:pointer;border:none;background:none;color:var(--sub);
  border-bottom:3px solid transparent;margin-bottom:-1.5px;
  transition:all .2s;white-space:nowrap;
}
.mtab.active{color:#E84393;border-bottom-color:#E84393;}
.modal-body{padding:22px 24px 30px;}
.mpanel{display:none;animation:fadeIn .25s ease;}
.mpanel.active{display:block;}

/* Panel styles */
.explain-box{
  background:rgba(255,255,255,.04);border-radius:14px;
  padding:18px 20px;margin-bottom:14px;line-height:1.7;
  font-size:.95rem;font-weight:600;color:#ccc;border:1px solid var(--border);
}
.example-box{border-radius:14px;padding:16px 20px;border-left:4px solid;}
.example-box .elabel{font-family:'Fredoka One',cursive;font-size:.85rem;margin-bottom:6px;opacity:.85;}
.example-box p{font-size:.92rem;line-height:1.6;font-weight:600;color:#bbb;}

/* PREREQUISITE PANEL */
.prereq-section{margin-bottom:20px;}
.prereq-title{
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:rgba(255,200,80,1);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.prereq-list{list-style:none;}
.prereq-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;margin-bottom:8px;
  background:rgba(255,200,80,.06);border-radius:10px;
  border-left:3px solid rgba(255,200,80,.5);
  font-size:.88rem;font-weight:600;line-height:1.5;color:#ccc;
}
.prereq-item .picon{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.prereq-item b{color:rgba(255,200,80,.9);}
.prereq-alert{
  margin-top:14px;padding:14px 16px;border-radius:12px;
  background:rgba(232,67,147,.08);border:1px solid rgba(232,67,147,.2);
  font-size:.85rem;font-weight:700;color:rgba(232,67,147,.9);line-height:1.6;
}

/* Visual */
.visual-wrap{text-align:center;padding:8px 0 4px;}
.visual-wrap svg{max-width:100%;height:auto;}
.visual-caption{margin-top:12px;font-size:.87rem;color:var(--sub);font-weight:700;line-height:1.5;text-align:center;}

/* Summary */
.summary-list{list-style:none;}
.summary-list li{
  display:flex;align-items:flex-start;gap:12px;padding:11px 0;
  border-bottom:1px solid var(--border);font-size:.92rem;font-weight:600;line-height:1.5;color:#ccc;
}
.summary-list li:last-child{border-bottom:none;}
.summary-list .icon{font-size:1.2rem;flex-shrink:0;margin-top:1px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:20px;color:#444;font-size:.82rem;font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🎓 Glossário de Matemática</h1>
    <p>Ensino Médio · Clique em qualquer termo para explorar e ver os pré-requisitos</p>
    <div class="header-tags">
      <span class="htag">📋 BNCC alinhado</span>
      <span class="htag">🔑 Pré-requisitos por tema</span>
      <span class="htag">🎨 Diagramas visuais</span>
    </div>
  </div>
</header>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Buscar… ex: logaritmo, função, trigonometria">
</div>

<div class="tabs">
  <button class="tab active" data-serie="all">Todos</button>
  <button class="tab" data-serie="1">1ª série</button>
  <button class="tab" data-serie="2">2ª série</button>
  <button class="tab" data-serie="3">3ª série</button>
</div>

<div class="theme-filter">
  <button class="theme-btn active" data-theme="all">Todos os temas</button>
  <button class="theme-btn" data-theme="Funções">Funções</button>
  <button class="theme-btn" data-theme="Geometria">Geometria</button>
  <button class="theme-btn" data-theme="Álgebra">Álgebra</button>
  <button class="theme-btn" data-theme="Estatística">Estatística</button>
  <button class="theme-btn" data-theme="Financeira">Financeira</button>
</div>

<div class="counter" id="counter"></div>
<div class="glossary" id="glossary"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-band" id="modalBand">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <span class="modal-emoji" id="mEmoji"></span>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-sub" id="mSub"></div>
      <span class="modal-bncc" id="mBncc"></span>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchTab(0,this)">📖 Explicação</button>
      <button class="mtab" onclick="switchTab(1,this)">🔑 Pré-requisitos</button>
      <button class="mtab" onclick="switchTab(2,this)">🎨 Visual</button>
      <button class="mtab" onclick="switchTab(3,this)">✅ Resumão</button>
    </div>
    <div class="modal-body">
      <div class="mpanel active" id="mp0"></div>
      <div class="mpanel" id="mp1"></div>
      <div class="mpanel" id="mp2"></div>
      <div class="mpanel" id="mp3"></div>
    </div>
  </div>
</div>

<footer>Colégio Batista Brasileiro · Coordenação Pedagógica · Ensino Médio</footer>

let activeSerie='all',activeTheme='all',searchQ='';

function render(){
  const grid=document.getElementById('glossary');
  const ctr=document.getElementById('counter');
  const filtered=terms.filter(t=>{
    const s=activeSerie==='all'||t.serie===activeSerie;
    const th=activeTheme==='all'||t.theme===activeTheme;
    const sq=searchQ===''||t.term.toLowerCase().includes(searchQ)||t.simple.toLowerCase().includes(searchQ);
    return s&&th&&sq;
  });
  ctr.textContent=filtered.length?`${filtered.length} termo${filtered.length>1?'s':''} encontrado${filtered.length>1?'s':''}` :'';
  if(!filtered.length){grid.innerHTML=`<div class="no-results"><span>🔍</span>Nenhum termo encontrado.</div>`;return;}
  grid.innerHTML=filtered.map(t=>{
    const tc=THEME_COLORS[t.theme]||'#E84393';
    const sc=SERIE_COLORS[t.serie]||'#E84393';
    return`<div class="card" style="border-top-color:${tc}" onclick="openModal(${terms.indexOf(t)})">
      <div class="card-top">
        <span style="font-size:1.8rem">${t.emoji}</span>
        <div class="card-badges">
          <span class="bserie" style="background:${sc}">${t.serie}ª série</span>
          <span class="btheme">${t.theme}</span>
        </div>
      </div>
      <h3>${t.term}</h3>
      <p class="simple">${t.simple}</p>
      <div class="prereq-hint">🔑 <span>${t.prereqs.length} pré-requisitos</span></div>
    </div>`;
  }).join('');
}

function openModal(idx){
  const t=terms[idx];
  const tc=THEME_COLORS[t.theme]||'#E84393';
  document.getElementById('modalBand').style.background=`linear-gradient(135deg,${tc}33,${tc}11)`;
  document.getElementById('modalBand').style.borderBottom=`2px solid ${tc}44`;
  document.getElementById('mEmoji').textContent=t.emoji;
  document.getElementById('mTitle').textContent=t.term;
  document.getElementById('mTitle').style.color=tc;
  document.getElementById('mSub').textContent=`${t.serie}ª série · ${t.theme}`;
  document.getElementById('mBncc').textContent=`BNCC: ${t.bncc}`;

  // Panel 0 – Explicação
  document.getElementById('mp0').innerHTML=`
    <div class="explain-box">${t.explain}</div>
    <div class="example-box" style="border-color:${tc};background:${tc}12">
      <div class="elabel" style="color:${tc}">💡 Exemplo prático</div>
      <p>${t.example}</p>
    </div>`;

  // Panel 1 – Pré-requisitos
  document.getElementById('mp1').innerHTML=`
    <div class="prereq-section">
      <div class="prereq-title">🔑 Para dominar <span style="color:#fff"> ${t.term}</span>, você precisa de:</div>
      <ul class="prereq-list">
        ${t.prereqs.map(p=>`
          <li class="prereq-item">
            <span class="picon">${p.icon}</span>
            <span><b>${p.label}</b> — ${p.desc}</span>
          </li>`).join('')}
      </ul>
      <div class="prereq-alert">${t.prereqAlert}</div>
    </div>`;

  // Panel 2 – Visual
  document.getElementById('mp2').innerHTML=`
    <div class="visual-wrap">${t.visual}</div>
    <p class="visual-caption">${t.visualCaption}</p>`;

  // Panel 3 – Resumão
  document.getElementById('mp3').innerHTML=`
    <ul class="summary-list">
      ${t.summary.map(s=>`<li><span class="icon">✅</span><span>${s}</span></li>`).join('')}
    </ul>`;

  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.mpanel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModalDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function switchTab(idx,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mpanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`mp${idx}`).classList.add('active');
}
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeSerie=tab.dataset.serie;render();
  });
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTheme=btn.dataset.theme;render();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase().trim();render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
render();
</script>
