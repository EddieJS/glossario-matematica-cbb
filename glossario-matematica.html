<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Matemática — Anos Finais CBB</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--c6:#FF6B6B;--c7:#FF9F43;--c8:#54A0FF;--c9:#5F27CD;--bg:#F0F4FF;--text:#2D3436;--sub:#636e72;--radius:18px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#6C5CE7,#a29bfe,#fd79a8);padding:40px 24px 60px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.15) 0%,transparent 60%),radial-gradient(circle at 80% 20%,rgba(255,255,255,.1) 0%,transparent 50%);}
.shape{position:absolute;border-radius:50%;opacity:.15;background:#fff;}
.s1{width:120px;height:120px;top:-30px;left:-30px;}
.s2{width:80px;height:80px;bottom:10px;right:60px;}
.s3{width:50px;height:50px;top:20px;right:22%;border-radius:8px;transform:rotate(20deg);}
header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,6vw,3.2rem);color:#fff;text-shadow:0 4px 12px rgba(0,0,0,.2);position:relative;}
header p{color:rgba(255,255,255,.9);font-size:1rem;margin-top:8px;font-weight:700;position:relative;}
.search-wrap{max-width:600px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10;}
.search-wrap input{width:100%;padding:16px 24px 16px 52px;border-radius:50px;border:none;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;box-shadow:0 8px 32px rgba(108,92,231,.25);outline:none;color:var(--text);}
.search-wrap::before{content:'🔍';position:absolute;left:40px;top:50%;transform:translateY(-50%);font-size:1.1rem;}
.tabs{display:flex;justify-content:center;gap:10px;padding:32px 20px 16px;flex-wrap:wrap;}
.tab{padding:10px 22px;border-radius:50px;border:3px solid transparent;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all .2s;background:#fff;color:var(--sub);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.tab[data-year="all"]{border-color:#6C5CE7;color:#6C5CE7;}
.tab[data-year="6"]{border-color:var(--c6);}
.tab[data-year="7"]{border-color:var(--c7);}
.tab[data-year="8"]{border-color:var(--c8);}
.tab[data-year="9"]{border-color:var(--c9);}
.tab.active[data-year="all"]{background:#6C5CE7;color:#fff;}
.tab.active[data-year="6"]{background:var(--c6);color:#fff;}
.tab.active[data-year="7"]{background:var(--c7);color:#fff;}
.tab.active[data-year="8"]{background:var(--c8);color:#fff;}
.tab.active[data-year="9"]{background:var(--c9);color:#fff;}
.tab:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12);}
.theme-filter{display:flex;justify-content:center;gap:8px;padding:0 20px 24px;flex-wrap:wrap;}
.theme-btn{padding:6px 16px;border-radius:50px;border:2px solid #e0e0e0;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;color:var(--sub);}
.theme-btn.active,.theme-btn:hover{border-color:#6C5CE7;color:#6C5CE7;background:#f0edff;}
.counter{text-align:center;padding:0 20px 16px;font-weight:700;color:var(--sub);font-size:.9rem;}
.glossary{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.card{background:#fff;border-radius:var(--radius);padding:20px 20px 16px;box-shadow:0 4px 16px rgba(0,0,0,.07);border-top:5px solid;transition:transform .2s,box-shadow .2s;cursor:pointer;}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.13);}
.card[data-year="6"]{border-color:var(--c6);}
.card[data-year="7"]{border-color:var(--c7);}
.card[data-year="8"]{border-color:var(--c8);}
.card[data-year="9"]{border-color:var(--c9);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.by{font-family:'Fredoka One',cursive;font-size:.7rem;padding:3px 10px;border-radius:50px;color:#fff;}
.by[data-year="6"]{background:var(--c6);}
.by[data-year="7"]{background:var(--c7);}
.by[data-year="8"]{background:var(--c8);}
.by[data-year="9"]{background:var(--c9);}
.bt{font-size:.7rem;padding:3px 10px;border-radius:50px;background:#f0f0f0;color:#888;font-weight:700;}
.btri{font-size:.7rem;padding:3px 10px;border-radius:50px;background:#e8f4f8;color:#54A0FF;font-weight:700;}
.card h3{font-family:'Fredoka One',cursive;font-size:1.2rem;margin-bottom:5px;}
.card .simple{font-size:.88rem;line-height:1.5;font-weight:600;color:#444;}
.card .hint{margin-top:10px;font-size:.75rem;color:#bbb;font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:var(--sub);font-size:1rem;font-weight:700;grid-column:1/-1;}
.no-results span{font-size:3rem;display:block;margin-bottom:12px;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,10,50,.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:24px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.35);transform:translateY(30px) scale(.97);transition:transform .3s,opacity .3s;opacity:0;}
.overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-band{padding:26px 26px 18px;border-radius:24px 24px 0 0;position:relative;}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;font-size:1rem;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;transition:background .2s;}
.modal-close:hover{background:rgba(255,255,255,.4);}
.modal-emoji{font-size:2.5rem;display:block;margin-bottom:6px;}
.modal-title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:#fff;}
.modal-sub{color:rgba(255,255,255,.75);font-weight:700;font-size:.88rem;margin-top:4px;}
.modal-tabs{display:flex;border-bottom:2px solid #f0f0f0;padding:0 24px;overflow-x:auto;}
.mtab{padding:13px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;border:none;background:none;color:#bbb;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.mtab.active{color:#6C5CE7;border-bottom-color:#6C5CE7;}
.modal-body{padding:22px 24px 30px;}
.mpanel{display:none;animation:fadeIn .25s ease;}
.mpanel.active{display:block;}
.explain-box{background:#f8f9ff;border-radius:14px;padding:18px 20px;margin-bottom:14px;line-height:1.7;font-size:.95rem;font-weight:600;color:#333;border:1px solid #e8ecff;}
.example-box{border-radius:14px;padding:16px 20px;border-left:4px solid;}
.example-box .elabel{font-family:'Fredoka One',cursive;font-size:.85rem;margin-bottom:6px;opacity:.85;}
.example-box p{font-size:.92rem;line-height:1.6;font-weight:600;color:#444;}
.visual-wrap{text-align:center;padding:8px 0 4px;}
.visual-wrap svg{max-width:100%;height:auto;}
.visual-caption{margin-top:12px;font-size:.87rem;color:var(--sub);font-weight:700;line-height:1.5;text-align:center;}
.summary-list{list-style:none;}
.summary-list li{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0;font-size:.92rem;font-weight:600;line-height:1.5;color:#333;}
.summary-list li:last-child{border-bottom:none;}
.summary-list .icon{font-size:1.2rem;flex-shrink:0;margin-top:1px;}
/* DICIONÁRIO */

/* CONTEXTO REAL */
.story-box{background:linear-gradient(135deg,rgba(108,92,231,.06),rgba(0,180,166,.04));border:1px solid rgba(108,92,231,.2);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
.story-icon{font-size:2rem;margin-bottom:10px;display:block;}
.story-title{font-family:'Fredoka One',cursive;font-size:.82rem;color:#6C5CE7;margin-bottom:8px;letter-spacing:.5px;}
.story-text{font-size:.92rem;font-weight:600;color:#2d3748;line-height:1.75;}
.story-connection{margin-top:14px;background:rgba(255,255,255,.7);border-radius:10px;padding:12px 16px;font-size:.83rem;font-weight:600;color:#555;line-height:1.6;border-left:3px solid #6C5CE7;}
.story-connection .conn-label{font-family:'Fredoka One',cursive;font-size:.72rem;color:#6C5CE7;margin-bottom:5px;letter-spacing:.5px;}

.dict-list{list-style:none;}
.dict-item{padding:12px 0;border-bottom:1px solid #f0f0f0;}
.dict-item:last-child{border-bottom:none;}
.dict-term{font-family:'Fredoka One',cursive;font-size:1rem;margin-bottom:4px;}
.dict-def{font-size:.9rem;font-weight:600;color:#444;line-height:1.55;margin-bottom:5px;}
.dict-ex{font-size:.82rem;font-weight:700;color:#888;background:#f8f9ff;border-radius:8px;padding:6px 10px;display:inline-block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:20px;color:#aaa;font-size:.82rem;font-weight:600;}

/* ══ TEMA CBB — IDENTIDADE VISUAL ══════════════════════════ */
:root {
  --cbb-blue: #1B3A6B;
  --cbb-gold: #C8961C;
  --cbb-gold-light: #E8B84B;
  --cbb-blue-mid: #2A5298;
  --font-title: 'Merriweather', 'Georgia', serif;
}

/* Botão de tema */
.theme-toggle {
  position: fixed; top: 14px; right: 14px; z-index: 500;
  background: var(--cbb-gold); color: #1B3A6B;
  border: none; border-radius: 50px; padding: 8px 16px;
  font-family: 'Nunito', 'Open Sans', sans-serif; font-weight: 800;
  font-size: .75rem; cursor: pointer; letter-spacing: .3px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: all .25s;
}
.theme-toggle:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.35); }

/* MODO CLARO */

body.light-mode .vestibular-box { background: rgba(200,150,28,.06) !important; border-color: rgba(200,150,28,.2) !important; }
body.light-mode .vestibular-box p { color: #3D4E6B !important; }

body.light-mode .story-question .sq-text { color: #1B2A45 !important; }

</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Alternar tema"><span id="toggleIcon">🌙</span><span id="toggleLabel">Modo Claro</span></button>
<header>
  <div class="shape s1"></div><div class="shape s2"></div><div class="shape s3"></div>
  <h1>📐 Glossário de Matemática</h1>
  <p>6º ao 9º ano · Colégio Batista Brasileiro · Clique em qualquer termo para explorar!</p>
</header>
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Buscar… ex: fração, ângulo, equação">
</div>
<div class="tabs">
  <button class="tab active" data-year="all">Todos</button>
  <button class="tab" data-year="6">6º ano</button>
  <button class="tab" data-year="7">7º ano</button>
  <button class="tab" data-year="8">8º ano</button>
  <button class="tab" data-year="9">9º ano</button>
</div>
<div class="theme-filter">
  <button class="theme-btn active" data-theme="all">Todos os temas</button>
  <button class="theme-btn" data-theme="Números">Números</button>
  <button class="theme-btn" data-theme="Álgebra">Álgebra</button>
  <button class="theme-btn" data-theme="Geometria">Geometria</button>
  <button class="theme-btn" data-theme="Estatística">Estatística</button>
  <button class="theme-btn" data-theme="Grandezas">Grandezas</button>
</div>
<div class="counter" id="counter"></div>
<div class="glossary" id="glossary"></div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-band" id="modalBand">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <span class="modal-emoji" id="mEmoji"></span>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-sub" id="mSub"></div>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchTab(0,this)">📖 Explicação</button>
      <button class="mtab" onclick="switchTab(1,this)">📚 Aprenda com Histórias</button>
      <button class="mtab" onclick="switchTab(2,this)">🔑 Dicionário</button>
      <button class="mtab" onclick="switchTab(3,this)">🎨 Visual</button>
      <button class="mtab" onclick="switchTab(4,this)">⚙️ Como Resolver</button>
      <button class="mtab" onclick="switchTab(5,this)">✅ Resumão</button>
    </div>
    <div class="modal-body">
      <div class="mpanel active" id="mp0"></div>
      <div class="mpanel" id="mp1"></div>
      <div class="mpanel" id="mp2"></div>
      <div class="mpanel" id="mp3"></div>
      <div class="mpanel" id="mp4"></div>
      <div class="mpanel" id="mp5"></div>
    </div>
  </div>
</div>
<footer>Colégio Batista Brasileiro · Coordenação Pedagógica · Anos Finais · 2026</footer>
<script>
const COLORS={6:'#FF6B6B',7:'#FF9F43',8:'#54A0FF',9:'#5F27CD'};
const terms=[
// ═══════════════════════════════════════════════
// 6º ANO
// ═══════════════════════════════════════════════
{year:"6",tri:"T1",theme:"Números",emoji:"🔢",term:"Número Natural",
 layers:[{tag:"O que são?",text:"Números naturais são os números que usamos para contar coisas do dia a dia: 0, 1, 2, 3, 4, 5... Eles são sempre <b>inteiros</b> (sem vírgula) e nunca <b>negativos</b>.",ex:"32 alunos em uma turma. 7 livros na mochila. 0 faltas no mês. Todos são naturais."},
   {tag:"O que é neutro?",text:"O número <b>0</b> é o neutro da adição — qualquer número + 0 = ele mesmo. O número <b>1</b> é o neutro da multiplicação — qualquer número × 1 = ele mesmo. E o 0 <b>anula</b> qualquer multiplicação: n × 0 = 0.",ex:"7 + 0 = 7. 7 × 1 = 7. 7 × 0 = 0."},
   {tag:"Quais NÃO são naturais?",text:"Número negativo (−5), número com vírgula (3,7), número com raiz não exata (√2) — nenhum desses é natural. Naturais = inteiros + não negativos + começando em zero.",ex:"-3 não é natural (negativo). 1,5 não é natural (decimal). √2 não é natural (irracional)."},
   {tag:"Para resolver problemas",text:"Antes de calcular, pergunte: a resposta pode ser negativa? Pode ter vírgula? Se a situação é de contar objetos, pessoas ou itens — o resultado deve ser natural.",ex:"Turma com 32 alunos, 7 faltaram: 32−7=25 presentes. O resultado (25) faz sentido como número natural."}],

 historia:{cenas:[{icon:"🏛️",label:"O COLISEU DE ROMA",texto:"Um turista viajou a Roma e entrou no Coliseu. Acima de cada portão havia um número romano gravado em pedra: XXIII, XLV, LXII. Eram os números dos setores. O turista aprendeu na hora: 'X antes de L é subtração — XL=40. L mais X é adição — LX=60. Só muda a ordem, e muda tudo.'"},{icon:"🎬",label:"O ANO DO FILME",texto:"No final de um filme antigo apareceu: MCMXCIX. O avô disse: 'é o ano em que o filme foi lançado — mas qual ano?' Joaquim decompôs: M=1000, CM=900, XC=90, IX=9. Total: 1999. O avô ficou impressionado: 'você leu um número que a maioria das pessoas ignora!'"}],pergunta:"Por que a posição do símbolo muda completamente o valor em Números Romanos?",moral:"Números Romanos são um sistema posicional de adição e subtração. I=1, V=5, X=10, L=50, C=100, D=500, M=1000. Símbolo menor antes de maior: subtraia. Caso contrário: some."},

{year:"6",tri:"T1",theme:"Números",emoji:"➗",term:"Expressão Numérica",
 layers:[{tag:"O problema sem regra",text:"Quanto é 2 + 3 × 4? Se você calcular da esquerda para a direita: (2+3)×4=20. Se você calcular multiplicação primeiro: 2+(3×4)=14. <b>Dois resultados diferentes para a mesma expressão! Por isso existe uma convenção.</b>",ex:"A convenção garante que 2+3×4 tenha sempre um único resultado: 14."},
   {tag:"A ordem correta",text:"A ordem é sempre: 1º <b>parênteses ( )</b>, 2º <b>colchetes [ ]</b>, 3º <b>potências e raízes</b>, 4º <b>multiplicação e divisão</b> (da esquerda para a direita), 5º <b>adição e subtração</b> (da esquerda para a direita).",ex:"[2+(3×4)]−1: primeiro 3×4=12, depois 2+12=14, depois 14−1=13."},
   {tag:"Por que essa ordem?",text:"Não é porque multiplicação é 'mais importante' — é apenas uma convenção acordada universalmente para que a mesma expressão tenha sempre o mesmo resultado em qualquer lugar do mundo.",ex:"2+3×4=14 no Brasil, nos EUA, na China. A convenção universal elimina ambiguidade."},
   {tag:"Resolvendo passo a passo",text:"Resolva sempre de dentro para fora: primeiro os parênteses mais internos. Dentro de cada grupo, aplique a ordem das operações. Nunca tente calcular tudo de uma vez.",ex:"3+(2²×5)−1: 2²=4, depois 4×5=20, depois 3+20=23, depois 23−1=22."}],
 historia:{cenas:[{icon:"🏪",label:"A CONFUSÃO NA LOJA",texto:"Bia foi a uma loja com R$30. Comprou 2 cadernos a R$5 cada e 3 canetas a R$2 cada. Quanto gastou? Seu irmão calculou: (2+3)×5=R$25. Mas o caixa cobrou: 2×5+3×2=R$16. Quem está certo? O caixa — porque multiplicou preço por quantidade antes de somar. A ordem das operações não é opcional!"},{icon:"💻",label:"A CALCULADORA QUE ERRAVA",texto:"Lucas digitou 2+3×4 na calculadora de bolso antiga do pai: a calculadora deu 20 (calculou da esquerda para a direita). Depois digitou no celular: deu 14 (ordem correta das operações). 'Qual está certa?' A do celular — ela conhece a convenção matemática universal."}],pergunta:"Se não houvesse ordem das operações, por que seria impossível fazer matemática em colaboração com outras pessoas?",moral:"A ordem das operações é uma convenção universal: parênteses → potências → × e ÷ → + e −. Garante que 2+3×4 sempre dê 14, em qualquer lugar do mundo."},

{year:"6",tri:"T1",theme:"Números",emoji:"⚡",term:"Potenciação",
 layers:[{tag:"O que é?",text:"Potenciação é uma <b>multiplicação repetida</b> do mesmo número. A <b>base</b> é o número que se multiplica. O <b>expoente</b> diz quantas vezes a base aparece na multiplicação.",ex:"2⁵ = 2×2×2×2×2 = 32. Base=2, expoente=5."},
   {tag:"Casos especiais importantes",text:"Qualquer número elevado a 0 = 1. Qualquer número elevado a 1 = ele mesmo. Base negativa com expoente <b>par</b> = positivo. Base negativa com expoente <b>ímpar</b> = negativo. O parêntese muda tudo!",ex:"5⁰=1. 5¹=5. (−3)²=+9. (−2)³=−8. Mas −3²=−9 (o parêntese não está lá!)."},
   {tag:"Propriedades — atalhos de cálculo",text:"Mesma base, multiplicando: aᵐ×aⁿ=aᵐ⁺ⁿ (some os expoentes). Mesma base, dividindo: aᵐ÷aⁿ=aᵐ⁻ⁿ. Potência de potência: (aᵐ)ⁿ=aᵐˣⁿ. Produto na base: (a×b)ⁿ=aⁿ×bⁿ.",ex:"2³×2⁴=2⁷=128. (2²)³=2⁶=64. (2×3)²=4×9=36."},
   {tag:"Na prática",text:"Potenciação aparece em áreas (m²), volumes (m³), notação científica (10⁸), e em todo crescimento exponencial. Reconhecer quadrados e cubos perfeitos economiza muito tempo.",ex:"Quadrados perfeitos: 1,4,9,16,25,36,49,64,81,100. Cubos: 1,8,27,64,125."}],
 historia:{cenas:[{icon:"📦",label:"O CUBO DE CAIXAS",texto:"Um depósito empilhava caixas em formato de cubo: 4 caixas de comprimento, 4 de largura, 4 de altura. Quantas caixas no total? Em vez de contar uma por uma (64 vezes), o funcionário calculou: 4³=64. Potenciação como atalho para multiplicações repetidas."},{icon:"🦠",label:"A MULTIPLICAÇÃO DAS BACTÉRIAS",texto:"Uma bactéria se divide em 2 a cada hora. Depois de 10 horas, quantas bactérias existem? Em vez de multiplicar 2×2×2... dez vezes, calculou: 2¹⁰=1024. Em 20 horas: 2²⁰=1.048.576. O expoente captura o crescimento explosivo de forma compacta."}],pergunta:"Por que (−3)² = +9 mas −3² = −9? Qual é a diferença entre as duas expressões?",moral:"Potenciação é multiplicação repetida: aⁿ = a×a×a... (n vezes). Expoente 0: sempre 1. Base negativa: par→positivo, ímpar→negativo. O parêntese muda tudo!"},

 simple:"Multiplicar um número por ele mesmo várias vezes. 2³ = 2×2×2 = 8. O número de baixo é a base, o de cima é o expoente.",

{year:"6",tri:"T1",theme:"Números",emoji:"√",term:"Raiz Quadrada",

 historia:{cenas:[{icon:"🏗️",label:"O LADRILHAMENTO",texto:"Um pedreiro precisava ladrilhar um quarto quadrado com 144 ladrilhos de 1m². Quantos ladrilhos de lado teria o quarto? Cada lado = √144 = 12 ladrilhos = 12 metros. Sem a raiz quadrada, ele teria que testar 1×1=1, 2×2=4, 3×3=9... até chegar em 12."},{icon:"⚽",label:"O TAMANHO DO CAMPO",texto:"A área de um campo quadrado de futebol de areia é 900m². Qual o comprimento do lado? √900=30m. A raiz quadrada respondeu diretamente, sem tentativa e erro. Em arquitetura, engenharia e design, a raiz quadrada calcula dimensões a partir de áreas."}],pergunta:"Por que não podemos 'distribuir' a raiz quadrada sobre uma soma, como fazemos com a multiplicação?",moral:"Raiz quadrada é a operação inversa do quadrado: √a=b quando b²=a. Memorize os quadrados perfeitos. Para simplificar: procure o maior quadrado perfeito que divide o radicando."},

{year:"6",tri:"T1",theme:"Números",emoji:"🔑",term:"Divisibilidade",
 layers:[{tag:"Para que serve?",text:"Os critérios de divisibilidade permitem verificar se um número é divisível por outro <b>sem fazer a divisão completa</b>. São atalhos que economizam tempo em cálculos de fatoração e simplificação de frações.",ex:"É 252 divisível por 9? Sem dividir: 2+5+2=9. Como 9÷9=1, sim!"},
   {tag:"Os critérios principais",text:"÷2: último dígito par (0,2,4,6,8). ÷3: soma dos dígitos ÷3. ÷5: termina em 0 ou 5. ÷9: soma dos dígitos ÷9. ÷10: termina em 0. ÷4: dois últimos dígitos ÷4. ÷6: ÷2 e ÷3 ao mesmo tempo.",ex:"360: ÷2 sim (par). ÷3 sim (3+6+0=9). ÷5 sim (termina em 0). ÷9 sim (soma=9)."},
   {tag:"Números primos",text:"Um número é primo quando é divisível apenas por 1 e por ele mesmo. Para verificar, teste divisão por todos os primos até sua raiz quadrada. Se nenhum dividir, é primo.",ex:"37: raiz≈6. Teste ÷2,÷3,÷5 — nenhum divide. 37 é primo!"},
   {tag:"Fatoração em primos",text:"Qualquer número pode ser escrito como produto de primos. Divida pelo menor primo possível repetidamente até chegar em 1. Essa decomposição é única (Teorema Fundamental da Aritmética).",ex:"120÷2=60÷2=30÷2=15÷3=5÷5=1. Logo 120=2³×3×5. Verificação: 8×3×5=120 ✓"}],

{year:"6",tri:"T1",theme:"Números",emoji:"⭐",term:"MMC e MDC",
 layers:[{tag:"Para que servem?",text:"MMC (Mínimo Múltiplo Comum) e MDC (Máximo Divisor Comum) resolvem problemas práticos: MMC serve para <b>somar frações</b> com denominadores diferentes. MDC serve para <b>simplificar frações</b> ao máximo.",ex:"Para somar 1/4+1/6: precisa do MMC(4,6)=12. Para simplificar 12/18: usa MDC(12,18)=6."},
   {tag:"Calculando por fatoração",text:"Fatore ambos os números em primos. MMC: pegue <b>todos</b> os fatores com o <b>maior</b> expoente. MDC: pegue apenas os fatores <b>comuns</b> com o <b>menor</b> expoente.",ex:"12=2²×3. 18=2×3². MMC=2²×3²=36. MDC=2¹×3¹=6."},
   {tag:"Relação importante",text:"MMC(a,b) × MDC(a,b) = a × b. Essa relação é uma forma rápida de verificar seus cálculos. Se encontrou MMC e MDC, multiplique-os — deve dar o produto dos números originais.",ex:"MMC(12,18)×MDC(12,18)=36×6=216=12×18 ✓"},
   {tag:"Na prática",text:"MMC aparece em problemas de eventos simultâneos que se repetem em intervalos diferentes. MDC aparece em problemas de divisão de objetos em grupos iguais.",ex:"3 ônibus saem de intervalos de 20, 30 e 45 min. Quando saem juntos? MMC(20,30,45)=180 min=3h."}],
 historia:{cenas:[{icon:"🚌",label:"O HORARIO DOS ONIBUS",texto:"Pedro mora perto de três linhas de ônibus. A linha A passa a cada 15 minutos, a B a cada 20 minutos, a C a cada 30 minutos. Às 6h, todos passaram juntos. Quando passarão juntos novamente? Pedro calculou: MMC(15,20,30)=60 minutos. Às 7h, estarão juntos de novo!"},{icon:"🍫",label:"A DIVISAO DO CHOCOLATE",texto:"Ana tem 24 balas e 36 chocolates. Quer fazer kits com a maior quantidade possível de itens, sem sobrar nada, com a mesma quantidade de cada tipo por kit. Quantos kits pode fazer? MDC(24,36)=12. Cada kit terá 2 balas (24÷12) e 3 chocolates (36÷12). 12 kits perfeitos!"}],pergunta:"Por que o MMC é usado para somar frações e o MDC para simplificá-las?",moral:"MMC = mínimo múltiplo comum: todos os fatores, maiores expoentes. MDC = máximo divisor comum: fatores comuns, menores expoentes. MMC×MDC = produto dos números."},

 simple:"MMC = menor número múltiplo de todos os dados. MDC = maior número que divide todos os dados exatamente.",

 steps:{
   intro:"O método mais eficiente para calcular MMC e MDC é a decomposição em fatores primos.",
   items:[
     {n:1,action:"Decomponha cada número em fatores primos",detail:"Use o método da fatoração. Escreva cada número como produto de primos.",ex:"12=2²×3. 18=2×3². 30=2×3×5"},
     {n:2,action:"Para o MDC: fatores COMUNS com MENOR expoente",detail:"Pegue apenas os primos que aparecem em TODOS os números, com o menor expoente.",ex:"MDC(12,18): comum=2¹×3¹=6"},

{year:"6",tri:"T2",theme:"Números",emoji:"🍕",term:"Fração",
 layers:[{tag:"O que representa?",text:"Uma fração a/b representa <b>a partes</b> de um todo dividido em <b>b partes iguais</b>. O de cima (numerador) diz quantas partes temos. O de baixo (denominador) diz em quantas partes o todo foi dividido.",ex:"3/4: o todo foi dividido em 4 partes iguais e temos 3 delas. Uma fatia de pizza de 8 pedaços = 1/8."},
   {tag:"Somar e subtrair",text:"Para somar ou subtrair frações, elas precisam ter o <b>mesmo denominador</b>. Encontre o MMC, converta as frações e opere os numeradores. Nunca some numeradores com numeradores e denominadores com denominadores!",ex:"1/4+1/6: MMC=12 → 3/12+2/12=5/12. ERRO: 1/4+1/6 ≠ 2/10."},

   {tag:"Comparando frações",text:"Para comparar a/b e c/d sem converter, use o produto cruzado: compare a×d com b×c. A maior fração corresponde ao maior produto cruzado.",ex:"3/4 vs 5/7: 3×7=21 e 5×4=20. Como 21>20, então 3/4>5/7. ✓"}],
 historia:{cenas:[{icon:"🍕",label:"A PIZZA DA TURMA",texto:"A turma pediu 3 pizzas iguais de 8 fatias cada. João comeu 3/8 de uma pizza. Maria comeu 5/8. Quanto comeram juntos? 3/8+5/8=8/8=1 pizza inteira! Como tinham denominador igual, foi direto. Mas quando Carlos comeu 1/4 de outra e Ana 1/3 da mesma: 1/4+1/3=3/12+4/12=7/12. Precisou do MMC."},{icon:"🧵",label:"O TECIDO DA COSTUREIRA",texto:"Uma costureira tinha 3/4 de metro de tecido azul e precisava de 2/3 de metro. Sobrou? 3/4−2/3=9/12−8/12=1/12 de metro. Apenas 1/12 de metro — o suficiente para um detalhe pequeno. A costureira usou a fração para não desperdiçar nem comprar a mais."}],pergunta:"Por que não se pode somar frações somando numeradores e denominadores separadamente?",moral:"Frações representam partes de um todo. Para somar/subtrair: denominador comum (MMC). Para multiplicar: direto (simplifique antes). Para dividir: inverta e multiplique."},

 simple:"Uma parte de um todo. O número de cima (numerador) diz quantas partes você tem; o de baixo (denominador) diz em quantas partes o todo foi dividido.",

   items:[
     {n:1,action:"Para somar/subtrair: encontre o denominador comum",detail:"Calcule o MMC dos denominadores. Converta cada fração para ter esse denominador. Então some/subtraia os numeradores.",ex:"1/4+1/6: MMC(4,6)=12 → 3/12+2/12=5/12"},

     {n:3,action:"Para dividir: multiplique pelo inverso",detail:"Inverta a segunda fração e multiplique. a/b ÷ c/d = a/b × d/c.",ex:"3/4 ÷ 2/5 = 3/4 × 5/2 = 15/8"},
     {n:4,action:"Simplifique o resultado",detail:"Divida numerador e denominador pelo MDC.",ex:"18/12: MDC=6 → 3/2",tip:"⚠️ Para somar frações, NÃO some numerador com numerador e denominador com denominador. Isso está errado!"}
   ]
 },

 },

{year:"6",tri:"T2",theme:"Geometria",emoji:"📐",term:"Ângulo",
 layers:[{tag:"O que é?",text:"Um ângulo mede a abertura entre dois raios com o mesmo ponto de origem (vértice). A unidade é o <b>grau (°)</b>. Tipos: agudo (<90°), reto (=90°), obtuso (>90°), raso (=180°), completo (=360°).",ex:"Canto de uma folha = ângulo reto (90°). Ponta de uma tesoura aberta = ângulo agudo."},

{year:"6",tri:"T2",theme:"Geometria",emoji:"📏",term:"Perímetro e Área",
 layers:[{tag:"A diferenca fundamental",text:"<b>Perímetro</b> é a medida do contorno — a soma de todos os lados (unidade: m). <b>Área</b> é a medida da superfície interior (unidade: m²). São conceitos completamente diferentes: uma figura pode ter perímetro grande e área pequena, e vice-versa.",ex:"Para colocar cerca num jardim: usa perímetro. Para comprar grama ou azulejo: usa área."},
   {tag:"Formulas principais",text:"Retângulo: P=2(b+h), A=b×h. Quadrado: P=4l, A=l². Triângulo: A=b×h÷2. Paralelogramo: A=b×h. Círculo: C=2πr, A=πr². Trapézio: A=(B+b)×h÷2.",ex:"Campo 105m×68m: P=2(105+68)=346m. A=105×68=7.140m²."},
   {tag:"Figuras compostas",text:"Para calcular a área de uma figura composta (que combina formas simples), divida-a em partes simples e some ou subtraia as áreas. É a estratégia usada em plantas de casas e reformas.",ex:"Sala em L: divida em dois retângulos, calcule cada área, some."},
   {tag:"Cuidado com as unidades",text:"Perímetro: mesma unidade das medidas dos lados (m, cm, km). Área: unidade ao quadrado (m², cm², km²). Converter: 1m²=10.000cm². 1km²=1.000.000m².",ex:"Terreno de 20m×15m: A=300m²=3.000.000cm². Para saber o preço/m², use m²."}],
 historia:{cenas:[{icon:"🏠",label:"A REFORMA DA COZINHA",texto:"A família de Lucas ia reformar a cozinha. Para comprar azulejo (precisa cobrir a superfície): calcularam a ÁREA da parede: 3m×2,5m=7,5m². Para comprar o rodapé que vai ao redor do piso: calcularam o PERÍMETRO: 2×(4+3)=14m. Dois cálculos diferentes para uma mesma sala."},{icon:"🌳",label:"O JARDIM DO COLEGIO",texto:"O CBB quer plantar grama em um jardim retangular de 12m×8m, mas há uma fonte circular de raio 2m no centro. Área de grama = área do retângulo − área do círculo = 12×8 − π×4 = 96 − 12,57 ≈ 83,4m². Figura composta: subtração de áreas."}],pergunta:"Uma figura tem o mesmo perímetro que outra mas área diferente. Como isso é possível?",moral:"Perímetro = contorno (m). Área = superfície (m²). Não confunda! Fórmulas: retângulo A=b×h, triângulo A=bh/2, círculo A=πr². Figuras compostas: some ou subtraia as partes."},

 simple:"Perímetro = medida do contorno (soma dos lados). Área = medida do interior (quanto de espaço a figura ocupa).",

 steps:{
   intro:"Para calcular perímetro e área, o protocolo começa sempre identificando a figura.",

 layers:[{tag:"O que significa %?",text:"Porcentagem significa 'por cem' — é uma fração com denominador 100. 30% = 30/100 = 0,30. Para calcular x% de um valor, multiplique pelo decimal correspondente.",ex:"30% de R$200 = 200×0,30 = R$60. Ou: 200×30÷100 = R$60."},

   {tag:"Para encontrar o original",text:"Se você sabe o valor após o desconto/aumento e quer o original, <b>divida pelo fator</b>. Nunca some a porcentagem de volta — isso dá resultado errado!",ex:"Após desconto de 30%, produto custa R$140. Original = 140÷0,70 = R$200."}],
 historia:{cenas:[{icon:"🛒",label:"O CUPOM DE DESCONTO",texto:"Julia tinha um cupom de 20% de desconto. O produto custava R$350. Em vez de calcular 20% de 350 (=70) e subtrair (350−70=280), ela usou o fator: 350×0,80=R$280. Mesmo resultado, um passo só. No checkout, o sistema aplicou o fator diretamente — como Julia."},{icon:"📊",label:"A NOTA QUE SUBIU",texto:"A média de matemática da turma subiu de 6,5 para 7,8. O diretor perguntou: 'qual foi o percentual de melhora?' Taxa = (7,8−6,5)/6,5×100 = 1,3/6,5×100 = 20%. A turma melhorou 20% — um dado muito mais informativo que simplesmente dizer 'subiu 1,3 pontos'."}],pergunta:"Por que usar o fator de multiplicação (×0,70) é mais confiável que calcular 30% e subtrair?",moral:"Porcentagem: x% = x/100. Fator de aumento: (1+p/100). Fator de desconto: (1−p/100). Taxa de variação: (final−inicial)/inicial×100%. Para encontrar o original: divida pelo fator."},

{year:"7",tri:"T1",theme:"Números",emoji:"🌡️",term:"Número Inteiro",
 layers:[{tag:"Por que precisamos de negativos?",text:"Números naturais não são suficientes para o mundo real: temperaturas abaixo de zero, dívidas, andares de subsolo, coordenadas abaixo do equador. <b>Números inteiros</b> estendem os naturais incluindo os negativos: ...−3, −2, −1, 0, 1, 2, 3...",ex:"−5°C (frio). Saldo −R$200 (dívida). Andar −1 (subsolo). Altitude −400m (abaixo do mar)."},
   {tag:"Operacoes com sinais — adicao",text:"Mesmos sinais: some os módulos e mantenha o sinal. Sinais diferentes: subtraia os módulos e use o sinal do maior módulo. Para subtrair, converta: a−b = a+(−b).",ex:"(+8)+(−3)=+5. (−8)+(+3)=−5. (−8)+(−3)=−11. 5−(−3)=5+3=8."},
   {tag:"Operacoes com sinais — multiplicacao",text:"Sinais iguais → resultado positivo. Sinais diferentes → resultado negativo. Essa regra é absoluta, sem exceções.",ex:"(+3)×(−4)=−12. (−3)×(−4)=+12. (−12)÷(+3)=−4. (−12)÷(−3)=+4."},
   {tag:"Armadilha da potenciacao",text:"(−2)² = +4 porque o parêntese inclui o sinal: (−2)×(−2)=+4. Mas −2² = −4 porque é −(2²) = −4. Expoente par com base negativa entre parênteses → sempre positivo.",ex:"(−3)²=9. (−3)³=−27. −3²=−9. Sem parêntese, o expoente age só sobre o 3."}],
 historia:{cenas:[{icon:"🏦",label:"A CONTA BANCARIA",texto:"Pedro tinha R$50 na conta. Pagou uma conta de R$80 com débito automático. Saldo: 50−80=−R$30. O banco enviou um alerta de saldo negativo. Isso significa uma dívida — Pedro deve R$30. Número negativo como dívida: a matemática refletindo a realidade financeira."},{icon:"🌡️",label:"O INVERNO EM CURITIBA",texto:"A previsão do tempo dizia: 'mínima de −3°C e máxima de 8°C amanhã'. Qual a variação de temperatura? 8−(−3)=8+3=11°C de variação. Subtrair um negativo vira adição — por isso a variação entre −3°C e +8°C é de 11 graus, não de 5."}],pergunta:"Por que subtrair um número negativo é o mesmo que somar o positivo correspondente?",moral:"Inteiros estendem os naturais com negativos. Mesmos sinais na mult/div → +. Sinais diferentes → −. Subtrair negativo = somar positivo. (−n)² = positivo quando n está entre parênteses."},

{year:"7",tri:"T1",theme:"Geometria",emoji:"⭕",term:"Circunferência",
 layers:[{tag:"Circunferencia vs circulo",text:"<b>Circunferência</b> é apenas a linha curva — o contorno. <b>Círculo</b> é a região interior, incluindo a linha. Na prática: a borda de um prato é a circunferência. A superfície do prato (onde a comida fica) é o círculo.",ex:"Para colocar um aro de metal numa panela: usa circunferência. Para tampar com uma tábua: usa o círculo (área)."},
   {tag:"Raio, diametro e Pi",text:"O <b>raio (r)</b> vai do centro à borda. O <b>diâmetro (d)</b> passa pelo centro ligando dois pontos da borda: d=2r. O número <b>π≈3,14</b> é a razão entre o comprimento de qualquer circunferência e seu diâmetro — é constante para qualquer tamanho.",ex:"Roda de bicicleta r=30cm: d=60cm. C=2×3,14×30=188,4cm. Dá exatamente uma volta a cada 188,4cm."},
   {tag:"Formulas",text:"Comprimento da circunferência: C=2πr=πd. Área do círculo: A=πr². Para arco de ângulo α°: L=2πr×α/360. Para setor circular (fatia): A=πr²×α/360.",ex:"Setor de 90° (1/4 de círculo) com r=6: A=π×36×90/360=9π≈28,3cm²."},
   {tag:"Na pratica",text:"Circunferência e círculo aparecem em rodas, pistas circulares, tanques, piscinas, antenas de satélite, relógios, e em toda a natureza (raios de sol, ondas na água).",ex:"Pista circular de atletismo: C=400m → r=400/(2π)≈63,7m."}],
 historia:{cenas:[{icon:"🚲",label:"A RODA DA BICICLETA",texto:"Lucas mediu a roda de sua bicicleta: raio de 35cm. Ele queria saber quantas voltas a roda dá num percurso de 1km=1000m=100.000cm. Comprimento de 1 volta: C=2×3,14×35=219,8cm. Número de voltas: 100.000÷219,8≈455 voltas. Lucas nunca mais ignorou as fórmulas de circunferência."},{icon:"🍕",label:"A PIZZA MAIS BARATA",texto:"A pizzaria vendia pizza pequena (r=10cm) por R$20 e grande (r=20cm) por R$55. Qual é a melhor compra? Área pequena=π×100=314cm². Área grande=π×400=1256cm². A grande tem 4× mais pizza mas custa menos de 3× mais. A área escala com r², não com r — o dobro do raio é 4× mais pizza!"}],pergunta:"Por que dobrar o raio de uma pizza quadruplica sua área, em vez de apenas dobrá-la?",moral:"Circunferência = linha curva (C=2πr). Círculo = região interior (A=πr²). d=2r. π≈3,14. Área cresce com r² — dobrar o raio quadruplica a área!"},

 simple:"A linha curva fechada cujos pontos são todos equidistantes de um centro. Não é o mesmo que círculo!",

 steps:{
   intro:"Para calcular comprimento e áreas envolvendo circunferência, o protocolo usa π e as fórmulas básicas.",
   items:[

 layers:[{tag:"O que e racional?",text:"Um número é racional se pode ser escrito como p/q, onde p e q são inteiros e q≠0. Isso inclui: todos os inteiros (3=3/1), frações (3/4), decimais finitos (0,75=3/4) e dízimas periódicas (0,333...=1/3).",ex:"0,75=3/4 (racional). 1/7=0,142857142857... (racional — dízima periódica). √2=1,41421... (irracional)."},
   {tag:"Dízima periódica → fração",text:"Para converter uma dízima periódica em fração: chame x=0,333... Multiplique por 10 (ou 100, 1000... dependendo do período): 10x=3,333... Subtraia: 10x−x=3 → 9x=3 → x=1/3.",ex:"0,272727... → 100x=27,2727... → 99x=27 → x=27/99=3/11."},
   {tag:"Comparando e ordenando",text:"Para comparar frações, converta para o mesmo denominador ou use o produto cruzado: compare a×d com b×c na proporção a/b vs c/d.",ex:"3/4 vs 5/7: 3×7=21 vs 5×4=20. Como 21>20, então 3/4>5/7."},
   {tag:"A reta numerica dos racionais",text:"Entre dois racionais quaisquer, sempre existe outro racional (densidade dos racionais). Mas há buracos na reta dos racionais — preenchidos pelos irracionais. Juntos, formam os números reais.",ex:"Entre 1/3 e 1/2, existe 5/12. Entre qualquer dois racionais, existem infinitos outros."}],
 historia:{cenas:[{icon:"📐",label:"O AZULEJO QUE NAO FECHAVA",texto:"O pedreiro precisava de azulejos de 0,333m de lado para uma parede de 1m. Quantos cabiam? 1÷0,333=3 — e sobraria um espaçozinho? Não! 0,333... = 1/3, e 3 × 1/3 = 1 exatamente. O pedreiro aprendeu que 0,333... é 1/3 perfeito, não uma aproximação."},{icon:"🎵",label:"A MUSICA E AS FRACOES",texto:"As notas musicais têm durações fracionárias: semínima=1/4, mínima=1/2, semibreve=1. Um compasso de 4/4 some 4 semínimas=4×1/4=1 compasso. A música é a fração em ação — e toda a matemática dos racionais está em cada partitura."}],pergunta:"Toda dízima periódica é racional? Como você provaria isso para um amigo cético?",moral:"Racional = pode ser escrito como p/q (inteiro÷inteiro). Inclui inteiros, frações, decimais finitos e dízimas periódicas. Para converter dízima em fração: multiplique por 10^período e subtraia."},

{year:"7",tri:"T2",theme:"Álgebra",emoji:"⚖️",term:"Equação do 1º Grau",
 layers:[{tag:"O que e uma equacao?",text:"Uma equação é uma igualdade com uma incógnita (geralmente x) que precisa ser descoberta. A equação do 1º grau tem a forma ax+b=c, com a≠0. A incógnita aparece com expoente 1.",ex:"3x+5=20 é equação do 1° grau. x²+1=5 não é (expoente 2). 3x+5 é expressão (sem igualdade)."},
   {tag:"A estrategia de isolar x",text:"O objetivo é deixar x sozinho num lado. Para isso, aplique operações inversas: o que estiver somando, subtraia dos dois lados. O que estiver multiplicando, divida dos dois lados. O que passar de um lado muda de operação.",ex:"3x+5=20 → 3x=20−5 → 3x=15 → x=15÷3 → x=5."},
   {tag:"Verificacao obrigatoria",text:"Sempre substitua o valor encontrado na equação original. Se resultar em igualdade verdadeira, está correto. Isso leva 10 segundos e elimina erros de cálculo.",ex:"Verificando x=5 em 3x+5=20: 3(5)+5=15+5=20=20 ✓."},
   {tag:"Equacoes com fracao",text:"Quando a equação tem frações, multiplique todos os termos pelo MMC dos denominadores para eliminar as frações antes de resolver. Isso simplifica enormemente o cálculo.",ex:"x/2+x/3=5. MMC(2,3)=6. Multiplica tudo por 6: 3x+2x=30 → 5x=30 → x=6."}],
 historia:{cenas:[{icon:"🎮",label:"O NIVEL DESCONHECIDO",texto:"No videogame, Carlos sabia que tinha 20 pontos a mais que o dobro de seu amigo. Juntos tinham 110 pontos. Quantos pontos cada um tinha? Amigo=x, Carlos=2x+20. Equação: x+(2x+20)=110 → 3x=90 → x=30. Carlos: 2(30)+20=80. Verificação: 30+80=110 ✓."},{icon:"⚖️",label:"A BALANCA DO QUIMICO",texto:"Um químico tem dois recipientes. O maior pesa 3 vezes mais que o menor, e juntos pesam 48g. Qual o peso de cada um? Menor=x, maior=3x. Equação: x+3x=48 → 4x=48 → x=12g. Maior: 36g. Equação do 1° grau resolvendo um problema experimental."}],pergunta:"Por que é obrigatório verificar a solução substituindo de volta na equação original?",moral:"Equação do 1° grau: ax+b=c. Isole x aplicando operações inversas. Verifique substituindo. Com frações: multiplique tudo pelo MMC para eliminar denominadores."},

 simple:"Uma igualdade com uma incógnita (letra) de expoente 1. Resolver é descobrir o valor da letra.",

     {n:2,action:"Isole a incógnita",detail:"Divida (ou multiplique) ambos os lados pelo coeficiente de x.",ex:"3x=15 → x=15/3 → x=5"},

{year:"7",tri:"T3",theme:"Grandezas",emoji:"⚖️",term:"Razão e Proporção",
 layers:[{tag:"O que e razao?",text:"A razão é a comparação entre duas grandezas por divisão. Razão de a para b = a/b = a:b. A ordem importa: razão 3:2 é diferente de 2:3.",ex:"Turma com 15 meninas e 10 meninos. Razão meninas:meninos = 15/10 = 3/2. Para cada 3 meninas, há 2 meninos."},
   {tag:"O que e proporcao?",text:"Proporção é a igualdade entre duas razões: a/b = c/d. O <b>produto cruzado</b> é sempre válido: a×d = b×c (extremos = meios).",ex:"3/6=5/x → 3x=30 → x=10. Verificação: 3/6=5/10=0,5 ✓."},
   {tag:"Proporcao direta vs inversa",text:"Grandezas <b>diretamente proporcionais</b>: quando uma dobra, a outra dobra (a₁/b₁=a₂/b₂). Grandezas <b>inversamente proporcionais</b>: quando uma dobra, a outra cai pela metade (a₁×b₁=a₂×b₂).",ex:"Preço e quantidade: direta. Velocidade e tempo: inversa."},
   {tag:"Escala",text:"Escala é uma razão entre medida no mapa e medida real. Escala 1:50.000 significa 1cm no mapa = 50.000cm = 500m na realidade.",ex:"Mapa 1:1.000.000. Distância no mapa: 3cm. Distância real: 3×1.000.000cm = 30km."}],
 historia:{cenas:[{icon:"🗺️",label:"O MAPA DA AVENTURA",texto:"Sofia e seu grupo foram acampar. No mapa (escala 1:25.000), a trilha media 8cm. Quantos km teriam que caminhar? Distância real = 8×25.000 = 200.000cm = 2km. Mas erraram a trilha e o GPS mostrou 3,5km de desvio. No mapa: 3,5km = 350.000cm ÷ 25.000 = 14cm."},{icon:"🍳",label:"A RECEITA PARA A TURMA",texto:"Uma receita de bolo para 4 pessoas pede 300g de farinha e 2 ovos. Para fazer para a turma de 32 pessoas (8 vezes mais): farinha=300×8=2400g=2,4kg. Ovos=2×8=16 ovos. Proporção direta: 8 vezes mais pessoas, 8 vezes mais de cada ingrediente."}],pergunta:"Se velocidade e tempo são inversamente proporcionais, o que acontece com o tempo se a velocidade triplicar?",moral:"Razão: a/b (comparação por divisão). Proporção: a/b=c/d com produto cruzado a×d=b×c. Direta: quando uma cresce, a outra cresce. Inversa: quando uma cresce, a outra diminui."},

 simple:"Razão é a comparação entre dois valores por divisão. Proporção é a igualdade entre duas razões.",

 steps:{
   intro:"Para resolver proporções, use o produto cruzado (extremos = meios).",

 dict:[
   {term:"Razão",def:"A comparação entre dois valores por divisão. Pode ser escrita como fração ou com ':' (dois pontos).",ex:"Razão entre 15 e 5: 15/5 = 3 (ou 15:5). A turma tem 3 vezes mais alunos que professores."},
   {term:"Proporção",def:"A igualdade entre duas razões. Indica que as razões têm o mesmo valor.",ex:"2/4 = 5/10 é uma proporção (ambas valem 1/2)."},
   {term:"Extremos",def:"O primeiro e o último termo de uma proporção: a/b = c/d → extremos são a e d.",ex:"Em 2/3 = 4/6: extremos são 2 e 6. Produto: 2×6=12."},
   {term:"Meios",def:"O segundo e o terceiro termo de uma proporção: a/b = c/d → meios são b e c.",ex:"Em 2/3 = 4/6: meios são 3 e 4. Produto: 3×4=12. (igual aos extremos!)"}
 ],
 explain:"A <b>razão</b> entre a e b é a/b (ou a:b). Ela expressa quantas vezes a contém b. A <b>proporção</b> a/b = c/d significa que as duas razões são iguais. <b>Propriedade fundamental</b>: numa proporção, o produto dos extremos é igual ao produto dos meios (a×d = b×c). Isso é a base da regra de três.",
 example:"Numa turma de 30 alunos, 18 são meninas. Razão meninas/total = 18/30 = 3/5. Proporção: 18/30 = 6/10 = 3/5 (todas equivalentes).",
 visual:`<svg viewBox="0 0 270 150" xmlns="http://www.w3.org/2000/svg" width="255">

 </svg>`,

{year:"7",tri:"T3",theme:"Grandezas",emoji:"📊",term:"Regra de Três",
 layers:[{tag:"A logica da regra de tres",text:"A regra de três é a aplicação prática de proporções. Sempre que você tem três valores conhecidos e precisa de um quarto, em que dois pares de grandezas se relacionam, usa-se a regra de três.",ex:"3 maçãs custam R$4,50. Quanto custam 7 maçãs? Três valores conhecidos (3, R$4,50, 7), um desconhecido."},
   {tag:"Passo 1 — classifique",text:"Antes de qualquer cálculo, classifique: se a primeira grandeza aumenta e a segunda também aumenta, é <b>DIRETA</b>. Se uma aumenta e a outra diminui, é <b>INVERSA</b>. Classificar errado = resultado errado.",ex:"Mais maçãs → mais custo = DIRETA. Mais operários → menos dias = INVERSA."},

 historia:{cenas:[{icon:"🏗️",label:"A OBRA DO GALPAO",texto:"4 pedreiros constroem um galpão em 18 dias. O dono precisa terminar em 12 dias (urgência). Quantos pedreiros contratar? Mais pedreiros → menos dias → INVERSA. 4×18=n×12 → n=72/12=6. Precisa de mais 2 pedreiros. O dono ligou imediatamente."},{icon:"🚗",label:"A VIAGEM A 90KM/H",texto:"Uma família viajou de São Paulo a Campinas (100km) a 90km/h em 67 minutos. Na volta, foram a 120km/h. Quanto tempo? Velocidade e tempo: INVERSA. 90×67=120×t → t=90×67/120=50 minutos. 17 minutos a menos — a matemática confirmou a diferença."}],pergunta:"Como você identifica, antes de calcular, se uma regra de três é direta ou inversa?",moral:"Regra de três: SEMPRE classifique antes. Direta: a₁/a₂=b₁/b₂. Inversa: a₁×b₁=a₂×b₂ (inverta uma coluna). Classifique errado = resultado errado."},

{year:"7",tri:"T3",theme:"Estatística",emoji:"📊",term:"Média, Mediana e Moda",
 layers:[{tag:"Por que tres medidas?",text:"Nenhuma medida única representa bem todos os conjuntos de dados. Média, mediana e moda são três ângulos diferentes para ver o 'centro' dos dados. A escolha certa depende do tipo de dado.",ex:"Notas 7,7,7,8: média=7,25, mediana=7, moda=7. Todas próximas. Mas com outlier, diferem muito."},
   {tag:"Media — o equilibrio",text:"Média = soma ÷ quantidade. Representa o ponto de equilíbrio dos dados. Problema: é sensível a valores extremos (outliers). Para <b>média ponderada</b>: multiplique cada valor pelo seu peso, some, divida pela soma dos pesos.",ex:"Notas 6(peso1) e 8(peso2): média=(6×1+8×2)/(1+2)=22/3≈7,3."},
   {tag:"Mediana — o centro real",text:"Mediana = valor central após ordenar. Para quantidade ímpar: valor do meio. Para par: média dos dois centrais. Não é afetada por outliers — é mais representativa quando há valores extremos.",ex:"Salários 1000,1000,1200,50000: mediana=(1000+1200)/2=R$1100. Média=R$13.300 (enganosa!)."},
   {tag:"Moda — o mais frequente",text:"Moda = valor que aparece mais vezes. Pode ser nenhum (amodal), um (unimodal) ou vários (bimodal, multimodal). Ideal para dados categóricos (cor favorita, produto mais vendido).",ex:"Vendas por cor: 15 azul, 28 vermelho, 28 verde, 10 amarelo. Bimodal: moda = vermelho e verde."}],
 historia:{cenas:[{icon:"📰",label:"A RENDA MEDIA DO BAIRRO",texto:"O jornal publicou: 'Renda média do bairro Jardins: R$12.000/mês.' Um morador do bairro ganhou R$1.800 e se sentiu excluído. O repórter não explicou: poucas famílias riquíssimas inflacionavam a média. A mediana era R$3.400 — bem mais representativa. A escolha da medida muda a história contada."},{icon:"👟",label:"O ESTOQUE DA LOJA",texto:"A loja de tênis precisava repor o estoque. O gerente olhou para a média de tamanhos vendidos: 39,5. Mas não existe tamanho 39,5! Ele usou a MODA: tamanho 40 (o mais vendido). Para decisão de estoque com dado categórico (tamanho), a moda é a medida correta."}],pergunta:"Em quais situações a mediana é mais honesta do que a média para representar um conjunto de dados?",moral:"Média = soma÷n (sensível a outliers). Mediana = valor central ordenado (robusta). Moda = mais frequente (ideal para categorias). Escolha a medida certa para cada situação."},

{year:"8",tri:"T1",theme:"Números",emoji:"🌀",term:"Números Reais e Irracionais",
 layers:[{tag:"O que sao irracionais?",text:"Um número irracional é aquele que <b>não pode ser escrito como p/q</b> — sua expansão decimal é infinita e sem padrão que se repete. São os 'buracos' na reta dos racionais.",ex:"√2=1,41421356... (infinito, sem padrão). π=3,14159265... (infinito, sem padrão)."},
   {tag:"Simplificando raízes irracionais",text:"Mesmo sendo irracionais, podemos simplificar raízes quadradas encontrando o maior quadrado perfeito que divide o radicando: √a×b = √a × √b quando a é quadrado perfeito.",ex:"√72=√(36×2)=6√2. √50=5√2. √75=5√3. Forma simplificada é mais limpa para cálculos."},
   {tag:"Racionalizando denominadores",text:"Em frações com raiz no denominador, multiplique numerador e denominador pela raiz para eliminar a irracionalidade de baixo.",ex:"1/√3 = (1×√3)/(√3×√3) = √3/3. 5/√2 = 5√2/2."},
   {tag:"Localizando na reta numerica",text:"Para estimar a posição de uma raiz irracional, determine entre quais quadrados perfeitos ela se encontra.",ex:"√10: √9=3 e √16=4. Então 3<√10<4. Mais perto de 3 (3,16). Para ser mais preciso: 3,1²=9,61 e 3,2²=10,24 → √10≈3,16."}],
 historia:{cenas:[{icon:"📐",label:"A DESCOBERTA DOS PITAGORICOS",texto:"Os pitagóricos acreditavam que todos os números eram racionais. Quando Hipaso calculou a diagonal de um quadrado de lado 1 — que é √2 — e provou que não pode ser escrito como fração, o descobrimento foi tão perturbador que, segundo a lenda, foi atirado ao mar para guardar o segredo."},{icon:"🔵",label:"O PI NA NATUREZA",texto:"Pi (π≈3,14159...) aparece em toda forma circular: roda, planeta, olho humano, espiral de galáxia, ondas sonoras. É impossível escrever π como fração exata — é irracional. Civilizações antigas usavam aproximações (22/7≈3,14286, 355/113≈3,14159). Hoje sabemos bilhões de dígitos de π — e nunca se repetem."}],pergunta:"Por que a diagonal de um quadrado de lado 1 é necessariamente irracional?",moral:"Irracionais: não podem ser escritos como p/q. Decimais infinitos sem período. √2, √3, π são os mais famosos. Para simplificar: extraia quadrados perfeitos. Reais = racionais + irracionais."},

 simple:"Os irracionais (√2, π) não podem ser escritos como fração. Reais = racionais + irracionais — o conjunto mais completo.",

 steps:{

{year:"8",tri:"T1",theme:"Números",emoji:"🔬",term:"Notação Científica",
 layers:[{tag:"Para que serve?",text:"Notação científica é uma forma compacta de escrever números muito grandes ou muito pequenos: a×10ⁿ, onde 1≤a<10. Evita erros de contar zeros e facilita a comunicação em ciências.",ex:"Distância Terra-Sol: 150.000.000km = 1,5×10⁸km. Tamanho de um vírus: 0,0000001m = 1×10⁻⁷m."},
   {tag:"Convertendo para notacao cientifica",text:"Mova a vírgula até ter um número entre 1 e 10. Se moveu para a <b>esquerda</b> (número grande): expoente positivo. Se moveu para a <b>direita</b> (número pequeno): expoente negativo. O expoente = número de casas movidas.",ex:"450.000 → vírgula andou 5 casas esquerda → 4,5×10⁵. 0,0032 → 3 casas direita → 3,2×10⁻³."},
   {tag:"Operacoes em notacao cientifica",text:"Multiplicar: multiplique as mantissas e some os expoentes. Dividir: divida as mantissas e subtraia os expoentes. Se o resultado tiver mantissa fora de [1,10), ajuste.",ex:"(2×10³)×(3×10⁴)=6×10⁷. (8×10⁶)÷(4×10²)=2×10⁴. Se der 20×10⁵, ajuste para 2×10⁶."},
   {tag:"Comparando grandezas",text:"Notação científica facilita comparar números de magnitudes muito diferentes: basta comparar os expoentes primeiro, depois as mantissas.",ex:"1,5×10⁸ km (Terra-Sol) vs 4,0×10¹³ km (estrela mais próxima). A estrela é 2,7×10⁵ vezes mais distante."}],
 historia:{cenas:[{icon:"🔬",label:"O LABORATORIO DE BIOLOGIA",texto:"A professora disse: 'uma gota de sangue tem 5.000.000 de glóbulos vermelhos'. Os alunos tentaram escrever e erraram o número de zeros. A professora reescreveu: 5×10⁶. Na notação científica, erros de contagem de zeros desaparecem — e a grandeza fica imediatamente visível."},{icon:"🚀",label:"A DISTANCIA ATE MARTE",texto:"A NASA anuncia distâncias de missões em notação científica: 'a sonda está a 2,25×10⁸km de Marte'. Para chegar a esse número de viagem: velocidade 2×10⁴km/h, tempo de viagem? T = 2,25×10⁸ ÷ (2×10⁴) = 1,125×10⁴ horas ≈ 469 dias. Divisão com notação científica: simples e precisa."}],pergunta:"Por que 12×10⁵ não é notação científica correta? Como você corrigiria?",moral:"Notação científica: a×10ⁿ com 1≤a<10. Esquerda: expoente +. Direita: expoente −. Mult: some expoentes. Div: subtraia expoentes. Ajuste a mantissa se sair de [1,10)."},

{year:"8",tri:"T1",theme:"Grandezas",emoji:"📊",term:"Grandezas Proporcionais e Porcentagem",
 layers:[{tag:"Grandezas e proporcionalidade",text:"Duas grandezas são <b>diretamente proporcionais</b> quando a razão entre elas é constante (a/b=k). São <b>inversamente proporcionais</b> quando o produto é constante (a×b=k).",ex:"Velocidade constante: distância/tempo=k (direta). Com velocidade×tempo=distância (inversa: mais rápido, menos tempo para a mesma distância)."},
   {tag:"Variações percentuais sucessivas",text:"Para aplicar dois ou mais percentuais em sequência, MULTIPLIQUE os fatores — nunca some os percentuais. +20% e depois −20% = 1,20×0,80=0,96 → resultado: −4%, não 0.",ex:"+30% e depois −30%: 1,30×0,70=0,91 → resultado: −9%, não 0."},
   {tag:"Regra de tres com porcentagem",text:"Porcentagem é frequentemente resolvida com regra de três direta. Mas o caminho mais curto é o fator de multiplicação: aumento de p% → ×(1+p/100). Desconto de p% → ×(1−p/100).",ex:"Produto R$350 com 40% de aumento: 350×1,40=R$490. Ou: regra de três 100%→350, 140%→x → x=R$490."},
   {tag:"Recuperar o valor original",text:"Se você sabe o valor após um percentual aplicado, divida pelo fator para recuperar o original. Nunca aplique o percentual de volta diretamente — isso dá resultado diferente.",ex:"Após aumento de 25%, produto custa R$500. Original: 500÷1,25=R$400. (Não faça 500−25%=375 — isso seria errado!)"}],
 historia:{cenas:[{icon:"📉",label:"O INVESTIMENTO PERDIDO",texto:"O pai de Pedro investiu R$10.000 numa ação. No primeiro mês, a ação subiu 50% (virou R$15.000). No segundo mês, caiu 50% (virou R$7.500). O pai ficou confuso: 'subiu 50% e caiu 50%, por que não voltou ao R$10.000?' Porque 1,50×0,50=0,75 — uma perda real de 25%!"},{icon:"🏷️",label:"O PRECO QUE VOLTOU?",texto:"Uma loja aumentou os preços em 20% para a temporada. Depois, em liquidação, deu 20% de desconto. O gerente disse: 'voltamos ao preço original'. Um cliente calculou: produto de R$100 → R$120 (+20%) → R$96 (−20%). Não voltou! O gerente estava errado: 1,20×0,80=0,96, não 1,00."}],pergunta:"Por que aplicar −20% depois de +20% não anula o aumento? O que seria necessário para anular exatamente?",moral:"Grandezas diretas: a/b=k. Inversas: a×b=k. Variações sucessivas: multiplique os fatores, nunca some os percentuais. Para recuperar o original: divida pelo fator aplicado."},

 simple:"Grandezas diretamente proporcionais variam juntas. Inversamente, uma cresce enquanto a outra diminui. Fator de multiplicação simplifica o cálculo de %.",

 steps:{
   intro:"Para problemas de porcentagem com fatores de multiplicação, o protocolo elimina erros de soma.",
   items:[
     {n:1,action:"Converta % em fator de multiplicação",detail:"Aumento de p%: ×(1+p/100). Desconto de p%: ×(1−p/100).",ex:"+20%: ×1,20. −15%: ×0,85. −30%: ×0,70"},
     {n:2,action:"Para variações sucessivas: multiplique os fatores",detail:"NUNCA some as porcentagens. Multiplique os fatores em sequência.",ex:"+20% e depois −20%: 1,20×0,80=0,96 → redução de 4% (não zero!)"},
     {n:3,action:"Para encontrar o valor original",detail:"Divida o valor final pelo fator aplicado.",ex:"Após desconto de 25%, produto custa R$150: original=150/0,75=R$200"},

 ],

{year:"8",tri:"T1",theme:"Álgebra",emoji:"🔤",term:"Expressões Algébricas e Monômios",
 layers:[{tag:"De numero para letra",text:"Em álgebra, usamos letras para representar valores desconhecidos ou variáveis. Um <b>monômio</b> é um produto de números e letras (3x², −5xy, 7). Um <b>polinômio</b> é uma soma de monômios.",ex:"3x²: monômio. 4x²−2x+1: polinômio de grau 2 com 3 termos."},
   {tag:"Termos semelhantes",text:"Monômios semelhantes têm a mesma <b>parte literal</b> (mesmas letras com mesmos expoentes). Só semelhantes podem ser somados ou subtraídos diretamente — some/subtraia os coeficientes e mantenha a parte literal.",ex:"5x² e −3x² são semelhantes: soma=2x². Mas 5x² e 3x NÃO são semelhantes (x²≠x)."},
   {tag:"Valor numerico",text:"O valor numérico de uma expressão é o resultado quando substituímos as letras por valores numéricos e calculamos. Aplique a ordem das operações normalmente após substituir.",ex:"Para x=2 e y=3: 2x²−3y = 2×(2)² − 3×(3) = 2×4 − 9 = 8−9 = −1."},
   {tag:"Grau do monomio e polinomio",text:"Grau do monômio = soma dos expoentes das variáveis. Grau do polinômio = maior grau entre os monômios que o compõem. Importante para classificar e para as operações com polinômios.",ex:"3x²y: grau=2+1=3. Polinômio 4x³−2x+1: grau=3 (o maior grau é o do 4x³)."}],

{year:"8",tri:"T2",theme:"Álgebra",emoji:"🌟",term:"Produtos Notáveis e Fatoração",
 layers:[{tag:"Por que 'notaveis'?",text:"São chamados 'notáveis' porque seus resultados têm padrão fixo e previsível — devem ser reconhecidos de memória, sem precisar multiplicar. São atalhos fundamentais em álgebra.",ex:"(a+b)²: ao invés de (a+b)×(a+b) → longo. Usando o padrão: a²+2ab+b² → instantâneo."},
   {tag:"Os tres padroes",text:"1) Quadrado da soma: (a+b)²=a²+<b>2ab</b>+b². 2) Quadrado da diferença: (a−b)²=a²−<b>2ab</b>+b². 3) Soma×diferença: (a+b)(a−b)=a²−b². O termo do meio (2ab) é o que mais se esquece!",ex:"(x+3)²=x²+6x+9. (2x−5)²=4x²−20x+25. (x+4)(x−4)=x²−16."},
   {tag:"Fatoracao — o caminho inverso",text:"Fatorar é escrever uma expressão como produto de fatores. Para identificar o produto notável: a) veja se começa e termina com quadrados perfeitos, b) verifique se o meio satisfaz o padrão.",ex:"x²−9=(x+3)(x−3). x²+6x+9=(x+3)². Sempre procure fator comum antes!"},
   {tag:"Fator comum em evidencia",text:"Antes de qualquer produto notável, procure o fator comum a todos os termos e coloque em evidência. Isso simplifica enormemente o que vem depois.",ex:"2x²−8=2(x²−4)=2(x+2)(x−2). Sem o fator 2 em evidência, seria mais difícil."}],
 historia:{cenas:[{icon:"🏟️",label:"A QUADRA MAIOR",texto:"A quadra de vôlei do CBB tinha lado a. O novo projeto ampliará o lado em 3m. Qual será a nova área? Em vez de calcular o lado (a+3) e depois elevar ao quadrado passo a passo, o arquiteto usou o produto notável: (a+3)²=a²+6a+9. A área original (a²) mais 6a mais 9 — três componentes claros."},{icon:"🎯",label:"O CALCULO RAPIDO",texto:"O professor pediu: 'qual é 49×51?' Os alunos foram de calculadora. Maria calculou mentalmente: 49×51=(50−1)(50+1)=50²−1²=2500−1=2499. Produto notável (a+b)(a−b)=a²−b² transformou uma multiplicação difícil numa conta mental de 3 segundos."}],pergunta:"Como usar o produto notável (a+b)(a−b) para calcular 99×101 mentalmente?",moral:"Produtos notáveis: (a+b)²=a²+2ab+b². (a−b)²=a²−2ab+b². (a+b)(a−b)=a²−b². Fatoração é o inverso. Sempre coloque fator comum em evidência antes de fatorar."},

 simple:"Produtos notáveis são multiplicações especiais com resultado padrão. Fatoração é o caminho inverso.",

 steps:{
   intro:"Para produtos notáveis, reconheça o padrão. Para fatoração, aplique o caminho inverso.",
   items:[
     {n:1,action:"Reconheça o tipo de produto ou expressão",detail:"Quadrado da soma: (a+b)². Quadrado da diferença: (a−b)². Soma×diferença: (a+b)(a−b).",ex:"(x+3)²: é quadrado da soma com a=x e b=3."},
     {n:2,action:"Aplique a fórmula correspondente",detail:"(a+b)²=a²+2ab+b². (a−b)²=a²−2ab+b². (a+b)(a−b)=a²−b².",ex:"(x+3)²=x²+6x+9. (2x−5)²=4x²−20x+25. (x+4)(x−4)=x²−16"},
     {n:3,action:"Para fatorar: reconheça o padrão",detail:"a²+2ab+b²=(a+b)². a²−b²=(a+b)(a−b). Procure fator comum primeiro.",ex:"x²−9=(x+3)(x−3). x²+6x+9=(x+3)²."},
     {n:4,action:"Verifique expandindo",detail:"Multiplique o resultado fatorado. Deve dar a expressão original.",ex:"(x+3)(x−3)=x²−3x+3x−9=x²−9 ✓",tip:"⚠️ Fator comum em evidência SEMPRE antes de aplicar produtos notáveis: 2x²−8=2(x²−4)=2(x+2)(x−2)"}

 },

{year:"8",tri:"T2",theme:"Geometria",emoji:"🔺",term:"Triângulos — Classificação e Pontos Notáveis",
 layers:[{tag:"Condicao de existencia",text:"Um triângulo existe apenas se cada lado for <b>estritamente menor</b> que a soma dos outros dois. Se qualquer lado for maior ou igual à soma dos outros, os lados não se fecham em triângulo.",ex:"Lados 3,4,8: 3+4=7<8 → NÃO existe! Lados 3,4,6: 3+4=7>6 → existe ✓."},
   {tag:"Classificacao pelos lados e angulos",text:"Pelos lados: equilátero (3 lados iguais), isósceles (2 iguais), escaleno (todos diferentes). Pelos ângulos: acutângulo (todos <90°), retângulo (um =90°), obtusângulo (um >90°). Um triângulo pode combinar ambas as classificações.",ex:"Triângulo 5,5,8: isósceles. Triângulo 3,4,5: escaleno E retângulo."},
   {tag:"Propriedades angulares",text:"Soma dos ângulos internos: sempre 180°. Ângulo externo = soma dos dois ângulos internos não adjacentes. Triângulo equilátero: todos os ângulos medem 60°.",ex:"Ângulos internos 50° e 70°: terceiro = 180°−50°−70°=60°. Ângulo externo ao de 60°: 50°+70°=120°."},
   {tag:"Pontos notaveis",text:"<b>Baricentro</b> (medianas): ponto de equilíbrio, divide cada mediana 2:1. <b>Incentro</b> (bissetrizes): centro do círculo inscrito. <b>Circuncentro</b> (mediatrizes): centro do círculo circunscrito. <b>Ortocentro</b> (alturas).",ex:"Baricentro: pegar um triângulo de papelão pelo baricentro — ele equilibra horizontalmente."}],
 historia:{cenas:[{icon:"⚙️",label:"O TRIANGULO NA ENGENHARIA",texto:"Engenheiros usam triângulos porque são a única forma poligonal que não deforma quando os vértices são fixados. Um quadrado pode virar um losango se pressionado — um triângulo não. Por isso pontes, torres e estruturas metálicas são repletas de triângulos: eles distribuem forças de forma mais eficiente."},{icon:"🗺️",label:"O TRIANGULO DE NAVEGACAO",texto:"Antes do GPS, navegadores usavam triangulação para se localizar. Com três referências de pontos conhecidos (estrelas, faróis, montanhas) e os ângulos de visão para cada uma, calculavam a posição exata usando propriedades de triângulos. A mesma técnica é usada hoje por redes de celular para localizar smartphones."}],pergunta:"Por que triângulos são tão usados em estruturas de engenharia, diferente de quadriláteros?",moral:"Condição de existência: cada lado < soma dos outros dois. Classificação por lados (equilátero, isósceles, escaleno) e por ângulos (acutângulo, retângulo, obtusângulo). Soma interna: sempre 180°."},

{year:"8",tri:"T3",theme:"Álgebra",emoji:"📉",term:"Equação do 2º Grau — Bhaskara",
 layers:[{tag:"O que diferencia do 1o grau?",text:"A equação do 2° grau tem a forma ax²+bx+c=0, com a≠0. O que diferencia é o termo x² — que faz a função ser uma parábola em vez de uma reta, e pode ter 0, 1 ou 2 soluções reais.",ex:"x+5=0: 1° grau → 1 solução (x=−5). x²−5x+6=0: 2° grau → pode ter 0, 1 ou 2 soluções."},
   {tag:"O discriminante Delta",text:"Antes de calcular as raízes com Bhaskara, calcule Δ=b²−4ac. Δ>0: 2 raízes reais distintas. Δ=0: 1 raiz real (dupla). Δ<0: sem raízes reais. Isso informa o número de soluções <b>antes</b> de qualquer cálculo.",ex:"x²−5x+6=0: Δ=25−24=1>0 → 2 raízes. x²+1=0: Δ=0−4=−4<0 → sem raiz real."},
   {tag:"Bhaskara — a formula",text:"x = (−b ± √Δ) / 2a. Calcule x₁ com o sinal + e x₂ com o sinal −. As raízes são os valores de x que satisfazem a equação (zeros da função quadrática).",ex:"x²−5x+6=0: Δ=1. x=(5±1)/2 → x₁=(5+1)/2=3 e x₂=(5−1)/2=2."},
   {tag:"Verificação com Girard",text:"Verifique rapidamente com as relações de Girard: x₁+x₂=−b/a (soma das raízes) e x₁×x₂=c/a (produto das raízes). Não precisa substituir nas equações.",ex:"Raízes 3 e 2: soma=5=5/1=−(−5)/1 ✓. Produto=6=6/1 ✓. Verificado!"}],
 historia:{cenas:[{icon:"⚽",label:"O CHUTE DA FALTA",texto:"O goleiro calculava mentalmente a trajetória do chute: h(t)=−5t²+20t metros. Quando a bola atinge o solo? −5t²+20t=0 → t(−5t+20)=0 → t=0 (saiu do pé) ou t=4 (chegou ao chão). A bola fica 4 segundos no ar. Máxima altura: em t=2s (vértice), h=−5×4+40=20m!"},{icon:"🏊",label:"A PISCINA DE AREA MAXIMA",texto:"Uma piscina retangular será construída com 40m de borda. Um lado = x, o outro = (20−x). Área = x(20−x) = −x²+20x. Máxima área: vértice em x=10m → área=100m². A solução de um problema de otimização real usando função do 2° grau."}],pergunta:"Por que equações do 2° grau podem ter 0, 1 ou 2 soluções, enquanto as do 1° grau têm sempre exatamente 1?",moral:"ax²+bx+c=0: Δ=b²−4ac. Δ>0: 2 raízes. Δ=0: 1 raiz. Δ<0: 0 raízes. Bhaskara: x=(−b±√Δ)/2a. Verificação rápida: x₁+x₂=−b/a e x₁×x₂=c/a."},

{year:"8",tri:"T3",theme:"Geometria",emoji:"⭕",term:"Circunferência e Círculo — Aprofundado",
 layers:[{tag:"Revisao e extensao",text:"Comprimento da circunferência: C=2πr. Área do círculo: A=πr². Agora estendemos: <b>arco</b> é parte da circunferência; <b>setor circular</b> é a fatia correspondente.",ex:"Semicírculo (180°): arco=πr. Área=πr²/2. Quarto de círculo (90°): arco=πr/2. Área=πr²/4."},
   {tag:"Arco e setor para qualquer angulo",text:"Para ângulo α graus: comprimento do arco = 2πr×α/360. Área do setor = πr²×α/360. É a fração α/360 do círculo completo.",ex:"Setor de 60° com r=6: arco=2π×6×60/360=2π. Área=π×36×60/360=6π≈18,85cm²."},
   {tag:"Coroa circular e figuras compostas",text:"A coroa circular (anel) é a região entre dois círculos concêntricos. Área da coroa = πR²−πr² = π(R²−r²). Use a fórmula direta, não calcule os dois círculos separadamente e subtraia.",ex:"Anel com R=10 e r=6: A=π(100−36)=64π≈201cm²."},
   {tag:"Posicoes relativas reta e circunferencia",text:"Uma reta e uma circunferência podem ser: secante (2 pontos de interseção), tangente (1 ponto), ou externas (0 pontos). A posição é determinada pela distância do centro à reta comparada com o raio.",ex:"Distância do centro à reta < raio → secante. = raio → tangente. > raio → externa."}],
 historia:{cenas:[{icon:"🎡",label:"A RODA GIGANTE",texto:"A roda gigante tem raio 25m. O setor de embarque ocupa um arco de 30°. Qual o comprimento desse arco? L=2π×25×30/360=25π/6≈13,1m. E a área do setor? A=π×625×30/360≈163m². O engenheiro precisou dessas fórmulas para calcular o espaço necessário para as cadeiras e a plataforma de embarque."},{icon:"🎯",label:"A TRAVE DE ATLETISMO",texto:"Uma pista de atletismo tem uma reta de 100m e duas semicircunferências de raio r. A pista total deve ter 400m. Comprimento total: 2×100 + 2×πr = 400 → 200+2πr=400 → 2πr=200 → r=200/(2π)≈31,8m. A geometria circular determinou o raio das curvas da pista!"}],pergunta:"Por que a fórmula da coroa circular A=π(R²−r²) é mais elegante do que calcular πR²−πr² separadamente?",moral:"Setor de α°: arco=2πr×α/360, área=πr²×α/360. Coroa circular: A=π(R²−r²). Posições da reta: distância do centro vs raio determina secante, tangente ou externa."},

{year:"9",tri:"T1",theme:"Geometria",emoji:"🏛️",term:"Teorema de Pitágoras",
 layers:[{tag:"O que afirma?",text:"Em todo triângulo retângulo, o quadrado da hipotenusa (o lado oposto ao ângulo reto) é igual à soma dos quadrados dos catetos: <b>c²=a²+b²</b>. A hipotenusa é sempre o lado mais longo.",ex:"Triângulo com catetos 3 e 4: hipotenusa=√(9+16)=√25=5."},
   {tag:"Ternas pitagoricas",text:"Ternas pitagóricas são conjuntos de três inteiros que satisfazem a²+b²=c². Memorize: 3-4-5, 5-12-13, 6-8-10, 8-15-17. Qualquer múltiplo também funciona: 6-8-10=2×(3-4-5).",ex:"Triângulo com lados 6, 8 e 10: é 2×(3,4,5). Como 6²+8²=100=10² ✓, é retângulo."},
   {tag:"Aplicando Pitagoras",text:"Para encontrar a hipotenusa: c=√(a²+b²). Para encontrar um cateto: a=√(c²−b²). Sempre identifique qual é a hipotenusa (o lado oposto ao 90°) antes de montar o cálculo.",ex:"Escada de 5m apoiada a 3m da parede: altura=√(5²−3²)=√(25−9)=√16=4m."},
   {tag:"A prova mais bonita",text:"Pitágoras foi provado de centenas de formas diferentes ao longo da história. Uma das mais elegantes: construa um quadrado de lado (a+b) e preencha com 4 cópias do triângulo retângulo e 1 quadrado central. A álgebra dos quadrados confirma c²=a²+b².",ex:"(a+b)²=4×(ab/2)+c² → a²+2ab+b²=2ab+c² → a²+b²=c² ✓"}],
 historia:{cenas:[{icon:"🏗️",label:"O CANTO DE 90 GRAUS",texto:"O pedreiro precisava garantir que o canto de uma parede fosse exatamente 90°. Ele usou o método egípcio de 4000 anos: mediu 3 tijolos em uma direção, 4 na outra perpendicular. Se a diagonal medir exatamente 5 tijolos, o ângulo é 90°. A terna 3-4-5 como ferramenta de construção há milênios."},{icon:"⛵",label:"A NAVEGACAO PELOS TRIANGULOS",texto:"Um barco saiu do porto em linha reta por 12km para leste e depois 5km para norte. Qual a distância direta de volta ao porto? √(12²+5²)=√(144+25)=√169=13km. Reconhece? 5-12-13 é uma terna pitagórica! O navegador calculou a distância em segundos."}],pergunta:"Por que a hipotenusa é sempre o maior lado de um triângulo retângulo?",moral:"c²=a²+b². Hipotenusa = lado oposto ao 90° (sempre o maior). Ternas: 3-4-5, 5-12-13, 6-8-10, 8-15-17. Para encontrar cateto: a=√(c²−b²)."},

{year:"9",tri:"T1",theme:"Geometria",emoji:"📐",term:"Semelhança de Triângulos e Teorema de Tales",
 layers:[{tag:"O que e semelhanca?",text:"Dois triângulos são semelhantes quando têm os <b>mesmos ângulos</b> (mesma forma, tamanho diferente). Os lados correspondentes são proporcionais com a mesma razão k (razão de semelhança).",ex:"Triângulos com lados 3,4,5 e 6,8,10: k=2. Todos os lados do maior são o dobro do menor."},
   {tag:"Criterios de semelhanca",text:"AA (dois ângulos iguais): se dois ângulos são iguais, o terceiro também é (pois a soma é 180°). LAL (dois lados proporcionais e ângulo entre eles igual). LLL (três lados proporcionais).",ex:"Para verificar AA: confirme que dois ângulos são iguais. O terceiro automaticamente também é."},
   {tag:"Razao de semelhanca e areas",text:"Se a razão de semelhança linear é k, a razão de áreas é k². Isso é fundamental para problemas de escala e ampliação.",ex:"Triângulos com razão 1:3 → áreas na razão 1:9. Foto ampliada 2x → área 4x maior."},
   {tag:"Teorema de Tales",text:"Se retas paralelas cortam duas transversais, os segmentos correspondentes são proporcionais: AB/BC=DE/EF. É a base da semelhança e aparece em sombras, projeções e qualquer situação de 'linhas paralelas cortando outras linhas'.",ex:"Sombra de 2m com objeto de 0,5m: sombra de outro objeto de 3m de altura = 2×3/0,5=12m."}],
 historia:{cenas:[{icon:"☀️",label:"TALES E A PIRAMIDE",texto:"O filósofo Tales mediu a altura de uma pirâmide do Egito sem escalá-la. Esperou o momento do dia em que sua sombra (1,75m de altura, 1,75m de sombra) igualava sua altura. Nesse momento, a sombra de qualquer objeto iguala sua altura. Mediu a sombra da pirâmide (230m) e descobriu: a pirâmide tem 230m de altura. Semelhança de triângulos há 2500 anos."},{icon:"📸",label:"A ESCALA DA FOTO",texto:"Uma foto de satélite de São Paulo tem escala 1:50.000. O parque do Ibirapuera no mapa mede 2cm×1,5cm. Área real: 1000m×750m=750.000m²=75 hectares. Como áreas escalam com k², confirma: na foto tem 3cm², na realidade: 3×(50.000)²cm²=75ha ✓."}],pergunta:"Como Tales usou semelhança de triângulos para medir a pirâmide sem escalá-la?",moral:"Triângulos semelhantes: mesmos ângulos, lados proporcionais. Razão k → áreas k². Tales: retas paralelas criam proporções nas transversais. Sombras, escalas e projeções usam semelhança."},

 },

{year:"9",tri:"T1",theme:"Grandezas",emoji:"💰",term:"Porcentagem Avançada e Juros",
 layers:[{tag:"Juros simples — o basico",text:"Juros simples: J=C×i×n. Os juros são sempre calculados sobre o capital inicial (C). O montante cresce linearmente: M=C(1+i×n). Raro no mercado real, mas importante como base de comparação.",ex:"R$1000 a 3%/mês por 4 meses: J=1000×0,03×4=R$120. M=R$1120."},
   {tag:"Juros compostos — a realidade",text:"Juros compostos: M=C×(1+i)ⁿ. Cada período, os juros incidem sobre o montante acumulado — <b>juros sobre juros</b>. O crescimento é exponencial. É o padrão do mercado financeiro.",ex:"R$1000 a 3%/mês por 4 meses: M=1000×(1,03)⁴=1000×1,1255=R$1125,50. (R$5,50 a mais que simples.)"},
   {tag:"A diferenca cresce com o tempo",text:"A diferença entre simples e compostos é pequena no curto prazo, mas enorme no longo prazo. R$1000 a 10% ao ano: simples por 30 anos = R$4000. Compostos por 30 anos = R$17.449.",ex:"Simples: cresce linearmente. Compostos: cresce exponencialmente. A separação entre as curvas aumenta sempre."},
   {tag:"I e n na mesma unidade",text:"A taxa i e o período n DEVEM estar na mesma unidade de tempo. Taxa anual com n em meses → ou converta a taxa para mensal, ou n para anos. Nunca misture.",ex:"10% ao ano por 6 meses: use i=10%/12≈0,833% ao mês e n=6. OU i=10% ao ano e n=0,5 ano."}],
 historia:{cenas:[{icon:"💳",label:"O CARTAO DE LUCAS",texto:"Lucas tinha R$500 de dívida no cartão a 12%/mês (compostos). Achou que poderia pagar depois. Sem fazer nenhum pagamento: após 3 meses: 500×(1,12)³=500×1,405=R$702,50. Após 6 meses: 500×(1,12)⁶=500×1,974=R$987. Em 6 meses, a dívida quase dobrou. 'Depois' saiu caro."},{icon:"🏦",label:"A POUPANÇA DE ANA",texto:"Ana depositou R$2000 na poupança a 0,5%/mês. Seu irmão fez a conta: 0,5%×12 meses=6% ao ano → em 10 anos, R$2000×(1+0,06×10)=R$3200. Ana calculou com compostos: 2000×(1,005)^120=2000×1,8194=R$3638,80. A diferença de R$438,80 é o poder dos juros compostos ao longo do tempo."}],pergunta:"Por que uma dívida de cartão de crédito com taxa mensal alta pode tornar-se impagável se ignorada?",moral:"Simples: M=C(1+in) — linear. Compostos: M=C(1+i)ⁿ — exponencial. i e n na mesma unidade. Compostos são o padrão do mercado. A diferença entre os dois cresce dramaticamente com o tempo."},

 simple:"Juros simples: M=C(1+in). Compostos: M=C(1+i)n. Compostos crescem mais — juros sobre juros.",
 explain:"Você já sabe que porcentagem é uma proporção de 100. No nível avançado, a habilidade central é o <b>fator de multiplicação</b> — que elimina a necessidade de dois cálculos separados.<br><br>Ao invés de 'calcular 20% e somar', você multiplica por 1,20. Ao invés de 'calcular 15% e subtrair', multiplica por 0,85.<br><br>Para variações sucessivas: <em>sempre multiplique os fatores, nunca some as porcentagens.</em><br>+20% depois −20% = ×1,20 × ×0,80 = ×0,96 → resultado −4%, não zero!<br><br>Para juros:<br>• <b>Simples</b>: M = C(1 + i·n) — crescimento linear<br>• <b>Compostos</b>: M = C·(1+i)ⁿ — crescimento exponencial (juros sobre juros)<br><br>No mercado financeiro real, juros compostos são o padrão — tanto para investimentos quanto para dívidas.",
 example:"R$2.000 aplicados a 5% ao mês por 3 meses. Simples: M=2000×(1+0,05×3)=R$2.300. Compostos: M=2000×(1,05)³=2000×1,1576≈R$2.315,25. A diferença aumenta com o tempo.",

 steps:{
   intro:"Para problemas de juros, identifique o regime e unifique as unidades de tempo.",
   items:[
     {n:1,action:"Identifique: simples ou composto?",detail:"Simples: M=C(1+in). Composto: M=C(1+i)n. Se não especificado, geralmente é composto.",ex:"Banco: quase sempre composto. Juros fixos por mês → simples"},
     {n:2,action:"Unifique as unidades de tempo",detail:"i e n devem estar na mesma unidade. Taxa anual com n em meses → converta.",ex:"Taxa 10% ao ano, prazo 6 meses: use i=10%/12 ao mês e n=6"},
     {n:3,action:"Substitua e calcule",detail:"Use a fórmula correta. Para compostos, calcule (1+i)n.",ex:"C=R$1.000, i=5%, n=2 meses: M=1000×(1,05)²=R$1.102,50"},
     {n:4,action:"Calcule os juros J se necessário",detail:"J=M−C=montante−capital inicial.",ex:"J=1102,50−1000=R$102,50",tip:"⚠️ Compostos: NAO multiplique i×n. Use (1+i)n. O produto i×n só vale para juros simples!"}
   ]
 },

 story:{icon:"🏦",title:"O empréstimo que triplicou",text:"Marcos pegou emprestado R$5.000 no banco para reformar a cozinha. Taxa: 8% ao mês em juros compostos. Ele 'esqueceu' de pagar por 18 meses.\n\nEle estimou: 8% × 18 = 144% → devia cerca de R$12.200.\n\nMas a realidade dos juros compostos:\nM = 5000 × (1,08)¹⁸ = 5000 × 3,996 = R$19.980\n\nA dívida quase quadruplicou! Marcos errou porque usou raciocínio de juros simples para uma situação de juros compostos.\n\nDiferença: R$19.980 − R$12.200 = R$7.780 que ele não esperava pagar.",connection:"Cartão de crédito (juros compostos altíssimos), financiamento imobiliário (30 anos de juros compostos), previdência privada (benefício dos juros compostos a favor), inflação cumulativa, retorno de investimentos — juros compostos afetam qualquer planejamento financeiro de longo prazo."},
 dict:[
   {term:"Juros simples",def:"Calculados sempre sobre o capital inicial. Crescimento linear — o valor dos juros é constante a cada período.",ex:"R$500 a 3%/mês por 4 meses: J=500×0,03×4=R$60. M=R$560."},
   {term:"Juros compostos",def:"Calculados sobre o montante acumulado do período anterior. Crescimento exponencial — os juros crescem a cada período.",ex:"R$500 a 3%/mês por 4 meses: M=500×(1,03)4≈R$562,75."},
   {term:"Montante",def:"Valor total ao final: capital + juros acumulados. M=C+J (simples) ou M=C(1+i)n (compostos).",ex:"Capital R$1.000, juros R$200: M=R$1.200."},
   {term:"Fator de multiplicação",def:"O valor (1+i) pelo qual o capital é multiplicado a cada período nos juros compostos.",ex:"Taxa de 5%: fator=1,05. Em 3 períodos: 1,05 ao cubo=1,1576."}

{year:"9",tri:"T3",theme:"Estatística",emoji:"📉",term:"Medidas de Dispersão",
 layers:[{tag:"Por que a media nao e suficiente?",text:"Duas turmas têm média 7,0. Turma A: notas 6,7,7,8 (todos parecidos). Turma B: notas 2,4,9,10 (muito diferentes). A média igual esconde realidades completamente diferentes. Precisamos medir o <b>espalhamento</b>.",ex:"Turma A: desempenho homogêneo. Turma B: metade precisa de reforço, metade está ótima."},
   {tag:"Variancia — medir o espalhamento",text:"Variância = média dos quadrados dos desvios. Passos: (1) calcule a média, (2) calcule cada desvio (dado−média), (3) eleve ao quadrado, (4) calcule a média dos quadrados. Elevamos ao quadrado para eliminar negativos.",ex:"Dados 4,6,8,10: média=7. Desvios: −3,−1,+1,+3. Quadrados: 9,1,1,9. Variância=20/4=5."},
   {tag:"Desvio padrao — de volta a unidade original",text:"Desvio Padrão (DP) = raiz quadrada da variância. Tem a mesma unidade que os dados originais (em vez de unidade²). DP pequeno: dados concentrados. DP grande: dados espalhados.",ex:"Variância=5. DP=√5≈2,24. Os dados se afastam, em média, 2,24 unidades da média 7."},
