<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Matemática — Anos Finais</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--c6:#FF6B6B;--c7:#FF9F43;--c8:#54A0FF;--c9:#5F27CD;--bg:#F0F4FF;--text:#2D3436;--sub:#636e72;--radius:18px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#6C5CE7,#a29bfe,#fd79a8);padding:40px 24px 60px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.15) 0%,transparent 60%),radial-gradient(circle at 80% 20%,rgba(255,255,255,.1) 0%,transparent 50%);}
header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,6vw,3.2rem);color:#fff;text-shadow:0 4px 12px rgba(0,0,0,.2);position:relative;}
header p{color:rgba(255,255,255,.9);font-size:1rem;margin-top:8px;font-weight:700;position:relative;}
.shape{position:absolute;border-radius:50%;opacity:.15;background:#fff;}
.s1{width:120px;height:120px;top:-30px;left:-30px;}
.s2{width:80px;height:80px;bottom:10px;right:60px;}
.s3{width:50px;height:50px;top:20px;right:22%;border-radius:8px;transform:rotate(20deg);}
.search-wrap{max-width:600px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10;}
.search-wrap input{width:100%;padding:16px 24px 16px 52px;border-radius:50px;border:none;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;box-shadow:0 8px 32px rgba(108,92,231,.25);outline:none;color:var(--text);}
.search-wrap::before{content:'🔍';position:absolute;left:40px;top:50%;transform:translateY(-50%);font-size:1.1rem;}
.tabs{display:flex;justify-content:center;gap:10px;padding:32px 20px 16px;flex-wrap:wrap;}
.tab{padding:10px 24px;border-radius:50px;border:3px solid transparent;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all .2s;background:#fff;color:var(--sub);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.tab[data-year="all"]{border-color:#6C5CE7;color:#6C5CE7;}
.tab[data-year="6"]{border-color:var(--c6);}
.tab[data-year="7"]{border-color:var(--c7);}
.tab[data-year="8"]{border-color:var(--c8);}
.tab[data-year="9"]{border-color:var(--c9);}
.tab.active[data-year="all"]{background:#6C5CE7;color:#fff;}
.tab.active[data-year="6"]{background:var(--c6);color:#fff;}
.tab.active[data-year="7"]{background:var(--c7);color:#fff;}
.tab.active[data-year="8"]{background:var(--c8);color:#fff;}
.tab.active[data-year="9"]{background:var(--c9);color:#fff;}
.tab:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12);}
.theme-filter{display:flex;justify-content:center;gap:8px;padding:0 20px 24px;flex-wrap:wrap;}
.theme-btn{padding:6px 16px;border-radius:50px;border:2px solid #e0e0e0;background:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;color:var(--sub);}
.theme-btn.active,.theme-btn:hover{border-color:#6C5CE7;color:#6C5CE7;background:#f0edff;}
.counter{text-align:center;padding:0 20px 16px;font-weight:700;color:var(--sub);font-size:.9rem;}
.glossary{max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.card{background:#fff;border-radius:var(--radius);padding:20px 20px 16px;box-shadow:0 4px 16px rgba(0,0,0,.07);border-top:5px solid;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.13);}
.card[data-year="6"]{border-color:var(--c6);}
.card[data-year="7"]{border-color:var(--c7);}
.card[data-year="8"]{border-color:var(--c8);}
.card[data-year="9"]{border-color:var(--c9);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.by{font-family:'Fredoka One',cursive;font-size:.72rem;padding:3px 10px;border-radius:50px;color:#fff;}
.by[data-year="6"]{background:var(--c6);}
.by[data-year="7"]{background:var(--c7);}
.by[data-year="8"]{background:var(--c8);}
.by[data-year="9"]{background:var(--c9);}
.bt{font-size:.72rem;padding:3px 10px;border-radius:50px;background:#f0f0f0;color:#888;font-weight:700;}
.card h3{font-family:'Fredoka One',cursive;font-size:1.2rem;margin-bottom:6px;}
.card .simple{font-size:.9rem;line-height:1.5;font-weight:600;color:#444;}
.card .hint{margin-top:12px;font-size:.78rem;color:#bbb;font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:var(--sub);font-size:1.1rem;font-weight:700;grid-column:1/-1;}
.no-results span{font-size:3rem;display:block;margin-bottom:12px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,10,50,.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:24px;width:100%;max-width:660px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.35);transform:translateY(30px) scale(.97);transition:transform .3s,opacity .3s;opacity:0;}
.overlay.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-band{padding:26px 26px 18px;border-radius:24px 24px 0 0;position:relative;}
.modal-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;font-size:1.1rem;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;transition:background .2s;}
.modal-close:hover{background:rgba(255,255,255,.4);}
.modal-emoji{font-size:2.6rem;display:block;margin-bottom:6px;}
.modal-title{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15);}
.modal-sub{color:rgba(255,255,255,.85);font-weight:700;font-size:.9rem;margin-top:4px;}
.modal-tabs{display:flex;border-bottom:2px solid #f0f0f0;padding:0 24px;overflow-x:auto;}
.mtab{padding:13px 18px;font-family:'Fredoka One',cursive;font-size:.95rem;cursor:pointer;border:none;background:none;color:#bbb;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.mtab.active{color:#6C5CE7;border-bottom-color:#6C5CE7;}
.modal-body{padding:22px 24px 30px;}
.mpanel{display:none;animation:fadeIn .25s ease;}
.mpanel.active{display:block;}
.explain-box{background:#f8f9ff;border-radius:14px;padding:18px 20px;margin-bottom:14px;line-height:1.7;font-size:.97rem;font-weight:600;color:#333;}
.example-box{border-radius:14px;padding:16px 20px;border-left:5px solid;}
.example-box .elabel{font-family:'Fredoka One',cursive;font-size:.85rem;margin-bottom:6px;opacity:.9;}
.example-box p{font-size:.93rem;line-height:1.6;font-weight:600;}
.visual-wrap{text-align:center;padding:8px 0 4px;}
.visual-wrap svg{max-width:100%;height:auto;}
.visual-caption{margin-top:12px;font-size:.88rem;color:var(--sub);font-weight:700;line-height:1.5;text-align:center;}
.summary-list{list-style:none;}
.summary-list li{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid #f0f0f0;font-size:.93rem;font-weight:600;line-height:1.5;}
.summary-list li:last-child{border-bottom:none;}
.summary-list .icon{font-size:1.3rem;flex-shrink:0;margin-top:1px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
footer{text-align:center;padding:20px;color:#aaa;font-size:.85rem;font-weight:600;}
</style>
</head>
<body>
<header>
  <div class="shape s1"></div><div class="shape s2"></div><div class="shape s3"></div>
  <h1>📐 Glossário de Matemática</h1>
  <p>6º ao 9º ano · Clique em qualquer termo para explorar em profundidade!</p>
</header>
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Buscar… ex: fração, ângulo, raiz quadrada">
</div>
<div class="tabs">
  <button class="tab active" data-year="all">Todos</button>
  <button class="tab" data-year="6">6º ano</button>
  <button class="tab" data-year="7">7º ano</button>
  <button class="tab" data-year="8">8º ano</button>
  <button class="tab" data-year="9">9º ano</button>
</div>
<div class="theme-filter">
  <button class="theme-btn active" data-theme="all">Todos os temas</button>
  <button class="theme-btn" data-theme="Números">Números</button>
  <button class="theme-btn" data-theme="Álgebra">Álgebra</button>
  <button class="theme-btn" data-theme="Geometria">Geometria</button>
  <button class="theme-btn" data-theme="Estatística">Estatística</button>
  <button class="theme-btn" data-theme="Grandezas">Grandezas</button>
</div>
<div class="counter" id="counter"></div>
<div class="glossary" id="glossary"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-band" id="modalBand">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <span class="modal-emoji" id="mEmoji"></span>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-sub" id="mSub"></div>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchTab(0,this)">📖 Explicação</button>
      <button class="mtab" onclick="switchTab(1,this)">🎨 Visual</button>
      <button class="mtab" onclick="switchTab(2,this)">✅ Resumão</button>
    </div>
    <div class="modal-body">
      <div class="mpanel active" id="mp0"></div>
      <div class="mpanel" id="mp1"></div>
      <div class="mpanel" id="mp2"></div>
    </div>
  </div>
</div>
<footer>Colégio Batista Brasileiro · Coordenação Pedagógica · Anos Finais</footer>

<script>
const COLORS={6:'#FF6B6B',7:'#FF9F43',8:'#54A0FF',9:'#5F27CD'};

const terms=[
  // 6º ANO
  {year:"6",theme:"Números",emoji:"🍕",term:"Fração",
   simple:"Uma parte de um todo. O número de cima diz quantas partes você tem; o de baixo diz em quantas partes o todo foi dividido.",
   explain:"Uma fração representa a divisão de um todo em partes iguais. O <b>numerador</b> (número de cima) indica quantas partes foram tomadas. O <b>denominador</b> (número de baixo) indica em quantas partes iguais o todo foi dividido. Frações são usadas em receitas, notas escolares, divisões e muito mais.",
   example:"Uma pizza foi cortada em 8 fatias iguais. Você comeu 3 fatias → você comeu <b>3/8</b> da pizza. O 3 é o numerador (fatias que comeu) e o 8 é o denominador (total de fatias).",
   visual:`<svg viewBox="0 0 260 240" xmlns="http://www.w3.org/2000/svg" width="230">
     <circle cx="130" cy="120" r="100" fill="#fff3e0" stroke="#FF9F43" stroke-width="3"/>
     ${[0,1,2,3,4,5,6,7].map(i=>{const a1=i*45*Math.PI/180,a2=(i+1)*45*Math.PI/180,x1=130+100*Math.cos(a1-Math.PI/2),y1=120+100*Math.sin(a1-Math.PI/2),x2=130+100*Math.cos(a2-Math.PI/2),y2=120+100*Math.sin(a2-Math.PI/2),f=i<3?'#FF9F43':'#ffe0b2';return`<path d="M130,120 L${x1},${y1} A100,100 0 0,1 ${x2},${y2} Z" fill="${f}" stroke="#fff" stroke-width="2"/>`;}).join('')}
     <text x="130" y="238" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#e67e22">3 fatias comidas = 3/8</text>
   </svg>`,
   visualCaption:"A pizza foi dividida em 8 partes iguais. As 3 partes laranjas representam a fração 3/8.",
   summary:["Numerador = partes que você tem (número de cima)","Denominador = total de partes iguais (número de baixo)","Fração < 1 → numerador menor que denominador","Fração equivalente: multiplique numerador e denominador pelo mesmo número","Usada em receitas, notas, divisões e porcentagens"]},

  {year:"6",theme:"Números",emoji:"💯",term:"Porcentagem",
   simple:"Uma fração especial onde o todo é sempre 100. O símbolo é %. Significa 'de cada 100'.",
   explain:"Porcentagem é uma forma padronizada de comparar qualquer quantidade com 100. Quando dizemos 30%, estamos dizendo '30 de cada 100'. É uma das ferramentas matemáticas mais usadas no cotidiano — em descontos, juros, notas e estatísticas. Para calcular: multiplique o valor pela porcentagem e divida por 100.",
   example:"Uma loja tem 30% de desconto num tênis de R$200. Isso significa R$30 de desconto para cada R$100 → 30% × 200 = R$60 de desconto. Você pagará R$140.",
   visual:`<svg viewBox="0 0 270 160" xmlns="http://www.w3.org/2000/svg" width="260">
     <rect x="10" y="40" width="250" height="40" rx="20" fill="#eee"/>
     <rect x="10" y="40" width="75" height="40" rx="20" fill="#FF6B6B"/>
     <text x="47" y="66" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#fff">30%</text>
     <text x="8" y="32" font-family="Fredoka One" font-size="13" fill="#636e72">0%</text>
     <text x="128" y="32" font-family="Fredoka One" font-size="13" fill="#636e72">50%</text>
     <text x="248" y="32" font-family="Fredoka One" font-size="13" fill="#636e72">100%</text>
     <text x="135" y="115" text-anchor="middle" font-family="Fredoka One" font-size="17" fill="#FF6B6B">30% = 30/100 = 0,30</text>
     <text x="135" y="145" text-anchor="middle" font-family="Nunito" font-size="13" fill="#636e72" font-weight="700">De cada R$100 → R$30 de desconto</text>
   </svg>`,
   visualCaption:"A barra mostra que 30% é 30 partes de um total de 100. A parte vermelha representa os 30%.",
   summary:["% sempre compara com 100","Para calcular: (valor × %) ÷ 100","10% de qualquer número = divida por 10","50% = metade; 25% = um quarto","Muito usada em descontos, notas e estatísticas"]},

  {year:"6",theme:"Geometria",emoji:"📐",term:"Ângulo",
   simple:"A abertura entre dois raios que partem do mesmo ponto. Medimos em graus (°).",
   explain:"Um ângulo é formado quando dois raios saem do mesmo ponto (o <b>vértice</b>). A abertura entre eles é medida em graus (°). Quanto mais 'aberto', maior o ângulo. Uma volta completa tem 360°. Ângulos estão em todo lugar: no relógio, nas construções, nos braços quando você os abre.",
   example:"Quando o ponteiro dos minutos está no 12 e o dos horas no 3, o ângulo formado entre eles é de 90° — exatamente o mesmo ângulo do canto de uma folha de papel.",
   visual:`<svg viewBox="0 0 260 210" xmlns="http://www.w3.org/2000/svg" width="240">
     <line x1="40" y1="180" x2="230" y2="180" stroke="#54A0FF" stroke-width="3" stroke-linecap="round"/>
     <line x1="40" y1="180" x2="130" y2="55" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
     <path d="M 95,180 A 55,55 0 0,1 65,130" fill="none" stroke="#FF9F43" stroke-width="2.5" stroke-dasharray="5,3"/>
     <text x="108" y="162" font-family="Fredoka One" font-size="20" fill="#FF9F43">α</text>
     <circle cx="40" cy="180" r="6" fill="#5F27CD"/>
     <text x="28" y="205" font-family="Fredoka One" font-size="12" fill="#5F27CD">Vértice</text>
     <text x="155" y="175" font-family="Nunito" font-size="12" fill="#54A0FF" font-weight="700">raio 1</text>
     <text x="118" y="88" font-family="Nunito" font-size="12" fill="#FF6B6B" font-weight="700">raio 2</text>
   </svg>`,
   visualCaption:"O ângulo α é a abertura entre os dois raios. O ponto roxo é o vértice — de onde os raios partem.",
   summary:["Ângulo agudo: menor que 90°","Ângulo reto: exatamente 90° (canto de folha)","Ângulo obtuso: entre 90° e 180°","Ângulo raso: 180° (linha reta)","Volta completa: 360°"]},

  {year:"6",theme:"Geometria",emoji:"📏",term:"Perímetro",
   simple:"A medida do contorno de uma figura — a soma de todos os seus lados.",
   explain:"Perímetro é a distância total que se percorre ao andar em torno da borda de uma figura. Para calculá-lo, somamos a medida de todos os lados. É muito usado em situações práticas como cercar terrenos, colocar molduras em quadros ou construir muros.",
   example:"Para cercar um jardim retangular de 6m de comprimento e 4m de largura: P = 6+4+6+4 = <b>20m</b> de cerca.",
   visual:`<svg viewBox="0 0 280 190" xmlns="http://www.w3.org/2000/svg" width="260">
     <rect x="40" y="35" width="200" height="120" fill="#e8f8e8" stroke="#27ae60" stroke-width="3" rx="4"/>
     <text x="140" y="25" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#27ae60">6m</text>
     <text x="140" y="178" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#27ae60">6m</text>
     <text x="18" y="100" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#27ae60">4m</text>
     <text x="262" y="100" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#27ae60">4m</text>
     <text x="140" y="95" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#2D3436">P = 6+4+6+4</text>
     <text x="140" y="118" text-anchor="middle" font-family="Fredoka One" font-size="18" fill="#FF6B6B">= 20m</text>
   </svg>`,
   visualCaption:"O perímetro é a soma de todos os lados. Para o retângulo de 6m × 4m, o perímetro é 20m.",
   summary:["Some todos os lados da figura","Retângulo: P = 2 × (comprimento + largura)","Quadrado: P = 4 × lado","Triângulo: P = lado1 + lado2 + lado3","Círculo: P = 2πr (chamado circunferência)"]},

  {year:"6",theme:"Números",emoji:"⭐",term:"MMC — Mínimo Múltiplo Comum",
   simple:"O menor número que é múltiplo de dois ou mais números ao mesmo tempo.",
   explain:"O MMC é muito usado para somar e subtrair frações com denominadores diferentes. Para encontrá-lo, listamos os múltiplos de cada número e identificamos o menor que aparece em todos. Também pode ser calculado por decomposição em fatores primos.",
   example:"MMC de 4 e 6: Múltiplos de 4 → 4, 8, <b>12</b>, 16... Múltiplos de 6 → 6, <b>12</b>, 18... O primeiro que aparece nos dois é 12. Logo, MMC(4,6) = 12.",
   visual:`<svg viewBox="0 0 280 175" xmlns="http://www.w3.org/2000/svg" width="260">
     <text x="65" y="22" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#FF6B6B">Múlt. de 4</text>
     <text x="215" y="22" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#54A0FF">Múlt. de 6</text>
     ${[4,8,12,16,20].map((n,i)=>{const f=n===12?'#27ae60':'#FF6B6B';return`<circle cx="65" cy="${45+i*26}" r="17" fill="${f}"/><text x="65" y="${51+i*26}" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#fff">${n}</text>`;}).join('')}
     ${[6,12,18,24,30].map((n,i)=>{const f=n===12?'#27ae60':'#54A0FF';return`<circle cx="215" cy="${45+i*26}" r="17" fill="${f}"/><text x="215" y="${51+i*26}" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#fff">${n}</text>`;}).join('')}
     <line x1="82" y1="97" x2="198" y2="97" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
     <text x="140" y="93" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#27ae60">MMC = 12</text>
   </svg>`,
   visualCaption:"O 12 (verde) é o primeiro número que aparece na lista de múltiplos dos dois — esse é o MMC.",
   summary:["MMC = menor número divisível por todos os dados","Muito usado para somar frações com denominadores diferentes","Pode ser encontrado por decomposição em fatores primos","MMC × MDC = produto dos dois números"]},

  // 7º ANO
  {year:"7",theme:"Álgebra",emoji:"⚖️",term:"Equação do 1º Grau",
   simple:"Uma igualdade com uma incógnita (letra). Resolver é descobrir qual valor a letra precisa ter para a igualdade ser verdadeira.",
   explain:"Uma equação do 1º grau tem a forma <b>ax + b = c</b>. Para resolvê-la, isolamos o x fazendo a mesma operação nos dois lados da igualdade — como uma balança: o que faço de um lado, faço do outro para manter o equilíbrio.",
   example:"3x + 5 = 20 → subtraio 5 dos dois lados: 3x = 15 → divido os dois por 3: <b>x = 5</b>. Verificação: 3×5+5 = 20 ✓",
   visual:`<svg viewBox="0 0 280 190" xmlns="http://www.w3.org/2000/svg" width="260">
     <line x1="140" y1="165" x2="140" y2="105" stroke="#636e72" stroke-width="3"/>
     <line x1="40" y1="105" x2="240" y2="105" stroke="#636e72" stroke-width="3"/>
     <line x1="40" y1="105" x2="40" y2="88" stroke="#636e72" stroke-width="2"/>
     <line x1="240" y1="105" x2="240" y2="88" stroke="#636e72" stroke-width="2"/>
     <rect x="8" y="60" width="64" height="30" rx="8" fill="#FF9F43"/>

  {year:"7",theme:"Álgebra",emoji:"🔤",term:"Expressão Algébrica",
   simple:"Combinação de números, letras e operações. As letras representam valores que variam ou são desconhecidos.",
   explain:"Uma expressão algébrica usa letras (<b>variáveis</b>) para representar quantidades que mudam. Diferente de uma equação, ela não tem '='. Para calcular o valor da expressão, basta substituir a letra por um número.",
   example:"O preço de x ingressos a R$15 cada é <b>15x</b>. Para 4 ingressos: 15×4 = R$60. Para 10: 15×10 = R$150. A expressão funciona para qualquer quantidade.",
   visual:`<svg viewBox="0 0 270 170" xmlns="http://www.w3.org/2000/svg" width="250">
     <rect x="15" y="15" width="240" height="52" rx="12" fill="#f0edff" stroke="#6C5CE7" stroke-width="2"/>
     <text x="135" y="48" text-anchor="middle" font-family="Fredoka One" font-size="28" fill="#6C5CE7">2x + 5</text>

     <text x="75" y="115" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#FF9F43">2</text>
     <text x="135" y="115" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#FF6B6B">x</text>
     <text x="195" y="95" text-anchor="middle" font-family="Nunito" font-size="11" fill="#54A0FF" font-weight="800">independente</text>
     <text x="195" y="115" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#54A0FF">5</text>
     <text x="50" y="148" font-family="Nunito" font-size="12" fill="#636e72" font-weight="700">Se x=3: 2×3+5=11  |  Se x=10: 2×10+5=25</text>
   </svg>`,
   visualCaption:"Na expressão 2x+5, o coeficiente (2) multiplica a variável (x), e o termo independente (5) é sempre somado.",
   summary:["Letras = variáveis (valores que mudam)","Coeficiente = número que multiplica a variável","Termo independente = número sem variável","Para calcular: substitua a letra por um número","Diferente de equação: não tem sinal de '='"]},

  {year:"7",theme:"Geometria",emoji:"🔺",term:"Ângulos no Triângulo",
   simple:"A soma dos três ângulos internos de qualquer triângulo é sempre 180°.",
   explain:"Esta é uma das propriedades mais importantes da geometria. Não importa o formato do triângulo — enorme ou minúsculo, equilátero ou escaleno — a soma dos seus três ângulos internos será <b>sempre 180°</b>. Isso nos permite calcular um ângulo desconhecido se soubermos os outros dois.",
   example:"Um triângulo tem ângulos de 60° e 80°. Qual é o terceiro? 180° − 60° − 80° = <b>40°</b>.",
   visual:`<svg viewBox="0 0 270 195" xmlns="http://www.w3.org/2000/svg" width="250">
     <polygon points="135,18 18,178 252,178" fill="#e8f4f8" stroke="#54A0FF" stroke-width="3"/>

     <text x="234" y="168" text-anchor="middle" font-family="Fredoka One" font-size="16" fill="#27ae60">50°</text>
     <text x="135" y="193" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#6C5CE7">60° + 70° + 50° = 180°</text>
   </svg>`,
   visualCaption:"Qualquer triângulo tem a soma dos ângulos internos igual a 180°. Sempre!",
   summary:["Soma dos ângulos internos = 180° (sempre!)","3º ângulo = 180° − ângulo1 − ângulo2","Triângulo equilátero: todos os ângulos = 60°","Triângulo retângulo: um ângulo = 90°","Triângulo isósceles: dois ângulos iguais"]},

  {year:"7",theme:"Grandezas",emoji:"🗺️",term:"Escala",
   simple:"A proporção entre o tamanho de um desenho/mapa e o tamanho real do objeto representado.",
   explain:"A escala permite representar objetos muito grandes (como cidades) em um tamanho que caiba numa folha. A escala 1:100 significa que 1cm no desenho representa 100cm (1m) na realidade. Para encontrar o tamanho real, multiplicamos a medida do desenho pelo denominador da escala.",
   example:"Num mapa escala 1:50.000, dois pontos estão a 4cm de distância. Distância real: 4 × 50.000 = 200.000cm = <b>2km</b>.",
   visual:`<svg viewBox="0 0 270 175" xmlns="http://www.w3.org/2000/svg" width="255">
     <rect x="15" y="18" width="95" height="60" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
     <text x="62" y="50" text-anchor="middle" font-family="Fredoka One" font-size="12" fill="#27ae60">No mapa</text>
     <text x="62" y="70" text-anchor="middle" font-family="Nunito" font-size="12" fill="#555" font-weight="700">2cm</text>
     <text x="133" y="52" text-anchor="middle" font-family="Fredoka One" font-size="22" fill="#FF9F43">→</text>
     <text x="133" y="70" text-anchor="middle" font-family="Fredoka One" font-size="11" fill="#FF9F43">1:100</text>
     <rect x="158" y="10" width="95" height="75" rx="8" fill="#a9dfbf" stroke="#27ae60" stroke-width="2"/>
     <text x="205" y="50" text-anchor="middle" font-family="Fredoka One" font-size="12" fill="#1e8449">Na realidade</text>
     <text x="205" y="72" text-anchor="middle" font-family="Nunito" font-size="12" fill="#555" font-weight="700">2m = 200cm</text>
     <text x="135" y="130" text-anchor="middle" font-family="Nunito" font-size="13" fill="#636e72" font-weight="700">tamanho real = medida × escala</text>
     <text x="135" y="155" text-anchor="middle" font-family="Nunito" font-size="13" fill="#636e72" font-weight="700">2cm × 100 = 200cm = 2m</text>
   </svg>`,
   visualCaption:"Na escala 1:100, cada centímetro do desenho representa 100cm do objeto real.",
   summary:["Escala = tamanho do desenho ÷ tamanho real","1:100 → 1cm do mapa = 100cm real","Tamanho real = medida no mapa × denominador","Usada em mapas, plantas de casas, maquetes e projetos"]},

  // 8º ANO
  {year:"8",theme:"Geometria",emoji:"🏛️",term:"Teorema de Pitágoras",
   simple:"Num triângulo retângulo: hipotenusa² = cateto² + cateto². O maior lado ao quadrado igual à soma dos outros dois ao quadrado.",
   explain:"Em qualquer triângulo retângulo (com ângulo de 90°), se chamarmos os dois lados menores de <b>a</b> e <b>b</b> (catetos), e o maior de <b>c</b> (hipotenusa), então: <b>c² = a² + b²</b>. Isso permite calcular qualquer lado do triângulo se soubermos os outros dois.",
   example:"Uma escada apoia a 4m de altura na parede, com a base a 3m da parede. Comprimento da escada: c² = 3²+4² = 9+16 = 25 → c = √25 = <b>5m</b>.",
   visual:`<svg viewBox="0 0 275 215" xmlns="http://www.w3.org/2000/svg" width="255">
     <polygon points="40,185 40,60 185,185" fill="#e8f4f8" stroke="#54A0FF" stroke-width="3"/>
     <rect x="40" y="165" width="20" height="20" fill="none" stroke="#54A0FF" stroke-width="2"/>
     <text x="28" y="128" text-anchor="end" font-family="Fredoka One" font-size="15" fill="#FF6B6B">a = 4</text>
     <text x="108" y="203" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#FF9F43">b = 3</text>
     <text x="125" y="118" text-anchor="middle" font-family="Fredoka One" font-size="15" fill="#27ae60">c = 5</text>
     <text x="138" y="215" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#6C5CE7">c² = a² + b²  →  25 = 16 + 9</text>
   </svg>`,
   visualCaption:"O triângulo 3-4-5 é o exemplo clássico. A hipotenusa² (25) = soma dos catetos² (16+9).",
   summary:["Só funciona em triângulo RETÂNGULO (90°)","c² = a² + b²  (c = hipotenusa)","Para achar c: c = √(a²+b²)","Ternas famosas: 3-4-5, 5-12-13, 8-15-17","Verifique se é retângulo antes de aplicar!"]},

  {year:"8",theme:"Geometria",emoji:"⭕",term:"Circunferência e Círculo",
   simple:"Circunferência é a linha curva (o contorno). Círculo é a região completa: contorno + interior.",
   explain:"Atenção à diferença! A <b>circunferência</b> é apenas o conjunto de pontos igualmente distantes do centro — só a 'borda'. O <b>círculo</b> inclui a borda e tudo que está dentro. O <b>raio</b> vai do centro à borda. O <b>diâmetro</b> atravessa o centro de ponta a ponta (= 2 × raio).",
   example:"Uma pista de atletismo circular com raio de 50m: comprimento da pista = 2×π×50 ≈ <b>314m</b>. Área do campo = π×50² ≈ <b>7.854m²</b>.",
   visual:`<svg viewBox="0 0 250 230" xmlns="http://www.w3.org/2000/svg" width="230">
     <circle cx="125" cy="110" r="90" fill="#e8f4f8" stroke="#54A0FF" stroke-width="3"/>
     <circle cx="125" cy="110" r="4" fill="#FF6B6B"/>
     <line x1="125" y1="110" x2="215" y2="110" stroke="#FF6B6B" stroke-width="2.5"/>
     <line x1="35" y1="110" x2="215" y2="110" stroke="#6C5CE7" stroke-width="1.5" stroke-dasharray="6,3"/>
     <text x="170" y="103" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#FF6B6B">raio (r)</text>
     <text x="125" y="140" text-anchor="middle" font-family="Fredoka One" font-size="12" fill="#6C5CE7">diâmetro (d=2r)</text>
     <text x="125" y="222" text-anchor="middle" font-family="Fredoka One" font-size="12" fill="#54A0FF">Circ.=2πr   Área=πr²</text>
   </svg>`,
   visualCaption:"O raio (vermelho) vai do centro à borda. O diâmetro (roxo tracejado) atravessa o centro. A linha azul é a circunferência.",
   summary:["Circunferência = apenas a borda (linha curva)","Círculo = borda + interior (área)","Raio = centro até qualquer ponto da borda","Diâmetro = 2 × raio","Comprimento = 2πr ≈ 6,28r | Área = πr²"]},

  {year:"8",theme:"Álgebra",emoji:"📈",term:"Função do 1º Grau",
   simple:"Regra que liga dois valores com expoente 1. Seu gráfico é sempre uma linha reta. Forma: y = ax + b.",
   explain:"A função do 1º grau tem a forma <b>f(x) = ax + b</b>. O parâmetro <b>a</b> é o coeficiente angular — ele define a inclinação da reta (positivo: sobe; negativo: desce). O parâmetro <b>b</b> é o coeficiente linear — onde a reta corta o eixo y. É a função mais usada para modelar situações de crescimento ou queda constantes.",
   example:"Um táxi cobra R$5 de taxa fixa + R$2/km: custo = 2x + 5. Com 10km: R$25. Com 20km: R$45. O preço cresce linearmente.",
   visual:`<svg viewBox="0 0 250 215" xmlns="http://www.w3.org/2000/svg" width="230">
     <line x1="25" y1="190" x2="230" y2="190" stroke="#636e72" stroke-width="2"/>

     <polygon points="29,15 35,2 41,15" fill="#636e72"/>
     <text x="240" y="194" font-family="Fredoka One" font-size="11" fill="#636e72">x</text>
     <text x="38" y="11" font-family="Fredoka One" font-size="11" fill="#636e72">y</text>
     <line x1="35" y1="165" x2="210" y2="50" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
     <circle cx="35" cy="165" r="5" fill="#6C5CE7"/>
     <text x="5" y="168" font-family="Fredoka One" font-size="11" fill="#6C5CE7">b</text>
     <text x="130" y="98" font-family="Fredoka One" font-size="13" fill="#FF6B6B" transform="rotate(-33,130,98)">y = ax + b</text>
   </svg>`,
   visualCaption:"O gráfico é sempre uma reta. O ponto roxo (b) é onde a reta cruza o eixo y. A inclinação depende de a.",
   summary:["Forma: f(x) = ax + b","a > 0: reta crescente (sobe da esquerda pra direita)","a < 0: reta decrescente (desce)","b = valor de y quando x = 0 (ponto inicial)","Gráfico = sempre linha reta"]},

  {year:"8",theme:"Estatística",emoji:"📊",term:"Média Aritmética",

   explain:"A média aritmética é calculada somando todos os valores e dividindo pelo número de valores. Ela representa o 'centro de equilíbrio' dos dados — o valor que cada um teria se tudo fosse redistribuído igualmente. É sensível a valores extremos: um dado muito alto ou muito baixo pode distorcer a média.",
   example:"Notas de um aluno: 6, 7, 8, 9 e 10. Média = (6+7+8+9+10) ÷ 5 = 40 ÷ 5 = <b>8</b>.",

     ${[6,7,8,9,10].map((n,i)=>{const h=n*10,x=22+i*50,y=155-h;return`<rect x="${x}" y="${y}" width="36" height="${h}" rx="6" fill="#54A0FF" opacity="0.85"/><text x="${x+18}" y="${y-6}" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#2D3436">${n}</text>`;}).join('')}
     <line x1="10" y1="75" x2="265" y2="75" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="8,4"/>
     <text x="260" y="71" font-family="Fredoka One" font-size="12" fill="#FF6B6B">8</text>
     <text x="135" y="172" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#FF6B6B">Média = 8</text>
   </svg>`,
   visualCaption:"A linha vermelha mostra a média (8). Algumas notas estão acima, outras abaixo — a média é o ponto de equilíbrio.",
   summary:["Média = soma ÷ quantidade","Representa o valor de equilíbrio","Sensível a extremos (valores muito altos ou baixos)","Usada em notas, temperaturas, salários","Compare sempre com mediana e moda para análise completa"]},

  // 9º ANO
  {year:"9",theme:"Álgebra",emoji:"🏹",term:"Função do 2º Grau",
   simple:"Função onde x aparece ao quadrado (x²). Seu gráfico é uma curva em U chamada parábola.",
   explain:"A função do 2º grau tem a forma <b>f(x) = ax² + bx + c</b>. O gráfico é uma <b>parábola</b>. Se <b>a > 0</b>, a parábola tem concavidade para cima (∪) e tem um ponto de mínimo. Se <b>a < 0</b>, para baixo (∩) com ponto de máximo. Esse ponto é o <b>vértice</b>.",
   example:"A altura de uma bola chutada segue h(t) = −t²+6t. Ela sobe, atinge o ponto máximo no vértice, e cai — formando uma parábola.",
   visual:`<svg viewBox="0 0 255 200" xmlns="http://www.w3.org/2000/svg" width="235">

   visualCaption:"A parábola tem um vértice (ponto máximo ou mínimo) e pode cruzar o eixo x em 0, 1 ou 2 pontos (raízes).",
   summary:["Forma: f(x) = ax²+bx+c","a>0: parábola ∪ (mínimo) | a<0: parábola ∩ (máximo)","Vértice = ponto mais alto ou mais baixo","Raízes = onde a parábola cruza o eixo x","Usada em física, trajetórias, lucro máximo"]},

  {year:"9",theme:"Geometria",emoji:"🌊",term:"Seno, Cosseno e Tangente",
   simple:"As três razões trigonométricas do triângulo retângulo. Relacionam ângulos com lados.",
   explain:"No triângulo retângulo, para um ângulo α, os lados têm nomes: <b>cateto oposto</b> (não toca α), <b>cateto adjacente</b> (toca α, mas não é a hipotenusa) e <b>hipotenusa</b> (maior lado, oposto ao 90°). As razões são: <b>sen(α) = op/hip</b>, <b>cos(α) = adj/hip</b>, <b>tg(α) = op/adj</b>. Macete: <b>SOH-CAH-TOA</b>.",
   example:"Triângulo com cateto oposto=3, adjacente=4, hipotenusa=5: sen(α)=3/5=0,6 | cos(α)=4/5=0,8 | tg(α)=3/4=0,75.",
   visual:`<svg viewBox="0 0 275 205" xmlns="http://www.w3.org/2000/svg" width="255">
     <polygon points="38,185 38,58 198,185" fill="#e8f4f8" stroke="#54A0FF" stroke-width="2.5"/>
     <rect x="38" y="165" width="20" height="20" fill="none" stroke="#54A0FF" stroke-width="2"/>
     <text x="24" y="125" text-anchor="end" font-family="Fredoka One" font-size="13" fill="#FF6B6B">oposto</text>
     <text x="112" y="202" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#27ae60">adjacente</text>
     <text x="128" y="110" text-anchor="middle" font-family="Fredoka One" font-size="13" fill="#6C5CE7">hipotenusa</text>
     <path d="M 58,185 A 20,20 0 0,0 38,167" fill="none" stroke="#FF9F43" stroke-width="2"/>
     <text x="66" y="176" font-family="Fredoka One" font-size="13" fill="#FF9F43">α</text>
     <text x="18" y="205" font-family="Nunito" font-size="11" fill="#555" font-weight="700">SOH: sen=op/hip | CAH: cos=adj/hip | TOA: tg=op/adj</text>
   </svg>`,
   visualCaption:"Para o ângulo α, identifique os lados e aplique SOH-CAH-TOA para calcular as razões trigonométricas.",
   summary:["sen(α) = cateto oposto ÷ hipotenusa","cos(α) = cateto adjacente ÷ hipotenusa","tg(α) = cateto oposto ÷ cateto adjacente","Macete: SOH-CAH-TOA","Usada para calcular alturas, distâncias e ângulos inacessíveis"]},

  {year:"9",theme:"Álgebra",emoji:"🔎",term:"Fórmula de Bhaskara",
   simple:"A fórmula que resolve qualquer equação do 2º grau, encontrando os valores de x.",
   explain:"Toda equação ax²+bx+c=0 pode ser resolvida pela fórmula: <b>x = (−b ± √Δ) / 2a</b>, onde <b>Δ = b²−4ac</b> (discriminante). O Δ determina quantas soluções existem antes mesmo de calcular tudo.",
   example:"x²−5x+6=0: a=1, b=−5, c=6. Δ = 25−24 = 1. x = (5±1)/2 → <b>x₁=3 e x₂=2</b>. Verifique: 3²−5×3+6=0 ✓",
   visual:`<svg viewBox="0 0 270 178" xmlns="http://www.w3.org/2000/svg" width="255">
     <rect x="8" y="12" width="254" height="55" rx="12" fill="#f0edff" stroke="#6C5CE7" stroke-width="2"/>
     <text x="135" y="36" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#6C5CE7">Δ = b² − 4ac</text>
     <text x="135" y="58" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#6C5CE7">x = (−b ± √Δ) / 2a</text>
     <rect x="8" y="82" width="76" height="68" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
     <text x="46" y="110" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#27ae60">Δ &gt; 0</text>
     <text x="46" y="132" text-anchor="middle" font-family="Nunito" font-size="11" fill="#27ae60" font-weight="700">2 soluções</text>
     <rect x="97" y="82" width="76" height="68" rx="10" fill="#fef9e7" stroke="#FF9F43" stroke-width="2"/>
     <text x="135" y="110" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#FF9F43">Δ = 0</text>
     <text x="135" y="132" text-anchor="middle" font-family="Nunito" font-size="11" fill="#FF9F43" font-weight="700">1 solução</text>
     <rect x="186" y="82" width="76" height="68" rx="10" fill="#fde8e8" stroke="#FF6B6B" stroke-width="2"/>
     <text x="224" y="110" text-anchor="middle" font-family="Fredoka One" font-size="14" fill="#FF6B6B">Δ &lt; 0</text>
     <text x="224" y="132" text-anchor="middle" font-family="Nunito" font-size="11" fill="#FF6B6B" font-weight="700">sem solução</text>
   </svg>`,

let activeYear='all',activeTheme='all',searchQ='';

function render(){
  const grid=document.getElementById('glossary');
  const ctr=document.getElementById('counter');
  const filtered=terms.filter(t=>{
    const y=activeYear==='all'||t.year===activeYear;
    const th=activeTheme==='all'||t.theme===activeTheme;
    const s=searchQ===''||t.term.toLowerCase().includes(searchQ)||t.simple.toLowerCase().includes(searchQ);
    return y&&th&&s;
  });
  ctr.textContent=filtered.length?`${filtered.length} termo${filtered.length>1?'s':''} encontrado${filtered.length>1?'s':''}` :'';
  if(!filtered.length){grid.innerHTML=`<div class="no-results"><span>🔍</span>Nenhum termo encontrado.</div>`;return;}
  grid.innerHTML=filtered.map(t=>`
    <div class="card" data-year="${t.year}" onclick="openModal(${terms.indexOf(t)})">
      <div class="card-top">
        <span style="font-size:1.9rem">${t.emoji}</span>
        <div class="card-badges">
          <span class="by" data-year="${t.year}">${t.year}º ano</span>
          <span class="bt">${t.theme}</span>
        </div>
      </div>
      <h3>${t.term}</h3>
      <p class="simple">${t.simple}</p>
      <p class="hint">👆 Clique para ver visual e exemplos</p>
    </div>`).join('');
}

function openModal(idx){
  const t=terms[idx];
  const col=COLORS[+t.year];
  document.getElementById('modalBand').style.background=`linear-gradient(135deg,${col}ee,${col}99)`;
  document.getElementById('mEmoji').textContent=t.emoji;
  document.getElementById('mTitle').textContent=t.term;
  document.getElementById('mSub').textContent=`${t.year}º ano · ${t.theme}`;
  document.getElementById('mp0').innerHTML=`
    <div class="explain-box">${t.explain}</div>
    <div class="example-box" style="border-color:${col};background:${col}18">
      <div class="elabel" style="color:${col}">💡 Exemplo do dia a dia</div>
      <p>${t.example}</p>
    </div>`;
  document.getElementById('mp1').innerHTML=`
    <div class="visual-wrap">${t.visual}</div>
    <p class="visual-caption">${t.visualCaption}</p>`;
  document.getElementById('mp2').innerHTML=`
    <ul class="summary-list">
      ${t.summary.map(s=>`<li><span class="icon">✅</span><span>${s}</span></li>`).join('')}
    </ul>`;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.mpanel').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModalDirect(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function switchTab(idx,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mpanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`mp${idx}`).classList.add('active');
}
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    activeYear=tab.dataset.year;render();
  });
});
document.querySelectorAll('.theme-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTheme=btn.dataset.theme;render();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase().trim();render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
render();
</script>
